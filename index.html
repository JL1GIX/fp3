</td><td>２００円</td></tr></tbody></table>", "choices": ["（ア）３１０", "（イ）２０３", "（ウ）８４１ 【第２問】下記の（問３）～（問５）について解答しなさい。"], "answer": 0, "kaisetsu": "【ここがポイント！】キャッシュフロー表の複数年計算では、前年の数値が次年の計算に使われることに注意します。\n\n端数処理のルール（計算過程では端数処理をしない、最終結果は四捨五入）を厳密に守って、各欄を計算します。\n\n3つの空欄(ア)(イ)(ウ)のうち、誤っているものが1つあります。与えられた計算式と前年の数値を使って、各欄を段階的に検算し、矛盾する箇所を見つけます。正解は①「(ア)310が誤り」です。"}, {"num": 3, "type": "multi", "text": "下記＜資料＞に基づくＨＸ株式会社の投資指標に関する次の記述のうち、最も不適切なものはどれか。 なお、購入時の手数料および税金は考慮しないものとする。 ＜資料＞ ［株式市場に関するデータ］ （出所：日本経済新聞 ２０２３年１月１３日朝刊 ２０面） ［ＨＸ株式会社に関するデータ］ 株価 ２,２００円 １株当たり純利益（今期予想） ７３０円 １株当たり純資産 ４,２８０円 １株当たり年間配当金（今期予想） ２００円", "tables_html": "<table class=\"q-table\"><tbody><tr><td>株価</td><td>２,２００円</td></tr><tr><td>１株当たり純利益（今期予想）</td><td>７３０円</td></tr><tr><td>１株当たり純資産</td><td>４,２８０円</td></tr><tr><td>１株当たり年間配当金（今期予想）</td><td>２００円</td></tr></tbody></table>", "choices": ["株価収益率（ＰＥＲ）で比較した場合、ＨＸ株式会社の株価は日経平均採用銘柄の平均（予想ベー ス）より割安である。", "株価純資産倍率（ＰＢＲ）で比較した場合、ＨＸ株式会社の株価は東証プライム全銘柄の平均より 割安である。", "配当利回り（単純平均）で比較した場合、ＨＸ株式会社の配当利回りは東証スタンダード全銘柄の 平均（予想ベース）より低い。"], "answer": 2, "kaisetsu": "【ここがポイント！】投資指標PER、PBR、配当利回りの計算と比較を正確に理解しましょう。\n\nHX株式会社の株価2,200円について、①PER（株価÷1株当たり純利益）＝2,200円÷730円≈3.01倍で、日経平均平均PER(14倍程度)より割安です。②PBR（株価÷1株当たり純資産）＝2,200円÷4,280円≈0.51倍で、東証プライム平均(1倍前後)より割安です。③配当利回り（1株当たり年間配当÷株価）を計算して、東証スタンダード平均と比較します。正解は③「配当利回りが低い」が最も不適切です。"}, {"num": 4, "type": "multi", "text": "東京証券取引所に上場されている国内株式の買い付け等に関する次の記述のうち、最も適切なものは どれか。なお、解答に当たっては、下記のカレンダーを使用すること。 ２０２３年 ９月／１０月 日 月 火 水 木 金 土 ９／２４ ２５ ２６ ２７ ２８ ２９ ３０ １０／１ ２ ３ ４ ５ ６ ７ ※網掛け部分は、市場休業日である。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>株価</td><td>２,２００円</td></tr><tr><td>１株当たり純利益（今期予想）</td><td>７３０円</td></tr><tr><td>１株当たり純資産</td><td>４,２８０円</td></tr><tr><td>１株当たり年間配当金（今期予想）</td><td>２００円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>２０２３年 ９月／１０月</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr><tr><td></td><td></td><td>日</td><td></td><td></td><td>月</td><td>火</td><td>水</td><td>木</td e\"><tbody><tr><td>毎回 ××,×××円</td></tr><tr><td>［保険料払込方法（回数）］<br>団体月払い</td></tr><tr><td>◇社員配当金支払方法<br>利息をつけて積立て<br>◇特約の払込期間および保険期間<br>１５年</td></tr></tbody></table>", "choices": ["（ア）なし （イ）可 （ウ）５", "（ア）３週間に１回以上 （イ）不可 （ウ）５", "（ア）３週間に１回以上 （イ）可 （ウ）３ 【第４問】下記の（問８）～（問１０）について解答しなさい。"], "answer": 0, "kaisetsu": "【ここがポイント！】媒介契約の3つの種類と重要な違いを正確に理解することが基本です。\n\n①一般媒介契約：複数業者への重複依頼「可」、自己発見取引「可」、報告頻度「なし」。②専任媒介契約：複数依頼「不可」、自己発見「可」、報告「2週に1回以上」。③専属専任媒介契約：複数依頼「不可」、自己発見「不可」、報告「1週に1回以上」。正解は①「なし・可・5」です。重複依頼の可否と、自己発見取引の可否が各契約で異なることがポイントです。"}, {"num": 8, "type": "multi", "text": "飯田雅彦さんが加入している定期保険特約付終身保険（下記＜資料＞参照）の保障内容に関する次の 記述の空欄（ア）にあてはまる金額として、正しいものはどれか。なお、保険契約は有効に継続してお り、特約は自動更新されているものとする。また、雅彦さんはこれまでに＜資料＞の保険から保険金お よび給付金を一度も受け取っていないものとする。 ＜資料＞ 定期保険特約付終身保険 保険証券記号番号○○△△××□□ ◇契約日（保険期間の始期） 保険契約者 飯田 雅彦 様 保険契約者印 ２００６年１０月１日 飯田 雅彦 様 契約年齢３０歳 ◇主契約の保険期間 被保険者 １９７６年８月１０日生まれ 男性 終身 ◯飯 田 (死亡保険金) 受取割合 ◇主契約の保険料払込期間 受取人 飯田 光子 様（妻） １０割 ６０歳払込満了 ◆ご契約内容 ◆お払い込みいただく合計保険料 毎回 ××,×××円 終身保険金額（主契約保険金額） ５００万円 定期保険特約保険金額 ３,０００万円 ［保険料払込方法（回数）］ 特定疾病保障定期保険特約保険金額 ４００万円 団体月払い 傷害特約保険金額 ３００万円 ◇社員配当金支払方法 災害入院特約［本人・妻型］入院５日目から 日額５,０００円 利息をつけて積立て 疾病入院特約［本人・妻型］入院５日目から 日額５,０００円 ※不慮の事故や疾病により所定の手術を受けた場合、手術の種 ◇特約の払込期間および保険期間 類に応じて手術給付金（入院給付金日額の１０倍・２０倍・ １５年 ４０倍）を支払います。 ※妻の場合は、本人の給付金の６割の日額となります。 リビング・ニーズ特約 飯田雅彦さんが、２０２３年中に交通事故により死亡（入院・手術なし）した場合に支払われる死 亡保険金は、合計（ ア ）である。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>保険契約者</td><td>飯田 雅彦 様</td><td></td><td>保険契約者印</td></tr><tr><td>被保険者</td><td>飯田 雅彦 様 契約年齢３０歳<br>１９７６年８月１０日生まれ 男性</td><td></td><td>◯飯<br>田</td></tr><tr><td>受取人</td><td>(死亡保険金)<br>飯田 光子 様（妻）</td><td>受取割合<br>１０割</td><td></td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>毎回 ××,×××円</td></tr><tr><td>［保険料払込方法（回数）］<br>団体月払い</td></tr><tr><td>◇社員配当金支払方法<br>利息をつけて積立て<br>◇特約の払込期間および保険期間<br>１５年</td></tr></tbody></table>", "choices": ["３,５００万円", "３,９００万円", "４,２００万円"], "answer": 2, "kaisetsu": "【ここがポイント！】定期保険特約付終身保険の保障内容を正確に把握することが重要です。\n\n定期保険特約とは、終身保険に「定期保険」の死亡保障を追加した商品です。特約の有効期間（年単位）と、自動更新の仕組みを理解する必要があります。\n\n飯田さんが加入した保険では、定期保険特約の保険金額、自動更新による保障内容の変化を把握します。保険証券に記載された保障内容から、特定時点での保障額を計算します。保険契約の継続と特約の自動更新が重要です。正解は③「4,200万円」です。"}, {"num": 9, "type": "multi", "text": "大垣正臣さんが２０２３年中に支払った生命保険の保険料は下記＜資料＞のとおりである。この場合 の正臣さんの２０２３年分の所得税の計算における生命保険料控除の金額として、正しいものはどれか。 なお、下記＜資料＞の保険について、これまでに契約内容の変更はないものとする。また、２０２３年 分の生命保険料控除額が最も多くなるように計算すること。 ＜資料＞ ［定期保険（無配当、新生命保険料）］ ［医療保険（無配当、介護医療保険料）］ 契約日：２０１９年５月１日 契約日：２０１２年８月１０日 保険契約者：大垣 正臣 保険契約者：大垣 正臣 被保険者：大垣 正臣 被保険者：大垣 正臣 死亡保険金受取人：大垣 悦子（妻） 死亡保険金受取人：大垣 悦子（妻） ２０２３年の年間支払保険料：６５,０４０円 ２０２３年の年間支払保険料：５０,４００円 ＜所得税の生命保険料控除額の速算表＞ ［２０１２年１月１日以後に締結した保険契約（新契約）等に係る控除額］ 年間の支払保険料の合計 控除額 ２０,０００円 以下 支払保険料の全額 ２０,０００円 超 ４０,０００円 以下 支払保険料×１／２＋１０,０００円 ４０,０００円 超 ８０,０００円 以下 支払保険料×１／４＋２０,０００円 ８０,０００円 超 ４０,０００円 （注）支払保険料とは、その年に支払った金額から、その年に受けた剰余金や割戻金を差し引いた残り の金額をいう。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>保険契約者</td><td>飯田 雅彦 様</td><td></td><td>保険契約者印</td></tr><tr><td>被保険者</td><td>飯田 雅彦 様 契約年齢３０歳<br>１９７６年８月１０日生まれ 男性</td><td></td><td>◯飯<br>田</td></tr><tr><td>受取人</td><td>(死亡保険金)<br>飯田 光子 様（妻）</td><td>受取割合<br>１０割</td><td></td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>毎回 ××,×××円</td></tr><tr><td>［保険料払込方法（回数）］<br>団体月払い</td></tr><tr><td>◇社員配当金支払方法<br>利息をつけて積立て<br>◇特約の払込期間および保険期間<br>１５年</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>年間の支払保険料の合計</td><td>控除額</td></tr><tr><td>２０,０００円 以下</td><td>支払保険料の全額</td></tr><tr><td>２０,０００円 超 ４０,０００円 以下</td><td>支払保険料×１／２＋１０,０００円</td></tr><tr><td>４０,０００円 超 ８０,０００円 以下</td><td>支払保険料×１／４＋２０,０００円</td></tr><tr><td>８０,０００円 超</td><td>４０,０００円</td></tr></tbody></table>", "choices": ["３６,２６０円", "４０,０００円", "６８,８６０円"], "answer": 2, "kaisetsu": "【ここがポイント！】生命保険料控除の計算方法と上限額を正確に理解しましょう。\n\n生命保険料控除は「一般生命保険控除（最大4万円）」と「介護医療保険控除（最大4万円）」に分かれています。新旧の保険商品で控除方法が異なることに注意が必要です。\n\n複数の保険料を支払っている場合、それぞれを分類して、控除額上限の4万円に到達するまで計算します。計算結果、総控除額の最大値が、正解は③「68,860円」です。ここがポイント！ 新保険料と旧保険料の区分、各カテゴリーの上限4万円を守ることが重要です。"}, {"num": 10, "type": "multi", "text": "損害保険の用語についてＦＰの青山さんが説明した次の記述のうち、最も適切なものはどれか。", "tables_html": "<table class=\"q-table\ d>４１０万円 超 ７７０万円 以下</td><td>（Ａ）×１５％＋ ６８.５万円</td></tr><tr><td></td><td>７７０万円 超 １,０００万円 以下</td><td>（Ａ）× ５％＋１４５.５万円</td></tr><tr><td></td><td>１,０００万円 超</td><td>１９５.５万円</td></tr><tr><td>６５歳以上の者</td><td>３３０万円 以下</td><td>１１０万円</td></tr><tr><td></td><td>３３０万円 超 ４１０万円 以下</td><td>（Ａ）×２５％＋ ２７.５万円</td></tr><tr><td></td><td>４１０万円 超 ７７０万円 以下</td><td>（Ａ）×１５％＋ ６８.５万円</td></tr><tr><td></td><td>７７０万円 超 １,０００万円 以下</td><td>（Ａ）× ５％＋１４５.５万円</td></tr><tr><td></td><td>１,０００万円 超</td><td>１９５.５万円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>支払年月</td><td>医療等を受けた人</td><td>内容</td><td>支払金額</td></tr><tr><td>２０２３年１月</td><td>大輝さん</td><td>人間ドック代（※１）</td><td>８万円</td></tr><tr><td>２０２３年５月～６月</td><td></td><td>入院費用（※２）</td><td>３０万円</td></tr><tr><td>２０２３年８月</td><td>妻</td><td>健康増進のためのビタミン剤の購入代</td><td>３万円</td></tr><tr><td>２０２３年９月</td><td></td><td>骨折の治療のために整形外科へ支払った<br>治療費</td><td>５万円</td></tr></tbody></table>", "choices": ["１９万円", "２５万円", "２７万円 【第６問】下記の（問１３）～（問１５）について解答しなさい。"], "answer": 0, "kaisetsu": "【ここがポイント！】医療費控除は「実際に支払った医療費」から「保険金」を差し引いて計算します。\n\n医療費控除の計算式：（実支払医療費－保険金）－10万円（または総所得の5%）=控除額です。給与所得800万円の場合、10万円の方が基準になります。\n\n具体的な医療費から保険金や通常より高い治療費などを考慮して計算します。最大の控除を受けるよう調整した結果、正解は①「19万円」です。ここがポイント！ セルフメディケーション税制も含める場合と含めない場合で計算方法が変わります。"}, {"num": 13, "type": "multi", "text": "２０２３年９月２日に相続が開始された鶴見和之さん（被相続人）の＜親族関係図＞が下記のとおり である場合、民法上の相続人および法定相続分の組み合わせとして、最も適切なものはどれか。なお、 記載のない条件については一切考慮しないものとする。 ＜親族関係図＞ 鶴見 和之 由希 （被相続人） 孝則 奈津子 達哉 優子（※) 祥吾 （すでに死亡） 勇斗 莉華 ※優子さんは適法に相続を放棄している。", "tables_html": "", "choices": ["由希 １／２ 達哉 １／２", "由希 １／２ 達哉 １／４ 勇斗 １／４", "由希 １／２ 達哉 １／６ 勇斗 １／６ 莉華 １／６"], "answer": 1, "kaisetsu": "【ここがポイント！】相続放棄や代襲相続の有無を正確に判定することが大切です。\n\n被相続人・鶴見和之の配偶者は由希さん(1/2)です。子については、孝則さんが死亡しているため、その子・達哉さんが代襲相続します。優子さんは相続放棄しているため、相続人ではなく、その子の相続権も失われます。\n\n相続人は由希さん、達哉さん(孝則さんの代襲)、勇斗さん(孝則さんの代襲)です。配偶者と3人の相続人なので、達哉さんと勇斗さんは合わせて1/2を2で分割：各1/4。正解は②「由希1/2、達哉1/4、勇斗1/4」です。"}, {"num": 14, "type": "multi", "text": "落合さん（６５歳）は、相続税の計算における生命保険金等の非課税限度額について、ＦＰで税理士 でもある佐野さんに質問をした。下記の空欄（ア）、（イ）にあてはまる数値または語句の組み合わせと して、最も適切なものはどれか。 ＜佐野さんの回答＞ 「被相続人の死亡によって相続人等が取得した生命保険金や損害保険金で、その保険料の全部また は一部を被相続人が負担していたものは、相続税の課税対象となります。 この死亡保険金の受取人が相続人である場合、すべての相続人が受け取った保険金の合計額が次 の算式によって計算した非課税限度額を超えるとき、その超える部分が相続税の課税対象になり ます。非課税限度額は『（ ア ）万円 ×（ イ ）の数』で求められます。」", "tables_html": "", "choices": ["（ア）３００ （イ）法定相続人", "（ア）３００ （イ）生命保険契約", "（ア）５００ （イ）法定相続人"], "answer": 2, "kaisetsu": "【ここがポイント！】生命保険金の相続税非課税限度額の計算方法を覚えておこう。\n\n相続税における生命保険金の非課税限度額は「500万円 × 法定相続人の数」です。空欄(ア)は「500」、空欄(イ)は「法定相続人」です。\n\n例えば、法定相続人が3人の場合、非課税限度額は1,500万円です。これを超えた部分の生命保険金が課税されます。ここがポイント！ 法定相続人の「数」であることに注意。実際の相続人の数ではなく、民法上の法定相続人の数を使います。正解は③です。"}, {"num": 15, "type": "multi", "text": "長岡さん（３５歳）が２０２３年中に贈与を受けた財産の価額および贈与者は以下のとおりである。 長岡さんの２０２３年分の贈与税額として、正しいものはどれか。なお、２０２３年中において、長岡 さんはこれ以外の財産の贈与を受けておらず、相続時精算課税制度は選択していないものとする。 ・ 長岡さんの父からの贈与 現金１８０万円 ・ 長岡さんの祖父からの贈与 現金５０万円 ・ 長岡さんの祖母からの贈与 現金２００万円 ※上記の贈与は、住宅取得等資金や教育資金、結婚・子育てに係る資金の贈与ではない。 ＜贈与税の速算表＞ （イ）１８歳以上の者が直系尊属から贈与を受けた財産の場合（特例贈与財産、特例税率） 基礎控除後の課税価格 税率 控除額 ２００万円 以下 １０％ － ２００万円 超 ４００万円 以下 １５％ １０万円 ４００万円 超 ６００万円 以下 ２０％ ３０万円 ６００万円 超 １,０００万円 以下 ３０％ ９０万円 １,０００万円 超 １,５００万円 以下 ４０％ １９０万円 １,５００万円 超 ３,０００万円 以下 ４５％ ２６５万円 ３,０００万円 超 ４,５００万円 以下 ５０％ ４１５万円 ４,５００万円 超 ５５％ ６４０万円 （注）「１８歳以上の者」とあるのは、２０２２年３月３１日以前の贈与により財産を取得した者の場 合、「２０歳以上の者」と読み替えるものとする。 （ロ）上記（イ）以外の場合（一般贈与財産、一般税率） 基礎控除後の課税価格 税率 控除額 ２００万円 以下 １０％ － ２００万円 超 ３００万円 以下 １５％ １０万円 ３００万円 超 ４００万円 以下 ２０％ ２５万円 ４００万円 超 ６００万円 以下 ３０％ ６５万円 ６００万円 超 １,０００万円 以下 ４０％ １２５万円 １,０００万円 超 １,５００万円 以下 ４５％ １７５万円 １,５００万円 超 ３,０００万円 以下 ５０％ ２５０万円 ３,０００万円 超 ５５％ ４００万円", "tables_html": "<table class=\"q-table\"><tbody><tr><td>基礎控除後の課税価格</td><td>税率</td><td>控除額</td></tr><tr><td>２００万円 以下</td><td>１０％</td><td>－</td></tr><tr><td>２００万円 超 ４００万円 以下</td><td>１５％</td><td>１０万円</td></tr><tr><td>４００万円 超 ６００万円 以下</td><td>２０％</td><td>３０万円</td></tr><tr><td>６００万円 超 １,０００万円 以下</td><td>３０％</td><td>９０万円</td></tr><tr><td>１,０００万円 超 １,５００万円 以下</td><td>４０％</td><td>１９０万円</td></tr><tr><td>１,５００万円 超 ３,０００万円 以下</td><td>４５％</td><td>２６５万円</td></tr><tr><td>３,０００万円 超 ４,５００万円 以下</td><td>５０％</td><td>４１５万円</td></tr><tr><td>４,５００ 解は②「38万円」です。ここがポイント！ 暦年課税と相続時精算課税の選択制を理解することが大切です。"}, {"num": 16, "type": "multi", "text": "ＦＰの浅見さんは、安藤家のバランスシートを作成した。下表の空欄（ア）にあてはまる金額として、 正しいものはどれか。なお、＜設例＞に記載のあるデータに基づいて解答するものとする。 ＜安藤家のバランスシート＞ （単位：万円) [資産］ ××× ［負債］ ××× 負債合計 ××× ［純資産］ （ ア ） 資産合計 ××× 負債・純資産合計 ×××", "tables_html": "<table class=\"q-table\"><tbody><tr><td>氏名</td><td>続柄</td><td>生年月日</td><td>年齢</td><td>備考</td></tr><tr><td>安藤 貴博</td><td>本人</td><td>１９７８年７月 ４日</td><td>４５歳</td><td>会社員</td></tr><tr><td>明子</td><td>妻</td><td>１９８１年５月３１日</td><td>４２歳</td><td>専業主婦</td></tr><tr><td>大輔</td><td>長男</td><td>２００７年８月１７日</td><td>１６歳</td><td>高校生</td></tr><tr><td>裕美</td><td>長女</td><td>２００９年７月２９日</td><td>１４歳</td><td>中学生</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>金融資産<br>普通預金<br>定期預金<br>投資信託<br>財形年金貯蓄<br>上場株式</td><td>２３０<br>２００<br>１８０<br>１５０<br>２７０</td></tr><tr><td>生命保険（解約返戻金相当額）</td><td>３５</td></tr><tr><td>不動産（自宅マンション）</td><td>３,２００</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>[資産］ ×××</td><td>［負債］ ×××</td></tr><tr><td></td><td>負債合計 ×××</td></tr><tr><td></td><td>［純資産］ （ ア ）</td></tr><tr><td>資産合計 ×××</td><td>負債・純資産合計 ×××</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>年利</td><td>減債基金係数</td><td>現価係数</td><td>資本回収係数</td><td>終価係数</td></tr><tr><td>１.０％</td><td>０.１９６０４</td><td>０.９５１５</td><td>０.２０６０４</td><td>１.０５１</td></tr><tr><td>２.０％</td><td>０.１９２１６</td><td>０.９０５７</td><td>０.２１２１６</td><td>１.１０４</td></tr></tbody></table>", "choices": ["１,１９５（万円）", "１,４３０（万円）", "１,４６５（万円）"], "answer": 2, "kaisetsu": "【ここがポイント！】複雑な資産・負債を含むバランスシートでも、基本式は変わりません。\n\n純資産 = 資産合計 - 負債合計です。安藤家のバランスシートで、すべての資産と負債を合計して計算します。\n\n不動産、現金・預金、投資信託などの資産から、住宅ローン・その他ローンなどの負債を差し引いた結果が純資産です。与えられた資料に基づいて計算すると、正解は③「1,465万円」です。"}, {"num": 17, "type": "multi", "text": "貴博さんは、６０歳で定年を迎えた後、公的年金の支給が始まる６５歳までの５年間の生活資金に退 職一時金の一部を充てようと考えている。退職一時金のうち６００万円を年利２.０％で複利運用しな がら５年間で均等に取り崩すこととした場合、年間で取り崩すことができる最大金額として、正しいも のはどれか。なお、下記＜資料＞の係数の中から最も適切な係数を選択して計算し、円単位で解答する こと。また、税金や記載のない事項については一切考慮しないものとする。 ＜資料：係数早見表（５年)＞ 年利 減債基金係数 現価係数 資本回収係数 終価係数", "tables_html": "<table class=\"q-table\"><tbody><tr><td>[資産］ ×××</td><td>［負債］ ×××</td></tr><tr><td></td><td>負債合計 ×××</td></tr><tr><td></td><td>［純資産］ （ ア ）</td></tr><tr><td>資産合計 ×××</td><td>負債・純資産合計 ×××</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>年利</td><td>減債基金係数</td><td>現価係数</td><td>資本回収係数</td><td>終価係数</td></tr><tr><td>１.０％</td><td>０.１９６０４</td><td>０.９５１５</td><td>０.２０６０４</td><td>１.０５１</td></tr><tr><td>２.０％</td><td>０.１９２１６</td><td>０.９０５７</td><td>０.２１２１６</td><td>１.１０４</td></tr></tbody></table>", "choices": ["０％ ０.１９６０４ ０.９５１５ ０.２０６０４ １.０５１", "０％ ０.１９２１６ ０.９０５７ ０.２１２１６ １.１０４ ※記載されている数値は正しいものとする。 １． １,１５２,９６０円 ２． １,２３６,２４０円", "１,２７２,９６０円"], "answer": 2, "kaisetsu": "【ここがポイント！】減債基金係数を使った定期的な取り崩し計算を理解しましょう。\n\n貴博さんが600万円を年利2.0%で5年間かけて均等に取り崩す場合、「減債基金係数」を使います。年間取り崩し額 = 600万円 × 係数です。\n\n係数表から2.0%・5年の減債基金係数(0.20604)を使うと、600万円 × 0.20604 ≈ 1,236,240円。正解は②「1,236,240円」です。ここがポイント！ 減債基金係数と年金現価係数は用途が異なります。取り崩す場合は減債基金係数を使用します。"}, {"num": 18, "type": "multi", "text": "貴博さんは、通常６５歳から支給される老齢基礎年金を繰り上げて受給することができることを知り、 ＦＰの浅見さんに質問をした。貴博さんの老齢基礎年金および老齢厚生年金の繰上げ受給に関する次の 記述のうち、最も不適切なものはどれか。なお、老齢基礎年金および老齢厚生年金の受給要件は満たし ているものとする。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>[資産］ ×××</td><td>［負債］ ×××</td></tr><tr><td></td><td>負債合計 ×××</td></tr><tr><td></td><td>［純資産］ （ ア ）</td></tr><tr><td>資産合計 ×××</td><td>負債・純資産合計 ×××</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>年利</td><td>減債基金係数</td><td>現価係数</td><td>資本回収係数</td><td>終価係数</td></tr><tr><td>１.０％</td><td>０.１９６０４</td><td>０.９５１５</td><td>０.２０６０４</td><td>１.０５１</td></tr><tr><td>２.０％</td><td>０.１９２１６</td><td>０.９０５７</td><td>０.２１２１６</td><td>１.１０４</td></tr></tbody></table>", "choices": ["老齢基礎年金を６０歳から繰上げ受給した場合、原則として、老齢厚生年金も６０歳から繰上げ受 給することになる。", "老齢基礎年金を繰上げ受給した場合の年金額は、繰上げ月数１月当たり、０.４％の割合で減額さ れる。", "老齢基礎年金を繰上げ受給した場合、６５歳になるまでであれば、繰上げ受給を取り消し、６５歳 からの受給に変更することができる。"], "answer": 2, "kaisetsu": "【ここがポイント！】老齢基礎年金の繰上げ受給の仕組みと制限を正確に理解しましょう。\n\n老齢基礎年金を60～64歳で繰上げ受給した場合、①減額率は月0.4%（240ヶ月なら96%減額）、②老齢厚生年金も原則同時に繰上げになります。\n\nここがポイント！ 繰上げを「取り消して戻す」ことはできないという点が重要です。一度繰上げ受給を選択すると、その後の変更はできません。正解は③「取り消し・変更できる」が不適切です。"}, {"num": 19, "type": "multi", "text": "明子さんは、現在、専業主婦であり国民年金の第３号被保険者であるが、パートタイマーとして、株 式会社ＳＸにて２０２３年１０月１日より「週２５時間、月給１２万円、雇用期間の定めなし」という 労働条件で働く予定である。この条件で働き始めた場合の明子さんの国民年金の被保険者種別に関する 次の記述のうち、最も適切なものはどれか。なお、株式会社ＳＸは特定適用事業所である。", "tables_html": "", "choices": ["国民年金の第１号被保険者である。", "国民年金の第２号被保険者である。", "国民年金の第３号被保険者である。"], "answer": 1, "kaisetsu": "【ここがポイント！】被保険者種別（1号・2号・3号）の判定基準を正確に理解することが大切です。\n\n明子さんは週25時間、月給12万円で特定適用事業所に勤務開始。社会保険の加入要件を確認します。一般的に「週20時間以上、月給8.8万円以上、継続雇用予定」で社会保険加入対象になります。\n\n明子さんはこれらの要件を満たすため、厚生年金保険の被保険者になり、国民年金の「第2号被保険者」に切り替わります。第1号(自営業)や第3号(配偶者扶養)ではなく、第2号です。正解は②です。"}, {"num": 20, "type": "multi", "text": "貴博さんと明子さんは、個人型確定拠出年金（以下「ｉＤｅＣｏ」という）について、ＦＰの浅見さ んに質問をした。ｉＤｅＣｏに関する浅見さんの次の説明のうち、最も不適切なものはどれか。", "tables_html": "", "choices": ["「ｉＤｅＣｏに加入した場合、拠出した掛金全額は、小規模企業共済等掛金控除として税額控除の 対象となり、所得税や住民税の負担が軽減されます。」", "「老齢給付金は年金として受け取ることができるほか、一時金として受け取ることもできます。」", "「国民年金の第３号被保険者である明子さんは、ｉＤｅＣｏに加入することができます。」"], "answer": 0, "kaisetsu": "【ここがポイント！】iDeCo制度の税制優遇と加入資格を正確に理解しましょう。\n\niDeCo最大のメリットは、掛金が「小規模企業共済等掛金控除」として「所得控除」されることです。混乱しやすいけど「税額控除」ではなく「所得控除」です。\n\n正解は①「『税額控除』ではなく『所得控除』が正しい」が最も不適切です。老齢給付金の年金・一時金受け取り選択や、第3号被保険者も加入可能という説明は正確です。ここがポイント！ 控除の種類（所得控除vs税額控除）を区別することが重要です。"}]}, {"id": "202401", "label": "2024年1月", "questions": [{"num": 1, "type": "multi", "text": "ファイナンシャル・プランニング業務を行うに当たっては、関連業法を順守することが重要である。 ファイナンシャル・プランナー（以下「ＦＰ」という）の行為に関する次の記述のうち、最も不適切な ものはどれか。", "tables_html": "", "choices": ["税理士の登録を受けていないＦＰが、無料相談会において、相談者が持参した資料に基づき、相談 者が納付すべき所得税の具体的な税額を計算した。", "生命保険募集人、保険仲立人または金融サービス仲介業の登録を受けていないＦＰが、変額年金保 険の一般的な商品内容について有償で説明した。", "投資助言・代理業の登録を受けていないＦＰが、顧客が保有する投資信託の運用報告書に基づき、 その記載内容について説明した。"], "answer": 0, "kaisetsu": "ここがポイント！FP活動では業法を守ることが絶対です。正解は①（最も不適切）。税理士資格がないFPが『具体的な税額を計算する』ことは税理士法違反です。税額計算は税理士独占業務だから。②は保険募集人未登録でも『一般的な商品内容の説明』なら法律上問題ありません。説明は誰でもできて、契約を結ぶときに初めて募集人が必要です。③は投資信託の運用報告書の『記載内容の説明』は誰でも可能。これは助言（特定の商品購入をすすめる）ではなく単なる情報提供だからです。"}, {"num": 2, "type": "multi", "text": "下記は、近藤家のキャッシュフロー表（一部抜粋）である。このキャッシュフロー表の空欄（ア）～ （ウ）にあてはまる数値として、誤っているものはどれか。なお、計算に当たっては、キャッシュフロ ー表中に記載の整数を使用し、計算過程においては端数処理をせず計算し、計算結果については万円未 満を四捨五入すること。 ＜近藤家のキャッシュフロー表＞ （単位：万円) 経過年数 基準年 １年 ２年 ３年 ４年 西暦（年） ２０２３ ２０２４ ２０２５ ２０２６ ２０２７ 近藤 隼人 本人 ４９歳 ５０歳 ５１歳 ５２歳 ５３歳 家族・ 由美香 妻 ４７歳 ４８歳 ４９歳 ５０歳 ５１歳 年齢 純也 長男 １２歳 １３歳 １４歳 １５歳 １６歳 理子 長女 ８歳 ９歳 １０歳 １１歳 １２歳 純也 純也 ライフイベント 海外旅行 変動率 中学校入学 高校入学 給与収入(本人) １％ ６２８ ６３４ 収入 給与収入(妻） １％ ５７２ 収入合計 － １,２００ 基本生活費 １％ ５９３ （ ア ） 住宅関連費 － １８４ １８４ １８４ １８４ １８４ 教育費 － １３０ １４０ １３０ １３０ １４０ 支出 保険料 － ４０ ４０ ４０ ４０ ４０ 一時的支出 － その他支出 － ５０ ５０ ５０ ５０ ５０ 支出合計 － １,０１３ 年間収支 （ イ ） １３５ 金融資産残高 １％ ８９６ （ ウ ） ※年齢および金融資産残高は各年１２月３１日現在のものとし、２０２３年を基準年とする。 ※給与収入は可処分所得で記載している。 ※記載されている数値は正しいものとする。 ※問題作成の都合上、一部を空欄にしてある。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>経過年数</td><td></td><td></td><td>基準年</td><td>１年</td><td>２年</td><td>３年</td><td>４年</td></tr><tr><td>西暦（年）</td><td></td><td></td><td>２０２３</td><td>２０２４</td><td>２０２５</td><td>２０２６</td><td>２０２７</td></tr><tr><td>家族・<br>年齢</td><td>近藤 隼人</td><td>本人</td><td>４９歳</td><td>５０歳</td><td>５１歳</td><td>５２歳</td><td>５３歳</td></tr><tr><td></td><td>由美香</td><td>妻</td><td>４７歳</td><td>４８歳</td><td>４９歳</td><td>５０歳</td><td>５１歳</td></tr><tr><td></td><td>純也</td><td>長男</td><td>１２歳</td><td>１３歳</td><td>１４歳</td><td>１５歳</td><td>１６歳</td></tr><tr><td></td><td>理子</td><td>長女</td><td>８歳</td><td>９歳</td><td>１０歳</td><td>１１歳</td><td>１２歳</td></tr><tr><td>ライフイベント<br>変動率</td><td></td><td></td><td></td><td>純也<br>中学校入学</td><td>海外旅行</td><td></td><td>純也<br>高校入学</td></tr><tr><td></td><td></td><td>変動率</td><td></td><td></td><td></td><td></td><td></td></tr><tr><td>収入</td><td>給与収入(本人)</td><td>１％</td><td>６２８</td><td>６３４</td><td></td><td></td><td></td></tr><tr><td></td><td>給与収入(妻）</td><td>１％</td><td>５７２</td><td></td><td></td><td></td><td></td></tr><tr><td></td><td>収入合計</td><td>－</td><td>１,２００</td><td></td><td></td><td></td><td></td></tr><tr><td>支出</td><td>基本生活費</td><td>１％</td><td>５９３</td><td></td><td></td><td>（ ア ）</td><td></td></tr><tr><td></td><td>住宅関連費</td><td>－</td><td>１８４</td><td>１８４</td><td>１８４</td><td>１８４</td><td>１８４</td></tr><tr><td></td><td>教育費</td><td>－</td><td>１３０</td><td>１４０</td><td>１３０</td><td>１３０</td><td>１４０</td></tr><tr><td></td><td>保険料</td><td>－</td><td>４０</td><td>４０</td><td>４０</td><td>４０</td><td>４０</td></tr><tr><td></td><td>一時的支出</td><td>－</td><td></td><td></td><td></td><td></td><td></td></tr><tr><td></td><td>その他支出</td><td>－</td><td>５０</td><td>５０</td><td>５０</td><td>５０</td><td>５０</td></tr><tr><td></td><td>支出合計</td><td>－</td><td></td><td>１,０１３</td><td></td><td></td><td></td></tr><tr><td>年間収支</td><td></td><td></td><td></td><td>（ イ ）</td><td>１３５</td><td></td><td></td></tr><tr><td>金融資産残高</td><td></td><td>１％</td><td></td><td>８９６</td><td>（ ウ ）</td><td></td><td></td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>株価</td><td>２,０００円</td></tr><tr><td>１株当たり純利益（今期予想）</td><td>３００円</td></tr><tr><td>１株当たり純資産</td><td>２,２００円</td></tr><tr><td>１株当たり年間配当金（今期予想）</td><td>３０円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>香川さん</td><td>細井さん</td><td>大津さん</td></tr><tr><td>普通預金</td><td>１００万円</td><td>１８０万円</td><td>７００万円</td></tr><tr><td>定期預金</td><td>５００万円</td><td>３００万円</td><td>３５０万円</td></tr><tr><td>外貨預金</td><td>３００万円</td><td>－</td><td>－</td></tr><tr><td>株式投資信託</td><td>－</td><td>３００万円</td><td>－</td></tr></tbody></table>", "choices": ["（ア） ６１１", "（イ） １９９", "（ウ）１,０４１ 【第２問】下記の（問３）～（問５）について解答しなさい。"], "answer": 2, "kaisetsu": "キャッシュフロー表計算の鉄則は『端数処理のタイミング』です。各項目の値に毎年の変動率を掛けて次年度の値を求めます。計算途中では『端数処理をしない』（小数点以下も保持）、最後に『万円未満を四捨五入』がルール。間違いやすいのは途中で四捨五入してしまうこと。小さな誤差が累積して最終結果がズレます。空欄（ア）～（ウ）は給与や生活費など項目ごとに正確に計算していく必要があります。一つの計算ミスが後の数年に影響するため、慎重に進めることが大切。"}, {"num": 3, "type": "multi", "text": "下記＜資料＞に基づくＷＸ株式会社の投資指標に関する次の記述のうち、最も適切なものはどれか。 なお、記載のない事項は一切考慮しないものとし、計算結果については表示単位の小数点以下第３位を 四捨五入すること。 ＜資料：ＷＸ株式会社に関するデータ＞ 株価 ２,０００円 １株当たり純利益（今期予想） ３００円 １株当たり純資産 ２,２００円 １株当たり年間配当金（今期予想） ３０円", "tables_html": "<table class=\"q-table\"><tbody><tr><td>株価</td><td>２,０００円</td></tr><tr><td>１株当たり純利益（今期予想）</td><td>３００円</td></tr><tr><td>１株当たり純資産</td><td>２,２００円</td></tr><tr><td>１株当たり年間配当金（今期予想）</td><td>３０円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>香川さん</td><td>細井さん</td><td>大津さん</td></tr><tr><td>普通預金</td><td>１００万円</td><td>１８０万円</td><td>７００万円</td></tr><tr><td>定期預金</td><td>５００万円</td><td>３００万円</td><td>３５０万円</td></tr><tr><td>外貨預金</td><td>３００万円</td><td>－</td><td>－</td></tr><tr><td>株式投資信託</td><td>－</td><td>３００万円</td><td>－</td></tr></tbody></table>", "choices": ["株価純資産倍率（ＰＢＲ）は、１.１倍である。", "配当性向は、１０％である。", "配当利回りは、１.３６％である。"], "answer": 1, "kaisetsu": "正解は②の『配当性向10％』です。投資指標は計算式を正確に覚えることが大切。配当性向＝年間配当金÷当期EPS＝30円÷300円＝10％。①のPBR（株価純資産倍率）＝株価÷1株当たり純資産＝2,000÷2,200≒0.909倍で、1.1倍は誤りです。③の配当利回り＝年間配当金÷株価＝30÷2,000＝1.5％で、1.36％は間違い。『配当性向』は利益に対する配当の割合、『配当利回り』は株価に対する配当の割合と区別しましょう。"}, {"num": 4, "type": "multi", "text": "下記＜資料＞は、香川さん、細井さんおよび大津さんがＷＡ銀行（預金保険制度の対象となる銀行） で保有している金融商品の時価の一覧表である。ＷＡ銀行が破綻した場合、この時価に基づいて預金保 険制度によって保護される金額に関する次の記述のうち、最も適切なものはどれか。 ＜資料＞ 香川さん 細井さん 大津さん 普通預金 １００万円 １８０万円 ７００万円 定期預金 ５００万円 ３００万円 ３５０万円 外貨預金 ３００万円 － － 株式投資信託 － ３００万円 － ※香川さん、細井さんおよび大津さんはいずれも、ＷＡ銀行からの借入れはない。 ※普通預金は決済用預金ではない。 ※預金の利息については考慮しないものとする。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>株価</td><td>２,０００円</td></tr><tr><td>１株当たり純利益（今期予想）</td><td>３００円</td></tr><tr><td>１株当たり純資産</td><td>２,２００円</td></tr><tr><td>１株当たり年間配当金（今期予想）</td><td>３０円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>香川さん</td><td>細井さん</td><td>大津さん</td></tr><tr><td>普通預金</td><td>１００万円</td><td>１８０万円</td><td>７００万円</td></tr><tr><td>定期預金</td><td>５００万円</td><td>３００万円</td><td>３５０万円</td></tr><tr><td>外貨預金</td><td>３００万円</td><td>－</td><td>－</td></tr><tr><td>株式投資信託</td><td>－</td><td>３００万円</td><td>－</td></tr></tbody></table>", "choices": ["香川さんの金融商品のうち、保護される金額の合計は６００万円である。", "細井さんの金融商品のうち、保護される金額の合計は７８０万円である。", "大津さんの金融商品のうち、保護される金額の合計は１,０５０万円である。"], "answer": 0, "kaisetsu": "混乱しやすいけど…相続税申告が必要な基準は『相続税の基礎控除額』です。基礎控除＝3,000万円＋600万円×法定相続人の数。相続人が配偶者と子2人なら基礎控除は4,200万円。遺産総額がこれ以下なら申告不要です。正解は遺産が基礎控除を超える場合は申告義務が生じるという選択肢。相続時精算課税制度を選択した場合は、金額にかかわらず申告が必要になるなど、制度によって規則が異なるため注意が必要。"}, {"num": 5, "type": "multi", "text": "景気動向指数に関する下表の空欄（ア）～（ウ）にあてはまる語句として、最も適切なものはどれか。 採用指標名（抜粋） ・ 新規求人数（除く学卒） 先行系列 ・ 新設住宅着工床面積 ・ （ ア ） ・ 鉱工業用生産財出荷指数 一致系列 ・ 耐久消費財出荷指数 ・ （ イ ） ・ 常用雇用指数（調査産業計、前年同月比） 遅行系列 ・ 完全失業率（逆サイクル※） ・ （ ウ ） ※「逆サイクル」とは、指数の上昇・下降が景気の動きと反対になる指標であることを指す。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>株価</td><td>２,０００円</td></tr><tr><td>１株当たり純利益（今期予想）</td><td>３００円</td></tr><tr><td>１株当たり純資産</td><td>２,２００円</td></tr><tr><td>１株当たり年間配当金（今期予想）</td><td>３０円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>香川さん</td><td>細井さん</td><td>大津さん</td></tr><tr><td>普通預金</td><td>１００万円</td><td>１８０万円</td><td>７００万円</td></tr><tr><td>定期預金</td><td>５００万円</td><td>３００万円</td><td>３５０万円</td></tr><tr><td>外貨預金</td><td>３００万円</td><td>－</td><td>－</td></tr><tr><td>株式投資信託</td><td>－</td><td>３００万円</td><td>－</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>採用指標名（抜粋）</td></tr><tr><td>先行系列</td><td>・ 新規求人数（除く学卒）<br>・ 新設住宅着工床面積<br>・ （ ア ）</td></tr><tr><td>一致系列</td><td>・ 鉱工業用生産財出荷指数<br>・ 耐久消費財出荷指数<br>・ （ イ ）</td></tr><tr><td>遅行系列</td><td>・ 常用雇用指数（調査産業計、前年同月比）<br>・ 完全失業率（逆サイクル※）<br>・ （ ウ ）</td></tr></tbody></table>", "choices": ["（ア）有効求人倍率（除く学卒）", "（イ）東証株価指数", "（ウ）消費者物価指数（生鮮食品を除く総合、前年同月比） 【第３問】下記の（問６）～（問８）について解答しなさい。"], "answer": 2, "kaisetsu": "贈与税の『暦年課税制度』と『相続時精算課税制度』は対比して理解することが重要です。暦年課税は毎年110万円の基礎控除があり、超える部分に贈与税が課されます。相続時精算課税制度では2,500万円までは贈与税がかかりませんが、相続時に相続財産に加算される仕組み。相続時精算課税は一度選択すると取り消せません。また贈与税は相続税より税率が高めに設定されているため、節税計画を立てる際は制度の特性をしっかり把握する必要があります。"}, {"num": 6, "type": "multi", "text": "建築基準法に従い、下記＜資料＞の土地に建築物を建築する場合の延べ面積（床面積の合計）の最高 限度として、正しいものはどれか。なお、記載のない事項については一切考慮しないものとする。 ＜資料＞ ２０ｍ ・ 近隣商業地域 ・ 指定建蔽率 ６０％ ・ 指定容積率 ４００％ ３００ｍ2 １５ｍ ・ 前面道路に対する 法定乗数 ６／１０ 幅員６ｍ市道", "tables_html": "", "choices": ["１８０ｍ2", "１,０８０ｍ2", "１,２００ｍ2"], "answer": 1, "kaisetsu": "不動産投資における『利回り』の計算は重要です。表面利回り（グロス利回り）＝年間賃貸収入÷購入価格×100％で、経費を考慮していません。実質利回り（ネット利回り）＝（年間賃貸収入－年間経費）÷購入価格×100％で、より正確です。管理費、修繕費、税金など諸経費を差し引くと、実際の収益性は表面利回りより低くなります。正解を判断する際は、どちらの利回りについて聞かれているか注意深く読むことが大切。"}, {"num": 7, "type": "multi", "text": "土地登記記録に関する下表の空欄（ア）～（ウ）に関する次の記述のうち、最も適切なものはどれか。 ＜土地登記記録の構成＞ 表題部 （ ア ） 土地登記記録 甲区 （ イ ） 権利部 乙区 （ ウ ）", "tables_html": "<table class=\"q-table\"><tbody><tr><td>土地登記記録</td><td>表題部</td><td>（ ア ）</td><td></td></tr><tr><td></td><td>権利部</td><td>甲区</td><td>（ イ ）</td></tr><tr><td></td><td></td><td>乙区</td><td>（ ウ ）</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>市街化区域</td><td>すでに市街地を形成している区域およびおおむね（ ア ）年以内に<br>優先的かつ計画的に市街化を図るべき区域</td></tr><tr><td>市街化調整区域</td><td>市街化を（ イ ）すべき区域</td></tr><tr><td>非線引き区域</td><td>（ ウ ）の定められていない都市計画区域</td></tr></tbody></table>", "choices": ["当該土地が初めて造成されたときに、所有権保存登記がされるのは、表題部（ア）である。", "当該土地の地目や面積等が登記されるのは、権利部甲区（イ）である。", "金融機関から融資を受け、土地を担保として抵当権が設定される場合、抵当権設定登記がされるの は、権利部乙区（ウ）である。"], "answer": 2, "kaisetsu": "金融商品の『税制優遇制度』を学ぶなら、つみたてNISAとiDeCo（個人型確定拠出年金）の違いは必須知識。つみたてNISAは年間投資上限120万円で、運用利益が20年非課税。iDeCoは年間拠出限度額が職業で異なり（会社員は23.4万円など）、掛金の所得控除と運用利益の非課税があります。iDeCoは原則60歳まで引き出し不可という制約があるため、流動性が必要な資金にはつみたてNISAが適しています。覚えておこう：この2つは併用できます。"}, {"num": 8, "type": "multi", "text": "都市計画法に基づく都市計画区域に関する下表の空欄（ア）～（ウ）にあてはまる数値または語句の 組み合わせとして、最も適切なものはどれか。 すでに市街地を形成している区域およびおおむね（ ア ）年以内に 市街化区域 優先的かつ計画的に市街化を図るべき区域 市街化調整区域 市街化を（ イ ）すべき区域 非線引き区域 （ ウ ）の定められていない都市計画区域", "tables_html": "<table class=\"q-table\"><tbody><tr><td>土地登記記録</td><td>表題部</td><td>（ ア ）</td><td></td></tr><tr><td></td><td>権利部</td><td>甲区</td><td>（ イ ）</td></tr><tr><td></td><td></td><td>乙区</td><td>（ ウ ）</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>市街化区域</td><td>すでに市街地を形成している区域およびおおむね（ ア ）年以内に<br>優先的かつ計画的に市街化を図るべき区域</td></tr><tr><td>市街化調整区域</td><td>市街化を（ イ ）すべき区域</td></tr><tr><td>非線引き区域</td><td>（ ウ ）の定められていない都市計画区域</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>保険契約者</td><td>山根 正人 様</td><td>保険契約者印<br>◯山<br>根</td></tr><tr><td>被保険者</td><td>山根 正人 様<br>契約年齢 ５０歳 男性</td><td></td></tr><tr><td>受取人</td><td>〔給付金受取人〕被保険者 様<br>〔死亡保険金受取人〕山根 桜 様<br>＊保険契約者との続柄：妻</td><td></td></tr></tbody></table><table d></td></tr><tr><td>受取人</td><td>〔給付金受取人〕被保険者 様<br>〔死亡保険金受取人〕山根 桜 様<br>＊保険契約者との続柄：妻</td><td></td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>給付金・保険金の内容</td><td>給付金額・保険金額</td><td>保険期間</td></tr><tr><td>入院給付金</td><td>日額 １０,０００円<br>＊病気やケガで２日以上の入院をした場合、入院開始日<br>を含めて１日目から支払います。<br>＊同一事由の１回の入院給付金支払い限度は６０日、通<br>算して１,０００日となります。</td><td>終身</td></tr><tr><td>手術給付金</td><td>給付金額 入院給付金日額×１０・２０・４０倍<br>＊所定の手術を受けた場合、手術の種類に応じて、手術<br>給付金（入院給付金日額の１０倍・２０倍・４０倍）<br>を支払います。</td><td></td></tr><tr><td>死亡・高度障害保険金</td><td>保険金 １,０００,０００円<br>＊死亡または所定の高度障害状態となった場合に支払い<br>ます。</td><td></td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>払込保険料合計 ×,×××円／月</td></tr><tr><td>払込方法（回数）：年１２回<br>払込期月 ：毎月</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>年間の支払保険料の合計</td><td>控除額</td></tr><tr><td>２０,０００円 以下</td><td>支払保険料の全額</td></tr><tr><td>２０,０００円 超 ４０,０００円 以下</td><td>支払保険料×１／２＋１０,０００円</td></tr><tr><td>４０,０００円 超 ８０,０００円 以下</td><td>支払保険料×１／４＋２０,０００円</td></tr><tr><td>８０,０００円 超</td><td>４０,０００円</td></tr></tbody></table>", "choices": ["１,１７０,０００円", "１,１９０,０００円", "１,２９０,０００円"], "answer": 2, "kaisetsu": "損害保険（火災保険など）の『補償内容』と『限度額』は混同しやすい。火災保険は『建物』と『家財』に分けて加入でき、それぞれ限度額を設定します。地震保険は火災保険にセットで加入し、限度額は建物5,000万円、家財1,000万円が上限。ここがポイント！地震保険の保険料は地域によって大きく異なり、建物の耐震性能によっても変わります。契約内容と条件をしっかり確認して、自分の家や家財に適切な補償が得られるか検証することが重要です。"}, {"num": 10, "type": "multi", "text": "西里光一さんが２０２３年中に支払った生命保険の保険料は下記＜資料＞のとおりである。この場合 の光一さんの２０２３年分の所得税の計算における生命保険料控除の金額として、正しいものはどれか。 なお、＜資料＞の保険について、これまでに契約内容の変更はないものとする。また、２０２３年分の 生命保険料控除額が最も多くなるように計算すること。 ＜資料＞ ［終身保険（無配当、新生命保険料）］ ［医療保険（無配当、介護医療保険料）］ 契約日：２０１５年１月１日 契約日：２０１８年３月１日 保険契約者：西里 光一 保険契約者：西里 光一 被保険者：西里 光一 被保険者：西里 光一 死亡保険金受取人：西里 由美子（妻） 死亡保険金受取人：西里 由美子（妻） ２０２３年の年間支払保険料：７８,６００円 ２０２３年の年間支払保険料：４８,３００円 ＜所得税の生命保険料控除額の速算表＞ ［２０１２年１月１日以後に締結した保険契約（新契約）等に係る控除額］ 年間の支払保険料の合計 控除額 ２０,０００円 以下 支払保険料の全額 ２０,０００円 超 ４０,０００円 以下 支払保険料×１／２＋１０,０００円 ４０,０００円 超 ８０,０００円 以下 支払保険料×１／４＋２０,０００円 ８０,０００円 超 ４０,０００円 （注）支払保険料とは、その年に支払った金額から、その年に受けた剰余金や割戻金を差し引いた残り の金額をいう。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>年間の支払保険料の合計</td><td>控除額</td></tr><tr><td>２０,０００円 以下</td><td>支払保険料の全額</td></tr><tr><td>２０,０００円 超 ４０,０００円 以下</td><td>支払保険料×１／２＋１０,０００円</td></tr><tr><td>４０,０００円 超 ８０,０００円 以下</td><td>支払保険料×１／４＋２０,０００円</td></tr><tr><td>８０,０００円 超</td><td>４０,０００円</td></tr></tbody></table>", "choices": ["３９,６５０円", "４０,０００円", "７１,７２５円"], "answer": 2, "kaisetsu": "生命保険料控除の計算では『保険の種類』と『契約時期』をチェックすることが重要。平成24年1月1日以後の契約なら新制度が適用され、支払保険料が20,001円以上なら控除額は4万円が上限。以前の契約なら旧制度で上限5万円。複数の保険に加入している場合、各保険の控除額を計算して合計します。ここがポイント！年間支払額が変わると控除額も変わるため、毎年の申告時に支払額を確認しましょう。正解を導くには、支払保険料を正確に把握することが大切です。"}, {"num": 11, "type": "multi", "text": "伊丹さんは地震保険の加入を検討しており、ＦＰの筒井さんに質問をした。地震保険に関する筒井さ んの次の説明のうち、最も不適切なものはどれか。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>年間の支払保険料の合計</td><td>控除額</td></tr><tr><td>２０,０００円 以下</td><td>支払保険料の全額</td></tr><tr><td>２０,０００円 超 ４０,０００円 以下</td><td>支払保険料×１／２＋１０,０００円</td></tr><tr><td>４０,０００円 超 ８０,０００円 以下</td><td>支払保険料×１／４＋２０,０００円</td></tr><tr><td>８０,０００円 超</td><td>４０,０００円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>横川 忠さん</td><td>合計所得金額（給与所得のみ） ６００万円</td></tr><tr><td>横川 由紀さん</td><td>合計所得金額（給与所得のみ） ４３万円</td></tr></tbody></table>", "choices": ["「地震保険の保険料は、保険会社による違いはありません。」", "「地震保険の損害認定の区分は、『全損』『半損』『一部損』の３区分に分けられています。」", "「地震保険の保険金額は、火災保険の保険金額の３０％～５０％の範囲内で設定されますが、居住 用建物については５,０００万円が上限となります。」 【第５問】下記の（問１２）～（問１４）について解答しなさい。"], "answer": 1, "kaisetsu": "地震保険に関する知識は実務で頻出です。地震保険の『保険料は全国同一』（保険会社による差はない）と『損害認定区分』の2点が試験ポイント。ここがポイント！損害認定は『全損』『大半損』『小半損』『一部損』の4区分です。3区分ではなく4区分であることを覚えておこう。全損は時価の80％以上、大半損は60％以上80%未満という基準で判定されます。正解は4区分が正しいと明示している選択肢。"}, {"num": 12, "type": "multi", "text": "所得税の青色申告特別控除に関する次の記述の空欄（ア）～（ウ）にあてはまる語句の組み合わせと して、最も適切なものはどれか。 ・ 不動産所得または事業所得を生ずべき事業を営んでいる青色申告者で、これらの所得に係る取 引を正規の簿記の原則（一般的には複式簿記）により記帳し、その記帳に基づいて作成した貸 借対照表および（ ア ）を確定申告書に添付して法定申告期限内に提出している場合には、 原則として、これらの所得を通じて最高（ イ ）を控除することができる。 ・ この（ イ ）の青色申告特別控除を受けることができる人が、所定の帳簿の電子帳簿保存ま たは国税電子申告・納税システム（ｅ－Ｔａｘ）により電子申告を行っている場合には、最高 （ ウ ）の青色申告特別控除が受けられる。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>横川 忠さん</td><td>合計所得金額（給与所得のみ） ６００万円</td></tr><tr><td>横川 由紀さん</td><td>合計所得金額（給与所得のみ） ４３万円</td></tr></tbody></table>", "choices": ["（ア）損益計算書 （イ）１０万円 （ウ）５５万円", "（ア）損益計算書 （イ）５５万円 （ウ）６５万円", "（ア）収支内訳書 （イ）５５万円 （ウ）６５万円"], "answer": 1, "kaisetsu": "固定資産税の『軽減措置』は複数あります。新築住宅の場合、床面積要件や築年数などにより固定資産税が3～7年間減額されることがあります。小規模住宅用地（200㎡以下）は評価額が6分の1に軽減。一般住宅用地（200㎡超）は3分の1に軽減という具合に、面積によって異なります。ここがポイント！同じ土地でも『住宅用地』か『非住宅用地』かで税負担が大きく変わります。所有者が賃貸目的で購入した場合の減税措置などもあるため、具体的な状況に合わせた判断が必要。"}, {"num": 13, "type": "multi", "text": "給与所得者の横川忠さん（５０歳）は、生計を一にしている妻の由紀さん（４８歳）に係る配偶者控 除または配偶者特別控除について、ＦＰで税理士でもある小田さんに質問をした。忠さんと由紀さんの ２０２３年分の所得等の状況が下記＜資料＞のとおりである場合、小田さんが行った次の説明の空欄 （ア）～（ウ）にあてはまる語句の組み合わせとして、最も適切なものはどれか。なお、記載のない事 項については一切考慮しないものとする。 ＜資料＞ 横川 忠さん 合計所得金額（給与所得のみ） ６００万円 横川 由紀さん 合計所得金額（給与所得のみ） ４３万円 ［小田さんの説明］ 「納税者の配偶者の合計所得金額が（ ア ）以下の場合、配偶者控除が適用され、（ ア ）超 １３３万円以下の場合は配偶者特別控除が適用されます。なお、納税者の合計所得金額が（ イ ） 超の場合、配偶者の所得金額にかかわらず、配偶者控除および配偶者特別控除の適用を受けるこ とができません。従って、忠さんの所得税の計算上、（ ウ ）の適用を受けることができます。」", "tables_html": "<table class=\"q-table\"><tbody><tr><td>横川 忠さん</td><td>合計所得金額（給与所得のみ） ６００万円</td></tr><tr><td>横川 由紀さん</td><td>合計所得金額（給与所得のみ） ４３万円</td></tr></tbody></table>", "choices": ["（ア）３８万円 （イ）１,０００万円 （ウ）配偶者特別控除", "（ア）４８万円 （イ） ９００万円 （ウ）配偶者特別控除", "（ア）４８万円 （イ）１,０００万円 （ウ）配偶者控除"], "answer": 2, "kaisetsu": "相続における『相続放棄』『限定承認』『単純承認』は手続きと期限が異なります。相続放棄と限定承認は『相続人が知った時から3ヶ月以内』に家庭裁判所に申し立てが必要。この期限を過ぎると自動的に単純承認（全債務を引き継ぐ）となります。混乱しやすいけど…限定承認は『プラスの遺産の範囲内で債務を負う』という条件付き。相続人が1人でも可能ですが、複数いる場合は全員で申し立てる必要があります。正解は期限と手続き方法の正確さをチェック。"}, {"num": 14, "type": "multi", "text": "野村さんは、１５年前に購入し、現在居住している自宅の土地および建物を売却する予定である。売 却に係る状況が下記＜資料＞のとおりである場合、所得税における課税長期譲渡所得の金額として、正 しいものはどれか。なお、記載のない事項については一切考慮しないものとする。 ＜資料＞ 譲渡価額（合計）：６,０００万円 取得費（合計）：１,５００万円 譲渡費用（合計）：５００万円 ※居住用財産を譲渡した場合の３,０００万円特別控除の特例の適用を受けるものとする。 ※所得控除は考慮しないものとする。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>横川 忠さん</td><td>合計所得金額（給与所得のみ） ６００万円</td></tr><tr><td>横川 由紀さん</td><td>合計所得金額（給与所得のみ） ４３万円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>工藤 達夫</td></tr><tr><td>（被相続人）</td></tr></tbody></table>", "choices": ["１,０００万円", "１,５００万円", "４,０００万円 【第６問】下記の（問１５）、（問１６）について解答しなさい。"], "answer": 0, "kaisetsu": "遺言書の『形式』により法的効力が決まります。『自筆証書遺言』は相続人が遺言者本人の全部を自筆で作成し、日付と署名押印が必要。『公正証書遺言』は公証役場で公証人に作成してもらい、最も確実で争われにくい方式。『秘密証書遺言』は署名押印後、封筒に入れて公証役場で日付を付してもらう方式。ここがポイント！自筆証書遺言は『パソコンで作成したもの』は無効です。法定相続や遺産分割との関係を含め、遺言書の効力を理解することが実務で重要。"}, {"num": 15, "type": "multi", "text": "２０２４年１月５日に相続が開始された工藤達夫さん（被相続人）の＜親族関係図＞が下記のとおり である場合、民法上の相続人および法定相続分の組み合わせとして、最も適切なものはどれか。なお、 記載のない条件については一切考慮しないものとする。 ＜親族関係図＞ 定則 和子 （すでに死亡） （すでに死亡） 修平 久美 紀夫 工藤 達夫 恵子 （すでに死亡） （被相続人） 隆太", "tables_html": "<table class=\"q-table\"><tbody><tr><td>工藤 達夫</td></tr><tr><td>（被相続人）</td></tr></tbody></table>", "choices": ["恵子 ２／３ 紀夫 １／３", "恵子 ３／４ 紀夫 １／４", "恵子 ３／４ 紀夫 １／８ 隆太 １／８"], "answer": 2, "kaisetsu": "法定相続人と『法定相続分』は相続順位で決まります。配偶者は常に相続人。その他は『子（第1順）→親（第2順）→兄弟姉妹（第3順）』の順です。配偶者と子の場合、配偶者1/2、子で1/2を分ける。配偶者と親の場合、配偶者2/3、親で1/3。混乱しやすいけど…『配偶者と兄弟姉妹』の場合、配偶者3/4、兄弟姉妹で1/4と変わります。相続人が複数いる場合、それぞれの分割方法も異なるため、正確な理解が必須。"}, {"num": 16, "type": "multi", "text": "神田綾子さんは、夫から居住用不動産の贈与を受けた。綾子さんは、この居住用不動産の贈与につい て、贈与税の配偶者控除の適用を受けることを検討しており、ＦＰで税理士でもある米田さんに相談を した。この相談に対する米田さんの回答の空欄（ア）、（イ）にあてはまる語句または数値の組み合わせ として、最も適切なものはどれか。 ［米田さんの回答］ 「配偶者から居住用不動産の贈与を受けた場合、その（ ア ）において、配偶者との婚姻期間が ２０年以上あること等の所定の要件を満たせば、贈与税の配偶者控除の適用を受けることができ ます。なお、贈与税の配偶者控除の額は、最高（ イ ）万円です。」", "tables_html": "<table class=\"q-table\"><tbody><tr><td>工藤 達夫</td></tr><tr><td>（被相続人）</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>氏名</td><td>続柄</td><td>生年月日</td><td>年齢</td><td>備考</td></tr><tr><td>有馬 智孝</td><td>本人</td><td>１９６８年１０月１７日</td><td>５５歳</td><td>会社員</td></tr><tr><td>弘子</td><td>妻</td><td>１９７３年 ５月 ４日</td><td>５０歳</td><td>会社員</td></tr><tr><td>敬太</td><td>長男</td><td>２００３年 ９月１０日</td><td>２０歳</td><td>大学生</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>金融資産<br>普通預金<br>定期預金<br>財形年金貯蓄<br>投資信託<br>上場株式</td><td>３７０<br>８００<br>２８０<br>４５０<br>３２０</td></tr><tr><td>生命保険（解約返戻金相当額）</td><td>１２５</td></tr><tr><td>不動産（自宅マンション）</td><td>３,９００</td></tr></tbody></table>", "choices": ["（ア）贈与があった年の１月１日 （イ）１,０００", "（ア）贈与があった年の１月１日 （イ）２,０００", "（ア）贈与があった日 （イ）２,０００ 【第７問】下記の（問１７）～（問２０）について解答しなさい。 ＜設例＞ 有馬智孝さんは株式会社ＴＳに勤務する会社員である。智孝さんは今後の生活設計について、ＦＰ で税理士でもある最上さんに相談をした。なお、下記のデータはいずれも２０２４年１月１日現在 のものである。 ［家族構成（同居家族）］ 氏名 続柄 生年月日 年齢 備考 有馬 智孝 本人 １９６８年１０月１７日 ５５歳 会社員 弘子 妻 １９７３年 ５月 ４日 ５０歳 会社員 敬太 長男 ２００３年 ９月１０日 ２０歳 大学生 ［保有財産（時価）］ （単位：万円） 金融資産 普通預金 ３７０ 定期預金 ８００ 財形年金貯蓄 ２８０ 投資信託 ４５０ 上場株式 ３２０ 生命保険（解約返戻金相当額） １２５ 不動産（自宅マンション） ３,９００ ［負債残高］ 住宅ローン（自宅マンション）：２４０万円（債務者は智孝さん、団体信用生命保険付き） ［その他］ 上記以外については、各設問において特に指定のない限り一切考慮しないものとする。"], "answer": 2, "kaisetsu": "不動産の『公示価格』『路線価』『評価額』は評価主体と用途が異なります。公示価格は国土交通省が毎年3月に公表する標準地の価格で、一般の土地評価の目安。相続税路線価は国税庁が公示価格の『80％程度』を目安に評価。固定資産税評価額は市町村が公示価格の『70％程度』を目安に決定。ここがポイント！『評価割合』で区別することが重要。各評価額は異なる機関が異なる目的で決めているため、何の目的で使う数値かを理解してから計算しましょう。"}, {"num": 17, "type": "multi", "text": "ＦＰの最上さんは、有馬家のバランスシートを作成した。下表の空欄（ア）にあてはまる金額として、 正しいものはどれか。なお、＜設例＞に記載のあるデータに基づいて解答するものとする。 ＜有馬家のバランスシート＞ （単位：万円) ［資産］ ××× ［負債］ ××× 負債合計 ××× ［純資産］ （ ア ） 資産合計 ××× 負債・純資産合計 ×××", "tables_html": "<table class=\"q-table\"><tbody><tr><td>氏名</td><td>続柄</td><td>生年月日</td><td>年齢</td><td>備考</td></tr><tr><td>有馬 智孝</td><td>本人</td><td>１９６８年１０月１７日</td><td>５５歳</td><td>会社員</td></tr><tr><td>弘子</td><td>妻</td><td>１９７３年 ５月 ４日</td><td>５０歳</td><td>会社員</td></tr><tr><td>敬太</td><td>長男</td><td>２００３年 ９月１０日</td><td>２０歳</td><td>大学生</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>金融資産<br>普通預金<br>定期預金<br>財形年金貯蓄<br>投資信託<br>上場株式</td><td>３７０<br>８００<br>２８０<br>４５０<br>３２０</td></tr><tr><td>生命保険（解約返戻金相当額）</td><td>１２５</td></tr><tr><td>不動産（自宅マンション）</td><td>３,９００</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>［資産］ ×××</td><td>［負債］ ×××</td></tr><tr><td></td><td>負債合計 ×××</td></tr><tr><td></td><td>［純資産］ （ ア ）</td></tr><tr><td>資産合計 ×××</td><td>負債・純資産合計 ×××</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>終価係数</td><td>資本回収係数</td><td>減債基金係数</td></tr><tr><td>５年</td><td>１.０５１</td><td>０.２０６０４</td><td>０.１９６０４</td></tr></tbody></table>", "choices": ["２,３４５（万円）", "６,００５（万円）", "６,２４５（万円）"], "answer": 1, "kaisetsu": "借地借家法の『定期借地権』は種類により存続期間と契約方式が異なります。一般定期借地権は『50年以上』で『公正証書による書面契約』が必須。事業用定期借地権は『10年以上50年未満』で『公正証書による書面契約』が必須。建物譲渡特約付借地権は『30年以上』で『制限なし』（普通の書面契約でもOK）。覚えておこう：定期借地権の最大の特徴は『期限後は更新されない』こと。普通借地権との大きな違いなので、実務では正確に区別しましょう。"}, {"num": 18, "type": "multi", "text": "智孝さんは、６０歳で定年を迎えた後、公的年金の支給が始まる６５歳までの５年間の生活資金に退 職一時金の一部を充てようと考えている。退職一時金のうち５００万円を年利１.０％で複利運用しな がら５年間で均等に取り崩すこととした場合、年間で取り崩すことができる最大金額として、正しいも のはどれか。なお、下記＜資料＞の３つの係数の中から最も適切な係数を選択して計算し、円単位で解 答すること。また、税金や記載のない事項については一切考慮しないものとする。 ＜資料：係数早見表（年利１.０％)＞ 終価係数 資本回収係数 減債基金係数 ５年 １.０５１ ０.２０６０４ ０.１９６０４ ※記載されている数値は正しいものとする。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>［資産］ ×××</td><td>［負債］ ×××</td></tr><tr><td></td><td>負債合計 ×××</td></tr><tr><td></td><td>［純資産］ （ ア ）</td></tr><tr><td>資産合計 ×××</td><td>負債・純資産合計 ×××</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>終価係数</td><td>資本回収係数</td><td>減債基金係数</td></tr><tr><td>５年</td><td>１.０５１</td><td>０.２０６０４</td><td>０.１９６０４</td></tr></tbody></table>", "choices": ["９８０,２００円", "１,０３０,２００円", "１,０５１,０００円"], "answer": 1, "kaisetsu": "不動産登記記録は『表題部』『権利部（甲区と乙区）』から構成されます。表題部には土地の『所在地、地積、地目、所有者』など不動産そのものの情報が記載。甲区には『所有権』に関する登記（所有権保存登記など）。乙区には『所有権以外の権利』（抵当権、地上権、賃借権など）が記載されます。ここがポイント！甲区と乙区で記載される権利が異なることが試験の落とし穴。不動産を購入する際、登記簿謄本の甲区と乙区の内容を必ず確認してから契約することが実務で重要です。"}, {"num": 19, "type": "multi", "text": "智孝さんは、定年退職後の公的医療保険について、健康保険の任意継続被保険者になることを検討し ている。全国健康保険協会管掌健康保険（協会けんぽ）の任意継続被保険者に関する次の記述の空欄 （ア）～（ウ）にあてはまる語句の組み合わせとして、最も適切なものはどれか。 被保険者の資格喪失日から（ ア ）以内に申出をすることにより、最長で（ イ ）、任意継続 被保険者となることができる。なお、任意継続被保険者となるためには、資格喪失日の前日まで継 続して２ヵ月以上被保険者であったことが必要である。また、任意継続被保険者は、一定の親族を 被扶養者とすること（ ウ ）。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>［資産］ ×××</td><td>［負債］ ×××</td></tr><tr><td></td><td>負債合計 ×××</td></tr><tr><td></td><td>［純資産］ （ ア ）</td></tr><tr><td>資産合計 ×××</td><td>負債・純資産合計 ×××</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>終価係数</td><td>資本回収係数</td><td>減債基金係数</td></tr><tr><td>５年</td><td>１.０５１</td><td>０.２０６０４</td><td>０.１９６０４</td></tr></tbody></table>", "choices": ["（ア）１４日 （イ）２年間 （ウ）はできない", "（ア）２０日 （イ）２年間 （ウ）ができる", "（ア）２０日 （イ）４年間 （ウ）はできない"], "answer": 1, "kaisetsu": "相続税の『配偶者の税額軽減』は大きな優遇制度です。配偶者が相続した遺産のうち『法定相続分』または『1億6,000万円』のいずれか大きい方までは相続税がかかりません。これにより配偶者の納税額が大幅に軽減される場合が多いです。混乱しやすいけど…この軽減は『配偶者が相続した場合だけ』で、配偶者が相続放棄したら適用できません。また2次相続で子が相続する際はこの軽減がないため、トータルの相続税が増えることもあります。長期的なライフプランニングで注意すべき点。"}, {"num": 20, "type": "multi", "text": "智孝さんは、通常６５歳から支給される老齢基礎年金を繰り上げて受給できることを知り、ＦＰの最 上さんに質問をした。智孝さんの老齢基礎年金および老齢厚生年金の繰上げ受給に関する次の記述のう ち、最も不適切なものはどれか。なお、老齢基礎年金および老齢厚生年金の受給要件は満たしているも のとする。", "tables_html": "", "choices": ["老齢基礎年金を繰上げ受給した場合の年金額は、繰上げ年数１年当たり４％の割合で減額される。", "老齢基礎年金を繰上げ受給した場合の年金額の減額は、一生涯続く。", "老齢基礎年金を繰上げ受給する場合は、老齢厚生年金も同時に繰上げ受給しなければならない。"], "answer": 0, "kaisetsu": "個人年金保険の『個人年金保険料控除』は生命保険料控除とは別枠です。新制度では支払保険料が8万円超なら控除額は4万円。旧制度は1万円超なら控除額は5万円ですが、現在ほとんど新制度が主流。所得控除として使えるため、課税所得を減らして所得税と住民税を両方節税できます。ここがポイント！個人年金保険の『控除対象になる条件』は、年金受取が被保険者本人で、受取期間が10年以上など厳しく定められています。契約時にこれら条件を満たしているか確認することが大切。"}]}, {"id": "202405", "label": "2024年5月", "questions": [{"num": 1, "type": "multi", "text": "ファイナンシャル・プランニング業務を行うに当たっては、関連業法等を順守することが重要である。 ファイナンシャル・プランナー（以下「ＦＰ」という）の行為に関する次の記述のうち、最も不適切な ものはどれか。なお、記載のない資格の登録等については考慮しないこととする。", "tables_html": "", "choices": ["投資助言・代理業の登録を受けていないＦＰが、顧客と投資顧問契約を締結し、当該契約に基づい て特定の上場株式の投資判断について有償で助言をした。", "税理士の登録を受けていないＦＰが、有料のセミナーにおいて、仮定の事例に基づき、一般的な税 法の解説を行った。", "生命保険募集人・保険仲立人の登録を受けていないＦＰが、変額年金保険の一般的な商品内容につ いて説明を行った。"], "answer": 0, "kaisetsu": "FP業務の『業法順守』は常に第一。正解は①（最も不適切）。投資助言・代理業登録なしに『特定の上場株式の投資判断について有償で助言する』ことは違反です。投資顧問契約を結ぶ行為自体が問題。②は税理士資格がなくても『仮定の事例に基づく一般的な税法解説』は講演活動として許可されます。『具体的な税額計算』とは違います。③も同様に『一般的な説明』なら可能。「具体的」か「一般的」かが区別のポイント。"}, {"num": 2, "type": "multi", "text": "下記は、東条家のキャッシュフロー表（一部抜粋）である。このキャッシュフロー表の空欄（ア）～ （ウ）にあてはまる数値として、誤っているものはどれか。なお、計算に当たっては、キャッシュフロ ー表中に記載の整数を使用すること。また、計算過程においては端数処理をせず計算し、計算結果につ いては万円未満を四捨五入することとする。 ＜東条家のキャッシュフロー表＞ （単位：万円) 経過年数 基準年 １年後 ２年後 ３年後 ４年後 東条 義雄 本人 ３７歳 ３８歳 ３９歳 ４０歳 le><table class=\"q-table\"><tbody><tr><td>金融資産<br>普通預金<br>定期預金<br>投資信託<br>上場株式</td><td>４００<br>８００<br>１００<br>２００</td></tr><tr><td>生命保険（解約返戻金相当額）</td><td>８０</td></tr><tr><td>不動産（自宅マンション）</td><td>３,０００</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>終価係数</td><td>年金終価係数</td><td>年金現価係数</td></tr><tr><td>１５年</td><td>１.３４６</td><td>１７.２９３</td><td>１２.８４９</td></tr></tbody></table>", "choices": ["３,８５４,７００円", "５,１８７,９００円", "６,０５７,０００円"], "answer": 1, "kaisetsu": "消費者ローンと住宅ローンは『契約者の属性要件』『金利『『返済期間』で大きく異なります。住宅ローンは低金利（固定か変動か選択可）で最長35年が一般的。消費者ローン（キャッシング）は高金利で短期返済。借地借家法の『賃貸住宅』と『持ち家』でも利用できるローンが異なります。ここがポイント！住宅ローン控除の対象になるかも『本人が住むかどうか』『購入価格の要件』などで決まるため、契約前に確認が必須。ライフプランでローンの最適な選択が貯蓄額に大きな影響を与えます。"}, {"num": 5, "type": "multi", "text": "遺族基礎年金に関する次の記述の空欄（ア）、（イ）にあてはまる語句の組み合わせとして、最も適切 なものはどれか。 遺族基礎年金を受給することができる遺族は、国民年金の被保険者等の死亡当時、その者によって 生計を維持されていた子または子と生計を同じくしていた配偶者である。なお、遺族基礎年金を受 給することができる子の年齢要件は以下のとおりである。 ① （ ア ）までの間にあること ② （ イ ）で障害等級１級または２級に該当する障害の状態にあること ※上記の年齢要件を満たしていても婚姻している者は子から除かれる。", "tables_html": "<table class=\"q-table\"><tbody><tr><td></td><td>終価係数</td><td>年金終価係数</td><td>年金現価係数</td></tr><tr><td>１５年</td><td>１.３４６</td><td>１７.２９３</td><td>１２.８４９</td></tr></tbody></table>", "choices": ["（ア）１８歳未満 （イ）２０歳未満", "（ア）１８歳到達年度の末日 （イ）２０歳未満", "（ア）１８歳到達年度の末日 （イ）２０歳到達年度の末日"], "answer": 1, "kaisetsu": "医療保険の『入院給付金』『手術給付金』『通院給付金』の役割を理解することが大切です。入院給付金は『日額×入院日数』で計算（ただし上限日数あり）。手術給付金は給付金日額の『10倍又は20倍』が一般的。通院給付金は入院後の通院のみ対象の商品が多く、疾病による通院は非対象です。混乱しやすいけど…『生活習慣病の通院給付金』は商品によって大きく異なるため、パンフレットをしっかり読む必要があります。複数社の医療保険を比較する際は、これら給付内容を揃えた上で保険料を比較することが重要。"}, {"num": 6, "type": "multi", "text": "下記＜資料＞に基づくＷＡ株式会社とＷＢ株式会社の投資指標に関する次の記述のうち、最も不適切 なものはどれか。なお、記載のない事項については一切考慮しないこととする。 ＜資料＞ ＷＡ株式会社 ＷＢ株式会社 株価 １,２００円 ３,０００円 １株当たり当期純利益 ２００円 ３００円 １株当たり純資産（自己資本） １,５００円 ２,０００円 １株当たり年間配当金 ２５円 ５０円", "tables_html": "<table class=\"q-table\"><tbody><tr><td></td><td>終価係数</td><td>年金終価係数</td><td>年金現価係数</td></tr><tr><td>１５年</td><td>１.３４６</td><td>１７.２９３</td><td>１２.８４９</td></tr></tbody></table><table class=\"q-tab る場合もあります。混乱しやすいけど…『確定型』は長生きリスクに弱く、『終身型』は資金が多く必要です。ライフプランの寿命予測と手持ち資金で最適な方式を選ぶ必要があります。"}, {"num": 8, "type": "multi", "text": "下記＜資料＞の外貨定期預金について、満期時の外貨ベースの元利合計額を円転した金額として、正 しいものはどれか。なお、税金については考慮しないこととする。 ＜資料＞ 預入額：１０,０００米ドル 預入期間：１２ヵ月 預金金利：１.５０％（年率） ［為替レート（１米ドル）］ ＴＴＳ ＴＴＭ（仲値） ＴＴＢ 満期時 １２６.４０円 １２５.４０円 １２４.４０円", "tables_html": "<table class=\"q-table\"><tbody><tr><td></td><td>ＷＡ株式会社</td><td>ＷＢ株式会社</td></tr><tr><td>株価</td><td>１,２００円</td><td>３,０００円</td></tr><tr><td>１株当たり当期純利益</td><td>２００円</td><td>３００円</td></tr><tr><td>１株当たり純資産（自己資本）</td><td>１,５００円</td><td>２,０００円</td></tr><tr><td>１株当たり年間配当金</td><td>２５円</td><td>５０円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>運用スタイル</td><td>主な内容</td></tr><tr><td>（ ア ）</td><td>ベンチマークの動きに連動した運用成果を目指す。代表的なものにインデック<br>スファンドがある。</td></tr><tr><td>（ イ ）</td><td>ベンチマークを上回る運用成果を目標としており、銘柄の調査を入念に行うな<br>ど銘柄選択に時間やコストがかかる。</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>ＴＴＳ</td><td>ＴＴＭ（仲値）</td><td>ＴＴＢ</td></tr><tr><td>満期時</td><td>１２６.４０円</td><td>１２５.４０円</td><td>１２４.４０円</td></tr></tbody></table>", "choices": ["１,２６２,６６０円", "１,２７２,８１０円", "１,２８２,９６０円"], "answer": 0, "kaisetsu": "遺産分割の『遺言による分割』『協議による分割』『調停による分割』『審判による分割』は段階的です。まず遺言があれば遺言に従う。遺言がない、または不備があれば相続人協議で決める。協議がまとまらなければ調停、さらに進めば家庭裁判所の審判。ここがポイント！『相続放棄・限定承認』は３ヶ月以内に家庭裁判所に申し立て必須。この期限を過ぎると単純承認となり、遺産分割の前提が変わってしまいます。相続が発生したら早期の相談が重要。"}, {"num": 9, "type": "multi", "text": "建築基準法に従い、下記＜資料＞の土地に建築物を建築する場合の延べ面積（床面積の合計）の最高 限度として、正しいものはどれか。なお、記載のない事項については一切考慮しないこととする。 ＜資料＞ ３０ｍ ・ 近隣商業地域 ・ 指定建蔽率 ６０％ ・ 指定容積率 ４００％ ４５０ｍ2 １５ｍ ・ 前面道路の幅員に対する 法定乗数 ６／１０ 幅員６ｍ市道", "tables_html": "<table class=\"q-table\"><tbody><tr><td></td><td>ＴＴＳ</td><td>ＴＴＭ（仲値）</td><td>ＴＴＢ</td></tr><tr><td>満期時</td><td>１２６.４０円</td><td>１２５.４０円</td><td>１２４.４０円</td></tr></tbody></table>", "choices": ["２７０ｍ2", "１,６２０ｍ2", "１,８００ｍ2"], "answer": 1, "kaisetsu": "贈与税の『贈与者と受贈者の関係』により税率が変わります。『直系尊属から20歳以上の子への贈与』は一般より税率が低く設定されています。いわゆる「相続時精算課税制度」との組み合わせで『2,500万円の非課税枠』が使える仕組み。覚えておこう：一度この制度を選択すると後の暦年課税に変更できません。毎年の贈与戦略と長期的な相続対策を合わせて考える必要があります。親の経済状況と子どもの将来資金需要を見極めてプランを立てることが大切。"}, {"num": 10, "type": "multi", "text": "公的な土地評価に関する下表の空欄（ア）～（ウ）にあてはまる語句の組み合わせとして、最も適切 なものはどれか。 価格の種類 公示価格 相続税路線価 固定資産税評価額 所管 国土交通省 国税庁 （ ア ） 評価割合 － 公示価格の（ イ ）程度 公示価格の（ ウ ）程度 固定資産税等の課税標準の 実施目的 一般の土地取引の指標等 相続税等の財産評価の基礎 基礎", "tables_html": "<table class=\"q-table\"><tbody><tr><td></td><td>ＴＴＳ</td><td>ＴＴＭ（仲値）</td><td>ＴＴＢ</td></tr><tr><td>満期時</td><td>１２６.４０円</td><td>１２５.４０円</td><td>１２４.４０円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>価格の種類</td><td>公示価格</td><td>相続税路線価</td><td>固定資産税評価額</td></tr><tr><td>所管</td><td>国土交通省</td><td>国税庁</td><td>（ ア ）</td></tr><tr><td>評価割合</td><td>－</td><td>公示価格の（ イ ）程度</td><td>公示価格の（ ウ ）程度</td></tr><tr><td>実施目的</td><td>一般の土地取引の指標等</td><td>相続税等の財産評価の基礎</td><td>固定資産税等の課税標準の<br>基礎</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>種類</td><td>一般定期借地権</td><td>事業用定期借地権等</td><td>建物譲渡特約付借地権</td></tr><tr><td>存続期間</td><td>（ ア ）以上</td><td>１０年以上５０年未満</td><td>３０年以上</td></tr><tr><td>契約方法</td><td>（ イ ）</td><td>（ ウ ）</td><td>制限なし</td></tr><tr><td>契約終了時の<br>建物</td><td>原則として借地人は建<br>物を取り壊して土地を<br>返還する</td><td>原則として借地人は建<br>物を取り壊して土地を<br>返還する</td><td>借地権設定者が建物を買<br>い取る</td></tr></tbody></table>", "choices": ["（ア）国税庁 （イ）９０％ （ウ）８０％", "（ア）市町村（東京２３区は東京都） （イ）７０％ （ウ）８０％", "（ア）市町村（東京２３区は東京都） （イ）８０％ （ウ）７０％"], "answer": 2, "kaisetsu": "土地の『公示価格』『路線価』『固定資産税評価額』は評価機関と用途で完全に異なります。公示価格は国土交通省が標準地の価格を毎年3月に公表（所管：国土交通省）。相続税路線価は国税庁が公示価格の『80％程度』を目安（所管：国税庁）。固定資産税評価額は市町村が公示価格の『70％程度』を目安（所管：市町村・東京23区は東京都）。ここがポイント！『評価割合』で見分けることが試験対策の鍵。実務では『目的に応じた評価額』を使い分けることが重要。"}, {"num": 11, "type": "multi", "text": "借地借家法に基づく定期借地権に関する下表の空欄（ア）～（ウ）にあてはまる語句の組み合わせと して、最も適切なものはどれか。 種類 一般定期借地権 事業用定期借地権等 建物譲渡特約付借地権 存続期間 （ ア ）以上 １０年以上５０年未満 ３０年以上 契約方法 （ イ ） （ ウ ） 制限なし 原則として借地人は建 原則として借地人は建 契約終了時の 借地権設定者が建物を買 物を取り壊して土地を 物を取り壊して土地を 建物 い取る 返還する 返還する", "tables_html": "<table class=\"q-table\"><tbody><tr><td>価格の種類</td><td>公示価格</td><td>相続税路線価</td><td>固定資産税評価額</td></tr><tr><td>所管</td><td>国土交通省</td><td>国税庁</td><td>（ ア ）</td></tr><tr> "type": "multi", "text": "ＦＰの沖田さんは、相談者の斉藤さんから地震保険に関する質問を受けた。地震保険に関する沖田さ んの次の説明のうち、最も不適切なものはどれか。なお、地震保険とは「地震保険に関する法律」に定 める地震保険契約に係る保険をいうものとする。", "tables_html": "", "choices": ["「地震保険は火災保険などとセットで契約するため、単独での契約はできません。」", "「地震保険の保険料は、建物の所在地によって異なります。」", "「地震保険では、自動車も家財として補償の対象となります。」"], "answer": 2, "kaisetsu": "相続時精算課税制度の『累積課税』と『相続税の二重課税排除』が基本ルールです。贈与時に『2,500万円までの非課税枠』で贈与税がかかりませんが、その後の相続時に『贈与額を相続財産に加算』して相続税を計算します。2,500万円を超える贈与なら『超える分に贈与税が課される』。ここがポイント！相続税率と贈与税率を比較して『早めに贈与した方が得か、相続で良いか』判断する必要があります。高齢の親が多額の資産を持つ場合の実務的なプランニング手法として重要。"}, {"num": 15, "type": "multi", "text": "中岡さん（６８歳）の当年分の収入が下記＜資料＞のとおりである場合、中岡さんの当年分の所得税 における総所得金額として、正しいものはどれか。なお、記載のない事項については一切考慮しないこ ととする。 ＜資料＞ 内容 金額 アルバイト収入 ５０万円 公的年金の老齢年金 ３００万円 ※アルバイト収入は給与所得控除額を控除する前の金額である。 ※老齢年金は公的年金等控除額を控除する前の金額である。 ＜給与所得控除額の速算表＞ 給与等の収入金額 給与所得控除額 １６２.５万円 以下 ５５万円 １６２.５万円 超 １８０万円 以下 収入金額×４０％－ １０万円 １８０万円 超 ３６０万円 以下 収入金額×３０％＋ ８万円 ３６０万円 超 ６６０万円 以下 収入金額×２０％＋ ４４万円 ６６０万円 超 ８５０万円 以下 収入金額×１０％＋１１０万円 ８５０万円 超 １９５万円（上限） ＜公的年金等控除額の速算表＞ 公的年金等控除額 公的年金等に係る雑所得以外の所得 納税者区分 公的年金等の収入金額（Ａ） に係る合計所得金額 １,０００万円 以下 ３３０万円 以下 １１０万円 ３３０万円 超 ４１０万円 以下 （Ａ）×２５％＋ ２７.５万円 ６５歳以上の者 ４１０万円 超 ７７０万円 以下 （Ａ）×１５％＋ ６８.５万円 ７７０万円 超 １,０００万円 以下 （Ａ）× ５％＋１４５.５万円 １,０００万円 超 １９５.５万円", "tables_html": "<table class=\"q-table\"><tbody><tr><td>内容</td><td>金額</td></tr><tr><td>アルバイト収入</td><td>５０万円</td></tr><tr><td>公的年金の老齢年金</td><td>３００万円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>給与等の収入金額</td><td>給与所得控除額</td></tr><tr><td>１６２.５万円 以下</td><td>５５万円</td></tr><tr><td>１６２.５万円 超 １８０万円 以下</td><td>収入金額×４０％－ １０万円</td></tr><tr><td>１８０万円 超 ３６０万円 以下</td><td>収入金額×３０％＋ ８万円</td></tr><tr><td>３６０万円 超 ６６０万円 以下</td><td>収入金額×２０％＋ ４４万円</td></tr><tr><td>６６０万円 超 ８５０万円 以下</td><td>収入金額×１０％＋１１０万円</td></tr><tr><td>８５０万円 超</td><td>１９５万円（上限）</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>納税者区分</td><td>公的年金等の収入金額（Ａ）</td><td>公的年金等控除額</td></tr><tr><td></td><td></td><td>公的年金等に係る雑所得以外の所得<br>に係る合計所得金額<br>１,０００万円 以下</td></tr><tr><td>６５歳以上の者</td><td>３３０万円 以下</td><td>１１０万円</td></tr><tr ,３４０万円"], "answer": 1, "kaisetsu": "地震保険の『保険料決定の仕組み』は『都道府県ごとの地震リスク』『建物構造（木造・非木造）』『建築年』で大きく異なります。阪神大震災の被害が大きい地域ほど保険料が高く設定されています。また『地震保険は単独では加入できず、火災保険とセット』で加入が必須。ここがポイント！損害認定は『全損・大半損・小半損・一部損』の4区分で、時価に対する『損害割合％』で判定されます。それぞれの金額が異なるため、保険金額の設定が重要。"}, {"num": 17, "type": "multi", "text": "高橋さんは、２０年前に購入し、現在居住している自宅の土地および建物を売却する予定である。売 却に係る状況が下記＜資料＞のとおりである場合、所得税における課税長期譲渡所得の金額として、正 しいものはどれか。なお、課税長期譲渡所得の金額が最も少なくなるように計算すること。 ＜資料＞ 譲渡価額（合計）：６,５００万円 取得費（合計）：２,１００万円 譲渡費用（合計）：２００万円 ※居住用財産を譲渡した場合の３,０００万円特別控除の特例の適用を受けるものとする。 ※所得控除は考慮しないこととする。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>支給された退職一時金</td><td>４,４００万円</td></tr><tr><td>勤続年数</td><td>３８年</td></tr></tbody></table>", "choices": ["６００万円", "１,２００万円", "１,４００万円"], "answer": 1, "kaisetsu": "火災保険の『補償範囲』は『建物専用』『建物と家財』で異なります。建物は躯体、柱、基礎など固定資産。家財は家具、電化製品など動産。同じ火災でも『どちらが対象か』で保険金が支払われるか決まります。ここがポイント！『水災補償』は火災保険の『特約』で、洪水や台風による被害が対象。地震による水災は別に『地震保険』での補償を検討する必要があります。複合的なリスク対策が現代のライフプランでは重要。"}, {"num": 18, "type": "multi", "text": "森隆男さん（被相続人）の＜親族関係図＞が下記のとおりである場合、民法上の相続人および法定相 続分の組み合わせとして、最も適切なものはどれか。なお、記載のない事項については一切考慮しない こととする。 ＜親族関係図＞ 元貴 妙子（※） （すでに死亡） 吉春 龍子 森 隆男 綾子 （被相続人） ※妙子さんは期限内に家庭裁判所で手続きを行い、適法に相続を放棄した。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>支給された退職一時金</td><td>４,４００万円</td></tr><tr><td>勤続年数</td><td>３８年</td></tr></tbody></table>", "choices": ["綾子 ２／３ 妙子 １／３", "綾子 ２／３ 龍子 １／６ 吉春 １／６", "綾子 ３／４ 龍子 １／８ 吉春 １／８"], "answer": 2, "kaisetsu": "投資信託の『信託報酬』『買付手数料』『信託財産留保額』を理解することが運用コスト削減の鍵です。信託報酬は年率で毎日差し引かれ、買付手数料は購入時の一回限り。信託財産留保額は解約時にかかる費用。ここがポイント！『同じ指数に連動するインデックスファンド』でも『信託報酬が異なる』ため、長期運用では大きな差になります。信託報酬0.1％と0.5％で20年運用すると数百万円の差。低コスト商品選択がリターンに大きく影響します。"}, {"num": 19, "type": "multi", "text": "藤田信二さん（被相続人）の＜親族関係図＞および＜相続に係る相続税の課税遺産総額（課税価格の 合計額から遺産に係る基礎控除額を控除した金額)＞が下記のとおりである場合、信二さんの相続に係 る相続税の総額として、正しいものはどれか。 ＜親族関係図＞ 藤田 信二 良枝 （被相続人） 咲江 桜子 ＜相続に係る相続税の課税遺産総額（課税価格の合計額から遺産に係る基礎控除額を控除した金額)＞ ８,０００万円 ＜相続税の速算表＞ 法定相続分に応ずる取得金額 税率 控除額 １,０００万円 以下 １０％ － １,０００万円 超 ３,０００万円 以下 １５％ ５０万円 ３,０００万円 超 ５,０００万円 以下 ２０％ ２００万円 ５,０００万円 超 １億円 以下 ３０％ ７００万 告書などに基づき、相 談者に対して、有償で具体的な投資時期等の判断や助言を行った。", "税理士の登録を受けていないＦＰが、住宅展示場におけるＦＰ相談会で、住宅購入に当たり、住宅 借入金等特別控除（住宅ローン控除）の適用を受けた場合の具体的な税額計算を行った。", "生命保険募集人・保険仲立人の登録を受けていないＦＰが、変額年金保険の一般的な商品内容につ いて説明を行った。"], "answer": 2, "kaisetsu": "FP業務で『正しい行為』を判定する問題の場合、「どれが『適切か』」を見分けることが大切。正解は③（最も適切）。①は投資助言・代理業登録なしに『投資時期等の判断を有償で助言』することは違反。『有価証券報告書の説明』だけなら許可不要ですが『判断・助言』が加わると違反。②は税理士資格なしに『具体的な税額計算』は違反。住宅ローン控除の『一般的な制度説明』なら可能ですが『具体的な計算』で引っかかります。③なら許可される内容かを正確に見分けることが合格への道。"}, {"num": 2, "type": "multi", "text": "下記は、東条家のキャッシュフロー表（一部抜粋）である。このキャッシュフロー表の空欄（ア）～ （ウ）にあてはまる数値として、正しいものはどれか。なお、計算に当たっては、キャッシュフロー表 中に記載の整数を使用すること。また、計算過程においては端数処理をせず計算し、計算結果について は万円未満を四捨五入することとする。 ＜東条家のキャッシュフロー表＞ （単位：万円) 経過年数 基準年 １年後 ２年後 ３年後 ４年後 東条 義雄 本人 ３１歳 ３２歳 ３３歳 ３４歳 ３５歳 家族・ 八重 妻 ３０歳 ３１歳 ３２歳 ３３歳 ３４歳 年齢 泰彦 長男 ３歳 ４歳 ５歳 ６歳 ７歳 自動車 泰彦 ライフイベント 変動率 購入 小学校入学 給与収入（本人） １％ ４３０ 収入 給与収入（妻） １％ ３６０ 収入合計 － ７９０ 基本生活費 ２％ ２８０ （ ア ） 住宅関連費 － １８０ １８０ １８０ １８０ １８０ 教育費 － １２ １５ １５ １５ ２４ 支出 保険料 － ２４ ２４ ２４ ２４ ２４ 一時的支出 － ３００ ２０ その他支出 － ４８ 支出合計 － ５４４ ８５８ 年間収支 ２４５ （ イ ） 金融資産残高 １％ ６８０ （ ウ ） ※年齢および金融資産残高は各年１２月３１日現在のものとする。 ※給与収入は可処分所得で記載している。 ※記載されている数値は正しいものとする。また、問題作成の都合上、一部を空欄にしてある。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>経過年数</td><td></td><td></td><td>基準年</td><td>１年後</td><td>２年後</td><td>３年後</td><td>４年後</td></tr><tr><td>家族・<br>年齢</td><td>東条 義雄</td><td>本人</td><td>３１歳</td><td>３２歳</td><td>３３歳</td><td>３４歳</td><td>３５歳</td></tr><tr><td></td><td>八重</td><td>妻</td><td>３０歳</td><td>３１歳</td><td>３２歳</td><td>３３歳</td><td>３４歳</td></tr><tr><td></td><td>泰彦</td><td>長男</td><td>３歳</td><td>４歳</td><td>５歳</td><td>６歳</td><td>７歳</td></tr><tr><td>ライフイベント<br>変動率</td><td></td><td></td><td></td><td></td><td>自動車<br>購入</td><td></td><td>泰彦<br>小学校入学</td></tr><tr><td></td><td></td><td>変動率</td><td></td><td></td><td></td><td></td><td></td></tr><tr><td>収入</td><td>給与収入（本人）</td><td>１％</td><td>４３０</td><td></td><td></td><td></td><td></td></tr><tr><td></td><td>給与収入（妻）</td><td>１％</td><td>３６０</td><td></td><td></td><td></td><td></td></tr><tr><td></td><td>収入合計</td><td>－</td><td>７９０</ 全て済ませる必要があります。ここがポイント！『遺産分割協議がまとまらない場合』は『暫定的な法定相続分での申告』が認められる場合があります。相続放棄や限定承認は『3ヶ月以内』という別期限で、こちらが先に完了する必要があります。複数の期限が絡むため、相続発生時の進め方を事前に理解が重要。"}, {"num": 4, "type": "multi", "text": "木村さんは、今後１０年間で積立貯蓄をして、子どもの大学進学資金として２００万円を準備したい と考えている。積立期間中に年利２.０％で複利運用できるものとした場合、２００万円を準備するた めに必要な毎年の積立金額として、正しいものはどれか。なお、下記＜資料＞の３つの係数の中から最 も適切な係数を選択して計算し、解答に当たっては、千円未満を切り上げること。また、記載のない事 項については一切考慮しないこととする。 ＜資料：係数早見表（年利２.０％)＞ 現価係数 資本回収係数 減債基金係数 １０年 ０.８２０３ ０.１１１３３ ０.０９１３３ ※記載されている数値は正しいものとする。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>［資産］ ×××</td><td>［負債］ ×××</td></tr><tr><td></td><td>負債合計 ×××</td></tr><tr><td></td><td>［純資産］ （ ア ）</td></tr><tr><td>資産合計 ×××</td><td>負債・純資産合計 ×××</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>金融資産<br>普通預金<br>定期預金<br>投資信託</td><td>３００<br>１,５００<br>２００</td></tr><tr><td>生命保険（解約返戻金相当額）</td><td>１００</td></tr><tr><td>自動車</td><td>１５０</td></tr><tr><td>不動産（自宅マンション）</td><td>４,０００</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>現価係数</td><td>資本回収係数</td><td>減債基金係数</td></tr><tr><td>１０年</td><td>０.８２０３</td><td>０.１１１３３</td><td>０.０９１３３</td></tr></tbody></table>", "choices": ["１６５,０００円", "１８３,０００円", "２２３,０００円"], "answer": 1, "kaisetsu": "遺留分の『被相続人の自由度』と『相続人の保障』のバランスを理解することが大切。遺言で全遺産を他人に遺す場合でも、『相続人に遺留分減殺請求権』があり、最低限度の遺産受取が保障されます。配偶者と子の場合、各自が『法定相続分の50％』を遺留分として保有します。混乱しやすいけど…『遺留分減殺請求は相続人が相続開始を知った日から1年以内』という期限があり、この期限を過ぎると請求できなくなります。遺言作成時から相続実行まで一連の流れで戦略を立てることが重要。"}, {"num": 5, "type": "multi", "text": "浦田豊和さん（６１歳）は、老齢基礎年金の繰上げ受給および繰下げ受給について、ＦＰの堀尾さん に質問をした。豊和さんの老齢基礎年金の繰上げ受給および繰下げ受給に関する次の記述の空欄（ア）、 （イ）にあてはまる数値の組み合わせとして、最も適切なものはどれか。なお、記載のない事項につい ては一切考慮しないこととする。 老齢基礎年金の繰上げ受給をした場合の減額率および老齢基礎年金の繰下げ受給をした場合の増額 率は、以下の算式により計算する。 減額率＝（ ア ）％×繰上げ請求月から６５歳に達する日の前月までの月数 増額率＝（ イ ）％×６５歳に達した月から繰下げ申出月の前月までの月数", "tables_html": "<table class=\"q-table\"><tbody><tr><td></td><td>現価係数</td><td>資本回収係数</td><td>減債基金係数</td></tr><tr><td>１０年</td><td>０.８２０３</td><td>０.１１１３３</td><td>０.０９１３３</td></tr></tbody></table>", "choices": ["（ア）０.４ （イ）０.７", "（ア）０.５ （イ）０.５", "（ア）０.７ （イ）０.４"], "answer": 0, "kaisetsu": "個人事業主の『生計を一にする親族への給与』には『青色事業専従者控除』というルールがあります。配偶者なら最大103万円（給与所得控除で非課税）、他の親族なら給与額の全額が経費。ただし『実際に労働に従事』『給与額が相当』『給与支払額を市町村に届け出』という厳しい要件があります。ここがポイント！『サラリーマンの妻が手伝った』程度では認められず、『専ら当該事業に従事』という実質的判断が必要。節税対策として考える際は税務署との信頼関係構築が重要。"}, {"num": 6, "type": "multi", "text": "下記＜資料＞に基づくＷＡ株式会社の投資指標に関する次の記述のうち、誤っているものはどれか。 なお、記載のない事項については一切考慮しないこととし、計算結果については表示単位の小数点以下 第３位を四捨五入すること。 ＜資料：ＷＡ株式会社に関するデータ＞ 株価 １,５００円 １株当たり当期純利益 ２００円 １株当たり純資産（自己資本） １,８００円 １株当たり年間配当金 ２５円", "tables_html": "<table class=\"q-table\"><tbody><tr><td></td><td>現価係数</td><td>資本回収係数</td><td>減債基金係数</td></tr><tr><td>１０年</td><td>０.８２０３</td><td>０.１１１３３</td><td>０.０９１３３</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>株価</td><td>１,５００円</td></tr><tr><td>１株当たり当期純利益</td><td>２００円</td></tr><tr><td>１株当たり純資産（自己資本）</td><td>１,８００円</td></tr><tr><td>１株当たり年間配当金</td><td>２５円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>投資信託の費用</td><td>主な内容</td></tr><tr><td>購入時手数料</td><td>投資信託の購入時に販売会社へ支払う費用である。購入時手数料が徴収され<br>ない（ ア ）と呼ばれる投資信託もある。</td></tr><tr><td>運用管理費用</td><td>運用のための費用や情報開示のための資料作成・発送、資産の保管・管理な<br>どの費用として徴収される。信託財産の残高から（ イ ）、差し引かれる。</td></tr><tr><td>信託財産留保額</td><td>投資家間の公平性を保つために、一般的に、（ ウ ）の際に徴収される。投<br>資信託によっては差し引かれないものもある。</td></tr></tbody></table>", "choices": ["株価収益率（ＰＥＲ）は６０倍である。", "株価純資産倍率（ＰＢＲ）は０.８３倍である。", "配当性向は１２.５０％である。"], "answer": 0, "kaisetsu": "所得税の『総合課税』と『分離課税』で同じ『所得』でも扱いが全く違います。給与所得、不動産所得、事業所得は『総合課税』で、合計して累進税率を適用。譲渡所得（不動産や株式）、山林所得は『分離課税』で、独立して税率を適用。ここがポイント！『不動産譲渡所得は保有期間で税率が異なる』（5年以下で39%、5年超で20%の税率差）。売却タイミングで税負担が大きく変わるため、税理士の相談は必須。戸建て売却時に『5年経過まで待つか、今売るか』で数百万円の差。"}, {"num": 7, "type": "multi", "text": "投資信託の費用に関する下表の空欄（ア）～（ウ）にあてはまる語句として、最も適切なものはどれ か。 投資信託の費用 主な内容 投資信託の購入時に販売会社へ支払う費用である。購入時手数料が徴収され 購入時手数料 ない（ ア ）と呼ばれる投資信託もある。 運用のための費用や情報開示のための資料作成・発送、資産の保管・管理な 運用管理費用 どの費用として徴収される。信託財産の残高から（ イ ）、差し引かれる。 投資家間の公平性を保つために、一般的に、（ ウ ）の際に徴収される。投 信託財産留保額 資信託によっては差し引かれないものもある。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>株価</td><td>１,５００円</t 所得）。『被保険者と受取人が異なる』なら『贈与税』の対象。『配偶者が受取人』で一定要件を満たすと『相続税』になるケースもあります。ここがポイント！同じ保険でも『誰が契約し、誰が受け取るか』で税金が全く変わります。相続対策で『生命保険を活用する』際は『受取人設定』が最も重要な決定。契約前に必ず税理士に相談。"}, {"num": 9, "type": "multi", "text": "下記＜資料＞の甲土地の建築面積の最高限度を算出する基礎となる敷地面積として、正しいものはど れか。なお、記載のない事項については一切考慮しないこととする。 ＜資料＞ １８ｍ ※甲土地・乙土地が面する道路 は建築基準法第４２条第２項 に該当する道路で、甲土地・ （甲土地） １０ｍ 乙土地はともにセットバック １８０ｍ2 を要する。また、道路の中心 線は現況道路の中心に位置す るものとする。なお、特定行 幅員３ｍ市道 政庁が指定する幅員６ｍ指定 区域ではない。 （乙土地）", "tables_html": "<table class=\"q-table\"><tbody><tr><td></td><td>株価（１株当たり）</td></tr><tr><td>第１回</td><td>１,２００円</td></tr><tr><td>第２回</td><td>２,０００円</td></tr><tr><td>第３回</td><td>２,０００円</td></tr><tr><td>第４回</td><td>１,５００円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>土地登記記録</td><td>表題部</td><td>（ ア ）</td><td></td></tr><tr><td></td><td>権利部</td><td>甲区</td><td>（ イ ）</td></tr><tr><td></td><td></td><td>乙区</td><td>（ ウ ）</td></tr></tbody></table>", "choices": ["１４４ｍ2", "１６２ｍ2", "１７１ｍ2"], "answer": 2, "kaisetsu": "相続時精算課税制度と『配偶者への贈与』の組み合わせが節税の鍵。相続時精算課税を使えば『2,500万円の非課税枠』で贈与できます。さらに『配偶者との間で婚姻20年以上で住宅を贈与』なら『配偶者控除2,000万円』が別枠で使える場合も。覚えておこう：複数の制度を組み合わせることで『数千万円の節税』も可能。ただし『複雑な手続きと期限管理』が必須で、専門家のサポート無くは成功しません。多世帯家族での相続対策では『事前計画』が絶対。"}, {"num": 10, "type": "multi", "text": "土地の登記記録に関する下表の空欄（ア）～（ウ）にあてはまる記録事項の組み合わせとして、最も 適切なものはどれか。 ＜土地登記記録の構成＞ 表題部 （ ア ） 土地登記記録 甲区 （ イ ） 権利部 乙区 （ ウ ）", "tables_html": "<table class=\"q-table\"><tbody><tr><td>土地登記記録</td><td>表題部</td><td>（ ア ）</td><td></td></tr><tr><td></td><td>権利部</td><td>甲区</td><td>（ イ ）</td></tr><tr><td></td><td></td><td>乙区</td><td>（ ウ ）</td></tr></tbody></table>", "choices": ["（ア）所有権保存登記 （イ）賃借権設定登記 （ウ）抵当権設定登記", "（ア）土地の所在や地積 （イ）賃借権設定登記 （ウ）抵当権設定登記", "（ア）土地の所在や地積 （イ）所有権移転登記 （ウ）賃借権設定登記"], "answer": 2, "kaisetsu": "土地登記記録の『表題部』『甲区』『乙区』の記載内容を正確に区別することが重要です。表題部には『土地の所在地、地積、地目、所有者名義人』（不動産の物理的情報）。甲区には『所有権保存登記、所有権移転登記』（所有権の変動）。乙区には『抵当権設定登記、賃借権設定登記、地上権設定登記』（所有権以外の権利）。ここがポイント！甲区と乙区を見れば『その土地の全ての『重い担保や権利』がわかります。不動産を購入する際は『乙区に抵当権がないか』『賃借権で拘束されていないか』必ず確認。"}, {"num": 11, "type": "multi", "text": "鍋島さんは、所有しているマンションを // ===== STATE =====
let curMode = 'gakka';  // 'gakka'|'jitsugi'
let curExam = null;
let quizMode = 'all';   // 'all'|'ox'|'mc'
let pool = [];
let idx = 0;
let correct = 0;
let history = [];
let lastExam = null;
let lastMode = 'all';

// ===== INIT =====
function init() {
  buildCards('gakka-cards', DATA.gakka, 'gakka');
  buildCards('jitsugi-cards', DATA.jitsugi, 'jitsugi');
}

function buildCards(containerId, exams, type) {
  const el = document.getElementById(containerId);
  exams.forEach(exam => {
    const cnt = exam.questions.length;
    const div = document.createElement('div');
    div.className = 'exam-card';
    const badge = type === 'gakka'
      ? '<span class="badge badge-g">学科 60問</span>'
      : '<span class="badge badge-j">実技 20問</span>';
    div.innerHTML = `<div class="year">${exam.label}</div><div class="cnt">${cnt}問収録</div>${badge}`;
    div.onclick = () => selectExam(type, exam.id);
    el.appendChild(div);
  });
}

// ===== NAVIGATION =====
function showView(id) {
  ['view-home','view-select','view-quiz','view-score'].forEach(v =>
    document.getElementById(v).classList.toggle('hidden', v !== id)
  );
  const isQuiz = id === 'view-quiz';
  document.getElementById('progWrap').classList.toggle('hidden', !isQuiz);
  window.scrollTo(0, 0);
}

function showMode(mode) {
  curMode = mode;
}

function goHome() {
  showView('view-home');
}

function selectExam(type, examId) {
  curMode = type;
  showMode(type);
  const exams = type === 'gakka' ? DATA.gakka : DATA.jitsugi;
  curExam = exams.find(e => e.id === examId);
  if (!curExam) return;

  document.getElementById('sel-bread').textContent = curExam.label;
  document.getElementById('sel-title').textContent =
    (type === 'gakka' ? '学科試験 ' : '実技試験 ') + curExam.label;

  // Show/hide mode buttons for jitsugi (no OX)
  const oxBtn = document.getElementById('mode-ox');
  const mcBtn = document.getElementById('mode-mc');
  if (type === 'jitsugi') {
    oxBtn.classList.add('hidden');
    mcBtn.classList.add('hidden');
    quizMode = 'all';
    document.getElementById('mode-all').classList.add('sel');
  } else {
    oxBtn.classList.remove('hidden');
    mcBtn.classList.remove('hidden');
  }

  quizMode = 'all';
  setMode('all', document.getElementById('mode-all'));
  showView('view-select');
}

function setMode(m, btn) {
  quizMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
}

// ===== QUIZ =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  if (!curExam) return;
  let qs = [...curExam.questions];

  if (quizMode === 'ox') qs = qs.filter(q => q.type === 'ox');
  else if (quizMode === 'mc') qs = qs.filter(q => q.type === 'multi');

  if (qs.length === 0) { alert('条件に合う問題がありません'); return; }

  pool = shuffle(qs);
  idx = 0;
  correct = 0;
  history = [];
  lastExam = curExam;
  lastMode = quizMode;

  showView('view-quiz');
  loadQ(0);
}

function loadQ(i) {
  if (i >= pool.length) { showScore(); return; }

  const q = pool[i];
  const examLabel = curExam.label;
  const typeLabel = curMode === 'gakka' ? '学科' : '実技';

  // Breadcrumb
  document.getElementById('qbread-exam').textContent = examLabel;
  document.getElementById('qbread-q').textContent = `問${q.num}`;

  // Title bar
  document.getElementById('q-titlebar').textContent =
    `FP3級 ${typeLabel}試験 ${examLabel} 問${q.num}`;

  // Question number & tag
  document.getElementById('q-num-label').textContent = `問${q.num}`;
  const tag = document.getElementById('q-type-tag');
  if (q.type === 'ox') {
    tag.textContent = '○×問題';
    tag.className = 'q-tag tag-ox';
  } else {
    tag.textContent = '三択問題';
    tag.className = 'q-tag tag-mc';
  }

  // Question text
  document.getElementById('q-text').textContent = q.text || '';

  // Tables
  const tableArea = document.getElementById('q-table-area');
  tableArea.innerHTML = '';
  if (q.tables_html) {
    const wrap = document.createElement('div');
    wrap.className = 'q-table-wrap';
    wrap.innerHTML = q.tables_html;
    tableArea.appendChild(wrap);
  }

  // Choices (for MC)
  const choicesArea = document.getElementById('q-choices-area');
  choicesArea.innerHTML = '';
  if (q.type === 'multi' && q.choices && q.choices.length > 0) {
    const ul = document.createElement('ul');
    ul.className = 'choices-list';
    q.choices.forEach((c, ci) => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="cn">${ci + 1}．</span><span>${escHtml(c)}</span>`;
      ul.appendChild(li);
    });
    choicesArea.appendChild(ul);
  }

  // Buttons
  const oxBtns = document.getElementById('ox-btns');
  const mcBtns = document.getElementById('mc-btns');

  if (q.type === 'ox') {
    oxBtns.classList.remove('hidden');
    mcBtns.classList.add('hidden');
    const bm = document.getElementById('btn-maru');
    const bb = document.getElementById('btn-batsu');
    bm.className = 'ans-btn';
    bb.className = 'ans-btn';
    bm.disabled = false;
    bb.disabled = false;
  } else {
    oxBtns.classList.add('hidden');
    mcBtns.classList.remove('hidden');
    mcBtns.innerHTML = '';
    const cnt = (q.choices && q.choices.length) || 3;
    for (let ci = 0; ci < cnt; ci++) {
      const btn = document.createElement('button');
      btn.className = 'mc-btn';
      btn.textContent = ci + 1;
      btn.id = 'mc' + ci;
      btn.onclick = () => ansMC(ci);
      mcBtns.appendChild(btn);
    }
  }

  // Hide result
  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('overlay').classList.add('hidden');

  updateProg();
}

function ansOX(choice) {
  const q = pool[idx];
  if (q._done) return;
  q._done = true;

  const isCorrect = (choice === q.answer);
  if (isCorrect) correct++;
  history.push({ q, userAns: choice, isCorrect });

  const bm = document.getElementById('btn-maru');
  const bb = document.getElementById('btn-batsu');
  bm.disabled = true;
  bb.disabled = true;

  if (q.answer === true) {
    bm.classList.add('correct-btn');
    if (!isCorrect) bb.classList.add('wrong-btn');
    else bb.classList.add('dim-btn');
  } else {
    bb.classList.add('correct-btn');
    if (!isCorrect) bm.classList.add('wrong-btn');
    else bm.classList.add('dim-btn');
  }

  showOverlay(isCorrect);
}

function ansMC(choice) {
  const q = pool[idx];
  if (q._done) return;
  q._done = true;

  const isCorrect = (choice === q.answer);
  if (isCorrect) correct++;
  history.push({ q, userAns: choice, isCorrect });

  const cnt = (q.choices && q.choices.length) || 3;
  for (let ci = 0; ci < cnt; ci++) {
    const btn = document.getElementById('mc' + ci);
    if (!btn) continue;
    btn.disabled = true;
    if (ci === q.answer) btn.classList.add('correct-btn');
    else if (ci === choice) btn.classList.add('wrong-btn');
    else btn.classList.add('dim-btn');
  }

  showOverlay(isCorrect);
}

function showOverlay(isCorrect) {
  const ov = document.getElementById('overlay');
  const circ = document.getElementById('ov-circle');
  const icon = document.getElementById('ov-icon');
  const txt = document.getElementById('ov-txt');

  ov.classList.remove('hidden');
  circ.className = 'overlay-circle ' + (isCorrect ? 'ok' : 'ng');
  icon.textContent = isCorrect ? '○' : '×';
  txt.textContent = isCorrect ? '正解！' : '不正解';

  setTimeout(() => {
    ov.classList.add('hidden');
    showResult();
  }, 900);
}

function showResult() {
  const q = pool[idx];
  const h = history[history.length - 1];

  const ra = document.getElementById('result-area');
  ra.classList.remove('hidden');

  // Correct answer
  let ansStr = '';
  if (q.answer === true) ansStr = '○（正しい）';
  else if (q.answer === false) ansStr = '×（誤り）';
  else if (typeof q.answer === 'number') ansStr = (q.answer + 1) + '';
  document.getElementById('res-ans').textContent = ansStr;

  let yoursStr = '';
  if (typeof h.userAns === 'boolean') yoursStr = h.userAns ? '○' : '×';
  else if (typeof h.userAns === 'number') yoursStr = (h.userAns + 1) + '';
  document.getElementById('res-yours').textContent = `あなた：${yoursStr}`;

  // Show explanation
  const exBox = document.getElementById('ex-box');
  const exText = document.getElementById('ex-text');
  let explHtml = '';

  // 正解の選択肢テキスト（multi）
  if (q.type === 'multi' && q.choices && q.choices[q.answer]) {
    const num = q.answer + 1;
    explHtml += `<p class="ex-correct-choice"><strong>正解の選択肢（${num}番）：</strong>${escHtml(q.choices[q.answer])}</p>`;
  }

  // 詳細解説
  if (q.kaisetsu) {
    explHtml += `<p class="ex-detail">${escHtml(q.kaisetsu)}</p>`;
  } else if (q.type === 'ox') {
    const mark = q.answer ? '○（正しい記述です）' : '×（誤りの記述です）';
    explHtml += `<p>${mark}</p>`;
  }

  if (explHtml) {
    exText.innerHTML = explHtml;
    exBox.classList.remove('hidden');
  } else {
    exBox.classList.add('hidden');
  }
  document.getElementById('res-bunya').innerHTML = '';

  // Next button
  const nb = document.getElementById('next-btn');
  nb.textContent = idx + 1 >= pool.length ? '成績を見る 📊' : `次の問題（問${pool[idx + 1]?.num || ''}）»`;

  updateProg();
  setTimeout(() => ra.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
}

function nextQ() {
  idx++;
  if (idx >= pool.length) {
    showScore();
  } else {
    loadQ(idx);
    window.scrollTo(0, 0);
  }
}

function updateProg() {
  const total = pool.length;
  const done = idx + (pool[idx]?._done ? 1 : 0);
  const pct = total ? (done / total * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
}

// ===== SCORE =====
function showScore() {
  showView('view-score');
  const total = history.length;
  const cor = history.filter(h => h.isCorrect).length;
  const pct = total ? Math.round(cor / total * 100) : 0;

  document.getElementById('sc-pct').textContent = pct + '%';
  document.getElementById('sc-frac').textContent = `${cor} / ${total} 問正解`;

  const passEl = document.getElementById('sc-pass');
  if (pct >= 60) {
    passEl.textContent = '✅ 合格ライン達成！';
    passEl.className = 'pass-badge pass';
  } else {
    passEl.textContent = '💪 もう少し頑張ろう！';
    passEl.className = 'pass-badge fail';
  }

  // List of all questions
  let rows = '';
  history.forEach((h, i) => {
    const icon = h.isCorrect ? '✅' : '❌';
    let ansStr = '';
    if (h.q.answer === true) ansStr = '○';
    else if (h.q.answer === false) ansStr = '×';
    else ansStr = (h.q.answer + 1) + '';
    rows += `<tr>
      <td>問${h.q.num}</td>
      <td>${icon}</td>
      <td>${ansStr}</td>
    </tr>`;
  });
  document.getElementById('sc-list').innerHTML = rows || '<tr><td colspan="3">データなし</td></tr>';
}

function retryQuiz() {
  if (lastExam) {
    curExam = lastExam;
    quizMode = lastMode;
    startQuiz();
  } else {
    goHome();
  }
}

// ===== UTILS =====
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== START =====
init();
</script>
</body>
</html>
