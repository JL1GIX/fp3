<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FP3級 過去問練習サイト</title>
  <style>
    :root {
      --primary: #1a56db; --primary-dark: #1e40af;
      --success: #16a34a; --danger: #dc2626; --warning: #d97706;
      --bg: #f0f4ff; --card-bg: #fff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
      --t1bg:#dbeafe;--t1c:#1d4ed8; --t2bg:#fce7f3;--t2c:#9d174d;
      --t3bg:#d1fae5;--t3c:#065f46; --t4bg:#fef3c7;--t4c:#92400e;
      --t5bg:#ede9fe;--t5c:#5b21b6; --t6bg:#fee2e2;--t6c:#991b1b;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    /* HEADER */
    header{background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;padding:18px 24px;box-shadow:0 4px 12px rgba(0,0,0,.15);}
    header h1{font-size:1.5rem;font-weight:800;}
    header p{font-size:.82rem;opacity:.85;margin-top:3px;}
    .hstats{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;}
    .hstat{background:rgba(255,255,255,.15);border-radius:10px;padding:6px 14px;font-size:.78rem;}
    .hstat span{font-size:1.15rem;font-weight:700;display:block;}

    /* CONTAINER */
    .container{max-width:860px;margin:0 auto;padding:20px 14px;}

    /* MODE TABS */
    .mode-tabs{display:flex;gap:8px;margin-bottom:18px;}
    .mode-tab{flex:1;padding:12px;border-radius:12px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:.9rem;font-weight:700;text-align:center;transition:all .2s;}
    .mode-tab:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.1);}
    .mode-tab.active.gakka-tab{background:#1a56db;border-color:#1a56db;color:#fff;}
    .mode-tab.active.jitsugi-tab{background:#7c3aed;border-color:#7c3aed;color:#fff;}

    /* UNIT TABS */
    .sec-label{font-size:.78rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
    .unit-tabs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
    .unit-tab{padding:7px 13px;border-radius:18px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:.78rem;font-weight:700;transition:all .2s;}
    .unit-tab:hover{transform:translateY(-1px);}
    .unit-tab.active{color:#fff;}
    .unit-tab[data-unit="all"].active{background:#475569;border-color:#475569;}
    .unit-tab[data-unit="1"].active{background:var(--t1c);border-color:var(--t1c);}
    .unit-tab[data-unit="2"].active{background:var(--t2c);border-color:var(--t2c);}
    .unit-tab[data-unit="3"].active{background:var(--t3c);border-color:var(--t3c);}
    .unit-tab[data-unit="4"].active{background:var(--t4c);border-color:var(--t4c);}
    .unit-tab[data-unit="5"].active{background:var(--t5c);border-color:var(--t5c);}
    .unit-tab[data-unit="6"].active{background:var(--t6c);border-color:var(--t6c);}

    /* SUB TABS */
    .sub-wrap{margin-bottom:14px;display:none;}
    .sub-wrap.vis{display:block;}
    .sub-tabs{display:flex;flex-wrap:wrap;gap:5px;}
    .sub-tab{padding:4px 11px;border-radius:12px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:.74rem;font-weight:600;transition:all .2s;}
    .sub-tab:hover,.sub-tab.active{border-color:var(--primary);color:var(--primary);background:#eff6ff;}

    /* PROGRESS */
    .prog-wrap{height:5px;background:var(--border);border-radius:3px;margin-bottom:18px;overflow:hidden;}
    .prog-bar{height:100%;background:linear-gradient(90deg,#1a56db,#7c3aed);border-radius:3px;transition:width .4s ease;}

    /* CARD */
    .card{background:var(--card-bg);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:24px;margin-bottom:14px;border:1px solid var(--border);animation:fadeIn .3s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

    .q-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:6px;}
    .q-num{font-size:.82rem;color:var(--muted);font-weight:700;}
    .q-tags{display:flex;gap:5px;flex-wrap:wrap;}
    .q-tag{font-size:.68rem;font-weight:700;padding:2px 9px;border-radius:9px;}
    .tag-1{background:var(--t1bg);color:var(--t1c);}
    .tag-2{background:var(--t2bg);color:var(--t2c);}
    .tag-3{background:var(--t3bg);color:var(--t3c);}
    .tag-4{background:var(--t4bg);color:var(--t4c);}
    .tag-5{background:var(--t5bg);color:var(--t5c);}
    .tag-6{background:var(--t6bg);color:var(--t6c);}
    .tag-mode{background:#f1f5f9;color:#475569;}

    /* SCENARIO BOX */
    .scenario-box{background:#eff6ff;border-left:4px solid #3b82f6;border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:14px;font-size:.85rem;line-height:1.75;color:#1e3a5f;white-space:pre-wrap;}
    .scenario-label{font-size:.7rem;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}

    .q-badge{display:inline-block;font-size:.7rem;background:#f8fafc;color:var(--muted);border-radius:6px;padding:2px 7px;margin-bottom:10px;border:1px solid var(--border);}
    .q-text{font-size:1rem;line-height:1.85;font-weight:500;margin-bottom:20px;}

    /* ○× BUTTONS */
    .maru-batsu{display:flex;gap:10px;margin-bottom:16px;}
    .btn-maru,.btn-batsu{flex:1;padding:15px;border-radius:12px;border:2px solid;font-size:1.5rem;font-weight:900;cursor:pointer;transition:all .2s;background:#fff;}
    .btn-maru{border-color:var(--success);color:var(--success);}
    .btn-batsu{border-color:var(--danger);color:var(--danger);}
    .btn-maru:hover:not(:disabled){background:var(--success);color:#fff;transform:scale(1.03);}
    .btn-batsu:hover:not(:disabled){background:var(--danger);color:#fff;transform:scale(1.03);}
    .btn-maru:disabled,.btn-batsu:disabled{opacity:.45;cursor:not-allowed;transform:none;}
    .btn-maru.sel{background:var(--success);color:#fff;}
    .btn-batsu.sel{background:var(--danger);color:#fff;}

    /* 3-CHOICE BUTTONS */
    .choices{display:flex;flex-direction:column;gap:9px;margin-bottom:16px;}
    .btn-choice{padding:13px 16px;border-radius:10px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:.88rem;text-align:left;transition:all .2s;display:flex;gap:10px;align-items:flex-start;}
    .btn-choice:hover:not(:disabled){border-color:var(--primary);background:#eff6ff;}
    .btn-choice:disabled{cursor:not-allowed;}
    .btn-choice .choice-label{font-weight:800;min-width:24px;flex-shrink:0;color:var(--muted);}
    .btn-choice.correct{border-color:var(--success);background:#f0fdf4;}
    .btn-choice.wrong{border-color:var(--danger);background:#fff1f2;}
    .btn-choice.show-ans{border-color:var(--success);background:#f0fdf4;}

    /* RESULT BOX */
    .result-box{border-radius:12px;padding:14px 18px;margin-bottom:16px;display:none;animation:fadeIn .3s ease;}
    .result-box.correct{background:#f0fdf4;border:2px solid #86efac;}
    .result-box.wrong{background:#fff1f2;border:2px solid #fca5a5;}
    .result-box h3{font-size:1rem;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
    .result-box.correct h3{color:var(--success);}
    .result-box.wrong h3{color:var(--danger);}
    .result-ans{font-size:.88rem;color:var(--muted);margin-bottom:9px;}
    .result-ans strong{color:var(--text);}
    .ex-label{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
    .ex-text{font-size:.86rem;line-height:1.8;color:#374151;background:rgba(0,0,0,.03);border-radius:8px;padding:11px;}
    .formula{background:#1e293b;color:#e2e8f0;border-radius:8px;padding:11px 14px;font-family:monospace;font-size:.82rem;line-height:1.75;white-space:pre-wrap;margin-top:7px;}

    /* NAV BUTTONS */
    .nav-btns{display:flex;gap:10px;}
    .btn{padding:11px 22px;border-radius:10px;border:none;cursor:pointer;font-size:.88rem;font-weight:700;transition:all .2s;}
    .btn-primary{background:var(--primary);color:#fff;flex:1;}
    .btn-primary:hover{background:var(--primary-dark);}
    .btn-secondary{background:var(--border);color:var(--text);}
    .btn-secondary:hover{background:#cbd5e1;}
    .btn:disabled{opacity:.4;cursor:not-allowed;}

    /* SCORE CARD */
    .score-card{background:var(--card-bg);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);padding:28px;text-align:center;display:none;}
    .score-circle{width:110px;height:110px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;border:6px solid;}
    .score-circle.great{border-color:var(--success);color:var(--success);background:#f0fdf4;}
    .score-circle.ok{border-color:var(--warning);color:var(--warning);background:#fffbeb;}
    .score-circle.poor{border-color:var(--danger);color:var(--danger);background:#fff1f2;}
    .score-card h2{font-size:1.2rem;margin-bottom:6px;}
    .score-card p{color:var(--muted);margin-bottom:18px;}
    .score-bd{display:flex;justify-content:center;gap:24px;margin-bottom:22px;}
    .score-item .val{font-size:1.3rem;font-weight:800;}
    .score-item .label{font-size:.72rem;color:var(--muted);}
    .btn-restart{background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;padding:13px 32px;border-radius:12px;border:none;font-size:.95rem;font-weight:700;cursor:pointer;}

    @media(max-width:600px){
      .q-text{font-size:.92rem;}
      header h1{font-size:1.2rem;}
      .mode-tab{font-size:.8rem;padding:10px 6px;}
    }
  </style>
</head>
<body>

<header>
  <h1>📊 FP3級 過去問練習サイト</h1>
  <p>学科（○×）＋ 実技（3択・計算）対策</p>
  <div class="hstats">
    <div class="hstat">総問題数<span id="totalCount">0</span>問</div>
    <div class="hstat">正解<span id="correctCount" style="color:#86efac">0</span>問</div>
    <div class="hstat">不正解<span id="wrongCount" style="color:#fca5a5">0</span>問</div>
    <div class="hstat">正答率<span id="rateDisplay">-</span></div>
  </div>
</header>

<div class="container">

  <!-- MODE TABS -->
  <div class="mode-tabs">
    <button class="mode-tab gakka-tab active" onclick="switchMode('gakka')">📝 学科試験（○×）</button>
    <button class="mode-tab jitsugi-tab" onclick="switchMode('jitsugi')">🧮 実技試験（3択・計算）</button>
  </div>

  <!-- UNIT TABS -->
  <div class="sec-label" id="unitLabel">📚 単元を選ぶ</div>
  <div class="unit-tabs" id="unitTabs"></div>

  <!-- SUB TABS -->
  <div class="sub-wrap" id="subWrap">
    <div class="sec-label">🔍 サブカテゴリ</div>
    <div class="sub-tabs" id="subTabs"></div>
  </div>

  <!-- PROGRESS -->
  <div class="prog-wrap"><div class="prog-bar" id="progBar" style="width:0%"></div></div>

  <!-- QUIZ CARD -->
  <div id="quizWrap">
    <div class="card" id="qCard">
      <div class="q-meta">
        <span class="q-num" id="qNum">問 1 / 1</span>
        <div class="q-tags" id="qTags"></div>
      </div>
      <div id="scenarioArea" style="display:none">
        <div class="scenario-label">📋 問題の前提条件</div>
        <div class="scenario-box" id="scenarioText"></div>
      </div>
      <div class="q-badge" id="qBadge">○か×で答えてください</div>
      <div class="q-text" id="qText">読み込み中...</div>
      <!-- ○× -->
      <div class="maru-batsu" id="maruBatsuArea">
        <button class="btn-maru" id="btnMaru" onclick="answerGakka(true)">○</button>
        <button class="btn-batsu" id="btnBatsu" onclick="answerGakka(false)">×</button>
      </div>
      <!-- 3択 -->
      <div class="choices" id="choicesArea" style="display:none"></div>
      <!-- RESULT -->
      <div class="result-box" id="resultBox">
        <h3 id="resultTitle"></h3>
        <div class="result-ans" id="resultAns"></div>
        <div class="ex-label">解説</div>
        <div class="ex-text" id="exText"></div>
      </div>
      <!-- NAV -->
      <div class="nav-btns">
        <button class="btn btn-secondary" id="btnPrev" onclick="prevQ()" disabled>← 前へ</button>
        <button class="btn btn-primary" id="btnNext" onclick="nextQ()" disabled>次へ →</button>
      </div>
    </div>
  </div>

  <!-- SCORE CARD -->
  <div class="score-card" id="scoreCard">
    <div class="score-circle" id="scoreCircle"></div>
    <h2 id="scoreTitle"></h2>
    <p id="scoreMsg"></p>
    <div class="score-bd">
      <div class="score-item"><div class="val" id="sc_c" style="color:var(--success)">0</div><div class="label">正解</div></div>
      <div class="score-item"><div class="val" id="sc_w" style="color:var(--danger)">0</div><div class="label">不正解</div></div>
      <div class="score-item"><div class="val" id="sc_r">0%</div><div class="label">正答率</div></div>
    </div>
    <button class="btn-restart" onclick="restart()">🔄 もう一度挑戦する</button>
  </div>

</div>

<script>
// =====================================================================
//  UNIT DEFINITIONS
// =====================================================================
const UNITS = {1:'ライフプランニング',2:'リスク管理',3:'金融資産運用',4:'タックスプランニング',5:'不動産',6:'相続・事業承継'};

// =====================================================================
//  学科問題（○× 形式）
// =====================================================================
const GAKKA_Q = [
  // ── 1: ライフプランニング ──
  {unit:1,sub:'FP業務と関連法規',q:'税理士資格を有しないFPが、顧客から個別の税務申告書類の作成を請け負うことは、税理士法に抵触する。',ans:true,ex:'税理士法により、税理士資格を有しない者が税務書類の作成・税務相談を有償で行うことは禁じられています。FPは一般的な税務知識の説明はできますが、個別具体的な税務申告書類の作成は行えません。'},
  {unit:1,sub:'FP業務と関連法規',q:'弁護士資格を有しないFPが、顧客から個別の法律事務（法律判断や法律相談）を依頼された場合に報酬を得ることは、弁護士法に抵触する。',ans:true,ex:'弁護士法により、弁護士でない者が報酬を得る目的で法律事務を業として行うことは禁止（非弁行為）されています。'},
  {unit:1,sub:'FP業務と関連法規',q:'金融商品取引法上の投資助言・代理業の登録を受けていないFPは、顧客に対して特定の金融商品への投資を勧める助言を業として行うことができる。',ans:false,ex:'投資助言・代理業を行うには金融商品取引法上の登録が必要です。無登録で投資助言を業として行うことは禁じられています。'},
  {unit:1,sub:'FP業務と関連法規',q:'ファイナンシャル・プランニングの6ステップの第1ステップは「顧客との関係確立（関係の明確化）」である。',ans:true,ex:'6ステップは①顧客との関係確立→②顧客データ収集・目標把握→③財務状況の分析・評価→④プランの検討・作成→⑤プランの実行援助→⑥定期的見直し の順です。'},
  {unit:1,sub:'社会保険',q:'全国健康保険協会管掌健康保険（協会けんぽ）の保険料は、被保険者と事業主が原則として折半で負担する。',ans:true,ex:'協会けんぽの保険料は被保険者と事業主が各50%を負担します（折半）。都道府県ごとに料率が異なります。'},
  {unit:1,sub:'社会保険',q:'健康保険の傷病手当金は、業務外の病気・けがで仕事を休んだ日から起算して3日間の待期期間を経た後、4日目から支給される。',ans:true,ex:'傷病手当金は連続3日間の待期期間（3日連続休業）後の4日目から支給されます。支給額は標準報酬日額の3分の2相当です。'},
  {unit:1,sub:'社会保険',q:'健康保険の出産育児一時金は、被保険者本人の出産だけでなく、被扶養者（家族）が出産した場合にも支給される。',ans:true,ex:'被扶養者の出産に対しても「家族出産育児一時金」として1児につき原則50万円が支給されます。'},
  {unit:1,sub:'社会保険',q:'公的介護保険の第1号被保険者は、市町村の区域内に住所を有する65歳以上の者であり、要介護・要支援の原因を問わず保険給付を受けられる。',ans:true,ex:'第1号被保険者（65歳以上）は、原因を問わず要介護・要支援状態になれば給付を受けられます。第2号被保険者（40〜64歳）は特定疾病が原因の場合のみ対象です。'},
  {unit:1,sub:'社会保険',q:'公的介護保険の第2号被保険者が保険給付を受けられるのは、加齢に起因する特定疾病により要介護・要支援状態となった場合に限られる。',ans:true,ex:'第2号被保険者（40〜64歳）は、初老期の認知症・脳血管疾患・がん末期など16種類の「特定疾病」が原因の場合のみ給付対象です。'},
  {unit:1,sub:'雇用保険',q:'雇用保険の基本手当（一般受給資格者）の受給要件は、離職前2年間に被保険者期間が通算12カ月以上あることである。',ans:true,ex:'一般離職者の基本手当受給要件は離職前2年間に被保険者期間12カ月以上。特定受給資格者（倒産・解雇等）は離職前1年間に6カ月以上です。'},
  {unit:1,sub:'雇用保険',q:'雇用保険の基本手当の給付日数は、被保険者期間や離職理由にかかわらず一律90日である。',ans:false,ex:'給付日数は被保険者期間・離職理由・年齢により異なります。最短90日〜最長360日の範囲で決まります。'},
  {unit:1,sub:'雇用保険',q:'育児休業給付金の給付率は、育児休業開始から180日間は休業開始時賃金日額の67%である。',ans:true,ex:'育児休業給付金の給付率は開始から180日間（6カ月間）は67%、181日目以降は50%です。'},
  {unit:1,sub:'公的年金',q:'老齢基礎年金を受給するためには、保険料納付済期間と保険料免除期間などを合算した受給資格期間が10年以上必要である。',ans:true,ex:'2017年8月より受給資格期間が25年から10年に短縮されました。保険料納付済期間・免除期間・合算対象期間の合計が10年以上あれば受給できます。'},
  {unit:1,sub:'公的年金',q:'国民年金の保険料全額免除期間（2009年4月以降）は、老齢基礎年金額の計算において免除を受けた期間の2分の1として反映される。',ans:true,ex:'2009年4月以降の全額免除期間は、国庫負担2分の1となり老齢基礎年金額の計算では月数×1/2として算出します。'},
  {unit:1,sub:'公的年金',q:'老齢厚生年金を繰り上げ受給した場合の減額率は、繰り上げた月数×0.4%（2022年4月以降）であり、この減額は一生涯続く。',ans:true,ex:'2022年4月以降の繰上げ減額率は1カ月あたり0.4%（改正前0.5%）。60歳から繰上げると最大24%減額され、生涯変わりません。'},
  {unit:1,sub:'公的年金',q:'遺族基礎年金は、子のない配偶者にも支給される。',ans:false,ex:'遺族基礎年金は「子のある配偶者」または「子」に支給されます。子のない配偶者は受給対象外です（遺族厚生年金は子のない妻等にも支給される場合があります）。'},
  {unit:1,sub:'公的年金',q:'老齢厚生年金の繰下げ支給の申出は、老齢基礎年金の繰下げ申出と同時に行わなければならない。',ans:false,ex:'老齢厚生年金と老齢基礎年金の繰下げは独立して申請でき、一方だけを繰り下げることも可能です。'},

  // ── 2: リスク管理 ──
  {unit:2,sub:'生命保険の種類',q:'定期保険は、保険期間内に被保険者が死亡した場合は死亡保険金が支払われるが、保険期間満了時に生存していても満期保険金は支払われない。',ans:true,ex:'定期保険は「掛け捨て型」で、保険期間内の死亡のみ補償。満期保険金も解約返戻金もほとんど（または全く）ありません。'},
  {unit:2,sub:'生命保険の種類',q:'収入保障保険の死亡保険金は、被保険者の死亡時期が保険期間の早い時期であるほど受取総額が多くなる。',ans:true,ex:'収入保障保険は死亡後の保険期間満了まで毎月（毎年）一定額が支払われます。早期に死亡するほど受取期間が長くなるため、受取総額は多くなります。'},
  {unit:2,sub:'生命保険と税務',q:'契約者（保険料負担者）・被保険者が夫、死亡保険金受取人が妻である場合、夫死亡時に妻が受け取る死亡保険金は、相続税のみなし相続財産として課税対象となる。',ans:true,ex:'契約者＝被保険者≠受取人の場合、死亡保険金は民法上の相続財産ではありませんが、相続税法上「みなし相続財産」として課税対象（ただし500万円×法定相続人数の非課税枠あり）です。'},
  {unit:2,sub:'生命保険と税務',q:'契約者（保険料負担者）が妻、被保険者が夫、死亡保険金受取人が妻である場合、夫死亡時に妻が受け取る死亡保険金は、一時所得として所得税の課税対象となる。',ans:true,ex:'契約者＝受取人≠被保険者の場合、死亡保険金は一時所得（所得税・住民税）の課税対象です。'},
  {unit:2,sub:'生命保険と税務',q:'所得税における一般生命保険料控除の控除限度額は、2012年1月以降の契約では最高4万円である。',ans:true,ex:'2012年1月以降締結の生命保険料控除は、①一般生命保険料（上限4万円）②介護医療保険料（上限4万円）③個人年金保険料（上限4万円）の3区分で合計最高12万円です。'},
  {unit:2,sub:'生命保険と税務',q:'個人年金保険料税制適格特約が付加されていない個人年金保険の保険料は、一般生命保険料控除の対象となる。',ans:true,ex:'個人年金保険料控除を受けるには「税制適格特約」の付加が必要です。付加されていない場合は一般生命保険料控除の対象として扱われます。'},
  {unit:2,sub:'損害保険',q:'火災保険では、地震・噴火またはこれらによる津波を原因とする損害は補償されない。',ans:true,ex:'地震・噴火・津波による損害は火災保険の免責事項です。これらに備えるには火災保険に付帯する地震保険への加入が必要です。'},
  {unit:2,sub:'損害保険',q:'地震保険は単独では加入できず、必ず火災保険に付帯して加入する必要がある。',ans:true,ex:'地震保険は必ず火災保険に付帯して加入します。補償額は火災保険の保険金額の30〜50%の範囲で設定され、建物5,000万円・家財1,000万円が上限です。'},
  {unit:2,sub:'損害保険',q:'自動車損害賠償責任保険（自賠責保険）は、対人賠償のみを補償し、対物賠償（物的損害）は補償しない。',ans:true,ex:'自賠責保険（強制保険）は被害者への人身損害（死亡・後遺障害・傷害）のみが対象で、物的損害は補償対象外です。'},
  {unit:2,sub:'損害保険',q:'損害保険における「超過保険」とは、保険金額が保険価額を上回っている状態をいう。',ans:true,ex:'超過保険＝保険金額＞保険価額の状態。この場合でも実損額を超えた保険金は支払われません（実損払いの原則）。逆に保険金額＜保険価額は「一部保険（比例てん補）」です。'},

  // ── 3: 金融資産運用 ──
  {unit:3,sub:'経済・金融の基礎',q:'国内総生産（GDP）は、一定期間内に国内で新たに生産されたモノやサービスの付加価値の合計額を示す指標である。',ans:true,ex:'GDPは「Gross Domestic Product（国内総生産）」の略で、国内の一定期間の付加価値総額。日本経済規模を示す代表的指標で内閣府が四半期ごとに公表します。'},
  {unit:3,sub:'経済・金融の基礎',q:'日本銀行が政策金利を引き上げる金融引き締め政策をとると、市場金利は上昇し、債券価格は下落する傾向がある。',ans:true,ex:'金融引き締め→市場金利上昇→既発債の利率が相対的に低下→債券売られる→債券価格下落。金利と債券価格は逆の動きをします。'},
  {unit:3,sub:'経済・金融の基礎',q:'消費者物価指数（CPI）が継続的に上昇している状態をデフレーションという。',ans:false,ex:'物価が継続的に上昇する状態は「インフレーション（インフレ）」、継続的に下落する状態が「デフレーション（デフレ）」です。'},
  {unit:3,sub:'預貯金・債券',q:'債券の価格が上昇すると、その債券の利回りは低下する。',ans:true,ex:'利回り＝(年間利息+値上がり益÷残存年数)÷購入価格×100。購入価格が上がると利回りの分母が大きくなるため利回りは低下します。'},
  {unit:3,sub:'預貯金・債券',q:'個人向け国債（変動10年）の利率は半年ごとに見直され、下限金利は年0.05%に設定されている。',ans:true,ex:'個人向け国債（変動10年）の利率は基準金利×0.66で半年ごとに変動し、下限は年0.05%。元本・利子の支払いは国が保証しています。'},
  {unit:3,sub:'預貯金・債券',q:'普通預金の利子は、20.315%（所得税・復興特別所得税・住民税）の税率で源泉徴収される。',ans:true,ex:'預貯金の利子は利子所得として20.315%（所得税15%＋復興特別所得税0.315%＋住民税5%）で源泉分離課税されます。'},
  {unit:3,sub:'株式・投資信託',q:'PER（株価収益率）は「株価÷1株当たり純利益（EPS）」で計算され、この値が低いほど株価は割安と判断される。',ans:true,ex:'PERは株価が1株純利益の何倍かを示します。PERが低いほど利益に対して株価が低く割安、高いほど割高と判断されます。'},
  {unit:3,sub:'株式・投資信託',q:'PBR（株価純資産倍率）が1倍を下回っている場合、理論上、株価は解散価値を下回っていると判断される。',ans:true,ex:'PBR＝株価÷1株当たり純資産（BPS）。1倍未満は株価が帳簿上の純資産を下回ることを意味し、理論上の解散価値以下とみなされます。'},
  {unit:3,sub:'株式・投資信託',q:'追加型株式投資信託の収益分配金のうち「元本払戻金（特別分配金）」は課税されない。',ans:true,ex:'投資信託の分配金は「普通分配金（課税対象）」と「元本払戻金・特別分配金（元本の払い戻しのため非課税）」に分かれます。'},
  {unit:3,sub:'株式・投資信託',q:'NISAの成長投資枠の年間投資上限額は240万円、つみたて投資枠と合わせた年間上限は360万円である。',ans:true,ex:'2024年からの新NISAは成長投資枠240万円＋つみたて投資枠120万円＝年間360万円。生涯非課税保有限度額は1,800万円（うち成長投資枠1,200万円）。'},
  {unit:3,sub:'外貨・その他',q:'外貨預金において、円を外貨に換える際（預入時）に適用されるのはTTSレートである。',ans:true,ex:'TTS（Telegraphic Transfer Selling）は銀行が外貨を売るレート（顧客が円→外貨）。TTB（Buying）は銀行が外貨を買うレート（顧客が外貨→円）。TTS＞TTM＞TTBの関係です。'},
  {unit:3,sub:'外貨・その他',q:'外貨預金は、預金保険制度の保護対象外である。',ans:true,ex:'預金保険の対象は円建ての預金（普通・定期等）。外貨預金、金融債、MMF等は保護対象外です。'},

  // ── 4: タックスプランニング ──
  {unit:4,sub:'所得税の基礎',q:'所得税は個人の所得に対して課税される国税であり、超過累進税率が採用されている。',ans:true,ex:'所得税は国税で、所得が多いほど税率が高くなる超過累進税率（5%〜45%の7段階）を採用。住民税は一律10%（定率）との違いも重要です。'},
  {unit:4,sub:'所得税の基礎',q:'給与収入が2,000万円を超える給与所得者は、年末調整の対象外となり、確定申告をしなければならない。',ans:true,ex:'給与収入2,000万円超の場合は年末調整不可で確定申告必須。また2カ所以上から給与を受けている場合や副業等で給与以外の所得が20万円超の場合も確定申告が必要です。'},
  {unit:4,sub:'所得税の基礎',q:'所得税の確定申告の申告・納付期限は、原則として翌年の3月15日である。',ans:true,ex:'確定申告の申告・納付期限はともに翌年3月15日（2月16日〜3月15日が申告期間）。土日の場合は翌平日になります。'},
  {unit:4,sub:'各種所得と損益通算',q:'不動産所得・事業所得の損失（一定の例外を除く）は、他の所得と損益通算することができる。',ans:true,ex:'損益通算できる損失の所得種類は不動産・事業・山林・譲渡の4種類（「ふ・じ・さ・ん」と覚える）。ただし不動産所得の土地取得借入金利子相当額は損益通算不可です。'},
  {unit:4,sub:'各種所得と損益通算',q:'上場株式等の譲渡損失は、申告分離課税を選択した上場株式等の配当所得と損益通算できる。',ans:true,ex:'上場株式等の譲渡損失は、申告分離課税を選択した配当所得と損益通算できます。さらに控除しきれない損失は3年間繰越控除も可能です。'},
  {unit:4,sub:'所得控除・税額控除',q:'所得税の基礎控除の額は、合計所得金額が2,400万円以下の場合、48万円である。',ans:true,ex:'2020年改正後の基礎控除は合計所得金額2,400万円以下で48万円（それ以上は逓減・消滅）。住民税の基礎控除は43万円です。'},
  {unit:4,sub:'所得控除・税額控除',q:'医療費控除の控除額は「（医療費合計−保険金補填額）−10万円（または総所得金額等×5%の低い方）」で計算する。',ans:true,ex:'医療費控除額＝(医療費−補填額)−10万円（総所得200万円未満の場合は総所得×5%）。上限200万円。自己と生計を一にする家族の医療費が対象です。'},
  {unit:4,sub:'所得控除・税額控除',q:'ふるさと納税による寄附金は、所得税では寄附金控除（所得控除）、住民税では税額控除として適用できる。',ans:true,ex:'ふるさと納税は寄附金額−2,000円について所得税（寄附金控除・所得控除）と住民税（税額控除）で控除されます。ワンストップ特例なら確定申告不要で住民税のみから全額控除。'},
  {unit:4,sub:'所得控除・税額控除',q:'住宅ローン控除（住宅借入金等特別控除）は、給与所得者の場合、初年度に確定申告すれば翌年以降は年末調整で適用を受けられる。',ans:true,ex:'住宅ローン控除の初年度は確定申告が必要ですが、2年目以降は給与所得者であれば年末調整で適用を受けることができます。'},
  {unit:4,sub:'所得控除・税額控除',q:'配当控除（税額控除）は、外国法人から受け取る配当金に対しても適用される。',ans:false,ex:'配当控除は内国法人（日本の会社）からの配当金に対してのみ適用されます。外国法人からの配当は対象外です。'},

  // ── 5: 不動産 ──
  {unit:5,sub:'不動産の基礎・登記',q:'不動産の登記記録（登記簿）の権利部甲区には所有権に関する事項が、乙区には所有権以外の権利（抵当権等）に関する事項が記録される。',ans:true,ex:'登記記録は表題部（物理的状況）と権利部に分かれます。権利部の甲区には所有権（売買・相続等）、乙区には抵当権・地上権・賃借権など所有権以外の権利が記録されます。'},
  {unit:5,sub:'不動産の基礎・登記',q:'日本の不動産登記には公信力があるため、登記を信頼して取引をした者は完全に保護される。',ans:false,ex:'日本の不動産登記には「対抗力」はありますが「公信力」はありません。登記が実態と異なる場合、登記を信頼した者が保護されない場合があります。'},
  {unit:5,sub:'不動産取引・法規制',q:'都市計画法において、用途地域は市街化区域に定められ、市街化調整区域には定められない。',ans:true,ex:'用途地域は市街化区域に必ず定められます。市街化調整区域は開発抑制区域なので用途地域は定められません。'},
  {unit:5,sub:'不動産取引・法規制',q:'借地借家法における普通借地権の存続期間は30年が最低で、合意によっても30年より短い期間を定めることはできない。',ans:true,ex:'普通借地権の存続期間は最低30年（30年未満の定めは無効→30年とみなす）。当事者の合意で30年より長い期間を設定することは可能です。'},
  {unit:5,sub:'不動産取引・法規制',q:'定期建物賃貸借契約（定期借家）は、公正証書でなければ有効に締結することができない。',ans:false,ex:'定期借家契約は公正証書でなくても書面（または電磁的方法）であれば有効です。ただし契約前に借主への書面による事前説明が必要です。'},
  {unit:5,sub:'不動産取引・法規制',q:'区分所有法において、管理規約の変更は区分所有者および議決権の各4分の3以上の多数による集会の決議が必要である。',ans:true,ex:'マンション（区分所有建物）の規約の設定・変更・廃止には、区分所有者および議決権の各4分の3以上の多数決（特別決議）が必要です。'},
  {unit:5,sub:'不動産税金',q:'不動産取得税は、相続による不動産の取得には課税されない。',ans:true,ex:'不動産取得税は売買・贈与・建築等による取得に課税されますが、相続（包括遺贈・合併も含む）による取得は非課税です。'},
  {unit:5,sub:'不動産税金',q:'居住用財産を譲渡した場合の3,000万円特別控除は、配偶者や直系血族（親・子等）への譲渡には適用されない。',ans:true,ex:'生計を一にする配偶者・親族などへの譲渡（特別関係者）、同族会社への譲渡などには3,000万円特別控除は適用できません。'},
  {unit:5,sub:'不動産税金',q:'固定資産税の標準税率は1.4%であり、都市計画税の制限税率（上限）は0.3%である。',ans:true,ex:'固定資産税の標準税率は1.4%。都市計画税は市街化区域内の土地・建物に課税され、制限税率（上限）は0.3%です。'},

  // ── 6: 相続・事業承継 ──
  {unit:6,sub:'相続の基礎',q:'相続の放棄は、自己のために相続の開始があったことを知った時から3カ月以内に家庭裁判所に申述しなければならない。',ans:true,ex:'相続放棄は3カ月以内（熟慮期間）に家庭裁判所へ申述します。放棄すると初めから相続人でなかったものとみなされます。'},
  {unit:6,sub:'相続の基礎',q:'被相続人の子が相続開始前に死亡していた場合、その子の子（被相続人の孫）が代わって相続する（代襲相続）。',ans:true,ex:'代襲相続とは相続人が死亡・欠格・廃除の場合に、その子が代わって相続することです。相続放棄した者の子は代襲相続しません。'},
  {unit:6,sub:'相続の基礎',q:'相続放棄をした者の子は、代襲相続人となる。',ans:false,ex:'相続放棄した場合、その者は「最初から相続人でなかった」とみなされます。そのため放棄した者の子は代襲相続しません（代襲が生じるのは死亡・欠格・廃除の場合）。'},
  {unit:6,sub:'相続の基礎',q:'法定相続人が配偶者と子2名の場合、法定相続分は配偶者が1/2、子それぞれが1/4ずつとなる。',ans:true,ex:'配偶者と子がいる場合の法定相続分は配偶者1/2・子（合計）1/2。子2人なら各1/4です。配偶者と尊属なら配偶者2/3・尊属1/3、配偶者と兄弟姉妹なら配偶者3/4・兄弟姉妹1/4。'},
  {unit:6,sub:'相続の基礎',q:'遺言書には自筆証書遺言・公正証書遺言・秘密証書遺言の3種類（普通方式）がある。',ans:true,ex:'普通方式の遺言は①自筆証書遺言（全文自書・自署・押印）②公正証書遺言（公証人作成・証人2名）③秘密証書遺言（署名押印のみ自筆・公証人関与・証人2名）の3種類です。'},
  {unit:6,sub:'相続税',q:'相続税の基礎控除額は「3,000万円＋600万円×法定相続人の数」で計算される。',ans:true,ex:'例えば相続人3名（配偶者+子2名）の場合、3,000+600×3=4,800万円が基礎控除。遺産総額が基礎控除以下なら相続税は課税されません。'},
  {unit:6,sub:'相続税',q:'相続税の申告・納付期限は、相続開始を知った日の翌日から10カ月以内である。',ans:true,ex:'相続税の申告・納税期限は相続開始を知った日の翌日から10カ月以内。期限を過ぎると延滞税・加算税が課される場合があります。'},

// =====================================================================
//  APP STATE
// =====================================================================
let mode = 'gakka';
let currentUnit = 'all';
let currentSub  = 'all';
let filteredQ   = [];
let qIndex      = 0;
let answered    = false;
let sessionAns  = {};
let totalOK = 0, totalNG = 0;

// =====================================================================
//  INIT
// =====================================================================
function init() {
  buildUnitTabs();
  filterQ();
  renderQ();
  updateStats();
}

// =====================================================================
//  MODE SWITCH
// =====================================================================
function switchMode(m) {
  mode = m;
  currentUnit = 'all'; currentSub = 'all';
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(m === 'gakka' ? '.gakka-tab' : '.jitsugi-tab').classList.add('active');
  buildUnitTabs();
  filterQ();
  renderQ();
  resetScore();
  document.getElementById('scoreCard').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
}

// =====================================================================
//  UNIT / SUB TABS
// =====================================================================
function buildUnitTabs() {
  const pool = getPool();
  const el = document.getElementById('unitTabs');
  el.innerHTML = `<button class="unit-tab active" data-unit="all" onclick="selectUnit('all')">🌐 全単元</button>`;
  [1,2,3,4,5,6].forEach(u => {
    if (pool.some(q => q.unit === u))
      el.innerHTML += `<button class="unit-tab" data-unit="${u}" onclick="selectUnit('${u}')">${['①','②','③','④','⑤','⑥'][u-1]} ${UNITS[u]}</button>`;
  });
}

function selectUnit(u) {
  currentUnit = u; currentSub = 'all';
  document.querySelectorAll('.unit-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.unit-tab[data-unit="${u}"]`).classList.add('active');
  buildSubTabs();
  filterQ(); renderQ();
  document.getElementById('scoreCard').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
}

function buildSubTabs() {
  const sw = document.getElementById('subWrap');
  if (currentUnit === 'all') { sw.classList.remove('vis'); return; }
  const pool = getPool().filter(q => String(q.unit) === currentUnit);
  const subs = [...new Set(pool.map(q => q.sub))];
  sw.classList.add('vis');
  const st = document.getElementById('subTabs');
  st.innerHTML = `<button class="sub-tab active" data-sub="all" onclick="selectSub('all')">すべて</button>`;
  subs.forEach(s => st.innerHTML += `<button class="sub-tab" data-sub="${encodeURIComponent(s)}" onclick="selectSub('${encodeURIComponent(s)}')">${s}</button>`);
}

function selectSub(s) {
  currentSub = decodeURIComponent(s);
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.sub-tab[data-sub="${s}"]`).classList.add('active');
  filterQ(); renderQ();
}

// =====================================================================
//  FILTER
// =====================================================================
function getPool() {
  return mode === 'gakka' ? GAKKA_Q : JITSUGI_Q;
}

function filterQ() {
  filteredQ = getPool().filter(q => {
    const um = currentUnit === 'all' || String(q.unit) === currentUnit;
    const sm = currentSub === 'all' || q.sub === currentSub;
    return um && sm;
  });
  qIndex = 0; sessionAns = {}; answered = false;
}

// =====================================================================
//  RENDER
// =====================================================================
function renderQ() {
  if (!filteredQ.length) {
    document.getElementById('qCard').innerHTML = '<div style="text-align:center;padding:50px 20px;color:#64748b"><div style="font-size:3rem">📭</div><p>この絞り込みには問題がありません</p></div>';
    return;
  }
  const q = filteredQ[qIndex];
  answered = false;

  // meta
  document.getElementById('qNum').textContent = `問 ${qIndex+1} / ${filteredQ.length}`;
  document.getElementById('qTags').innerHTML =
    `<span class="q-tag tag-${q.unit}">第${q.unit}分野：${UNITS[q.unit]}</span>` +
    `<span class="q-tag tag-mode">${mode==='gakka'?'学科・○×':'実技・3択'}</span>` +
    `<span class="q-tag" style="background:#f1f5f9;color:#475569">${q.sub}</span>`;

  // scenario
  const sa = document.getElementById('scenarioArea');
  if (mode === 'jitsugi' && q.scenario) {
    document.getElementById('scenarioText').textContent = q.scenario;
    sa.style.display = 'block';
  } else sa.style.display = 'none';

  // badge + text
  document.getElementById('qBadge').textContent = mode === 'gakka' ? '○か×で答えてください' : '最も適切なものを選んでください';
  document.getElementById('qText').textContent = q.q;

  // buttons
  const mb = document.getElementById('maruBatsuArea');
  const ca = document.getElementById('choicesArea');
  if (mode === 'gakka') {
    mb.style.display = 'flex'; ca.style.display = 'none';
    const bm = document.getElementById('btnMaru');
    const bb = document.getElementById('btnBatsu');
    bm.disabled = false; bb.disabled = false;
    bm.classList.remove('sel'); bb.classList.remove('sel');
  } else {
    mb.style.display = 'none'; ca.style.display = 'flex';
    ca.innerHTML = q.choices.map((c,i) =>
      `<button class="btn-choice" id="ch${i}" onclick="answerJitsugi(${i})">`+
      `<span class="choice-label">${['A','B','C'][i]}．</span><span>${c}</span></button>`
    ).join('');
  }

  // result
  const rb = document.getElementById('resultBox');
  rb.style.display = 'none'; rb.className = 'result-box';

  // nav
  document.getElementById('btnPrev').disabled = qIndex === 0;
  document.getElementById('btnNext').disabled = true;

  // progress
  const pct = filteredQ.length > 1 ? (qIndex/(filteredQ.length-1))*100 : 0;
  document.getElementById('progBar').style.width = pct + '%';
}

// =====================================================================
//  ANSWER HANDLERS
// =====================================================================
function answerGakka(userAns) {
  if (answered) return;
  answered = true;
  const q = filteredQ[qIndex];
  const ok = userAns === q.ans;
  const bm = document.getElementById('btnMaru');
  const bb = document.getElementById('btnBatsu');
  bm.disabled = true; bb.disabled = true;
  if (userAns) bm.classList.add('sel'); else bb.classList.add('sel');
  trackAnswer(ok);
  showResult(ok, q.ans ? '○（正しい）' : '×（誤り）', q.ex);
}

function answerJitsugi(idx) {
  if (answered) return;
  answered = true;
  const q = filteredQ[qIndex];
  const ok = idx === q.ans;
  document.querySelectorAll('.btn-choice').forEach((b,i) => {
    b.disabled = true;
    if (i === q.ans) b.classList.add('correct');
    else if (i === idx && !ok) b.classList.add('wrong');
  });
  trackAnswer(ok);
  showResult(ok, `${['A','B','C'][q.ans]}．${q.choices[q.ans]}`, q.ex);
}

function trackAnswer(ok) {
  if (!(qIndex in sessionAns)) {
    sessionAns[qIndex] = ok;
    if (ok) totalOK++; else totalNG++;
    updateStats();
  }
}

function showResult(ok, answerText, explanation) {
  const rb = document.getElementById('resultBox');
  rb.style.display = 'block';
  rb.classList.add(ok ? 'correct' : 'wrong');
  document.getElementById('resultTitle').innerHTML = ok ? '✅ 正解！' : '❌ 不正解';
  document.getElementById('resultAns').innerHTML = `正解：<strong>${answerText}</strong>`;
  const isCalc = mode === 'jitsugi' && explanation.includes('=');
  if (isCalc) {
    document.getElementById('exText').innerHTML = `<div class="formula">${escHtml(explanation)}</div>`;
  } else {
    document.getElementById('exText').textContent = explanation;
    document.getElementById('exText').style.whiteSpace = 'pre-wrap';
  }
  document.getElementById('btnNext').disabled = false;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =====================================================================
//  NAVIGATION
// =====================================================================
function prevQ() { if (qIndex > 0) { qIndex--; renderQ(); scrollTop(); } }
function nextQ() {
  if (qIndex < filteredQ.length - 1) { qIndex++; renderQ(); scrollTop(); }
  else showScore();
}
function scrollTop() { window.scrollTo({top:0,behavior:'smooth'}); }

// =====================================================================
//  SCORE
// =====================================================================
function showScore() {
  const cnt = Object.keys(sessionAns).length;
  const rate = cnt ? Math.round(totalOK/cnt*100) : 0;
  document.getElementById('quizWrap').style.display = 'none';
  const sc = document.getElementById('scoreCard');
  sc.style.display = 'block';
  const circle = document.getElementById('scoreCircle');
  circle.textContent = rate+'%';
  circle.className = 'score-circle '+(rate>=80?'great':rate>=60?'ok':'poor');
  document.getElementById('scoreTitle').textContent = rate>=80?'素晴らしい！':rate>=60?'もう少し！':'もっと頑張ろう！';
  document.getElementById('scoreMsg').textContent = `${cnt}問中${totalOK}問正解（正答率 ${rate}%）`;
  document.getElementById('sc_c').textContent = totalOK;
  document.getElementById('sc_w').textContent = totalNG;
  document.getElementById('sc_r').textContent = rate+'%';
}

function restart() {
  resetScore();
  document.getElementById('scoreCard').style.display = 'none';
  document.getElementById('quizWrap').style.display = 'block';
  filterQ(); renderQ();
}

function resetScore() { totalOK = 0; totalNG = 0; sessionAns = {}; updateStats(); }

function updateStats() {
  const total = GAKKA_Q.length + JITSUGI_Q.length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('correctCount').textContent = totalOK;
  document.getElementById('wrongCount').textContent = totalNG;
  const t = totalOK+totalNG;
  document.getElementById('rateDisplay').textContent = t ? Math.round(totalOK/t*100)+'%' : '-';
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
