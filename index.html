<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FP3級 過去問集</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#1b5e20;
  --g2:#2e7d32;
  --g3:#388e3c;
  --g4:#43a047;
  --g5:#66bb6a;
  --gl:#c8e6c9;
  --gxl:#e8f5e9;
  --gxxl:#f1f8e9;
  --accent:#f9a825;
  --accent2:#ff8f00;
  --red:#d32f2f;
  --border:#a5d6a7;
  --text:#1a1a1a;
  --gray:#616161;
  --lg:#f5f5f5;
}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--gxxl);color:var(--text);font-size:15px;line-height:1.65;min-height:100vh}

/* ========== HEADER ========== */
header{background:var(--g2);position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr{max-width:820px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-badge{background:#fff;color:var(--g2);font-weight:900;font-size:13px;padding:3px 7px;border-radius:4px;letter-spacing:.05em}
.logo-title{color:#fff;font-size:1.05rem;font-weight:800;letter-spacing:.03em}
.logo-title em{font-style:normal;font-size:.75em;opacity:.85}
nav{display:flex;gap:2px}
nav button{background:rgba(255,255,255,.15);color:#fff;border:none;padding:7px 14px;border-radius:4px;font-size:.83rem;cursor:pointer;transition:.15s;font-weight:600;white-space:nowrap}
nav button:hover{background:rgba(255,255,255,.3)}
nav button.active{background:#fff;color:var(--g2)}

/* ========== PROGRESS BAR ========== */
.prog-bar-wrap{background:rgba(0,0,0,.2);height:4px;position:sticky;top:54px;z-index:199}
.prog-bar-fill{height:4px;background:var(--accent);transition:.35s;width:0%}

/* ========== MAIN ========== */
main{max-width:820px;margin:0 auto;padding:16px 16px 60px}

/* ========== HERO ========== */
.hero{background:linear-gradient(135deg,var(--g2),var(--g4));color:#fff;border-radius:12px;padding:28px 24px;margin-bottom:24px;text-align:center;box-shadow:0 4px 16px rgba(46,125,50,.3)}
.hero h1{font-size:1.6rem;font-weight:900;margin-bottom:8px;letter-spacing:.03em}
.hero p{font-size:.92rem;opacity:.9;margin-bottom:20px}
.hero-stats{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.hero-stat{background:rgba(255,255,255,.2);border-radius:8px;padding:10px 20px;text-align:center}
.hero-stat .n{font-size:1.6rem;font-weight:900;display:block}
.hero-stat .l{font-size:.75rem;opacity:.85}

/* ========== EXAM CARDS ========== */
.section-title{font-size:1rem;font-weight:700;color:var(--g2);margin:20px 0 12px;display:flex;align-items:center;gap:8px;padding-bottom:6px;border-bottom:2px solid var(--gl)}
.exam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:24px}
.exam-card{background:#fff;border:2px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:.2s;text-align:center;position:relative;overflow:hidden}
.exam-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--g3)}
.exam-card:hover{border-color:var(--g4);box-shadow:0 4px 16px rgba(46,125,50,.2);transform:translateY(-2px)}
.exam-card .year{font-size:1.1rem;font-weight:800;color:var(--g2);margin-bottom:4px}
.exam-card .cnt{font-size:.8rem;color:var(--gray)}
.exam-card .badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:.72rem;font-weight:600;margin-top:8px}
.badge-g{background:var(--gxl);color:var(--g2);border:1px solid var(--gl)}
.badge-j{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}

/* ========== MODE BUTTONS ========== */
.mode-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.mode-btn{flex:1;min-width:140px;padding:10px 16px;border:2px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--g2);transition:.15s;text-align:center}
.mode-btn:hover,.mode-btn.sel{background:var(--gxl);border-color:var(--g3)}

/* ========== QUIZ SECTION ========== */
.quiz-wrap{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:16px}

/* Breadcrumb */
.bread{font-size:.78rem;color:var(--gray);margin-bottom:12px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.bread span::after{content:' ›';margin-left:4px;color:#bbb}
.bread span:last-child::after{content:''}
.bread a{color:var(--g2);cursor:pointer;text-decoration:none}
.bread a:hover{text-decoration:underline}

/* Question title bar */
.q-titlebar{background:var(--gxl);border-left:5px solid var(--g3);padding:8px 14px;border-radius:0 6px 6px 0;margin-bottom:14px;font-size:.88rem;color:var(--g2);font-weight:600}

/* Question number */
.q-num-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.q-num{font-size:1.15rem;font-weight:800;color:var(--g1)}
.q-tag{font-size:.72rem;padding:3px 10px;border-radius:10px;font-weight:600}
.tag-ox{background:#e8f5e9;color:var(--g2);border:1px solid var(--gl)}
.tag-mc{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}

/* Question text */
.q-text{font-size:1rem;line-height:1.85;color:var(--text);margin-bottom:14px;white-space:pre-wrap}

/* Tables */
.q-table{border-collapse:collapse;width:100%;margin:12px 0;font-size:.83rem;background:#fff}
.q-table td{border:1px solid #bdbdbd;padding:6px 10px;vertical-align:top;line-height:1.5}
.q-table tr:first-child td{background:var(--gxl);font-weight:600;color:var(--g1)}
.q-table-wrap{overflow-x:auto;margin:12px 0;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* Choices list */
.choices-list{list-style:none;margin:10px 0 14px}
.choices-list li{padding:6px 0;display:flex;gap:8px;line-height:1.7;font-size:.93rem}
.choices-list li .cn{color:var(--g2);font-weight:700;flex-shrink:0;min-width:22px}

/* Answer buttons */
.ans-btns{display:flex;gap:12px;margin:20px 0;justify-content:center}
.ans-btn{display:inline-flex;align-items:center;justify-content:center;width:130px;height:56px;background:var(--g3);color:#fff;border:none;border-radius:8px;font-size:1.8rem;font-weight:900;cursor:pointer;transition:.15s;box-shadow:0 3px 8px rgba(0,0,0,.2);user-select:none}
.ans-btn:hover:not(:disabled){background:var(--g1);transform:translateY(-2px);box-shadow:0 5px 12px rgba(0,0,0,.25)}
.ans-btn:active{transform:translateY(0)}
.ans-btn:disabled{opacity:.7;cursor:default;transform:none}
.ans-btn.correct-btn{background:#1b5e20;box-shadow:0 0 0 3px #1b5e20,0 3px 8px rgba(0,0,0,.2)}
.ans-btn.wrong-btn{background:#757575}
.ans-btn.dim-btn{background:#9e9e9e;opacity:.6}

.mc-btns{display:flex;gap:10px;margin:20px 0;justify-content:center;flex-wrap:wrap}
.mc-btn{display:inline-flex;align-items:center;justify-content:center;min-width:70px;height:52px;padding:0 20px;background:var(--g3);color:#fff;border:none;border-radius:8px;font-size:1.2rem;font-weight:700;cursor:pointer;transition:.15s;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.mc-btn:hover:not(:disabled){background:var(--g1);transform:translateY(-2px)}
.mc-btn:disabled{cursor:default;transform:none}
.mc-btn.correct-btn{background:#1b5e20}
.mc-btn.wrong-btn{background:#757575}
.mc-btn.dim-btn{background:#bdbdbd;opacity:.7}

/* Overlay */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:300;display:flex;align-items:center;justify-content:center}
.overlay-circle{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:pop .38s cubic-bezier(.175,.885,.32,1.275) forwards;opacity:0}
.overlay-circle.ok{background:rgba(27,94,32,.92)}
.overlay-circle.ng{background:rgba(198,40,40,.92)}
.overlay-icon{font-size:3.4rem;line-height:1;color:#fff}
.overlay-txt{font-size:.9rem;color:#fff;font-weight:700;margin-top:4px}
@keyframes pop{0%{transform:scale(.2);opacity:0}65%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

/* Result box */
.result-box{background:var(--gxxl);border:1.5px solid var(--border);border-radius:8px;padding:14px 16px;margin:16px 0}
.result-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.result-label{font-weight:700;color:var(--g1);font-size:.88rem}
.result-ans{font-size:1.15rem;font-weight:900;color:var(--g2)}
.result-yours{font-size:.82rem;color:var(--gray);margin-left:4px}
.bunya-badge{background:var(--gxl);border:1px solid var(--gl);color:var(--g2);font-size:.78rem;font-weight:600;padding:3px 10px;border-radius:10px;display:inline-block;margin-top:4px}

/* Explanation */
.ex-box{margin:16px 0}
.ex-head{background:var(--gxl);border-left:4px solid var(--g4);padding:8px 14px;font-weight:700;font-size:.9rem;color:var(--g2);margin-bottom:10px}
.ex-text{font-size:.9rem;line-height:1.85;color:var(--text)}
.hl{background:#f0fce4;border-bottom:2px solid var(--g5);padding:0 2px;font-weight:600}

/* Nav row */
.nav-row{display:flex;justify-content:flex-end;margin:16px 0}
.next-btn{background:var(--g3);color:#fff;border:none;padding:11px 24px;border-radius:8px;font-size:.92rem;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
.next-btn:hover{background:var(--g1)}

/* ========== SCORE PAGE ========== */
.score-card{background:#fff;border-radius:12px;padding:36px 24px;text-align:center;box-shadow:0 4px 20px rgba(46,125,50,.15);margin:20px 0}
.score-pct{font-size:4rem;font-weight:900;color:var(--g2);line-height:1}
.score-label{font-size:.9rem;color:var(--gray);margin:6px 0}
.score-frac{font-size:1.3rem;font-weight:700;margin-bottom:16px}
.pass-badge{display:inline-block;padding:7px 24px;border-radius:20px;font-weight:700;font-size:1rem;margin-bottom:24px}
.pass{background:#e8f5e9;color:var(--g1);border:1.5px solid var(--g5)}
.fail{background:#ffebee;color:#b71c1c;border:1.5px solid #ef9a9a}
.score-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.sc-btn{padding:12px 28px;border-radius:8px;border:none;cursor:pointer;font-size:.95rem;font-weight:700;transition:.15s}
.sc-primary{background:var(--g3);color:#fff}
.sc-primary:hover{background:var(--g1)}
.sc-secondary{background:#eee;color:var(--text)}
.sc-secondary:hover{background:#ddd}

/* Breakdown table */
.break-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:.88rem}
.break-table th{background:var(--gxl);padding:9px 12px;text-align:left;border:1px solid var(--border);color:var(--g1);font-weight:700}
.break-table td{padding:8px 12px;border:1px solid var(--border);text-align:center}
.break-table tr:hover td{background:var(--gxxl)}
.sec-head{font-size:1rem;font-weight:700;color:var(--g2);margin:24px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--gl)}

/* ========== UTILITY ========== */
.hidden{display:none!important}
.mt12{margin-top:12px}
footer{text-align:center;padding:20px;font-size:.75rem;color:var(--gray);background:var(--gxl);border-top:1px solid var(--gl);margin-top:40px}

/* ========== RESPONSIVE ========== */
@media(max-width:580px){
  .hero h1{font-size:1.3rem}
  .hero-stats{gap:12px}
  .hero-stat{padding:8px 14px}
  .ans-btn{width:110px;height:50px;font-size:1.5rem}
  .mc-btn{min-width:60px;height:46px;font-size:1.1rem}
  .exam-grid{grid-template-columns:1fr 1fr}
  .hdr{height:48px}
  nav button{padding:5px 10px;font-size:.78rem}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <a class="logo" href="#" onclick="goHome();return false;">
      <span class="logo-badge">FP3</span>
      <span class="logo-title">過去問集</span>
    </a>
    <nav>

    </nav>
  </div>
</header>

<div class="prog-bar-wrap hidden" id="progWrap">
  <div class="prog-bar-fill" id="progFill"></div>
</div>

<main>

<!-- ========== HOME ========== -->
<div id="view-home">
  <div class="hero">
    <h1>FP3級 過去問集</h1>
    <div class="hero-stats">
      <div class="hero-stat"><span class="n">300問</span><span class="l">学科問題</span></div>
      <div class="hero-stat"><span class="n">100問</span><span class="l">実技問題</span></div>
      <div class="hero-stat"><span class="n">5回分</span><span class="l">過去問</span></div>
    </div>
  </div>

  <!-- 学科 exams -->
  <div class="section-title">📚 学科試験（正誤式＋三択式）</div>
  <div class="exam-grid" id="gakka-cards"></div>

  <!-- 実技 exams -->
  <div class="section-title">✍️ 実技試験（資産設計提案業務）</div>
  <div class="exam-grid" id="jitsugi-cards"></div>
</div>

<!-- ========== EXAM SELECT / MODE ========== -->
<div id="view-select" class="hidden">
  <div class="bread">
    <span><a onclick="goHome()">Home</a></span>
    <span id="sel-bread"></span>
  </div>
  <div class="quiz-wrap">
    <div id="sel-title" class="q-titlebar"></div>
    <div class="mode-row">
      <button class="mode-btn sel" id="mode-all" onclick="setMode('all',this)">🔀 全問ランダム</button>
      <button class="mode-btn" id="mode-ox" onclick="setMode('ox',this)">⭕ 正誤問題のみ</button>
      <button class="mode-btn" id="mode-mc" onclick="setMode('mc',this)">🔢 三択問題のみ</button>
    </div>
    <div style="text-align:center;margin-top:20px">
      <button onclick="startQuiz()" style="background:var(--g3);color:#fff;border:none;padding:15px 60px;border-radius:8px;font-size:1.1rem;font-weight:800;cursor:pointer;box-shadow:0 4px 12px rgba(46,125,50,.3);letter-spacing:.05em">
        出題開始 START ▶
      </button>
    </div>
  </div>
</div>

<!-- ========== QUIZ ========== -->
<div id="view-quiz" class="hidden">
  <div class="bread">
    <span><a onclick="goHome()">Home</a></span>
    <span id="qbread-exam"></span>
    <span id="qbread-q"></span>
  </div>
  <div class="quiz-wrap">
    <div class="q-titlebar" id="q-titlebar"></div>

    <div class="q-num-row">
      <div class="q-num" id="q-num-label"></div>
      <div class="q-tag" id="q-type-tag"></div>
    </div>

    <div class="q-text" id="q-text"></div>
    <div id="q-table-area"></div>
    <div id="q-choices-area"></div>

    <div class="ans-btns hidden" id="ox-btns">
      <button class="ans-btn" id="btn-maru" onclick="ansOX(true)">○</button>
      <button class="ans-btn" id="btn-batsu" onclick="ansOX(false)">×</button>
    </div>
    <div class="mc-btns hidden" id="mc-btns"></div>
  </div>

  <div id="overlay" class="overlay hidden">
    <div class="overlay-circle" id="ov-circle">
      <div class="overlay-icon" id="ov-icon"></div>
      <div class="overlay-txt" id="ov-txt"></div>
    </div>
  </div>

  <div class="quiz-wrap hidden" id="result-area">
    <div class="result-box">
      <div class="result-row">
        <span class="result-label">正解</span>
        <span class="result-ans" id="res-ans"></span>
        <span class="result-yours" id="res-yours"></span>
      </div>
      <div id="res-bunya"></div>
    </div>
    <div class="ex-box hidden" id="ex-box">
      <div class="ex-head">💡 解説</div>
      <div class="ex-text" id="ex-text"></div>
    </div>
    <div class="nav-row">
      <button class="next-btn" id="next-btn" onclick="nextQ()">次の問題 »</button>
    </div>
  </div>
</div>

<!-- ========== SCORE ========== -->
<div id="view-score" class="hidden">
  <div class="bread">
    <span><a onclick="goHome()">Home</a></span>
    <span>成績</span>
  </div>
  <div class="score-card">
    <div class="score-label">正答率</div>
    <div class="score-pct" id="sc-pct"></div>
    <div class="score-frac" id="sc-frac"></div>
    <div class="pass-badge" id="sc-pass"></div>
    <div class="score-actions">
      <button class="sc-btn sc-primary" onclick="retryQuiz()">もう一度 🔄</button>
      <button class="sc-btn sc-secondary" onclick="goHome()">トップへ 🏠</button>
    </div>
  </div>
  <div class="sec-head">科目別成績</div>
  <table class="break-table">
    <thead><tr><th>問題番号</th><th>結果</th><th>正解</th></tr></thead>
    <tbody id="sc-list"></tbody>
  </table>
</div>

</main>

<footer>
  <p>FP3級 過去問集 | データ出典：FP3級過去問PDF（日本FP協会）</p>
</footer>

<script>
// ===== DATA =====

se}, {"num": 15, "type": "ox", "text": "オプション取引において、特定の商品を将来の一定期日に、あらかじめ決められた 価格（権利行使価格）で売る権利のことを、コール・オプションという。", "choices": [], "answer": false}, {"num": 16, "type": "ox", "text": "所得税において、国債や地方債などの特定公社債の利子は、総合課税の対象となる。", "choices": [], "answer": false}, {"num": 17, "type": "ox", "text": "退職手当等の支払を受ける個人がその支払を受ける時までに「退職所得の受給に関 する申告書」を提出した場合、その支払われる退職手当等の金額に20.42％の税率を乗 じた金額に相当する所得税および復興特別所得税が源泉徴収される。", "choices": [], "answer": false}, {"num": 18, "type": "ox", "text": "所得税において、国民年金基金の掛金は、社会保険料控除の対象となる。", "choices": [], "answer": true}, {"num": 19, "type": "ox", "text": "所得税において、生計を一にする配偶者の合計所得金額が48万円を超える場合、配 偶者控除の適用を受けることはできない。", "choices": [], "answer": true}, {"num": 20, "type": "ox", "text": "住宅ローンを利用してマンションを取得し、所得税の住宅借入金等特別控除の適用 を受ける場合、借入金の償還期間は、20年以上でなければならない。", "choices": [], "answer": false}, {"num": 21, "type": "ox", "text": "不動産登記には公信力が認められていないため、登記記録上の権利者が真実の権利 者と異なっている場合に、登記記録を信じて不動産を購入した者は、原則として、そ の不動産に対する権利の取得について法的に保護されない。", "choices": [], "answer": true}, {"num": 22, "type": "ox", "text": "アパートやマンションの所有者が、当該建物を賃貸して家賃収入を得るためには、 宅地建物取引業の免許を取得しなければならない。", "choices": [], "answer": false}, {"num": 23, "type": "ox", "text": "都市計画区域内にある建築物の敷地は、原則として、建築基準法に規定する道路に ２ｍ以上接していなければならない。", "choices": [], "answer": true}, {"num": 24, "type": "ox", "text": "個人が相続により取得した被相続人の居住用家屋およびその敷地を譲渡し、「被相続 人の居住用財産（空き家）に係る譲渡所得の特別控除の特例」の適用を受けるために は、譲渡資産の譲渡対価の額が6,000万円以下であることなどの要件を満たす必要があ る。", "choices": [], "answer": false}, {"num": 25, "type": "ox", "text": "土地の有効活用において、一般に、土地所有者が入居予定の事業会社から建設資金 を借り受けて、事業会社の要望に沿った店舗等を建設し、その店舗等を事業会社に賃 貸する手法を、建設協力金方式という。", "choices": [], "answer": true}, {"num": 26, "type": "ox", "text": "書面によらない贈与契約は、その履行前であれば、各当事者は契約の解除をするこ とができる。", "choices": [], "answer": true}, {"num": 27, "type": "ox", "text": "特別養子縁組が成立した場合、養子となった者と実方の父母との親族関係は終了す る。", "choices": [], "answer": true}, {"num": 28, "type": "ox", "text": "自筆証書遺言書保管制度を利用して、法務局（遺言書保管所）に保管されている自 筆証書遺言については、家庭裁判所による検認の手続を要しない。", "choices": [], "answer": true}, {"num": 29, "type": "ox", "text": "相続人が ％", "① 330㎡ ② 80％", "① 400㎡ ② 80％ （終）"], "answer": 2}]}, {"id": "202309", "label": "2023年9月", "questions": [{"num": 1, "type": "ox", "text": "ファイナンシャル・プランナーが顧客と投資顧問契約を締結し、当該契約に基づき 金融商品取引法で定める投資助言・代理業を行うためには、内閣総理大臣の登録を受 けなければならない。", "choices": [], "answer": true}, {"num": 2, "type": "ox", "text": "アルバイトやパートタイマーが、労働者災害補償保険の適用を受けるためには、１ 週間の所定労働時間が20時間を超えていなければならない。", "choices": [], "answer": false}, {"num": 3, "type": "ox", "text": "国民年金の第１号被保険者は、日本国内に住所を有する20歳以上60歳未満の自営業 者や学生などのうち、日本国籍を有する者のみが該当する。", "choices": [], "answer": false}, {"num": 4, "type": "ox", "text": "国民年金基金の加入員は、所定の事由により加入員資格を喪失する場合を除き、加 入している国民年金基金から自己都合で任意に脱退することはできない。", "choices": [], "answer": true}, {"num": 5, "type": "ox", "text": "住宅ローンの一部繰上げ返済では、返済期間を変更せずに毎月の返済額を減額する 返済額軽減型よりも、毎月の返済額を変更せずに返済期間を短くする期間短縮型のほ うが、他の条件が同一である場合、通常、総返済額は少なくなる。", "choices": [], "answer": true}, {"num": 6, "type": "ox", "text": "国内で事業を行う生命保険会社が破綻した場合、生命保険契約者保護機構による補 償の対象となる保険契約については、高予定利率契約を除き、既払込保険料相当額の 90％まで補償される。", "choices": [], "answer": false}, {"num": 7, "type": "ox", "text": "定期保険特約付終身保険（更新型）は、定期保険特約を同額の保険金額で更新する 場合、更新にあたって被保険者の健康状態についての告知や医師の診査は必要ない。", "choices": [], "answer": true}, {"num": 8, "type": "ox", "text": "変額個人年金保険は、特別勘定の運用実績によって、将来受け取る年金額や死亡給 付金額は変動するが、解約返戻金額は変動しない。", "choices": [], "answer": false}, {"num": 9, "type": "ox", "text": "自動車保険の車両保険では、一般に、被保険自動車が洪水により水没したことに よって被る損害は、補償の対象となる。", "choices": [], "answer": true}, {"num": 10, "type": "ox", "text": "地震保険では、保険の対象である居住用建物または生活用動産（家財）の損害の程 度が「全損」「大半損」「小半損」「一部損」のいずれかに該当した場合に、保険金が支 払われる。", "choices": [], "answer": true}, {"num": 11, "type": "ox", "text": "景気動向指数において、コンポジット・インデックス（ＣＩ）は、景気拡張の動きの 各経済部門への波及度合いを測定することを主な目的とした指標である。", "choices": [], "answer": false}, {"num": 12, "type": "ox", "text": "追加型の国内公募株式投資信託において、収益分配金支払後の基準価額が受益者の 個別元本を下回る場合、当該受益者に対する収益分配金は、その全額が普通分配金と なる。", "choices": [], "answer": false}, {"num": 13, "type": "ox", "text": "債券の信用格付とは、債券やその発行体の信用評価を記号等で示したものであり、 一般に、ＢＢＢ（トリプルビー）格相当以上の格付が付された債券は、投資適格債とさ れる。", "choices": [], "answer ": true}, {"num": 28, "type": "ox", "text": "共同相続人は、被相続人が遺言により相続分や遺産分割方法の指定をしていない場 合、法定相続分どおりに相続財産を分割しなければならない。", "choices": [], "answer": false}, {"num": 29, "type": "ox", "text": "相続税の申告書の提出は、原則として、その相続の開始があったことを知った日の 翌日から10カ月以内にしなければならない。", "choices": [], "answer": true}, {"num": 30, "type": "ox", "text": "相続人が相続により取得した宅地が「小規模宅地等についての相続税の課税価格の 計算の特例」における特定居住用宅地等に該当する場合、その宅地のうち330㎡までを 限度面積として、評価額の80％相当額を減額した金額を、相続税の課税価格に算入す べき価額とすることができる。 【第２問】 次の各文章（(31)～(60)）の（ ）内にあてはまる最も適切な文章、語句、数 字またはそれらの組合せを1)～3)のなかから選び、その番号を解答用紙にマー クしなさい。 〔30問〕", "choices": [], "answer": true}, {"num": 31, "type": "multi", "text": "Ａさんの2023年分の可処分所得の金額は、下記の＜資料＞によれば、（ ）であ る。 ＜資料＞2023年分のＡさんの収入等 給与収入 ： 750万円（給与所得：565万円） 所得税・住民税 ： 80万円 社会保険料 ： 100万円 生命保険料 ： 20万円", "choices": ["385万円", "550万円", "570万円"], "answer": 2}, {"num": 32, "type": "multi", "text": "全国健康保険協会管掌健康保険の被保険者に支給される傷病手当金の額は、原則と して、１日につき、傷病手当金の支給を始める日の属する月以前の直近の継続した （ ① ）の各月の標準報酬月額の平均額を30で除した額に、（ ② ）を乗じた額で ある。", "choices": ["① ６カ月間 ② ３分の２", "① 12カ月間 ② ３分の２", "① 12カ月間 ② ４分の３"], "answer": 1}, {"num": 33, "type": "multi", "text": "雇用保険の基本手当を受給するためには、倒産、解雇、雇止めなどの場合を除き、 原則として、離職の日以前（ ① ）に被保険者期間が通算して（ ② ）以上ある ことなどの要件を満たす必要がある。", "choices": ["① １年間 ② ６カ月", "① ２年間 ② ６カ月", "① ２年間 ② 12カ月"], "answer": 2}, {"num": 34, "type": "multi", "text": "子のいない障害等級１級に該当する者に支給される障害基礎年金の額は、子のいな い障害等級２級に該当する者に支給される障害基礎年金の額の（ ）に相当する 額である。", "choices": ["1.25倍", "1.50倍", "1.75倍"], "answer": 0}, {"num": 35, "type": "multi", "text": "住宅金融支援機構と民間金融機関が提携した住宅ローンであるフラット3（5 買取型） の融資額は、土地取得費を含めた住宅建設費用または住宅購入価額以内で、最高 （ ① ）であり、融資金利は（ ② ）である。", "choices": ["① 8,000万円 ② 固定金利", "① １億円 ② 固定金利", "① １億円 ② 変動金利"], "answer": 0}, {"num": 36, "type": "multi", "text": "生命保険の保険料は、大数の法則および（ ① ）に基づき、予定死亡率、予定 利率、（ ② ）の３つの予定基礎率を用いて計算される。", "choices": ["① 適合性の原則 ② 予定事業費率", "① 適合性の原則 ② 予定損害率", "① 収支相等の原則 ② 予定事業費率"], "answer": 2}, {"num": 37, "type": "multi", "text": "自動車損害賠償責任保険（自賠責保険）において、被害者１人当たりの保険金の支 払限度額は、加害車両が１台の場合、死亡による損害については（ ① ）、傷害によ る損害については（ ② ）である。", "choices": ["① 3,000万円 ② 1 族に該当する。", "choices": ["① 16歳 ② 19歳", "① 18歳 ② 22歳", "① 19歳 ② 23歳"], "answer": 2}, {"num": 50, "type": "multi", "text": "その年の１月16日以後新たに事業所得を生ずべき業務を開始した納税者が、その年 分から所得税の青色申告の承認を受けようとする場合、原則として、その業務を開始 した日から（ ）以内に、青色申告承認申請書を納税地の所轄税務署長に提出し なければならない。", "choices": ["２カ月", "３カ月", "６カ月"], "answer": 0}, {"num": 51, "type": "multi", "text": "相続税路線価は、相続税や（ ① ）を算定する際の土地等の評価額の基準となる 価格であり、地価公示法による公示価格の（ ② ）を価格水準の目安として設定さ れる。", "choices": ["① 贈与税 ② 70％", "① 贈与税 ② 80％", "① 固定資産税 ② 80％"], "answer": 1}, {"num": 52, "type": "multi", "text": "下記の200㎡の土地に建築面積120㎡、延べ面積160㎡の２階建ての住宅を建築した場 合、当該建物の建蔽率は、（ ）である。 幅員６ｍ公道 200㎡", "choices": ["60％", "80％", "100％"], "answer": 0}, {"num": 53, "type": "multi", "text": "建物の区分所有等に関する法律（区分所有法）によれば、規約の変更は、区分所有 者および議決権の各（ ）以上の多数による集会の決議によらなければならない。", "choices": ["３分の２", "４分の３", "５分の４"], "answer": 1}, {"num": 54, "type": "multi", "text": "投資総額5,000万円で購入した賃貸用不動産の年間収入の合計額が270万円、年間費用 の合計額が110万円である場合、この投資の純利回り（ＮＯＩ利回り）は、（ ）であ る。", "choices": ["2.2％", "3.2％", "5.4％"], "answer": 1}, {"num": 55, "type": "multi", "text": "自己が居住していた家屋を譲渡する場合、その家屋に居住しなくなった日から （ ① ）を経過する日の属する年の（ ② ）までに譲渡しなければ、「居住用財産 を譲渡した場合の3,000万円の特別控除」の適用を受けることができない。", "choices": ["① ３年 ② ３月15日", "① ３年 ② 12月31日", "① ５年 ② 12月31日"], "answer": 1}, {"num": 56, "type": "multi", "text": "「直系尊属から教育資金の一括贈与を受けた場合の贈与税の非課税」の適用を受けた 場合、受贈者１人につき（ ① ）までは贈与税が非課税となるが、学校等以外の者 に対して直接支払われる金銭については、（ ② ）が限度となる。", "choices": ["① 1,000万円 ② 500万円", "① 1,500万円 ② 300万円", "① 1,500万円 ② 500万円"], "answer": 2}, {"num": 57, "type": "multi", "text": "下記の＜親族関係図＞において、Ａさんの相続における妻Ｂさんの法定相続分は、 （ ）である。 ＜親族関係図＞ 父 母Ｃさん （既に死亡） 兄Ｄさん 姉Ｅさん Ａさん 妻Ｂさん （被相続人）", "choices": ["２分の１", "３分の２", "４分の３"], "answer": 1}, {"num": 58, "type": "multi", "text": "下記の＜親族関係図＞において、Ａさんの相続における相続税額の計算上、遺産に係 る基礎控除額は、（ ）である。 ＜親族関係図＞ 父Ｃさん 母Ｄさん 兄Ｅさん Ａさん 妻Ｂさん （被相続人）", "choices": ["4,500万円", "4,800万円", "5,400万円"], "answer": 1}, {"num": 59, "type": "multi", "text": "「配偶者に対する相続税額の軽減」の適用を受けた場合、配偶者の相続税の課税価格 が、相続税の課税価格の合計額に対する配偶者の法定相続分相当額または（ ） のいずれか多い金額までであれば、原則として、配偶者が納付すべき相続税額は算出 されない。", "choices": ["１億2,000万円", "１億6,000万円", "１億8,000万円"], "answer": 1}, {"num": 60, "type": "multi", "text": "貸家建付地の相続税評価額は、（ ）の算式により算出される。", "choices": ["自用地としての価額×（１－借地権割合）", "自用地としての価額×（１－借家権割合×賃貸割合）", "自用地としての価額×（１－借地権割合×借家権割合×賃貸割合） （終）"], "answer": 2}]}, {"id": "202401", "label": "2024年1月", "questions": [{"num": 1, "type": "ox", "text": "弁護士の登録を受けていないファイナンシャル・プランナーが、資産管理の相談に 来た顧客の求めに応じ、有償で、当該顧客を委任者とする任意後見契約の受任者とな ることは、弁護士法に抵触する。", "choices": [], "answer": false}, {"num": 2, "type": "ox", "text": "労働者災害補償保険の保険料は、労働者と事業主が折半で負担する。", "choices": [], "answer": false}, {"num": 3, "type": "ox", "text": "国民年金の学生納付特例制度の適用を受けた期間に係る保険料のうち、追納するこ とができる保険料は、追納に係る厚生労働大臣の承認を受けた日の属する月前10年以 内の期間に係るものに限られる。", "choices": [], "answer": true}, {"num": 4, "type": "ox", "text": "遺族基礎年金を受給することができる遺族は、国民年金の被保険者等の死亡の当時、 その者によって生計を維持され、かつ、所定の要件を満たす「子のある配偶者」また は「子」である。", "choices": [], "answer": true}, {"num": 5, "type": "ox", "text": "日本学生支援機構の奨学金と日本政策金融公庫の教育一般貸付（国の教育ローン） は、重複して利用することができる。", "choices": [], "answer": true}, {"num": 6, "type": "ox", "text": "こども保険（学資保険）において、保険期間中に契約者（＝保険料負担者）である 親が死亡した場合、一般に、既払込保険料相当額の死亡保険金が支払われて保険契約 は消滅する。", "choices": [], "answer": false}, {"num": 7, "type": "ox", "text": "個人年金保険（終身年金）の保険料は、性別以外の契約条件が同一であれば、被保 険者が女性のほうが男性よりも高くなる。", "choices": [], "answer": true}, {"num": 8, "type": "ox", "text": "少額短期保険業者と契約した少額短期保険の保険料は、所得税の生命保険料控除の 対象とならない。", "choices": [], "answer": true}, {"num": 9, "type": "ox", "text": "家族傷害保険（家族型）において、保険期間中に契約者（＝被保険者本人）に子が 生まれた場合、その子を被保険者に加えるためには追加保険料を支払う必要がある。", "choices": [], "answer": false}, {"num": 10, "type": "ox", "text": "自動車損害賠償責任保険（自賠責保険）では、他人の自動車や建物などの財物を損壊 し、法律上の損害賠償責任を負担することによって被る損害は補償の対象とならない。", "choices": [], "answer": true}, {"num": 11, "type": "ox", "text": "日本銀行の金融政策の１つである公開市場操作（オペレーション）のうち、国債買 入オペは、日本銀行が長期国債（利付国債）を買い入れることによって金融市場に資 金を供給するオペレーションである。", "choices": [], "answer": true}, {"num": 12, "type": "ox", "text": "株式投資信託の運用において、個別銘柄の投資指標の分析や企業業績などのリサー チによって投資対象とする銘柄を選定し、その積上げによりポートフォリオを構築す る手法を、トップダウン・アプローチという。", "choices": [], "answer": false}, {"num": 13, "type": "ox", "text": "元金2,500,000円を、年利４％（１年複利）で３年間運用した場合の元利合計額は、税 金や手数料等を考慮しない場合、2,812,160円である。", "choices": [], "answer": true}, {"num": 14, "type": "ox", "text": "為替予約を締結していない外貨定期預金において、満期時の為替レートが預入時の 為替レートに比べて円高になれば、当該外貨定期預金の円換算の利回りは高くなる。", "choices": [], "answer": false}, {"num": 15, "type": "ox", "text": "日本国内に本店のある銀行の国内支店に預け入れた外貨預金は、元本1,000万円まで とその利息が預金保険制度による保護の対象となる。", "choices": [], "answer": false}, {"num": 16, "type": "ox", "text": "所得税における一時所得に係る総収入金額が400万円で、その収入を得るために支出 した金額が200万円である場合、一時所得の金額のうち総所得金額に算入される金額は、 75万円である。", "choices": [], "answer": true}, {"num": 17, "type": "ox", "text": "個人が賃貸アパートの敷地および建物を売却したことにより生じた所得は、不動産 所得となる。", "choices": [], "answer": false}, {"num": 18, "type": "ox", "text": "所得税において、納税者の合計所得金額が1,000万円を超えている場合、医療費控除 の適用を受けることができない。", "choices": [], "answer": false}, {"num": 19, "type": "ox", "text": "所得税において、その年の12月31日時点の年齢が16歳未満である扶養親族は、扶養 控除の対象となる控除対象扶養親族に該当しない。", "choices": [], "answer": true}, {"num": 20, "type": "ox", "text": "所得税において、上場株式の配当に係る配当所得について申告分離課税を選択した 場合、配当控除の適用を受けることができない。", "choices": [], "answer": true}, {"num": 21, "type": "ox", "text": "不動産の登記記録において、所有権の移転に関する事項は、権利部（甲区）に記録 される。", "choices": [], "answer": true}, {"num": 22, "type": "ox", "text": "宅地建物取引業法によれば、宅地または建物の売買の媒介契約のうち、専任媒介契 約を締結した宅地建物取引業者は、依頼者に対し、当該契約に係る業務の処理状況を ２カ月に１回以上報告しなければならない。", "choices": [], "answer": false}, {"num": 23, "type": "ox", "text": "建築基準法によれば、建築物が防火地域および準防火地域にわたる場合、原則とし て、その全部について、敷地の過半が属する地域内の建築物に関する規定が適用され る。", "choices": [], "answer": false}, {"num": 24, "type": "ox", "text": "不動産取得税は、相続人が不動産を相続により取得した場合には課されない。", "choices": [], "answer": true}, {"num": 25, "type": "ox", "text": "不動産投資に係る収益性を測る指標のうち、純利回り（ＮＯＩ利回り）は、対象不動 産から得られる年間の総収入額を総投資額で除して算出される。", "choices": [], "answer": false}, {"num": 26, "type": "ox", "text": "定期贈与とは、贈与者が受贈者に対して定期的に財産を給付することを目的とする 贈与をいい、贈与者または受贈者のいずれか一方が生存している限り、その効力を失 うことはない。", "choices": [], "answer": false}, {"num": 27, "type": "ox", "text": "相続において、養子の法定相続分は、実子の法定相続分の２分の１となる。", "choices": [], "answer": false}, {"num": 28, "type": "ox", "text": "相続税額の計算上、被相続人が生前に購入した墓碑の購入代金で、相続開始時にお いて未払いであったものは、債務控除の対象となる。", "choices": [], "answer": false}, {"num": 29, "type": "ox", "text": "相続税額の計算上、遺産に係る基礎控除額を計算する際の法定相続人の数は、相続人 のうちに相続の放棄をした者がいる場合であっても、その放棄がなかったものとした ときの相続人の数とされる。", "choices": [], "answer": true}, {"num": 30, "type": "ox", "text": "個人が、自己が所有する土地上に建築した店舗用建物を第三者に賃貸していた場合、 相続税額の計算上、当該敷地は貸家建付地として評価される。 【第２問】 次の各文章（(31)～(60)）の（ ）内にあてはまる最も適切な文章、語句、数 字またはそれらの組合せを1)～3)のなかから選び、その番号を解答用紙にマー クしなさい。 〔30問〕", "choices": [], "answer": true}, {"num": 31, "type": "multi", "text": "毎年一定金額を積み立てながら、一定の利率で複利運用した場合の一定期間経過後 の元利合計額を試算する際、毎年の積立額に乗じる係数は、（ ）である。", "choices": ["資本回収係数", "年金終価係数", "減債基金係数"], "answer": 1}, {"num": 32, "type": "multi", "text": "退職により健康保険の被保険者資格を喪失した者で、喪失日の前日までに継続して （ ① ）以上被保険者であった者は、所定の申出により、最長で（ ② ）、健康保 険の任意継続被保険者となることができる。", "choices": ["① １カ月 ② ２年間", "① ２カ月 ② １年間", "① ２カ月 ② ２年間"], "answer": 2}, {"num": 33, "type": "multi", "text": "厚生年金保険の被保険者期間が（ ① ）以上ある者が、老齢厚生年金の受給権を 取得した当時、一定の要件を満たす（ ② ）未満の配偶者を有する場合、当該受給 権者が受給する老齢厚生年金に加給年金額が加算される。", "choices": ["① 10年 ② 65歳", "① 20年 ② 65歳", "① 20年 ② 70歳"], "answer": 1}, {"num": 34, "type": "multi", "text": "確定拠出年金の個人型年金の老齢給付金を60歳から受給するためには、通算加入者 等期間が（ ）以上なければならない。", "choices": ["10年", "15年", "20年"], "answer": 0}, {"num": 35, "type": "multi", "text": "下図は、住宅ローンの（ ① ）返済方式をイメージ図で表したものであり、図中 のＰの部分は（ ② ）部分を、Ｑの部分は（ ③ ）部分を示している。 返 Ｐ 済 額 Ｑ 返済期間", "choices": ["① 元金均等 ② 利息 ③ 元金", "① 元利均等 ② 元金 ③ 利息", "① 元利均等 ② 利息 ③ 元金"], "answer": 0}, {"num": 36, "type": "multi", "text": "生命保険の保険料は、純保険料および付加保険料で構成されており、このうち付加 保険料は、（ ）に基づいて計算される。", "choices": ["予定利率", "予定死亡率", "予定事業費率"], "answer": 2}, {"num": 37, "type": "multi", "text": "国内で事業を行う生命保険会社が破綻した場合、生命保険契約者保護機構による補 償の対象となる保険契約については、高予定利率契約を除き、（ ① ）の（ ② ） まで補償される。", "choices": ["① 既払込保険料相当額 ② 70％", "① 死亡保険金額 ② 80％", "① 責任準備金等 ② 90％"], "answer": 2}, {"num": 38, "type": "multi", "text": "自動車を運転中にハンドル操作を誤ってガードレールに衝突し、被保険者である運 転者がケガをした場合 xt": "年末調整の対象となる給与所得者は、所定の手続により、年末調整で所得税の （ ）の適用を受けることができる。", "choices": ["雑損控除", "寄附金控除", "小規模企業共済等掛金控除"], "answer": 2}, {"num": 51, "type": "multi", "text": "宅地に係る固定資産税評価額は、原則として、（ ① ）ごとの基準年度において 評価替えが行われ、前年の地価公示法による公示価格等の（ ② ）を目途として評 定される。", "choices": ["① ３年 ② 70％", "① ３年 ② 80％", "① ５年 ② 80％"], "answer": 0}, {"num": 52, "type": "multi", "text": "都市計画法によれば、市街化調整区域は、（ ）とされている。", "choices": ["既に市街地を形成している区域", "市街化を抑制すべき区域", "優先的かつ計画的に市街化を図るべき区域"], "answer": 1}, {"num": 53, "type": "multi", "text": "都市計画区域内にある幅員４ｍ未満の道で、建築基準法第42条第２項により道路と みなされるものについては、原則として、その中心線からの水平距離で（ ① ）後 退した線がその道路の境界線とみなされ、当該境界線と道路の間の敷地部分は建蔽率 や容積率を算定する際の敷地面積に算入（ ② ）。", "choices": ["① ２ｍ ② することができる", "① ２ｍ ② することができない", "① ４ｍ ② することができない"], "answer": 1}, {"num": 54, "type": "multi", "text": "農地法によれば、農地を農地以外のものに転用する場合、原則として、（ ① ）の 許可を受けなければならないが、市街化区域内にある農地を農地以外のものに転用す る場合、あらかじめ当該転用に係る届出書を（ ② ）に提出すれば、（ ① ）の許 可を受ける必要はない。", "choices": ["① 農林水産大臣 ② 都道府県知事等", "① 農林水産大臣 ② 農業委員会", "① 都道府県知事等 ② 農業委員会"], "answer": 2}, {"num": 55, "type": "multi", "text": "所得税額の計算において、個人が土地を譲渡したことによる譲渡所得が長期譲渡所 得に区分されるためには、土地を譲渡した年の１月１日における所有期間が（ ） を超えていなければならない。", "choices": ["５年", "10年", "20年"], "answer": 0}, {"num": 56, "type": "multi", "text": "贈与税の申告書は、原則として、贈与を受けた年の翌年の（ ① ）から３月15日 までの間に、（ ② ）の住所地を所轄する税務署長に提出しなければならない。", "choices": ["① ２月１日 ② 受贈者", "① ２月１日 ② 贈与者", "① ２月16日 ② 贈与者"], "answer": 0}, {"num": 57, "type": "multi", "text": "贈与税の配偶者控除は、婚姻期間が（ ① ）以上である配偶者から居住用不動産 または居住用不動産を取得するための金銭の贈与を受け、所定の要件を満たす場合、 贈与税の課税価格から基礎控除額のほかに最高で（ ② ）を控除することができる 特例である。", "choices": ["① 10年 ② 2,000万円", "① 20年 ② 2,000万円", "① 20年 ② 2,500万円"], "answer": 1}, {"num": 58, "type": "multi", "text": "下記の〈親族関係図〉において、Ａさんの相続における妻Ｂさんの法定相続分は、 （ ）である。なお、Ａさんの父母は、Ａさんの相続開始前に死亡している。 〈親族関係図〉 父 母 （既に死亡） （既に死亡） 姉Ｃさん 兄Ｄさん Ａさん 妻Ｂさん （被相続人）", "choices": ["２分の１", "３分の２", "４分の３"], "answer": 2}, {"num": 59, "type": "multi", "text": "相続税額の計算上、死亡退職金の非課税金額の規定による非課税限度額は、 「（ ）×法定相続人の数」の算式により算出される。", "choices": ["500万円", "600万円", "1,000万円"], "answer": 0}, {"num": 60, " // ===== STATE =====
let curMode = 'gakka';  // 'gakka'|'jitsugi'
let curExam = null;
let quizMode = 'all';   // 'all'|'ox'|'mc'
let pool = [];
let idx = 0;
let correct = 0;
let history = [];
let lastExam = null;
let lastMode = 'all';

// ===== INIT =====
function init() {
  buildCards('gakka-cards', DATA.gakka, 'gakka');
  buildCards('jitsugi-cards', DATA.jitsugi, 'jitsugi');
}

function buildCards(containerId, exams, type) {
  const el = document.getElementById(containerId);
  exams.forEach(exam => {
    const cnt = exam.questions.length;
    const div = document.createElement('div');
    div.className = 'exam-card';
    const badge = type === 'gakka'
      ? '<span class="badge badge-g">学科 60問</span>'
      : '<span class="badge badge-j">実技 20問</span>';
    div.innerHTML = `<div class="year">${exam.label}</div><div class="cnt">${cnt}問収録</div>${badge}`;
    div.onclick = () => selectExam(type, exam.id);
    el.appendChild(div);
  });
}

// ===== NAVIGATION =====
function showView(id) {
  ['view-home','view-select','view-quiz','view-score'].forEach(v =>
    document.getElementById(v).classList.toggle('hidden', v !== id)
  );
  const isQuiz = id === 'view-quiz';
  document.getElementById('progWrap').classList.toggle('hidden', !isQuiz);
  window.scrollTo(0, 0);
}

function showMode(mode) {
  curMode = mode;
}

function goHome() {
  showView('view-home');
}

function selectExam(type, examId) {
  curMode = type;
  showMode(type);
  const exams = type === 'gakka' ? DATA.gakka : DATA.jitsugi;
  curExam = exams.find(e => e.id === examId);
  if (!curExam) return;

  document.getElementById('sel-bread').textContent = curExam.label;
  document.getElementById('sel-title').textContent =
    (type === 'gakka' ? '学科試験 ' : '実技試験 ') + curExam.label;

  // Show/hide mode buttons for jitsugi (no OX)
  const oxBtn = document.getElementById('mode-ox');
  const mcBtn = document.getElementById('mode-mc');
  if (type === 'jitsugi') {
    oxBtn.classList.add('hidden');
    mcBtn.classList.add('hidden');
    quizMode = 'all';
    document.getElementById('mode-all').classList.add('sel');
  } else {
    oxBtn.classList.remove('hidden');
    mcBtn.classList.remove('hidden');
  }

  quizMode = 'all';
  setMode('all', document.getElementById('mode-all'));
  showView('view-select');
}

function setMode(m, btn) {
  quizMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
}

// ===== QUIZ =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  if (!curExam) return;
  let qs = [...curExam.questions];

  if (quizMode === 'ox') qs = qs.filter(q => q.type === 'ox');
  else if (quizMode === 'mc') qs = qs.filter(q => q.type === 'multi');

  if (qs.length === 0) { alert('条件に合う問題がありません'); return; }

  pool = shuffle(qs);
  idx = 0;
  correct = 0;
  history = [];
  lastExam = curExam;
  lastMode = quizMode;

  showView('view-quiz');
  loadQ(0);
}

function loadQ(i) {
  if (i >= pool.length) { showScore(); return; }

  const q = pool[i];
  const examLabel = curExam.label;
  const typeLabel = curMode === 'gakka' ? '学科' : '実技';

  // Breadcrumb
  document.getElementById('qbread-exam').textContent = examLabel;
  document.getElementById('qbread-q').textContent = `問${q.num}`;

  // Title bar
  document.getElementById('q-titlebar').textContent =
    `FP3級 ${typeLabel}試験 ${examLabel} 問${q.num}`;

  // Question number & tag
  document.getElementById('q-num-label').textContent = `問${q.num}`;
  const tag = document.getElementById('q-type-tag');
  if (q.type === 'ox') {
    tag.textContent = '○×問題';
    tag.className = 'q-tag tag-ox';
  } else {
    tag.textContent = '三択問題';
    tag.className = 'q-tag tag-mc';
  }

  // Question text
  document.getElementById('q-text').textContent = q.text || '';

  // Tables
  const tableArea = document.getElementById('q-table-area');
  tableArea.innerHTML = '';
  if (q.tables_html) {
    const wrap = document.createElement('div');
    wrap.className = 'q-table-wrap';
    wrap.innerHTML = q.tables_html;
    tableArea.appendChild(wrap);
  }

  // Choices (for MC)
  const choicesArea = document.getElementById('q-choices-area');
  choicesArea.innerHTML = '';
  if (q.type === 'multi' && q.choices && q.choices.length > 0) {
    const ul = document.createElement('ul');
    ul.className = 'choices-list';
    q.choices.forEach((c, ci) => {
      const li = document.createElement('li');
      li.innerHTML = `<span class="cn">${ci + 1}．</span><span>${escHtml(c)}</span>`;
      ul.appendChild(li);
    });
    choicesArea.appendChild(ul);
  }

  // Buttons
  const oxBtns = document.getElementById('ox-btns');
  const mcBtns = document.getElementById('mc-btns');

  if (q.type === 'ox') {
    oxBtns.classList.remove('hidden');
    mcBtns.classList.add('hidden');
    const bm = document.getElementById('btn-maru');
    const bb = document.getElementById('btn-batsu');
    bm.className = 'ans-btn';
    bb.className = 'ans-btn';
    bm.disabled = false;
    bb.disabled = false;
  } else {
    oxBtns.classList.add('hidden');
    mcBtns.classList.remove('hidden');
    mcBtns.innerHTML = '';
    const cnt = (q.choices && q.choices.length) || 3;
    for (let ci = 0; ci < cnt; ci++) {
      const btn = document.createElement('button');
      btn.className = 'mc-btn';
      btn.textContent = ci + 1;
      btn.id = 'mc' + ci;
      btn.onclick = () => ansMC(ci);
      mcBtns.appendChild(btn);
    }
  }

  // Hide result
  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('overlay').classList.add('hidden');

  updateProg();
}

function ansOX(choice) {
  const q = pool[idx];
  if (q._done) return;
  q._done = true;

  const isCorrect = (choice === q.answer);
  if (isCorrect) correct++;
  history.push({ q, userAns: choice, isCorrect });

  const bm = document.getElementById('btn-maru');
  const bb = document.getElementById('btn-batsu');
  bm.disabled = true;
  bb.disabled = true;

  if (q.answer === true) {
    bm.classList.add('correct-btn');
    if (!isCorrect) bb.classList.add('wrong-btn');
    else bb.classList.add('dim-btn');
  } else {
    bb.classList.add('correct-btn');
    if (!isCorrect) bm.classList.add('wrong-btn');
    else bm.classList.add('dim-btn');
  }

  showOverlay(isCorrect);
}

function ansMC(choice) {
  const q = pool[idx];
  if (q._done) return;
  q._done = true;

  const isCorrect = (choice === q.answer);
  if (isCorrect) correct++;
  history.push({ q, userAns: choice, isCorrect });

  const cnt = (q.choices && q.choices.length) || 3;
  for (let ci = 0; ci < cnt; ci++) {
    const btn = document.getElementById('mc' + ci);
    if (!btn) continue;
    btn.disabled = true;
    if (ci === q.answer) btn.classList.add('correct-btn');
    else if (ci === choice) btn.classList.add('wrong-btn');
    else btn.classList.add('dim-btn');
  }

  showOverlay(isCorrect);
}

function showOverlay(isCorrect) {
  const ov = document.getElementById('overlay');
  const circ = document.getElementById('ov-circle');
  const icon = document.getElementById('ov-icon');
  const txt = document.getElementById('ov-txt');

  ov.classList.remove('hidden');
  circ.className = 'overlay-circle ' + (isCorrect ? 'ok' : 'ng');
  icon.textContent = isCorrect ? '○' : '×';
  txt.textContent = isCorrect ? '正解！' : '不正解';

  setTimeout(() => {
    ov.classList.add('hidden');
    showResult();
  }, 900);
}

function showResult() {
  const q = pool[idx];
  const h = history[history.length - 1];

  const ra = document.getElementById('result-area');
  ra.classList.remove('hidden');

  // Correct answer
  let ansStr = '';
  if (q.answer === true) ansStr = '○（正しい）';
  else if (q.answer === false) ansStr = '×（誤り）';
  else if (typeof q.answer === 'number') ansStr = (q.answer + 1) + '';
  document.getElementById('res-ans').textContent = ansStr;

  let yoursStr = '';
  if (typeof h.userAns === 'boolean') yoursStr = h.userAns ? '○' : '×';
  else if (typeof h.userAns === 'number') yoursStr = (h.userAns + 1) + '';
  document.getElementById('res-yours').textContent = `あなた：${yoursStr}`;

  // No explanation data (PDFs only have questions/answers, not explanations)
  document.getElementById('ex-box').classList.add('hidden');
  document.getElementById('res-bunya').innerHTML = '';

  // Next button
  const nb = document.getElementById('next-btn');
  nb.textContent = idx + 1 >= pool.length ? '成績を見る 📊' : `次の問題（問${pool[idx + 1]?.num || ''}）»`;

  updateProg();
  setTimeout(() => ra.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
}

function nextQ() {
  idx++;
  if (idx >= pool.length) {
    showScore();
  } else {
    loadQ(idx);
    window.scrollTo(0, 0);
  }
}

function updateProg() {
  const total = pool.length;
  const done = idx + (pool[idx]?._done ? 1 : 0);
  const pct = total ? (done / total * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
}

// ===== SCORE =====
function showScore() {
  showView('view-score');
  const total = history.length;
  const cor = history.filter(h => h.isCorrect).length;
  const pct = total ? Math.round(cor / total * 100) : 0;

  document.getElementById('sc-pct').textContent = pct + '%';
  document.getElementById('sc-frac').textContent = `${cor} / ${total} 問正解`;

  const passEl = document.getElementById('sc-pass');
  if (pct >= 60) {
    passEl.textContent = '✅ 合格ライン達成！';
    passEl.className = 'pass-badge pass';
  } else {
    passEl.textContent = '💪 もう少し頑張ろう！';
    passEl.className = 'pass-badge fail';
  }

  // List of all questions
  let rows = '';
  history.forEach((h, i) => {
    const icon = h.isCorrect ? '✅' : '❌';
    let ansStr = '';
    if (h.q.answer === true) ansStr = '○';
    else if (h.q.answer === false) ansStr = '×';
    else ansStr = (h.q.answer + 1) + '';
    rows += `<tr>
      <td>問${h.q.num}</td>
      <td>${icon}</td>
      <td>${ansStr}</td>
    </tr>`;
  });
  document.getElementById('sc-list').innerHTML = rows || '<tr><td colspan="3">データなし</td></tr>';
}

function retryQuiz() {
  if (lastExam) {
    curExam = lastExam;
    quizMode = lastMode;
    startQuiz();
  } else {
    goHome();
  }
}

// ===== UTILS =====
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== START =====
init();
</script>
