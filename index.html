<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FP3級 過去問練習（2025年5月試験）</title>
  <style>
    :root{--pr:#1a56db;--pu:#7c3aed;--ok:#16a34a;--ng:#dc2626;--bg:#f0f4ff;--card:#fff;--txt:#1e293b;--mut:#64748b;--bdr:#e2e8f0;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
    header{background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;padding:16px 20px;box-shadow:0 4px 12px rgba(0,0,0,.15);}
    header h1{font-size:1.4rem;font-weight:800;}
    header p{font-size:.8rem;opacity:.85;margin-top:2px;}
    .hstats{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;}
    .hstat{background:rgba(255,255,255,.15);border-radius:8px;padding:5px 12px;font-size:.75rem;}
    .hstat span{font-size:1.1rem;font-weight:700;display:block;}
    .container{max-width:820px;margin:0 auto;padding:16px 12px;}
    .mode-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
    .mode-tab{flex:1;min-width:120px;padding:10px 8px;border-radius:10px;border:2px solid var(--bdr);background:#fff;cursor:pointer;font-size:.82rem;font-weight:700;text-align:center;transition:all .2s;}
    .mode-tab:hover{transform:translateY(-1px);}
    .mode-tab.active-ox{background:#1a56db;border-color:#1a56db;color:#fff;}
    .mode-tab.active-s3{background:#7c3aed;border-color:#7c3aed;color:#fff;}
    .mode-tab.active-fp{background:#0891b2;border-color:#0891b2;color:#fff;}
    .sec-label{font-size:.72rem;color:var(--mut);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
    .unit-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
    .unit-tab{padding:5px 11px;border-radius:16px;border:1.5px solid var(--bdr);background:#fff;cursor:pointer;font-size:.72rem;font-weight:700;transition:all .2s;}
    .unit-tab:hover{transform:translateY(-1px);}
    .unit-tab.act{background:#475569;border-color:#475569;color:#fff;}
    .progress-wrap{background:#e2e8f0;border-radius:8px;height:7px;margin-bottom:14px;overflow:hidden;}
    .progress-bar{height:100%;border-radius:8px;background:linear-gradient(90deg,#1a56db,#7c3aed);transition:width .4s;}
    .card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 4px 14px rgba(0,0,0,.07);margin-bottom:14px;}
    .q-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
    .badge{padding:2px 9px;border-radius:18px;font-size:.68rem;font-weight:700;}
    .badge-src{background:#dbeafe;color:#1d4ed8;}
    .badge-unit{background:#f1f5f9;color:#475569;}
    .q-num{color:var(--mut);font-size:.75rem;}
    .q-text{font-size:1rem;font-weight:600;line-height:1.7;margin-bottom:14px;}
    /* ○× */
    .ox-btns{display:flex;gap:10px;margin-bottom:10px;}
    .ox-btn{flex:1;padding:14px;border-radius:12px;border:2.5px solid var(--bdr);background:#fff;cursor:pointer;font-size:1.8rem;font-weight:800;text-align:center;transition:all .2s;}
    .ox-btn:hover{transform:scale(1.04);}
    .ox-btn.c-show{border-color:var(--ok);background:#f0fdf4;}
    .ox-btn.w-show{border-color:var(--ng);background:#fef2f2;}
    .ox-btn.sel-ok{border-color:var(--ok);background:#dcfce7;}
    .ox-btn.sel-ng{border-color:var(--ng);background:#fee2e2;}
    /* 三択 */
    .choices{display:flex;flex-direction:column;gap:8px;margin-bottom:10px;}
    .choice-btn{padding:12px 14px;border-radius:10px;border:2px solid var(--bdr);background:#fff;cursor:pointer;font-size:.88rem;text-align:left;font-weight:600;transition:all .2s;line-height:1.55;}
    .choice-btn:hover{transform:translateX(3px);border-color:#94a3b8;}
    .choice-btn.c{border-color:var(--ok);background:#f0fdf4;color:var(--ok);}
    .choice-btn.w{border-color:var(--ng);background:#fef2f2;color:var(--ng);}
    /* 結果 */
    .result-box{border-radius:10px;padding:12px 14px;margin-bottom:12px;display:none;}
    .result-box.show{display:block;}
    .result-box.ok{background:#f0fdf4;border:2px solid #86efac;}
    .result-box.ng{background:#fef2f2;border:2px solid #fca5a5;}
    .r-title{font-weight:800;font-size:.95rem;margin-bottom:5px;}
    .result-box.ok .r-title{color:var(--ok);}
    .result-box.ng .r-title{color:var(--ng);}
    .r-exp{font-size:.83rem;line-height:1.75;color:#374151;}
    .r-exp strong{color:#1e293b;}
    .formula{display:inline-block;background:#1e293b;color:#93c5fd;font-family:monospace;font-size:.78rem;padding:3px 8px;border-radius:5px;margin:1px 0;}
    .nav-btns{display:flex;gap:8px;margin-top:4px;}
    .nav-btn{flex:1;padding:11px;border-radius:10px;border:none;cursor:pointer;font-size:.88rem;font-weight:700;transition:all .2s;}
    .nav-btn:hover{transform:translateY(-1px);}
    .btn-next{background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;}
    .btn-skip{background:#f1f5f9;color:#475569;}
    .score-card{background:#fff;border-radius:18px;padding:28px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.1);}
    .score-circle{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#1a56db,#7c3aed);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:#fff;font-size:1.8rem;font-weight:800;}
    .score-breakdown{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:16px 0;}
    .si{background:#f8faff;border-radius:10px;padding:8px 16px;}
    .si .v{font-size:1.3rem;font-weight:800;color:#1a56db;}
    .si .l{font-size:.72rem;color:var(--mut);}
    .btn-restart{padding:12px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;}
    .btn-restart:hover{transform:translateY(-2px);}
    .empty{text-align:center;padding:36px;color:var(--mut);}
  </style>
</head>
<body>
<header>
  <h1>📊 FP3級 過去問練習（2025年5月試験）</h1>
  <p>fp3-siken.com より取得 ／ 学科○×30問・学科三択30問・実技FP協会20問</p>
  <div class="hstats">
    <div class="hstat">学科○×<span>30問</span></div>
    <div class="hstat">学科三択<span>30問</span></div>
    <div class="hstat">実技FP協会<span>20問</span></div>
    <div class="hstat">正答率<span id="hrate">―</span></div>
  </div>
</header>
<div class="container">
  <div class="mode-tabs">
    <button class="mode-tab" id="tab-ox" onclick="switchMode('ox')">📝 学科 ○×（30問）</button>
    <button class="mode-tab" id="tab-s3" onclick="switchMode('s3')">🔢 学科 三択（30問）</button>
    <button class="mode-tab" id="tab-fp" onclick="switchMode('fp')">🧮 実技 FP協会（20問）</button>
  </div>
  <div class="sec-label">科目フィルター</div>
  <div class="unit-tabs" id="unitTabs"></div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div id="quizArea"></div>
</div>

<script>
// ===== DATA =====
const KAMOKU_MAP = {
  'A.ライフプランニングと資金計画': 'ライフ',
  'B.リスク管理': 'リスク',
  'C.金融資産運用': '金融',
  'D.タックスプランニング': 'タックス',
  'E.不動産': '不動産',
  'F.相続・事業承継': '相続'
};

const GAKKA_OX = [
  {q:`税理士の登録を受けていないファイナンシャル・プランナーが、顧客のために反復継続して確定申告書を作成しても、その行為が無償であれば税理士法に抵触しない。`, a:false, kamoku:"A.ライフプランニングと資金計画", saimoku:"2.ファイナンシャル・プランニングと関連法規", ex:`税理士法は有償・無償を問わず、税理士・税理士法人でない者が税理士業務を行うことを禁止しています。税務書類の作成は税理士の独占業務です。したがって記述は[誤り]です。`},
  {q:`雇用保険の高年齢雇用継続基本給付金は、原則として、60歳以上65歳未満の被保険者が、60歳到達時点に比べて賃金月額が85％未満に低下した状態で就労している場合に支給される。`, a:false, kamoku:"A.ライフプランニングと資金計画", saimoku:"4.社会保険", ex:`高年齢雇用継続基本給付金は、賃金が60歳到達時点の75％未満に低下した場合に支給されます（85%ではありません）。したがって記述は[誤り]です。`},
  {q:`国民年金の第1号被保険者の収入により生計を維持している配偶者で、20歳以上60歳未満の者は、国民年金の第3号被保険者となる。`, a:false, kamoku:"A.ライフプランニングと資金計画", saimoku:"5.公的年金", ex:`第3号被保険者になれるのは、第2号被保険者（会社員・公務員）に扶養される配偶者です。第1号被保険者に扶養される配偶者は第1号被保険者となります。したがって記述は[誤り]です。`},
  {q:`確定拠出年金の個人型年金（iDeCo）において、国民年金の第3号被保険者は、iDeCoに加入することができない。`, a:false, kamoku:"A.ライフプランニングと資金計画", saimoku:"6.企業年金・個人年金等", ex:`2017年1月以降、国民年金の第3号被保険者もiDeCoに加入できるようになりました。したがって記述は[誤り]です。`},
  {q:`小規模企業共済制度において、共済契約者が掛け金を前払いした場合、その前払い分についても小規模企業共済等掛金控除として所得控除の対象となる。`, a:false, kamoku:"A.ライフプランニングと資金計画", saimoku:"6.企業年金・個人年金等", ex:`前払いした掛金は、その年に支払った分のみが所得控除の対象です。翌年以降分の前払い分は当年の控除対象外となります。したがって記述は[誤り]です。`},
  {q:`生命保険契約において、契約の転換制度を利用する場合、転換後契約の保険料は、転換時の被保険者の年齢・保険料率で計算されます。`, a:true, kamoku:"B.リスク管理", saimoku:"3.生命保険", ex:`契約の転換制度を使って新しい保険に切り替える場合、転換後の保険料は転換時（新しい契約時）の年齢と保険料率を基に計算されます。したがって記述は[適切]です。`},
  {q:`定期保険特約付終身保険（更新型）において、定期保険特約を更新する場合、更新後の保険料は更新時の年齢・保険料率で計算される。`, a:true, kamoku:"B.リスク管理", saimoku:"3.生命保険", ex:`更新型定期保険特約は、更新時の年齢と保険料率をもとに保険料が再計算されるため、通常は保険料が上がります。したがって記述は[適切]です。`},
  {q:`個人年金保険（終身年金）は、被保険者が生存している限り年金が受け取れるため、被保険者の死亡リスクに備える機能を持っている。`, a:false, kamoku:"B.リスク管理", saimoku:"3.生命保険", ex:`終身年金は長生きリスク（老後の生活費枯渇）に備えるものであり、死亡リスクに備えるものではありません。したがって記述は[誤り]です。`},
  {q:`国内旅行傷害保険では、旅行中に発生した地震・噴火またはこれらによる津波を原因とする傷害は補償される。`, a:false, kamoku:"B.リスク管理", saimoku:"4.損害保険", ex:`国内旅行傷害保険では、地震・噴火・津波による傷害は補償対象外となっています。海外旅行傷害保険では補償されます。したがって記述は[誤り]です。`},
  {q:`自動車保険の人身傷害保険は、被保険者が自動車事故で死傷した場合に、過失割合にかかわらず実際の損害額が補償される。`, a:true, kamoku:"B.リスク管理", saimoku:"4.損害保険", ex:`人身傷害保険は、自分の過失割合に関係なく、実際の損害額（治療費・休業損害・慰謝料等）が補償されます。したがって記述は[適切]です。`},
  {q:`金利が上昇すると、一般的に既発債の価格は下落する。`, a:true, kamoku:"C.金融資産運用", saimoku:"4.債券投資", ex:`債券価格と金利は逆の関係にあります。市場金利が上昇すると既発債の価格は下落し、利回りは上昇します。したがって記述は[適切]です。`},
  {q:`公社債投資信託は株式をいっさい組み入れることができないため、元本が保証されている。`, a:false, kamoku:"C.金融資産運用", saimoku:"3.投資信託", ex:`公社債投資信託は株式を組み入れることができませんが、元本保証はありません。投資信託はすべて元本保証なしです。したがって記述は[誤り]です。`},
  {q:`指値注文は、投資家が売買したい価格を指定する注文方法で、指定した価格以外では売買が成立しない。`, a:false, kamoku:"C.金融資産運用", saimoku:"5.株式投資", ex:`指値注文は指定した価格またはそれよりも有利な価格で売買されます。「指定した価格以外では成立しない」という記述は誤りです。したがって記述は[誤り]です。`},
  {q:`犯罪収益移転防止法に基づき、金融機関等の特定事業者は、顧客と特定業務に係る取引を行う場合、原則として、取引時確認を行わなければならない。`, a:true, kamoku:"C.金融資産運用", saimoku:"12.関連法規", ex:`犯罪収益移転防止法により、銀行・証券会社等の特定事業者は、一定の取引の際に本人確認（取引時確認）を行う義務があります。したがって記述は[適切]です。`},
  {q:`2資産間の相関係数が＋1である場合、2資産を組み合わせたポートフォリオのリスクを分散効果により軽減させることができる。`, a:false, kamoku:"C.金融資産運用", saimoku:"9.ポートフォリオ運用", ex:`相関係数が＋1の場合、2資産は完全に同じ動きをするため分散効果はゼロです。相関係数が低い（マイナスに近い）ほど分散効果が大きくなります。したがって記述は[誤り]です。`},
  {q:`所得税において、個人が受け取る入院給付金は、非課税とされる。`, a:true, kamoku:"D.タックスプランニング", saimoku:"2.所得税の仕組み", ex:`身体の傷害に基因して受け取る入院給付金・手術給付金等は、所得税法上非課税とされています。したがって記述は[適切]です。`},
  {q:`給与所得の金額は、給与収入の金額から給与所得控除額を差し引いた金額であるが、給与所得控除額は一律55万円である。`, a:false, kamoku:"D.タックスプランニング", saimoku:"3.各種所得の内容", ex:`給与所得控除額は収入金額に応じて異なります。55万円は最低額であり、収入が増えるにつれて控除額も増え、850万円超では195万円が上限となります。したがって記述は[誤り]です。`},
  {q:`商品の年間の売上原価は、「期首商品棚卸高＋当期商品仕入高－期末商品棚卸高」の算式で算出することができる。`, a:true, kamoku:"D.タックスプランニング", saimoku:"3.各種所得の内容", ex:`売上原価の計算式は「期首商品棚卸高＋当期商品仕入高－期末商品棚卸高」で正しいです。したがって記述は[適切]です。`},
  {q:`所得税において、賃貸アパートの土地および建物を譲渡したことによる譲渡所得の金額の計算上生じた損失の金額は、他の所得金額と損益通算することができない。`, a:true, kamoku:"D.タックスプランニング", saimoku:"4.損益通算", ex:`土地・建物の譲渡による損失は、一般的な損益通算の対象外です（分離課税のため）。したがって記述は[適切]です。`},
  {q:`所得税において、納税者の合計所得金額が1,000万円を超えている場合、配偶者の合計所得金額の多寡にかかわらず、納税者は配偶者控除の適用を受けることはできない。`, a:true, kamoku:"D.タックスプランニング", saimoku:"5.所得控除", ex:`配偶者控除は納税者本人の合計所得金額が1,000万円以下であることが要件です。1,000万円を超えると配偶者の所得にかかわらず適用を受けられません。したがって記述は[適切]です。`},
  {q:`不動産の登記記録において、土地・建物の所有者の住所・氏名は甲区に記録されている。`, a:false, kamoku:"E.不動産", saimoku:"1.不動産の見方", ex:`所有者の住所・氏名および所有権に関する事項は「甲区」に記録されます。ただし、土地・建物の物理的状況（所在・地積等）は「表題部」に記録されます。したがって記述は[誤り]です。`},
  {q:`借地借家法の定期借地権の一種である一般定期借地権は、存続期間を50年以上として設定するものである。`, a:true, kamoku:"E.不動産", saimoku:"2.不動産の取引", ex:`一般定期借地権の存続期間は50年以上です。契約は必ず書面で行い、期間満了後の契約更新はありません。したがって記述は[適切]です。`},
  {q:`都市計画法において、市街化調整区域は、市街化を抑制すべき区域とされており、開発行為を行うには都道府県知事等の許可が原則必要である。`, a:true, kamoku:"E.不動産", saimoku:"3.不動産に関する法令上の規制", ex:`市街化調整区域は市街化を抑制する区域です。この区域で開発行為を行うには都道府県知事等の開発許可が必要です（一定規模以下等の例外あり）。したがって記述は[適切]です。`},
  {q:`不動産を取得した場合の登録免許税は、所有権の移転登記の場合、固定資産税評価額に税率を乗じて計算されるが、相続による取得の場合の税率は売買による取得よりも高くなる。`, a:false, kamoku:"E.不動産", saimoku:"4.不動産の取得・保有に係る税金", ex:`登録免許税の税率は、売買が2%、相続が0.4%です。相続の方が低くなります。したがって記述は[誤り]です。`},
  {q:`「空き家に係る譲渡所得の特別控除の特例」の適用を受けることができる譲渡に係る譲渡対価の合計額が、その年における1億円を超える場合には、本特例の適用を受けることができない。`, a:true, kamoku:"E.不動産", saimoku:"5.不動産の譲渡に係る税金", ex:`空き家の3,000万円特別控除の特例には、譲渡価額が1億円以下であることが要件の一つです。1億円を超える場合は適用不可となります。したがって記述は[適切]です。`},
  {q:`贈与税の配偶者控除の適用を受けるためには、贈与を受けた日において贈与者との婚姻期間が20年以上あり、かつ贈与された財産は居住用不動産または居住用不動産を取得するための金銭でなければならない。`, a:true, kamoku:"F.相続・事業承継", saimoku:"2.贈与と税金", ex:`贈与税の配偶者控除は、婚姻20年以上の配偶者から居住用不動産または居住用不動産取得のための金銭の贈与を受けた場合に2,000万円まで控除できます。したがって記述は[適切]です。`},
  {q:`公正証書遺言は、証人2人以上の立会いのもとで作成し、遺言者が遺言の趣旨を公証人に口授し、その内容を公証人が筆記してから、遺言者および証人がその内容を確認し、各自が署名・押印することで成立する。`, a:true, kamoku:"F.相続・事業承継", saimoku:"3.相続と法律", ex:`公正証書遺言の作成手続きはこの通りです。証人2名以上の立会い、口授、公証人の筆記・読み聞かせ、遺言者・証人の署名押印が必要です。したがって記述は[適切]です。`},
  {q:`相続税において、死亡保険金の非課税金額の規定により相続人が非課税となる金額の上限は、「500万円×被相続人の子の数」で算出される。`, a:false, kamoku:"F.相続・事業承継", saimoku:"4.相続と税金", ex:`死亡保険金の非課税限度額は「500万円×法定相続人の数」です。「子の数」ではなく「法定相続人の数」を使います。したがって記述は[誤り]です。`},
  {q:`相続税における配偶者の税額軽減の特例では、配偶者が相続等によって取得した財産が、1億6,000万円と配偶者の法定相続分相当額のうちいずれか多い金額を超えない限り、配偶者は相続税を納めなくてもよい。`, a:true, kamoku:"F.相続・事業承継", saimoku:"4.相続と税金", ex:`配偶者の税額軽減では、1億6,000万円または法定相続分相当額のいずれか大きい方まで相続税がかかりません。したがって記述は[適切]です。`},
  {q:`贈与税の申告書は、受贈者が贈与者の住所地の所轄税務署長に提出しなければならない。`, a:false, kamoku:"F.相続・事業承継", saimoku:"2.贈与と税金", ex:`贈与税の申告書は、受贈者（もらった人）の住所地の所轄税務署長に提出します。贈与者の住所地ではありません。したがって記述は[誤り]です。`}

  {q:`異なる2資産からなるポートフォリオにおいて、2資産間の相関係数が（　）である場合、両銘柄への分散投資によるリスク軽減効果は最大になる。`, choices:["－1","0","＋1"], ans:0, kamoku:"C.金融資産運用", saimoku:"9.ポートフォリオ運用", ex:`相関係数が-1のとき、2資産は完全に逆の動きをするためリスク軽減効果が最大になります。+1のときはリスク軽減効果なし。したがって（　）には－1が入ります。`},
  {q:`NISAの成長投資枠については、上場株式や公募株式投資信託等への投資が可能であり、年間投資上限額は（　）とされている。`, choices:["120万円","240万円","360万円"], ans:1, kamoku:"C.金融資産運用", saimoku:"10.金融商品と税金", ex:`2024年からの新NISAでは、成長投資枠の年間投資上限額は240万円（つみたて投資枠は120万円）です。非課税保有限度額は合計1,800万円（うち成長投資枠1,200万円）。したがって[2]が適切です。`},

  renderUnitTabs();
  filterQ();
}

function getPool() {
  if(mode==='ox') return GAKKA_OX;
  if(mode==='s3') return GAKKA_3;
  return JITSUGI_FP;
}

function renderUnitTabs() {
  const pool = getPool();
  const kamokuSet = ['all', ...[...new Set(pool.map(q=>q.kamoku))]];
  let html = '';
  kamokuSet.forEach(k => {
    const cnt = k==='all' ? pool.length : pool.filter(q=>q.kamoku===k).length;
    const label = k==='all' ? `すべて(${cnt})` : `${KAMOKU_MAP[k]||k}(${cnt})`;
    html += `<button class="unit-tab${filterKamoku===k?' act':''}" onclick="setKamoku('${k}')">${label}</button>`;
  });
  document.getElementById('unitTabs').innerHTML = html;
}

function setKamoku(k) {
  filterKamoku = k;
  idx = 0; answered = false;
  session = {total:0, correct:0};
  renderUnitTabs();
  filterQ();
}

function filterQ() {
  const pool = getPool();
  let qs = filterKamoku==='all' ? [...pool] : pool.filter(q=>q.kamoku===filterKamoku);
  // shuffle
  for(let i=qs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[qs[i],qs[j]]=[qs[j],qs[i]];}
  questions = qs;
  idx = 0; answered = false;
  renderUnitTabs();
  renderQ();
}

function renderQ() {
  const area = document.getElementById('quizArea');
  if(!questions.length){area.innerHTML='<div class="empty">この科目の問題はありません。</div>';return;}
  if(idx>=questions.length){showScore();return;}
  const q = questions[idx];
  const pct = Math.round(idx/questions.length*100);
  document.getElementById('progressBar').style.width = pct+'%';

  const km = KAMOKU_MAP[q.kamoku]||q.kamoku;
  const badgeColor = {
    'ライフ':'#dbeafe::#1d4ed8','リスク':'#fce7f3::#9d174d',
    '金融':'#d1fae5::#065f46','タックス':'#fef3c7::#92400e',
    '不動産':'#ede9fe::#5b21b6','相続':'#fee2e2::#991b1b'
  }[km]||'#f1f5f9::#475569';
  const [bg,fg] = badgeColor.split('::');

  const metaHtml = `
    <div class="q-meta">
      <span class="badge badge-src">2025年5月</span>
      <span class="badge" style="background:${bg};color:${fg}">${km}</span>
      ${q.saimoku ? `<span class="badge badge-unit">${q.saimoku}</span>` : ''}
      <span class="q-num">${idx+1} / ${questions.length}</span>
    </div>`;

  if(mode==='ox') {
    area.innerHTML = `<div class="card">${metaHtml}
      <div class="q-text">${q.q}</div>
      <div class="ox-btns">
        <button class="ox-btn" id="btn-o" onclick="ansOX(true)">○</button>
        <button class="ox-btn" id="btn-x" onclick="ansOX(false)">×</button>
      </div>
      <div class="result-box" id="rb"><div class="r-title" id="rt"></div><div class="r-exp" id="re"></div></div>
      <div class="nav-btns" id="nb" style="display:none">
        <button class="nav-btn btn-skip" onclick="skipQ()">スキップ</button>
        <button class="nav-btn btn-next" onclick="nextQ()">次の問題 →</button>
      </div></div>`;
  } else {
    const chHtml = q.choices.map((c,i)=>
      `<button class="choice-btn" id="ch${i}" onclick="ansChoice(${i})">${['①','②','③'][i]} ${c}</button>`
    ).join('');
    area.innerHTML = `<div class="card">${metaHtml}
      <div class="q-text">${q.q}</div>
      <div class="choices">${chHtml}</div>
      <div class="result-box" id="rb"><div class="r-title" id="rt"></div><div class="r-exp" id="re"></div></div>
      <div class="nav-btns" id="nb" style="display:none">
        <button class="nav-btn btn-skip" onclick="skipQ()">スキップ</button>
        <button class="nav-btn btn-next" onclick="nextQ()">次の問題 →</button>
      </div></div>`;
  }
  answered = false;
}

function ansOX(choice) {
  if(answered) return;
  answered = true;
  const q = questions[idx];
  const ok = choice === q.a;
  stats.total++; session.total++;
  if(ok){stats.correct++;session.correct++;}
  const ob = document.getElementById('btn-o');
  const xb = document.getElementById('btn-x');
  ob.disabled=true; xb.disabled=true;
  ob.classList.add(q.a ? 'c-show' : 'w-show');
  xb.classList.add(!q.a ? 'c-show' : 'w-show');
  if(choice) ob.classList.add(ok?'sel-ok':'sel-ng');
  else xb.classList.add(ok?'sel-ok':'sel-ng');
  showResult(ok, q.ex, q.a ? '正解は ○' : '正解は ×');
  updateHeader();
}

function ansChoice(choice) {
  if(answered) return;
  answered = true;
  const q = questions[idx];
  const ok = choice === q.ans;
  stats.total++; session.total++;
  if(ok){stats.correct++;session.correct++;}
  q.choices.forEach((_,i)=>{
    const b = document.getElementById('ch'+i);
    b.disabled=true;
    if(i===q.ans) b.classList.add('c');
    else if(i===choice&&!ok) b.classList.add('w');
  });
  showResult(ok, q.ex, `正解は ${['①','②','③'][q.ans]} ${q.choices[q.ans]}`);
  updateHeader();
}

function showResult(ok, ex, label) {
  const rb = document.getElementById('rb');
  rb.className = 'result-box show ' + (ok?'ok':'ng');
  document.getElementById('rt').textContent = ok ? '✅ 正解！' : '❌ 不正解…';
  document.getElementById('re').innerHTML = `<strong>${label}</strong><br><br>${(ex||'').replace(/\n/g,'<br>')}`;
  document.getElementById('nb').style.display = 'flex';
}

function nextQ(){idx++;answered=false;renderQ();}
function skipQ(){idx++;answered=false;renderQ();}

function showScore() {
  document.getElementById('progressBar').style.width='100%';
  const pct = session.total>0 ? Math.round(session.correct/session.total*100) : 0;
  document.getElementById('quizArea').innerHTML = `
    <div class="score-card">
      <div class="score-circle">${pct}%</div>
      <div style="font-size:1.1rem;font-weight:700;margin-bottom:6px;">セッション終了！</div>
      <div style="color:#64748b;font-size:.85rem;margin-bottom:16px;">お疲れさまでした</div>
      <div class="score-breakdown">
        <div class="si"><div class="v">${session.correct}</div><div class="l">正解</div></div>
        <div class="si"><div class="v">${session.total-session.correct}</div><div class="l">不正解</div></div>
        <div class="si"><div class="v">${session.total}</div><div class="l">回答数</div></div>
        <div class="si"><div class="v">${pct}%</div><div class="l">正答率</div></div>
      </div>
      <button class="btn-restart" onclick="restart()">もう一度やる</button>
    </div>`;
}

function restart(){session={total:0,correct:0};filterQ();}

function updateHeader(){
  const rate = stats.total>0 ? Math.round(stats.correct/stats.total*100)+'%' : '―';
  document.getElementById('hrate').textContent = rate;
}

window.onload = init;
</script>
</body>
</html>
