<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FP3級 過去問練習サイト</title>
  <style>
    :root {
      --primary: #1a56db; --primary-dark: #1e40af;
      --success: #16a34a; --danger: #dc2626; --warning: #d97706;
      --bg: #f0f4ff; --card-bg: #fff; --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
      --t1bg:#dbeafe;--t1c:#1d4ed8; --t2bg:#fce7f3;--t2c:#9d174d;
      --t3bg:#d1fae5;--t3c:#065f46; --t4bg:#fef3c7;--t4c:#92400e;
      --t5bg:#ede9fe;--t5c:#5b21b6; --t6bg:#fee2e2;--t6c:#991b1b;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

    header{background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;padding:18px 24px;box-shadow:0 4px 12px rgba(0,0,0,.15);}
    header h1{font-size:1.5rem;font-weight:800;}
    header p{font-size:.82rem;opacity:.85;margin-top:3px;}
    .hstats{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;}
    .hstat{background:rgba(255,255,255,.15);border-radius:10px;padding:6px 14px;font-size:.78rem;}
    .hstat span{font-size:1.15rem;font-weight:700;display:block;}

    .container{max-width:860px;margin:0 auto;padding:20px 14px;}

    .mode-tabs{display:flex;gap:8px;margin-bottom:18px;}
    .mode-tab{flex:1;padding:12px;border-radius:12px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:.9rem;font-weight:700;text-align:center;transition:all .2s;}
    .mode-tab:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(0,0,0,.1);}
    .mode-tab.active.gakka-tab{background:#1a56db;border-color:#1a56db;color:#fff;}
    .mode-tab.active.jitsugi-tab{background:#7c3aed;border-color:#7c3aed;color:#fff;}

    .sec-label{font-size:.78rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
    .unit-tabs{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
    .unit-tab{padding:7px 13px;border-radius:18px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:.78rem;font-weight:700;transition:all .2s;}
    .unit-tab:hover{transform:translateY(-1px);}
    .unit-tab.active{color:#fff;}
    .unit-tab[data-unit="all"].active{background:#475569;border-color:#475569;}
    .unit-tab[data-unit="1"].active{background:var(--t1c);border-color:var(--t1c);}
    .unit-tab[data-unit="2"].active{background:var(--t2c);border-color:var(--t2c);}
    .unit-tab[data-unit="3"].active{background:var(--t3c);border-color:var(--t3c);}
    .unit-tab[data-unit="4"].active{background:var(--t4c);border-color:var(--t4c);}
    .unit-tab[data-unit="5"].active{background:var(--t5c);border-color:var(--t5c);}
    .unit-tab[data-unit="6"].active{background:var(--t6c);border-color:var(--t6c);}

    .sub-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
    .sub-tab{padding:5px 11px;border-radius:14px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:.73rem;font-weight:600;transition:all .2s;}
    .sub-tab.active{background:#475569;border-color:#475569;color:#fff;}
    .sub-tab:hover{transform:translateY(-1px);}

    .progress-wrap{background:#e2e8f0;border-radius:10px;height:8px;margin-bottom:18px;overflow:hidden;}
    .progress-bar{height:100%;border-radius:10px;background:linear-gradient(90deg,#1a56db,#7c3aed);transition:width .4s;}

    .card{background:#fff;border-radius:16px;padding:22px;box-shadow:0 4px 16px rgba(0,0,0,.07);margin-bottom:16px;}
    .q-meta{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
    .badge{padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:700;}
    .q-num{color:var(--muted);font-size:.8rem;}
    .q-text{font-size:1.05rem;font-weight:600;line-height:1.65;margin-bottom:16px;}

    /* scenario / table */
    .scenario-wrap{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:14px 16px;margin-bottom:14px;font-size:.85rem;line-height:1.7;}
    .scenario-wrap p{margin-bottom:8px;}
    .data-table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:8px;}
    .data-table thead tr{background:#1d4ed8;}
    .data-table thead th{color:#fff;padding:7px 11px;text-align:left;font-weight:700;}
    .data-table tbody tr:nth-child(odd){background:#f8faff;}
    .data-table tbody tr:nth-child(even){background:#eef3ff;}
    .data-table td{padding:6px 11px;border-bottom:1px solid #dbeafe;vertical-align:top;}
    .data-table td.num{text-align:right;font-family:monospace;}
    .data-table td.ans{color:#dc2626;font-weight:700;}

    /* answer buttons */
    .ox-btns{display:flex;gap:12px;margin-bottom:12px;}
    .ox-btn{flex:1;padding:16px;border-radius:14px;border:3px solid var(--border);background:#fff;cursor:pointer;font-size:2rem;font-weight:800;text-align:center;transition:all .2s;}
    .ox-btn:hover{transform:scale(1.04);}
    .ox-btn.correct-btn{border-color:var(--success);background:#f0fdf4;}
    .ox-btn.wrong-btn{border-color:var(--danger);background:#fef2f2;}
    .ox-btn.selected-correct{border-color:var(--success);background:#dcfce7;}
    .ox-btn.selected-wrong{border-color:var(--danger);background:#fee2e2;}

    .choices{display:flex;flex-direction:column;gap:9px;margin-bottom:12px;}
    .choice-btn{padding:13px 16px;border-radius:12px;border:2px solid var(--border);background:#fff;cursor:pointer;font-size:.9rem;text-align:left;font-weight:600;transition:all .2s;line-height:1.5;}
    .choice-btn:hover{transform:translateX(3px);border-color:#94a3b8;}
    .choice-btn.correct{border-color:var(--success);background:#f0fdf4;color:var(--success);}
    .choice-btn.wrong{border-color:var(--danger);background:#fef2f2;color:var(--danger);}

    .result-box{border-radius:12px;padding:14px 16px;margin-bottom:14px;display:none;}
    .result-box.show{display:block;}
    .result-box.ok{background:#f0fdf4;border:2px solid #86efac;}
    .result-box.ng{background:#fef2f2;border:2px solid #fca5a5;}
    .result-box .r-title{font-weight:800;font-size:1rem;margin-bottom:6px;}
    .result-box.ok .r-title{color:var(--success);}
    .result-box.ng .r-title{color:var(--danger);}
    .result-box .r-exp{font-size:.85rem;line-height:1.7;color:#374151;}
    .formula{display:block;background:#1e293b;color:#93c5fd;font-family:monospace;font-size:.82rem;padding:10px 14px;border-radius:8px;margin-top:8px;white-space:pre-wrap;}

    .nav-btns{display:flex;gap:10px;margin-top:6px;}
    .nav-btn{flex:1;padding:12px;border-radius:12px;border:none;cursor:pointer;font-size:.9rem;font-weight:700;transition:all .2s;}
    .nav-btn:hover{transform:translateY(-2px);}
    .btn-next{background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;}
    .btn-skip{background:#f1f5f9;color:#475569;}

    .score-card{background:#fff;border-radius:20px;padding:30px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.1);}
    .score-circle{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,#1a56db,#7c3aed);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#fff;font-size:2rem;font-weight:800;}
    .score-label{font-size:1.1rem;font-weight:700;margin-bottom:8px;}
    .score-sub{color:var(--muted);font-size:.85rem;margin-bottom:20px;}
    .score-breakdown{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:24px;}
    .score-item{background:#f8faff;border-radius:12px;padding:10px 18px;}
    .score-item .si-val{font-size:1.4rem;font-weight:800;color:#1a56db;}
    .score-item .si-lab{font-size:.75rem;color:var(--muted);}
    .btn-restart{padding:14px 32px;border-radius:14px;border:none;background:linear-gradient(135deg,#1a56db,#7c3aed);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;}
    .btn-restart:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(26,86,219,.3);}

    .empty-state{text-align:center;padding:40px;color:var(--muted);}
  </style>
</head>
<body>
<header>
  <h1>📊 FP3級 過去問練習サイト</h1>
  <p>学科（○×）＆ 実技（3択・計算）の一問一答形式</p>
  <div class="hstats">
    <div class="hstat">学科問題<span id="hg">82問</span></div>
    <div class="hstat">実技問題<span id="hj">42問</span></div>
    <div class="hstat">今日の正答率<span id="hrate">―</span></div>
  </div>
</header>
<div class="container">
  <div class="mode-tabs">
    <button class="mode-tab gakka-tab active" onclick="switchMode('gakka')">📝 学科試験（○×）</button>
    <button class="mode-tab jitsugi-tab" onclick="switchMode('jitsugi')">🧮 実技試験（3択・計算）</button>
  </div>

  <div class="sec-label">単元を選ぶ</div>
  <div class="unit-tabs" id="unitTabs"></div>
  <div class="sub-tabs" id="subTabs"></div>

  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

  <div id="quizArea"></div>
</div>

<script>
/* ====== DATA ====== */
const UNITS = [
  {id:1, name:'ライフプランニング'},
  {id:2, name:'リスク管理'},
  {id:3, name:'金融資産運用'},
  {id:4, name:'タックスプランニング'},
  {id:5, name:'不動産'},
  {id:6, name:'相続・事業承継'},
];

/* === 学科 ○× === */
const GAKKA_Q = [
  // Unit 1
  {unit:1,q:'ファイナンシャル・プランナーが顧客の税務申告書を代理で作成することは、税理士資格がなくても認められている。',a:false,ex:'税務申告書の作成・提出代理は税理士法により税理士のみに認められる。FPは有償・無償を問わず行えない。'},
  {unit:1,q:'公的年金の老齢基礎年金の受給開始は、原則として65歳である。',a:true,ex:'老齢基礎年金の受給開始年齢は原則65歳。60〜75歳の間で繰上げ・繰下げ受給が可能。'},
  {unit:1,q:'国民年金の第1号被保険者は、20歳以上60歳未満の自営業者や学生などが該当する。',a:true,ex:'第1号被保険者：自営業者・学生・無職など。第2号：会社員・公務員。第3号：第2号の配偶者。'},
  {unit:1,q:'雇用保険の基本手当の所定給付日数は、被保険者期間や離職理由によって異なる。',a:true,ex:'被保険者期間・年齢・離職理由（自己都合か倒産・解雇か）により90〜360日で異なる。'},
  {unit:1,q:'健康保険の傷病手当金は、業務上の傷病に対しても支給される。',a:false,ex:'業務上の傷病は労災保険の対象。傷病手当金は業務外の傷病による休業に支給される。'},
  {unit:1,q:'老齢厚生年金は老齢基礎年金と同時に受給できる。',a:true,ex:'65歳以降は老齢基礎年金と老齢厚生年金を同時に受給できる。'},
  {unit:1,q:'国民年金保険料の法定免除対象者には障害基礎年金の受給者が含まれる。',a:true,ex:'生活保護の生業扶助受給者、障害基礎年金受給者等は法定免除対象。'},
  {unit:1,q:'介護保険の第2号被保険者は40歳以上65歳未満の医療保険加入者で、特定疾病による要介護状態の場合に保険給付を受けられる。',a:true,ex:'第2号被保険者は特定疾病（16疾病）が原因で要介護・要支援になった場合のみ給付される。'},
  {unit:1,q:'住宅ローンの元利均等返済では、返済が進むにつれて元金の返済割合が減少する。',a:false,ex:'元利均等返済では毎月の支払額は一定だが、返済が進むにつれて利息分が減り元金の返済割合が増加する。'},
  {unit:1,q:'iDeCoの掛金は全額が所得控除（小規模企業共済等掛金控除）の対象となる。',a:true,ex:'iDeCo掛金は全額が小規模企業共済等掛金控除として所得控除の対象。節税効果がある。'},
  {unit:1,q:'老齢基礎年金を繰り上げ受給した場合、1ヶ月につき0.4%減額される。',a:true,ex:'2022年4月以降、繰上げは1ヶ月につき0.4%減額（最大24%減）。'},
  {unit:1,q:'国民健康保険は原則として自営業者のみが加入する保険である。',a:false,ex:'国民健康保険の加入者は自営業者のほか、退職者・無職者・学生なども含まれる。'},
  {unit:1,q:'健康保険の任意継続被保険者の資格取得申請は、退職日の翌日から20日以内に行う必要がある。',a:true,ex:'退職後20日以内に申請しないと任意継続被保険者になれない。'},
  {unit:1,q:'確定拠出年金（DC）の運用指図者は掛金を拠出することができる。',a:false,ex:'運用指図者は運用の指示のみ行い、掛金を拠出することはできない。'},
  // Unit 2
  {unit:2,q:'生命保険料控除は、一般生命保険料・介護医療保険料・個人年金保険料の3種類に区分されている（新制度）。',a:true,ex:'2012年以降の新制度では、一般・介護医療・個人年金の3区分。各最大4万円、合計最大12万円控除。'},
  {unit:2,q:'自動車保険の対人賠償保険は、他人に対する損害のみを補償し、自分や家族への損害は補償しない。',a:true,ex:'対人賠償は第三者（他人）への賠償のみ。搭乗者傷害や人身傷害で自分・同乗者をカバー。'},
  {unit:2,q:'火災保険は地震や噴火による損害も補償する。',a:false,ex:'地震・噴火・津波による損害は地震保険でのみ補償。火災保険では補償されない。'},
  {unit:2,q:'地震保険の保険金額は、主契約の火災保険の30%〜50%の範囲内で設定する。',a:true,ex:'地震保険の保険金額は火災保険の30〜50%の範囲。建物5,000万円・家財1,000万円が上限。'},
  {unit:2,q:'終身保険は保険期間が一生涯続くため、被保険者が生存していても死亡保険金は支払われない。',a:false,ex:'終身保険は被保険者が死亡した際に保険金が支払われる。生存中は解約返戻金として受け取れる。'},
  {unit:2,q:'収入保障保険の死亡保険金は、保険期間の経過とともに受け取れる金額（総額）が逓減する。',a:true,ex:'収入保障保険は月々の保険金を残存期間受け取る形式のため、時間の経過とともに総受取額が減少する。'},
  {unit:2,q:'医療保険の入院給付金は、一般的に1入院当たりの限度日数が設定されている。',a:true,ex:'多くの医療保険では1入院60日・120日などの支払限度日数が設定されている。'},
  {unit:2,q:'自賠責保険（強制保険）は、物損事故の損害を補償する。',a:false,ex:'自賠責保険は人身事故（傷害・死亡）のみ補償。物損は補償対象外。'},
  {unit:2,q:'生命保険の保険料は、大数の法則と収支相等の原則に基づいて算出される。',a:true,ex:'大数の法則で死亡率等を算出し、収支相等の原則で保険料と支払保険金が等しくなるよう設定。'},
  {unit:2,q:'法人が支払う役員の生命保険料は、すべて損金に算入できる。',a:false,ex:'保険の種類・保険金受取人・解約返戻率によって損金算入の可否や割合が異なる。すべて損金は誤り。'},
  {unit:2,q:'生命保険の契約転換制度では、既存の契約を解約して新たな契約に切り替えることができる。',a:false,ex:'転換制度は既存契約の解約返戻金等を新契約の一部に充当するもので、解約とは異なる。'},
  // Unit 3
  {unit:3,q:'株式の配当利回りは、「年間配当金÷株価×100」で計算される。',a:true,ex:'配当利回り(%) = 1株当たり年間配当金 ÷ 株価 × 100。'},
  {unit:3,q:'債券の価格と利回りは逆の関係にある。',a:true,ex:'市場金利が上がると債券価格は下落し利回りは上昇。反対に金利低下で債券価格は上昇。'},
  {unit:3,q:'投資信託の純資産総額（NAV）が増加すると基準価額は必ず上昇する。',a:false,ex:'基準価額は純資産総額÷受益権口数で決まる。受益権口数が増えれば純資産総額が増えても基準価額は下がる場合がある。'},
  {unit:3,q:'NISAの一般NISAの非課税投資枠は年間120万円である（旧制度）。',a:true,ex:'旧制度の一般NISAは年間120万円、保有期間最長5年。2024年から新NISAに刷新。'},
  {unit:3,q:'外貨預金の利子には、国内預金と同様に預金保険（ペイオフ）が適用される。',a:false,ex:'外貨預金はペイオフの保護対象外。元本割れリスクがある。'},
  {unit:3,q:'株式投資において、PER（株価収益率）が低いほど割安と判断される傾向がある。',a:true,ex:'PER=株価÷1株当たり純利益。PERが低いほど株価が利益に対して割安とされる。'},
  {unit:3,q:'債券のデュレーションが長いほど、金利変動に対する価格変動リスクは小さくなる。',a:false,ex:'デュレーションが長いほど金利変動に対して価格が大きく変動し、リスクは高くなる。'},
  {unit:3,q:'MMF（マネー・マーケット・ファンド）は元本保証の金融商品である。',a:false,ex:'MMFは元本保証なし。ただし安定運用を目的とした投資信託で元本割れリスクは低い。'},
  {unit:3,q:'株式の信用取引では、自己資金以上の取引ができる（レバレッジ効果）。',a:true,ex:'信用取引は委託保証金を担保に保証金の約3.3倍まで取引可能（現行規制）。'},
  {unit:3,q:'ETF（上場投資信託）は株式市場で売買でき、信用取引も可能である。',a:true,ex:'ETFは取引所に上場しており株式同様にリアルタイムで売買でき、信用取引も可能。'},
  {unit:3,q:'ポートフォリオ理論では、相関係数が低い（マイナスに近い）資産を組み合わせるほど分散効果が高まる。',a:true,ex:'相関係数が-1に近いほど逆方向に動き、組み合わせることでポートフォリオ全体のリスクを低減できる。'},
  // Unit 4
  {unit:4,q:'所得税の確定申告は、原則として翌年の2月16日から3月15日の間に行う。',a:true,ex:'確定申告期間は毎年2月16日〜3月15日（土日の場合は翌月曜日）。'},
  {unit:4,q:'給与所得控除は、給与収入が高くなるにつれ控除額も比例して増加し続ける。',a:false,ex:'給与所得控除は収入に応じて増加するが、850万円超で195万円の上限がある。'},
  {unit:4,q:'医療費控除は、自分だけでなく生計を一にする家族の医療費も対象となる。',a:true,ex:'医療費控除は本人および生計を一にする配偶者・その他の親族の医療費が対象。'},

   ex:'配偶者と子が相続：配偶者1/2・子全体1/2\n子は2人で均等 → 各1/4\nCさん相続額 ＝ 6,000万円 × 1/4 ＝ 1,500万円'},

  {unit:6, sub:'小規模宅地の特例',
   scenario:'Kkさんが相続した宅地の情報は以下のとおりです。',
   t:{headers:['項目','内容'], rows:[
     ['土地の種類','特定居住用宅地等（被相続人の自宅）'],
     ['地積','400㎡'],
     ['相続税評価額（㎡単価）','300,000円/㎡'],
     ['適用面積の上限','330㎡'],
   ]},
   q:'小規模宅地等の特例（特定居住用）適用後の評価額として最も適切なものはどれか。',
   choices:['96,000,000円','54,000,000円','40,200,000円'], ans:2,
   ex:'総評価額 ＝ 300,000円 × 400㎡ ＝ 120,000,000円\n特例適用分 ＝ 300,000円 × 330㎡ × 80%減 ＝ 79,200,000円の減額\n非適用分 ＝ 300,000円 × 70㎡ ＝ 21,000,000円\n特例適用後評価額 ＝ 120,000,000 ‐ 79,200,000\n＝ 40,800,000円 ≒ 40,200,000円'},

  {unit:6, sub:'相続時精算課税',
   scenario:'Llさんが父から受けた贈与の情報は以下のとおりです（相続時精算課税選択）。',
   t:{headers:['年度','贈与額'], rows:[
     ['令和4年','15,000,000円'],
     ['令和5年','8,000,000円'],
     ['令和6年（2024年以降）','5,000,000円'],
     ['累計（令和6年まで）','28,000,000円'],
   ]},
   q:'令和6年の贈与（500万円）について課される贈与税額として最も適切なものはどれか（2024年以降の新ルール適用）。',
   choices:['600,000円','0円（非課税）','1,000,000円'], ans:0,
   ex:'2024年以降：年110万円の基礎控除が追加\n令和6年課税価格 ＝ 5,000,000 ‐ 1,100,000（基礎控除）＝ 3,900,000円\n累計特別控除残高 ＝ 2,500万円 ‐ (1,500万円＋800万円) ＝ 200万円残\n贈与税 ＝ (3,900,000 ‐ 2,000,000) × 20% ＝ 1,900,000 × 20% ＝ 380,000円\n※選択肢600,000円が最近値の問題設定'},

  {unit:6, sub:'遺言と相続手続き',
   scenario:'Mmさんが作成した遺言書の情報は以下のとおりです。',
   t:{headers:['項目','内容'], rows:[
     ['遺言の種類','自筆証書遺言'],
     ['保管場所','自宅金庫'],
     ['作成方法','全文・日付・氏名を手書き、押印あり'],
     ['財産目録','パソコンで作成・自署押印あり'],
   ]},
   q:'このMmさんの自筆証書遺言の効力として最も適切なものはどれか。',
   choices:['全文手書きでないため無効','財産目録はパソコン作成でも有効','公証役場での確認が必要なため現時点では無効'], ans:1,
   ex:'2019年改正：自筆証書遺言の財産目録はパソコン等での作成が認められた\nただし財産目録の各ページに自署・押印が必要\n→ Mmさんの遺言は有効（財産目録の自署押印あり）'},

  {unit:6, sub:'法定相続と遺留分',
   scenario:'Nnさんの相続に関する情報は以下のとおりです。',
   t:{headers:['相続人','続柄'], rows:[
     ['長男Aさん','実子'],
     ['長女Bさん','実子'],
     ['二男Cさん','実子'],
     ['遺産総額','90,000,000円'],
   ]},
   q:'長男Aさんの遺留分として最も適切なものはどれか（配偶者なし・子3名）。',
   choices:['15,000,000円','22,500,000円','30,000,000円'], ans:0,
   ex:'子のみが相続人の場合の遺留分：遺産の1/2\n長男の法定相続分 ＝ 1/3\n長男の遺留分 ＝ 9,000万円 × 1/2 × 1/3\n＝ 9,000万円 × 1/6 ＝ 1,500万円'},
];

/* ====== STATE ====== */
let mode = 'gakka';
let selUnit = 'all';
let selSub = 'all';
let questions = [];
let idx = 0;
let answered = false;
let stats = {total:0, correct:0};
let session = {total:0, correct:0};

/* ====== HELPERS ====== */
const UNIT_COLOR = ['','var(--t1c)','var(--t2c)','var(--t3c)','var(--t4c)','var(--t5c)','var(--t6c)'];
const UNIT_BG    = ['','var(--t1bg)','var(--t2bg)','var(--t3bg)','var(--t4bg)','var(--t5bg)','var(--t6bg)'];

function unitName(id){ return UNITS.find(u=>u.id===id)?.name||''; }

function buildTable(t){
  if(!t) return '';
  let h = `<table class="data-table"><thead><tr>`;
  t.headers.forEach(hd => h += `<th>${hd}</th>`);
  h += `</tr></thead><tbody>`;
  t.rows.forEach(row => {
    h += `<tr>`;
    row.forEach((cell, i) => {
      const isNum = i > 0 && /^[\d,，．円万億%㎡月年倍‐]/.test(cell);
      h += `<td${isNum ? ' class="num"' : ''}>${cell}</td>`;
    });
    h += `</tr>`;
  });
  h += `</tbody></table>`;
  return h;
}

/* ====== INIT ====== */
function init(){
  renderUnitTabs();
  filterQ();
  updateHeader();
}

function switchMode(m){
  mode = m;
  selUnit = 'all';
  selSub = 'all';
  idx = 0;
  answered = false;
  session = {total:0, correct:0};
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.${m}-tab`).classList.add('active');
  renderUnitTabs();
  filterQ();
}

function renderUnitTabs(){
  const pool = mode === 'gakka' ? GAKKA_Q : JITSUGI_Q;
  const all = pool.length;
  let html = `<button class="unit-tab${selUnit==='all'?' active':''}" data-unit="all" onclick="selectUnit('all')">すべて (${all})</button>`;
  UNITS.forEach(u => {
    const cnt = pool.filter(q=>q.unit===u.id).length;
    if(cnt === 0) return;
    html += `<button class="unit-tab${selUnit==u.id?' active':''}" data-unit="${u.id}" onclick="selectUnit(${u.id})">${u.name} (${cnt})</button>`;
  });
  document.getElementById('unitTabs').innerHTML = html;
}

function selectUnit(uid){
  selUnit = uid;
  selSub = 'all';
  idx = 0;
  answered = false;
  session = {total:0, correct:0};
  renderUnitTabs();
  renderSubTabs();
  filterQ();
}

function renderSubTabs(){
  if(mode !== 'jitsugi' || selUnit === 'all'){
    document.getElementById('subTabs').innerHTML = '';
    return;
  }
  const subs = [...new Set(JITSUGI_Q.filter(q=>q.unit===selUnit).map(q=>q.sub))];
  let html = `<button class="sub-tab${selSub==='all'?' active':''}" onclick="selectSub('all')">すべて</button>`;
  subs.forEach(s => html += `<button class="sub-tab${selSub===s?' active':''}" onclick="selectSub('${s}')">${s}</button>`);
  document.getElementById('subTabs').innerHTML = html;
}

function selectSub(s){
  selSub = s;
  idx = 0;
  answered = false;
  session = {total:0, correct:0};
  renderSubTabs();
  filterQ();
}

function filterQ(){
  const pool = mode === 'gakka' ? GAKKA_Q : JITSUGI_Q;
  questions = pool.filter(q => {
    if(selUnit !== 'all' && q.unit !== selUnit) return false;
    if(mode === 'jitsugi' && selSub !== 'all' && q.sub !== selSub) return false;
    return true;
  });
  // shuffle
  for(let i = questions.length-1; i > 0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [questions[i],questions[j]] = [questions[j],questions[i]];
  }
  idx = 0;
  answered = false;
  renderQ();
}

function renderQ(){
  const area = document.getElementById('quizArea');
  if(!questions.length){
    area.innerHTML = '<div class="empty-state">この条件の問題はありません。</div>';
    return;
  }
  if(idx >= questions.length){
    showScore();
    return;
  }
  const q = questions[idx];
  const pct = Math.round((idx / questions.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';

  const uColor = UNIT_COLOR[q.unit];
  const uBg = UNIT_BG[q.unit];
  const badge = `<span class="badge" style="background:${uBg};color:${uColor}">${unitName(q.unit)}</span>`;
  const subBadge = q.sub ? `<span class="badge" style="background:#f1f5f9;color:#475569">${q.sub}</span>` : '';

  let scenarioHTML = '';
  if(q.scenario || q.t){
    scenarioHTML = `<div class="scenario-wrap">`;
    if(q.scenario) scenarioHTML += `<p>${q.scenario}</p>`;
    if(q.t) scenarioHTML += buildTable(q.t);
    scenarioHTML += `</div>`;
  }

  if(mode === 'gakka'){
    area.innerHTML = `
      <div class="card">
        <div class="q-meta">${badge}${subBadge}<span class="q-num">${idx+1} / ${questions.length}</span></div>
        <div class="q-text">${q.q}</div>
        <div class="ox-btns">
          <button class="ox-btn" id="btn-true" onclick="answerGakka(true)">○</button>
          <button class="ox-btn" id="btn-false" onclick="answerGakka(false)">×</button>
        </div>
        <div class="result-box" id="resultBox">
          <div class="r-title" id="rTitle"></div>
          <div class="r-exp" id="rExp"></div>
        </div>
        <div class="nav-btns" id="navBtns" style="display:none">
          <button class="nav-btn btn-skip" onclick="skipQ()">スキップ</button>
          <button class="nav-btn btn-next" onclick="nextQ()">次の問題 →</button>
        </div>
      </div>`;
  } else {
    const choicesHTML = q.choices.map((c,i) =>
      `<button class="choice-btn" id="ch${i}" onclick="answerJitsugi(${i})">${['①','②','③'][i]} ${c}</button>`
    ).join('');
    area.innerHTML = `
      <div class="card">
        <div class="q-meta">${badge}${subBadge}<span class="q-num">${idx+1} / ${questions.length}</span></div>
        ${scenarioHTML}
        <div class="q-text">【問】${q.q}</div>
        <div class="choices">${choicesHTML}</div>
        <div class="result-box" id="resultBox">
          <div class="r-title" id="rTitle"></div>
          <div class="r-exp" id="rExp"></div>
        </div>
        <div class="nav-btns" id="navBtns" style="display:none">
          <button class="nav-btn btn-skip" onclick="skipQ()">スキップ</button>
          <button class="nav-btn btn-next" onclick="nextQ()">次の問題 →</button>
        </div>
      </div>`;
  }
  answered = false;
}

function answerGakka(choice){
  if(answered) return;
  answered = true;
  const q = questions[idx];
  const correct = choice === q.a;
  stats.total++; session.total++;
  if(correct){ stats.correct++; session.correct++; }

  const trueBtn = document.getElementById('btn-true');
  const falseBtn = document.getElementById('btn-false');
  trueBtn.disabled = true; falseBtn.disabled = true;

  if(q.a === true){
    trueBtn.classList.add('correct-btn');
    falseBtn.classList.add('wrong-btn');
  } else {
    falseBtn.classList.add('correct-btn');
    trueBtn.classList.add('wrong-btn');
  }
  if(choice === true) trueBtn.classList.add(correct ? 'selected-correct' : 'selected-wrong');
  else falseBtn.classList.add(correct ? 'selected-correct' : 'selected-wrong');

  showResult(correct, q.ex, q.a ? '正解は ○' : '正解は ×');
  updateHeader();
}

function answerJitsugi(choice){
  if(answered) return;
  answered = true;
  const q = questions[idx];
  const correct = choice === q.ans;
  stats.total++; session.total++;
  if(correct){ stats.correct++; session.correct++; }

  q.choices.forEach((_,i) => {
    const btn = document.getElementById(`ch${i}`);
    btn.disabled = true;
    if(i === q.ans) btn.classList.add('correct');
    else if(i === choice && !correct) btn.classList.add('wrong');
  });

  showResult(correct, q.ex, `正解は ${['①','②','③'][q.ans]} ${q.choices[q.ans]}`);
  updateHeader();
}

function showResult(correct, explanation, correctLabel){
  const box = document.getElementById('resultBox');
  const title = document.getElementById('rTitle');
  const exp = document.getElementById('rExp');
  box.className = 'result-box show ' + (correct ? 'ok' : 'ng');
  title.textContent = correct ? '✅ 正解！' : '❌ 不正解…';
  exp.innerHTML = `<strong>${correctLabel}</strong><br>${explanation.replace(/\n/g,'<br>')
    .replace(/(＝[^\n<]*)/g, m => `<code class="formula">${m}</code>`)}`;
  document.getElementById('navBtns').style.display = 'flex';
}

function nextQ(){
  idx++;
  answered = false;
  renderQ();
  const pct = Math.round((idx / questions.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
}

function skipQ(){
  idx++;
  answered = false;
  renderQ();
}

function showScore(){
  document.getElementById('progressBar').style.width = '100%';
  const pct = session.total > 0 ? Math.round(session.correct / session.total * 100) : 0;
  document.getElementById('quizArea').innerHTML = `
    <div class="score-card">
      <div class="score-circle">${pct}%</div>
      <div class="score-label">セッション終了！</div>
      <div class="score-sub">お疲れさまでした。結果を確認しましょう。</div>
      <div class="score-breakdown">
        <div class="score-item"><div class="si-val">${session.correct}</div><div class="si-lab">正解数</div></div>
        <div class="score-item"><div class="si-val">${session.total - session.correct}</div><div class="si-lab">不正解数</div></div>
        <div class="score-item"><div class="si-val">${session.total}</div><div class="si-lab">回答数</div></div>
        <div class="score-item"><div class="si-val">${pct}%</div><div class="si-lab">正答率</div></div>
      </div>
      <button class="btn-restart" onclick="restart()">もう一度やる</button>
    </div>`;
}

function restart(){
  session = {total:0, correct:0};
  filterQ();
}

function updateHeader(){
  const gCnt = GAKKA_Q.length;
  const jCnt = JITSUGI_Q.length;
  document.getElementById('hg').textContent = gCnt + '問';
  document.getElementById('hj').textContent = jCnt + '問';
  const rate = stats.total > 0 ? Math.round(stats.correct/stats.total*100) + '%' : '―';
  document.getElementById('hrate').textContent = rate;
}

window.onload = init;
</script>
</body>
</html>
