kaisetsu": "答え：0（に制限はない）\n\n【解説】\nがん保険の入院給付金は、一般的に支払日数に制限がありません（無制限）。通常の医療保険は1回の入院で60日～120日の制限がありますが、がん保険は「がんの治療」というリスクの大きさから、より手厚い保障になっています。覚えておこう：がん保険は特別な保障です。"}, {"num": 41, "type": "multi", "text": "景気動向指数において、完全失業率は、（ ）に採用されている。", "choices": ["先行系列", "一致系列", "遅行系列"], "answer": 2, "kaisetsu": "答え：2（遅行系列）\n\n【解説】\n景気動向指数の「完全失業率」は遅行系列に含まれます。景気が悪くなった後、失業率が上がるため「遅れて」反応するためです。\n- 先行系列 = 景気に先立つ指標（鉱工業生産指数など）\n- 一致系列 = 同時に動く（鉱工業生産）\n- 遅行系列 = 後から反応（失業率、金融機関貸出）\n景気判断には3つを組み合わせて使います。"}, {"num": 42, "type": "multi", "text": "追加型株式投資信託を基準価額１万200円（１万口当たり）で１万口購入した後、最 初の決算時に１万口当たり700円の収益分配金が支払われ、分配落ち後の基準価額が １万円（１万口当たり）となった場合、その収益分配金のうち、普通分配金は（ ① ） であり、元本払戻金（特別分配金）は（ ② ）である。", "choices": ["① 200円 ② 500円", "① 500円 ② 200円", "① 700円 ② 200円"], "answer": 1, "kaisetsu": "答え：1（①500円 ②200円）\n\n【計算確認】\n購入時：10,200円（万口あたり）\n分配金：700円\n分配落ち後基準価額：10,000円\n→ 実質的な値下がりは200円\n分配金700円のうち、700 - 200 = 500円が利益（普通分配金）、残る200円が元本払戻（特別分配金）。普通分配金は課税、特別分配金は非課税です。"}, {"num": 43, "type": "multi", "text": "表面利率（クーポンレート）４％、残存期間５年の固定利付債券を額面100円当たり 104円で購入した場合の最終利回り（年率・単利）は、（ ）である。なお、税金 等は考慮しないものとし、計算結果は表示単位の小数点以下第３位を四捨五入してい る。", "choices": ["3.08％", "3.20％", "3.33％"], "answer": 0, "kaisetsu": "答え：0（3.08％）\n\n【計算確認】\n表面利率4% × 100 × 5年間 = 20円の利息\n売却益（または償却額）: 100 - 104 = -4円\n実質利息：20 - 4 = 16円\n年間平均：16 ÷ 5 = 3.2円 → 実際には以下のとおり：\n最終利回り = (クーポン + (額面 - 購入価格) ÷ 残存年数) ÷ 購入価格\n= (4 + (100 - 104) ÷ 5) ÷ 104\n= (4 - 0.8) ÷ 104 = 3.2 ÷ 104 ≒ 3.08％\n"}, {"num": 44, "type": "multi", "text": "株式の投資指標のうち、（ ）は、株価を１株当たり当期純利益で除して算出さ れる。", "choices": ["ＰＢＲ", "ＰＥＲ", "ＢＰＳ"], "answer": 1, "kaisetsu": "答え：1（PER）\n\n【解説】\n- PER（株価収益率）= 株価 ÷ 1株あたり当期純利益\n- PBR（株価簿価倍率）= 株価 ÷ 1株あたり純資産（簿価）\n- BPS = 1株あたり純資産（本体）\nPERは企業の収益性を見る指標で、割安株を探すのに使われます。覚えておこう：PER = 値頃感をはかる指標。"}, {"num": 45, "type": "multi", "text": "異なる２資産からなるポートフォリオにおいて、２資産間の相関係数が（ ） である場合、分散投資によるリスクの低減効果は最大となる。", "choices": ["＋１", "０", "－１"], "answer": 2, "kaisetsu": "答え：2（-1）\n\n【解説】\n2資産間の相関係数が-1（完全負の相関）の場合、2つの資産が逆方向に動くため、ポートフォリオの価格変動がキャンセルされます。これが分散投資のリスク低減効果を最大化します。相関係数0でも分散効果がありますが、-1のときが最大です。覚えておこう：負の相関こそ理想の分散投資。"}, {"num": 46, "type": "multi", "text": "所得税において、病気で入院したことにより医療保険の被保険者が受け取った入院 給付金は、（ ）とされる。", "choices": ["非課税所得", "一時所得", "雑所得"], "answer": 0, "kaisetsu": "答え：0（非課税所得）\n\n【解説】\n医療保険から受け取った入院給付金は非課税所得です。これは給付金が「損害補填」の性質を持つため、所得としてカウントされません。一方、高額療養費や健康保険の給付金も同じく非課税です。覚えておこう：保険の給付金 = 多くの場合非課税。"}, {"num": 47, "type": "multi", "text": "所得税において、為替予約を締結していない外貨定期預金を満期時に円貨で払い戻 した結果生じた為替差益は、（ ）として総合課税の対象となる。", "choices": ["利子所得", "一時所得", "雑所得"], "answer": 2, "kaisetsu": "答え：2（雑所得）\n\n【解説】\n外貨定期預金の為替差益は「雑所得」として総合課税されます。利子所得や配当所得ではなく、雑所得です。為替差損が出た場合も雑所得に計上されます。ただし、為替予約を締結していない場合の説明なので注意してください。"}, {"num": 48, "type": "multi", "text": "日本国内において支払を受ける預貯金の利子は、原則として、所得税および復興特 別所得税と住民税の合計で（ ① ）の税率による（ ② ）分離課税の対象となる。", "choices": ["① 10.21％ ② 申告", "① 20.315％ ② 申告", "① 20.315％ ② 源泉"], "answer": 2, "kaisetsu": "答え：2（①20.315％ ②源泉）\n\n【解説】\n預貯金利子は「源泉分離課税」で、所得税15％+復興特別所得税0.315％+住民税5％＝20.315％が自動的に引かれます。申告は不要（ただし選択可能な場合もあります）。この税率は上場株式配当の申告分離課税と同じ20.315％です。"}, {"num": 49, "type": "multi", "text": "所得税において、納税者の合計所得金額が2,400万円以下である場合、基礎控除の 控除額は、（ ）である。", "choices": ["38万円", "48万円", "63万円"], "answer": 1, "kaisetsu": "答え：1（48万円）\n\n【解説】\n基礎控除は合計所得金額で決まります。\n- 2,400万円以下：48万円\n- 2,400万円超2,450万円以下：32万円\n- 2,450万円超2,500万円以下：16万円\n- 2,500万円超：0円\n2024年（令和6年）からこの控除額が適用されます。覚えておこう：基礎控除は所得で段階的に減少。"}, {"num": 50, "type": "multi", "text": "年末調整の対象となる給与所得者は、所定の手続により、年末調整で所得税の （ ）の適用を受けることができる。", "choices": ["雑損控除", "寄附金控除", "小規模企業共済等掛金控除"], "answer": 2, "kaisetsu": "答え：2（小規模企業共済等掛金控除）\n\n【解説】\n年末調整で受けられる控除：\n- ○ 小規模企業共済等掛金控除\n- ○ 生命保険料控除\n- ○ 地震保険料控除\n- ○ 扶養控除、配偶者控除など\n- × 雑損控除（年末調整の対象外）\n- × 寄附金控除（原則として年末調整の対象外）\n給与所得者は年末調整で多くの控除が適用されるため、確定申告が不要な場合が多いです。"}, {"num": 51, "type": "multi", "text": "宅地に係る固定資産税評価額は、原則として、（ ① ）ごとの基準年度において 評価替えが行われ、前年の地価公示法による公示価格等の（ ② ）を目途として評 定される。", "choices": ["① ３年 ② 70％", "① ３年 ② 80％", "① ５年 ② 80％"], "answer": 0, "kaisetsu": "答え：0（①3年 ②70％）\n\n【解説】\n固定資産税評価額の基準年度は「3年ごと」に評価替えされます。前年の地価公示価格の「70％を目途」として評定されます。これにより固定資産税が計算されるため、実売価格より低めになっています。覚えておこう：評価替え＝3年、目安＝70％。"}, {"num": 52, "type": "multi", "text": "都市計画法によれば、市街化調整区域は、（ ）とされている。", "choices": ["既に市街地を形成している区域", "市街化を抑制すべき区域", "優先的かつ計画的に市街化を図るべき区域"], "answer": 1, "kaisetsu": "答え：1（市街化を抑制すべき区域）\n\n【解説】\n都市計画の区分：\n- 市街化区域 = 優先的かつ計画的に市街化を図るべき区域\n- 市街化調整区域 = 市街化を抑制すべき区域\n農地は多くの場合、市街化調整区域に指定され、開発が制限されます。この制限のおかげで、無秩序な開発が防がれています。"}, {"num": 53, "type": "multi", "text": "都市計画区域内にある幅員４ｍ未満の道で、建築基準法第42条第２項により道路と みなされるものについては、原則として、その中心線からの水平距離で（ ① ）後 退した線がその道路の境界線とみなされ、当該境界線と道路の間の敷地部分は建蔽率 や容積率を算定する際の敷地面積に算入（ ② ）。", "choices": ["① ２ｍ ② することができる", "① ２ｍ ② することができない", "① ４ｍ ② することができない"], "answer": 1, "kaisetsu": "答え：1（①2m ②することができない）\n\n【解説】\n建築基準法42条2項の道路（四号道路）について、幅員4m未満の道は「中心線から2m後退したラインが道路の境界」とみなされます。その後退部分は「容積率・建蔽率計算の敷地面積に算入されません」。これは隠された制限で、一見すると敷地面積より実際の使える面積が小さくなるため、重要です。"}, {"num": 54, "type": "multi", "text": "農地法によれば、農地を農地以外のものに転用する場合、原則として、（ ① ）の 許可を受けなければならないが、市街化区域内にある農地を農地以外のものに転用す る場合、あらかじめ当該転用に係る届出書を（ ② ）に提出すれば、（ ① ）の許 可を受ける必要はない。", "choices": ["① 農林水産大臣 ② 都道府県知事等", "① 農林水産大臣 ② 農業委員会", "① 都道府県知事等 ② 農業委員会"], "answer": 2, "kaisetsu": "答え：2（①都道府県知事等 ②農業委員会）\n\n【解説】\n農地転用許可：\n- 原則：都道府県知事等の許可が必要\n- 例外（市街化区域）：届出だけで足りる（農業委員会へ）\nこの例外により、市街化区域内の農地は比較的転用しやすくなっています。逆に市街化調整区域は許可が厳しいです。"}, {"num": 55, "type": "multi", "text": "所得税額の計算において、個人が土地を譲渡したことによる譲渡所得が長期譲渡所 得に区分されるためには、土地を譲渡した年の１月１日における所有期間が（ ） を超えていなければならない。", "choices": ["５年", "10年", "20年"], "answer": 0, "kaisetsu": "答え：0（5年）\n\n【解説】\n譲渡所得の長短判定：\n- 長期譲渡所得：譲渡した年の1月1日時点で5年を超えて所有\n- 短期譲渡所得：5年以下\n税率が大きく異なるため（短期：39.63%、長期：20.315%）、タイミングが重要です。覚えておこう：「5年ルール」は不動産投資の重要な判断基準。"}, {"num": 56, "type": "multi", "text": "贈与税の申告書は、原則として、贈与を受けた年の翌年の（ ① ）から３月15日 までの間に、（ ② ）の住所地を所轄する税務署長に提出しなければならない。", "choices": ["① ２月１日 ② 受贈者", "① ２月１日 ② 贈与者", "① ２月16日 ② 贈与者"], "answer": 0, "kaisetsu": "答え：0（①2月1日 ②受贈者）\n\n【解説】\n贈与税申告の期限：\n- 申告期限：贈与を受けた年の翌年2月1日～3月15日\n- 提出先：受贈者（もらった人）の住所地の税務署\n相続税申告が被相続人の住所地であるのに対し、贈与税は受贈者の住所地であることに注意。"}, {"num": 57, "type": "multi", "text": "贈与税の配偶者控除は、婚姻期間が（ ① ）以上である配偶者から居住用不動産 または居住用不動産を取得するための金銭の贈与を受け、所定の要件を満たす場合、 贈与税の課税価格から基礎控除額のほかに最高で（ ② ）を控除することができる 特例である。", "choices": ["① 10年 ② 2,000万円", "① 20年 ② 2,000万円", "① 20年 ② 2,500万円"], "answer": 1, "kaisetsu": "答え：1（①20年 ②2,000万円）\n\n【解説】\n配偶者控除の要件：\n- 婚姻期間「20年以上」\n- 居住用不動産または取得資金の贈与\n- 控除額：最高「2,000万円」\n基礎控除110万円+配偶者控除2,000万円＝最大2,110万円の非課税贈与が可能です。夫婦間の資産移転で最も利用される制度です。"}, {"num": 58, "type": "multi", "text": "下記の〈親族関係図〉において、Ａさんの相続における妻Ｂさんの法定相続分は、 （ ）である。なお、Ａさんの父母は、Ａさんの相続開始前に死亡している。 〈親族関係図〉 父 母 （既に死亡） （既に死亡） 姉Ｃさん 兄Ｄさん Ａさん 妻Ｂさん （被相続人）", "choices": ["２分の１", "３分の２", "４分の３"], "answer": 2, "kaisetsu": "答え：2（4分の3）\n\n【解説】\n親族関係図では、Aの相続人は妻Bと兄弟姉妹C・D。\nAの親は既に死亡しているため、法定相続順位は：\n1. 配偶者 = 常に相続人\n2. 兄弟姉妹 = 親が不在のため相続人\n配偶者と兄弟姉妹の相続分：配偶者3/4、兄弟姉妹1/4。妻Bの相続分は4分の3です。"}, {"num": 59, "type": "multi", "text": "相続税額の計算上、死亡退職金の非課税金額の規定による非課税限度額は、 「（ ）×法定相続人の数」の算式により算出される。", "choices": ["500万円", "600万円", "1,000万円"], "answer": 0, "kaisetsu": "答え：0（500万円）\n\n【解説】\n死亡退職金の非課税限度額：\n= 500万円 × 法定相続人の数\n例えば法定相続人が3人なら、最大1,500万円まで非課税になります。これは故人の退職金を遺族保護の観点から優遇する制度です。"}, {"num": 60, "type": "multi", "text": "2024年１月10日（水）に死亡したＡさんが所有していた上場株式Ｘを、相続人が相 続により取得した場合の１株当たりの相続税評価額は、下記の〈資料〉によれば、（ ） である。 〈資料〉上場株式Ｘの価格 2023年11月の毎日の最終価格の月平均額 1,480円 2023年12月の毎日の最終価格の月平均額 1,490円 2024年１月の毎日の最終価格の月平均額 1,500円 2024年１月10日（水）の最終価格 1,490円", "choices": ["1,480円", "1,490円", "1,500円 （終）"], "answer": 0, "kaisetsu": "答え：0（1,480円）\n\n【解説】\n相続税評価の基準日はAさんの死亡日（2024年1月10日）です。評価額は以下の4つの価格のうち最も低い額：\n1. 2023年11月の月平均：1,480円\n2. 2023年12月の月平均：1,490円\n3. 2024年1月の月平均：1,500円\n4. 2024年1月10日の最終価格：1,490円\nこのうち最低は1,480円なので、評価額は1,480円です。相続税評価は「一番低いルール」で計算されます。"}]}, {"id": "202405", "label": "2024年5月", "questions": [{"num": 1, "type": "ox", "text": "ファイナンシャル・プランナーは、職業倫理上、顧客情報に関する守秘義務を厳守し なければならない。", "choices": [], "answer": true, "kaisetsu": "【正解】○ ここがポイント！ファイナンシャル・プランナーは法律で守秘義務を課されており、これは職業倫理の根幹です。顧客から聞いた家計情報、資産状況、借金の有無、保険加入状況、相続の問題など、一切を外部に漏らしてはいけません。弁護士や公認会計士と同じレベルの厳格な基準が適用されます。たとえ親しい人からの質問でも、「顧客の秘密です」と返答する義務があります。個人情報保護法との二重の法的義務があります。顧客の信頼があってこそ、FPは本当の情報を聞くことができるのです。"}, {"num": 2, "type": "ox", "text": "正当な理由がなく自己の都合により退職した者に対する雇用保険の基本手当は、待期 期間の満了後４カ月間は支給されない。", "choices": [], "answer": false, "kaisetsu": "【正解】× 覚えておこう。自己都合離職（自分の都合で退職）の場合の流れは以下の通り：①待期期間7日間→②給付制限3ヶ月間→③その後から支給開始。つまり、約4ヶ月後から支給が始まります。問題文は「4ヶ月間は支給されない」と書いていますが、実際には『3ヶ月の給付制限』が正確な説明です。特定受給資格者（会社都合）は給付制限がなく、7日後から支給されます。待期期間と給付制限の違いをしっかり区別することが重要。"}, {"num": 3, "type": "ox", "text": "国民年金の第１号被保険者とは、日本国内に住所を有する20歳以上65歳未満の者であっ て、国民年金の第２号被保険者および第３号被保険者のいずれにも該当しない者をいう。", "choices": [], "answer": false, "kaisetsu": "【正解】× 混乱しやすいけど…第１号被保険者は『日本国内に住所を有する20歳以上60歳未満』です。問題では『65歳未満』と書かれていますが、これが誤りです。60歳で自動的に第１号被保険者ではなくなり、第２号被保険者の資格も喪失します。65歳からは公的年金受給者になり、国民年金の保険料は払いません。重要な年齢ラインは『20歳・60歳・65歳』です。これを正確に覚えることが国年の基本。"}, {"num": 4, "type": "ox", "text": "国民年金の第２号被保険者である公務員が確定拠出年金の個人型年金に加入する場合、 掛金の拠出限度額は年額14万4,000円である。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 覚えておこう。公務員（第２号被保険者）がiDeCo（個人型確定拠出年金）に加入する場合、年間の掛金拠出限度額は『14万4,000円』です。会社員も同じ金額が上限になります。一方、自営業者の第１号被保険者は『27万6,000円』と約2倍の上限があります。この差は『既に厚生年金がある』ため調整されているからです。正確な金額暗記が試験対策には必須です。"}, {"num": 5, "type": "ox", "text": "国民年金基金の給付には、老齢年金と遺族一時金がある。", "choices": [], "answer": true, "kaisetsu": "【正解】○ ここがポイント！国民年金基金の給付には『老齢年金』と『遺族一時金』の2つがあります。「一時金」という言葉に注意してください。基金から年金を受取っていた人が死亡した際、遺族は『一時金（永続的ではなく単発）』を受け取ります。これは公的年金の補完制度として機能し、自営業者が厚生年金の代わりに加入するものです。給付内容の正確な理解が大切。"}, {"num": 6, "type": "ox", "text": "払済保険とは、一般に、現在契約している生命保険の保険料の払込みを中止し、その 時点での解約返戻金相当額を基に、元の契約の保険金額を変えずに一時払いの定期保険 に変更する制度である。", "choices": [], "answer": false, "kaisetsu": "【正解】× 混乱しやすいけど…払済保険の仕組みは『保険料の払込中止→解約返戻金で定期保険に変更→保険金額は必ず減少』というものです。問題では「保険金額を変えずに」と書かれていますが、実際には保険金額は減少してしまいます。払済保険=保障削減のトレードオフです。例えば月5,000円払っていた保険を払済にすれば、返戻金で定期保険を買いますが、その返戻金では元の保険金額は継続不可になります。"}, {"num": 7, "type": "ox", "text": "定期保険は、被保険者が保険期間満了まで生存した場合、死亡保険金と同額の満期保 険金が支払われる保険である。", "choices": [], "answer": false, "kaisetsu": "【正解】× 重要な区別です。定期保険は『掛け捨て』で、満期時に生存していても何ももらいません。満期保険金がある保険は『養老保険』です。定期保険＝死亡時のみ給付、養老保険＝死亡時と満期どちらでも給付という単純なルールです。この区別を間違える受験生が多いので注意してください。シンプルなルールですが、試験では正確さを求められます。"}, {"num": 8, "type": "ox", "text": "変額個人年金保険では、特別勘定の運用実績に基づいて、将来受け取る年金額が変動 する。", "choices": [], "answer": true, "kaisetsu": "【正解】○ ここがポイント！変額個人年金保険では『特別勘定』という独立した運用口座で資金が運用されます。その運用実績に基づいて、将来受け取る年金額が変動するのが特徴です。高いリターンが見込める一方で、元本割れのリスクもあります。定額年金とは異なり、受取額が確定していない点が重要です。『特別勘定+変動』このセットで暗記しましょう。"}, {"num": 9, "type": "ox", "text": "普通傷害保険の保険料は、被保険者の性別や加入時の年齢によって異なる。", "choices": [], "answer": false, "kaisetsu": "【正解】× 普通傷害保険の大きな特徴です。普通傷害保険は『職業・年齢・性別に関わらず、保険料が一律』という平等主義的な設計になっています。生命保険やがん保険はリスク細分化で料金が変わりますが、傷害保険は異なるという重要な違いです。加入者みんなで公平にリスクを負担する仕組みなのです。"}, {"num": 10, "type": "ox", "text": "自動車保険の対人賠償保険では、被保険者が被保険自動車を運転中に誤って起こした 事故により他人を死傷させ、法律上の損害賠償責任を負った場合、自動車損害賠償責任 保険（自賠責保険）から支払われる限度額を超える損害賠償額に対して保険金が支払わ れる。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 重要な補完関係です。対人賠償保険は『自動車損害賠償責任保険（自賠責保険）を上回る損害賠償額に対して支払う』という補完的な役割を果たします。自賠責が上限（通常3,000万円）に達したら、その上積み部分を対人賠償保険がカバーします。自賠責と商業保険の二重構造を理解することが大切です。"}, {"num": 11, "type": "ox", "text": "国内総生産（GDP）は、国内で一定期間内に生産されたモノやサービスの付加価値の合 計額を示すものである。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 基本概念です。GDP（国内総生産）は『国内で一定期間内に生産されたモノやサービスの付加価値の合計額』を示すもの。「付加価値」というのが重要で、重複計算を避けるための基準になります。GNP（国民総生産）は国籍ベース、GDPは地域ベースという違いも大切です。名目GDPと実質GDPの区別も経済分析では重要。"}, {"num": 12, "type": "ox", "text": "投資信託を購入する際には、購入時手数料とあわせて、１カ月分の運用管理費用（信託 報酬）を支払う必要がある。", "choices": [], "answer": false, "kaisetsu": "【正解】× 信託報酬は継続的に差し引かれます。投資信託を購入する際、最初に『購入時手数料』を支払いますが、『信託報酬（運用管理費用）』は毎月あるいは日々の基準価額から自動的に差し引かれます。購入時に１ヶ月分だけ先払いするのではなく、保有期間中ずっと継続的に徴収されるという仕組みです。長期保有ほどコスト負担が大きくなる点は要注意。"}, {"num": 13, "type": "ox", "text": "残存期間や表面利率（クーポンレート）等の他の条件が同一であれば、一般に、格付の 高い債券ほど利回りが高く、格付の低い債券ほど利回りが低い。", "choices": [], "answer": false, "kaisetsu": "【正解】× リスクとリターンの関係を理解しましょう。『格付が高い＝信用リスク低い＝利回り低い』『格付が低い＝信用リスク高い＝利回り高い』というのが正の関係です。問題文は「格付の高い債券ほど利回りが高く」と書かれていますが、これは逆です。リスクとリターンの関係性は金融の基本中の基本。"}, {"num": 14, "type": "ox", "text": "国内の証券取引所に上場している内国株式を普通取引により売買する場合、売買成立 日の翌営業日に決済が行われる。", "choices": [], "answer": false, "kaisetsu": "【正解】× 制度改正があります。昔は『翌営業日決済（T+1）』が標準でしたが、現在、上場株式の決済は『同日決済（T+0）』に変わっています。この法改正は重要で、古い知識のままでは確実に引っかかります。市場の高速化に対応した改正であり、決済速度の短縮で市場効率が向上しました。"}, {"num": 15, "type": "ox", "text": "金融商品取引法によれば、金融商品取引業者等は、金融商品取引行為について、顧客 （特定投資家を除く）の知識、経験、財産の状況および金融商品取引契約を締結する目的 に照らして、投資者の保護に欠けるおそれがある不適当な勧誘を行ってはならないとさ れている。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 金融商品取引法の基本原則です。『適合性の原則』により、金融商品取引業者は『顧客に不適当な勧誘をしてはならない』と定められています。顧客の知識・経験・財産状況・投資目的を考慮せずに商品を薦める行為は違法です。投資者保護の根幹をなす重要なルール。これを破ると行政処分や損害賠償請求の対象になります。"}, {"num": 16, "type": "ox", "text": "所得税や住民税は国税であり、固定資産税や登録免許税は地方税である。", "choices": [], "answer": false, "kaisetsu": "【正解】× 国税と地方税の分類を正確に理解しましょう。『固定資産税＝地方税』『登録免許税＝国税』というのが正しい分類です。問題文では登録免許税を「地方税」と誤記しています。国税：所得税、法人税、相続税、登録免許税等。地方税：住民税、都市計画税、不動産取得税等です。"}, {"num": 17, "type": "ox", "text": "個人が受け取った非上場株式の配当については、その金額の多寡にかかわらず、所得 税の確定申告不要制度を選択することができる。", "choices": [], "answer": false, "kaisetsu": "【正解】× 非上場株式の配当は特別なルールがあります。『非上場株式の配当については、金額の多寡を問わず、所得税の確定申告不要制度を選択することができない』というのが重要です。つまり『必ず申告が必要』という意味です。配当は税務署に把握されやすい所得なため、このような厳しい制限があります。"}, {"num": 18, "type": "ox", "text": "所得税において、賃貸アパートの貸付による所得は、その貸付が事業的規模で行われ ていたとしても、不動産所得となる。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 重要な分類ルールです。事業的規模でアパート経営をしていても『事業所得ではなく不動産所得』に分類されます。これは給与所得との損益通算ルールも異なります。不動産関連はすべて『不動産所得』で統一されるというのが税法のルール。事業的規模という概念と不動産所得の関係を正確に理解することが大切。"}, {"num": 19, "type": "ox", "text": "所得税において、不動産所得、事業所得、山林所得、譲渡所得の金額の計算上生じた 損失の金額は、一定のものを除き、他の所得金額と損益通算することができる。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 損益通算ルールの基本です。『不動産所得・事業所得・山林所得の赤字は他の所得と相殺できます』。譲渡所得の赤字も同様に通算可能です。ただし『一定のものを除き』という限定付きで、例えば『住宅譲渡損失』には特別な通算ルールがあります。給与所得との通算にも制限があるので、正確な理解が必要。"}, {"num": 20, "type": "ox", "text": "夫が生計を一にする妻に係る医療費を支払った場合に、妻の合計所得金額が48万円を 超えるときは、その支払った医療費は夫に係る所得税の医療費控除の対象とならない。", "choices": [], "answer": false, "kaisetsu": "【正解】× 生計同一が重要なポイント。『配偶者の医療費でも、生計を一にしていれば医療費控除の対象になります』。配偶者の合計所得金額が48万円を超えるかどうかは関係ありません。むしろ重要なのは『生計を一にしているか否か』という事実です。扶養者の所得制限とは異なる概念なので注意。"}, {"num": 21, "type": "ox", "text": "不動産の登記事項証明書の交付を請求することができる者は、当該不動産に利害関係 を有する者に限られる。", "choices": [], "answer": false, "kaisetsu": "【正解】× 登記事項証明書の請求は『誰でも可能』です。「利害関係を有する者に限る」という制限はありません。これが登記簿公開制度の基本原則です。ただしプライバシーとのバランスから、一部の情報（建物外部分など）には制限がある場合がありますが、基本は『公開・透明性』が原則。"}, {"num": 22, "type": "ox", "text": "借地借家法によれば、建物の賃貸借契約（定期建物賃貸借等を除く）において、賃貸 借期間として１年未満の期間を定めた場合、期間の定めのない賃貸借契約とみなされる。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 借地借家法による賃借人保護ルール。『1年未満の期間で契約しても、自動的に期間の定めなし扱いになる』というのが重要です。つまり『1年未満の期間契約は無効』という扱いです。これは定期建物賃貸借契約以外での話。定期借家契約なら期間を短く設定できますが、普通借家は保護が強い。"}, {"num": 23, "type": "ox", "text": "都市計画法によれば、市街化区域は、既に市街地を形成している区域およびおおむね 10年以内に優先的かつ計画的に市街化を図るべき区域とされている。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 都市計画の基本概念です。『市街化区域＝既に市街地を形成している区域＋おおむね10年以内に優先的かつ計画的に市街化を図るべき区域』という定義です。「おおむね10年」というのが標準的な都市計画期間。市街化調整区域との対比で整理すると、規制が大きく異なることが理解できます。"}, {"num": 24, "type": "ox", "text": "贈与や相続により不動産を取得した場合、不動産取得税は課されない。", "choices": [], "answer": false, "kaisetsu": "【正解】× 相続と贈与で取扱が異なります。『贈与で不動産取得→贈与税対象』『相続で不動産取得→相続税対象』です。ただし『不動産取得税は相続の場合に限り非課税』というルールがあります。問題の「贈与や相続も含めて非課税」は誤りです。登録免許税との混同にも注意。"}, {"num": 25, "type": "ox", "text": "土地の有効活用において、一般に、土地所有者が土地の全部または一部を拠出し、デ ベロッパーが建設資金を負担してマンション等を建設し、それぞれの出資割合に応じて 土地・建物に係る権利を取得する方式を、建設協力金方式という。", "choices": [], "answer": false, "kaisetsu": "【正解】× 用語の区別が大切。土地所有者がデベロッパーと協力して開発する方式は『等価交換方式』です。『建設協力金方式』は全く異なり、『土地所有者が土地を担保に入れて建設資金を借入し、借地料を返済に充てる』というパターン。用語の正確な理解が不動産の重要スキル。"}, {"num": 26, "type": "ox", "text": "「直系尊属から住宅取得等資金の贈与を受けた場合の贈与税の非課税」による非課税限 度額は、受贈者ごとに、取得等した家屋が省エネ等住宅である場合は2,000万円、それ以 外の住宅である場合は1,000万円である。", "choices": [], "answer": false, "kaisetsu": "【正解】× 非課税限度額が改正されています。『直系尊属からの住宅取得資金贈与の非課税限度額：省エネ等住宅=1,500万円（2024年）、その他の住宅=1,000万円』です。問題では『2,000万円と1,000万円』と書かれていますが、省エネ等住宅の方が誤りです。毎年改正される制度なので、常に最新情報を確認することが重要。"}, {"num": 27, "type": "ox", "text": "自筆証書遺言の作成において、自筆証書に添付する財産目録については、自書によ らずにパソコンで作成しても差し支えない。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 自筆証書遺言の規則が改正されました。『財産目録に限ってパソコン作成でもOK』という特例があります。ただし『本文は必ず自書が必須』です。さらに『署名押印は必須』です。この改正により、複雑な財産をリスト化しやすくなりました。デジタル化時代に対応した重要な改正。"}, {"num": 28, "type": "ox", "text": "被相続人の葬式後に相続人が負担した香典返戻費用は、相続税額の計算上、葬式費用 として債務控除の対象となる。", "choices": [], "answer": false, "kaisetsu": "【正解】× 葬式費用の定義を正確に理解しましょう。『香典返戻費用は葬式費用ではなく、相続人の個人的支出』として扱われ、債務控除の対象外です。葬式費用として認められるのは『葬儀そのもの、火葬費用、祭壇設営費用』等です。返礼品や返礼状の費用は相続人負担で控除できません。"}, {"num": 29, "type": "ox", "text": "相続税額の計算上、遺産に係る基礎控除額は、「3,000万円＋600万円×法定相続人の数」 の算式により計算する。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 相続税基礎控除の公式を暗記しましょう。『3,000万円＋600万円×法定相続人の数』です。例えば相続人が2人なら『3,000万円＋1,200万円=4,200万円』が基礎控除になります。この公式は相続税申告判定の第一ステップなので、確実に暗記が必須。計算ミスは致命的です。"}, {"num": 30, "type": "ox", "text": "相続税の申告書の提出先は、原則として、被相続人の死亡の時における住所地の所轄 税務署長である。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 申告先の決定ルール。『相続税申告先は被相続人の死亡時における住所地の所轄税務署長』が原則です。引越し後の新住所ではなく、『死亡時点での住所』が重要です。海外に住んでいた場合など例外がありますが、基本ルールは『死亡時住所地の所轄税務署』です。"}, {"num": 31, "type": "multi", "text": "一定の利率で複利運用しながら一定期間経過後に目標とする額を得るために必要な毎 年の積立額を試算する際、目標とする額に乗じる係数は、（ ）である。", "choices": ["現価係数", "資本回収係数", "減債基金係数"], "answer": 2, "kaisetsu": "【正解】3番『減債基金係数』。ここがポイント！『毎年の積立額を計算するときに使う係数』だからです。他の係数との対比：現価係数＝将来価値を現在価値に、資本回収係数＝現在価値を毎年受取額に換算。『積立額を求める→減債基金係数』という暗記ロジックで確実。ファイナンシャル計算の基本中の基本。"}, {"num": 32, "type": "multi", "text": "全国健康保険協会管掌健康保険の傷病手当金の支給期間は、同一の傷病に関して、そ の支給開始日から通算して最長で（ ）である。", "choices": ["１年", "１年６カ月", "２年"], "answer": 1, "kaisetsu": "【正解】1番『１年』。重要な期間制限です。傷病手当金は『支給開始から最長1年6ヶ月の期間』支給されますが、『同一傷病に関して通算1年』というのが上限です。つまり『1年間給与がわりに受け取ったら終了』という厳しい制限。長期休職者にとって重要な制度ですが、期間限定という点は絶対に落とせません。"}, {"num": 33, "type": "multi", "text": "60歳０カ月で老齢基礎年金の繰上げ支給の請求をし、支給開始を60カ月繰り上げた場 合、老齢基礎年金の減額率は（ ）となる。", "choices": ["24％", "42％", "60％"], "answer": 0, "kaisetsu": "【正解】1番『24％』。計算式を覚えておこう。『60ヶ月繰上げ＝5年繰上げ』の場合、『減額率＝月0.4％×60ヶ月＝24％』です。つまり年金額が24％カットされます。繰上げはお得に見えますが、生涯受給額では大きく減少するため、慎重な判断が必要です。月0.4％という基準率を暗記することが重要。"}, {"num": 34, "type": "multi", "text": "遺族基礎年金を受給することができる遺族の範囲は、国民年金の被保険者等の死亡の 当時、その者によって生計を維持され、かつ、所定の要件を満たす（ ）とされる。", "choices": ["子のある配偶者、子", "子のある妻、子", "子のある配偶者、子、父母"], "answer": 0, "kaisetsu": "【正解】1番『子のある配偶者、子』。遺族基礎年金の受給者は『配偶者（性別不問）と子』です。「子のある妻」という表現は昔の法律で、今は『配偶者』に統一されています。LGBTQ対応の改正です。配偶者の条件は『遺族基礎年金の対象となる子がいる』こと。"}, {"num": 35, "type": "multi", "text": "住宅ローンの元利均等返済方式と元金均等返済方式を比較した場合、借入額、金利、借 入期間等の条件が同一であれば、通常、総返済額は（ ）。", "choices": ["元利均等返済方式のほうが多くなる", "元金均等返済方式のほうが多くなる", "同じである"], "answer": 0, "kaisetsu": "【正解】1番『元利均等返済方式のほうが多くなる』。返済パターンの違い：元利均等＝毎月返済額が同じ（初期は利息が多め、後期は元金が多め）。元金均等＝毎月元金が一定（当初は返済額が高いが逓減）。元金均等のほうが利息払いが少なくて済むので、『総返済額は元利均等＞元金均等』。"}, {"num": 36, "type": "multi", "text": "国内で事業を行う生命保険会社が破綻した場合、生命保険契約者保護機構による補償 の対象となる保険契約については、高予定利率契約を除き、破綻時の（ ）の90％ まで補償される。", "choices": ["解約返戻金相当額", "責任準備金等", "既払込保険料相当額"], "answer": 1, "kaisetsu": "【正解】2番『責任準備金等』。生保破綻時の重要なルール。生命保険契約者保護機構による補償対象は『責任準備金等の90％』（高予定利率契約を除く）です。解約返戻金ではなく『責任準備金』という『保険会社の負債評価』をベースに補償額が決まります。生保破綻の最終セーフティネット。"}, {"num": 37, "type": "multi", "text": "生命保険の保険料は、（ ① ）および収支相等の原則に基づき、予定死亡率、（ ② ）、予 定事業費率の３つの予定基礎率を用いて計算される。", "choices": ["① 大数の法則 ② 予定利率", "① 適合性の原則 ② 予定利率", "① 大数の法則 ② 予定損害率"], "answer": 0, "kaisetsu": "【正解】1番『① 大数の法則 ② 予定利率』。保険料計算の基礎です。『大数の法則』を基礎に、『予定死亡率』『予定利率』『予定事業費率』の３つの予定基礎率で算式化されます。適合性の原則は商品販売時のコンプライアンスルール。料金計算とは別概念です。"}, {"num": 38, "type": "multi", "text": "地震保険の保険金額は、火災保険の保険金額の30％から50％までの範囲内で設定する が、居住用建物については（ ① ）、生活用動産（家財）については（ ② ）が上限 となる。", "choices": ["① 1,000万円 ② 200万円", "① 3,000万円 ② 500万円", "① 5,000万円 ② 1,000万円"], "answer": 2, "kaisetsu": "【正解】3番『① 5,000万円 ② 1,000万円』。地震保険の上限額を暗記しましょう。『居住用建物＝5,000万円』『生活用動産（家財）＝1,000万円』です。これらは火災保険金額の30～50％の範囲内かつ上記上限が適用されます。地震保険は補助的な保険のため、上限が厳格に設定。"}, {"num": 39, "type": "multi", "text": "がん保険では、一般に、（ ）程度の免責期間が設けられており、この期間中に がんと診断確定されたとしても、がん診断給付金は支払われない。", "choices": ["30日間", "60日間", "90日間"], "answer": 2, "kaisetsu": "【正解】3番『90日間』。がん保険の免責期間は『契約から90日以内のがん診断は給付対象外』です。この３ヶ月間に診断されても保険金は出ません。『契約直後の早期請求を防ぐ』という保険会社の自己防衛ルール。免責期間を過ぎれば保障が開始される仕組み。"}, {"num": 40, "type": "multi", "text": "生命保険契約において、契約者（＝保険料負担者）および死亡保険金受取人がＡさん、 被保険者がＡさんの父親である場合、Ａさんの父親の死亡によりＡさんが受け取る死亡 保険金は、（ ）の課税対象となる。", "choices": ["贈与税", "相続税", "所得税"], "answer": 2, "kaisetsu": "【正解】2番『相続税』。税金の種類を判定しましょう。『契約者＝死亡保険金受取人＝Aさん』『被保険者＝Aさんの父親』という場合、死亡保険金は『相続財産』として扱われます。したがって『相続税の対象』です。契約者＝被保険者なら所得税ですが、異なる場合は相続税になる。"}, {"num": 41, "type": "multi", "text": "株式投資信託の運用において、企業の売上高や利益の伸び率が市場平均よりも高いな ど、企業の成長性に着目して選定した銘柄に投資する手法を、（ ）という。", "choices": ["グロース運用", "バリュー運用", "トップダウン・アプローチ"], "answer": 0, "kaisetsu": "【正解】1番『グロース運用』。投資手法の分類です。『成長性に注目した運用＝グロース（成長）投資』。高い利益成長率やPER高めの企業などを選定します。『バリュー運用＝割安性に注目』（PERが低い企業など）。『トップダウン・アプローチ＝マクロ分析を優先』。"}, {"num": 42, "type": "multi", "text": "株式の投資指標のうち、（ ）は、株価を１株当たり純資産で除して算出される。", "choices": ["PBR", "PER", "ROE"], "answer": 0, "kaisetsu": "【正解】1番『PBR』。投資指標の定義を覚えましょう。『PBR＝株価÷1株当たり純資産』です。『PER＝株価÷1株当たり利益』。『ROE＝純利益÷自己資本』。PBRはバリュー投資の指標として重要で、PBR<1.0なら『割安』とされます。"}, {"num": 43, "type": "multi", "text": "Ａ資産の期待収益率が2.0％、Ｂ資産の期待収益率が5.0％の場合に、Ａ資産を40％、Ｂ 資産を60％の割合で組み入れたポートフォリオの期待収益率は、（ ）である。", "choices": ["3.5％", "3.8％", "7.0％"], "answer": 1, "kaisetsu": "【正解】2番『3.8％』。ポートフォリオの期待リターン計算です。『期待収益率＝（2.0％×0.4）+（5.0％×0.6）＝0.8％+3.0％＝3.8％』です。ポートフォリオの期待リターンは『各資産の期待収益率×配分比率の合計』。シンプルな線形計算ですが、確実に得点したい基本問題。"}, {"num": 44, "type": "multi", "text": "2024年中にNISAの「成長投資枠」を利用して上場株式を購入することができる限度額 （年間投資枠）は、年間（ ）である。", "choices": ["102万円", "120万円", "240万円"], "answer": 2, "kaisetsu": "【正解】3番『240万円』。2024年のNISA制度を理解しましょう。『成長投資枠＝年間240万円』『つみたてNISA枠＝年間120万円』。両枠を合わせて『最大360万円の年間投資』が可能です。制度が頻繁に改正されるため、最新の金額を常に確認することが大切。"}, {"num": 45, "type": "multi", "text": "預金保険制度の対象金融機関に預け入れた（ ）は、預入金額の多寡にかかわら ず、その全額が預金保険制度による保護の対象となる。", "choices": ["定期積金", "決済用預金", "定期預金"], "answer": 1, "kaisetsu": "【正解】2番『決済用預金』。預金保険制度の保護範囲です。『決済用預金＝金額に関わらず全額保護』という特別な扱いです。その他の定期預金などは『1金融機関ごとに1,000万円まで＋利息100万円』という上限があります。決済用預金の特別性をしっかり押さえましょう。"}, {"num": 46, "type": "multi", "text": "所得税において、国債や地方債などの特定公社債の利子は、原則として、（ ① ）課 税の対象となるが、確定申告不要制度を選択すること（ ② ）。", "choices": ["① 総合 ② ができる", "① 源泉分離 ② はできない", "① 申告分離 ② ができる"], "answer": 2, "kaisetsu": "【正解】3番『① 申告分離 ② ができる』。公社債利子の課税方式が重要です。『特定公社債の利子＝申告分離課税の対象』で、かつ『確定申告不要制度を選択できる』というのが現在のルール。源泉分離ではなく申告分離です。制度改正の歴史を理解することも大切。"}, {"num": 47, "type": "multi", "text": "所得税において、（ ）は、所得控除に該当する。", "choices": ["配当控除", "雑損控除", "住宅借入金等特別控除"], "answer": 1, "kaisetsu": "【正解】2番『雑損控除』。所得控除と税額控除の区別が大切です。『配当控除＝税額控除』『住宅借入金等特別控除＝税額控除』『雑損控除＝所得控除』です。医療費控除、社会保険料控除と同じカテゴリ。この区別は試験の重要ポイント。"}, {"num": 48, "type": "multi", "text": "納税者が2012年１月１日以後に締結した生命保険契約により、一般の生命保険料控除 の対象となる保険料、個人年金保険料控除の対象となる保険料および介護医療保険料控 除の対象となる保険料をそれぞれ年間10万円支払った場合、所得税において、支払った 年分の生命保険料控除の控除額は、（ ）となる。", "choices": ["12万円", "15万円", "30万円"], "answer": 0, "kaisetsu": "【正解】1番『12万円』。2012年1月1日以後の生保料計算ルール。『一般保険料（上限4万円）+個人年金保険料（上限4万円）+介護医療保険料（上限4万円）＝最大12万円が所得控除額』です。年10万円ずつ支払った場合は各4万円適用で、合計12万円。3本立ての構造を理解することが大切。"}, {"num": 49, "type": "multi", "text": "住宅ローンを利用してマンションを取得し、新たに所得税における住宅借入金等特別 控除の適用を受ける場合、住宅借入金の償還期間は（ ）以上でなければならない。", "choices": ["10年", "13年", "15年"], "answer": 0, "kaisetsu": "【正解】1番『10年』。住宅借入金等特別控除の要件です。『償還期間10年以上の住宅ローン』が必須条件です。短期返済では適用されません。新規取得の場合は控除期間が13年のケース（省エネ対応住宅等）もありますが、ローン期間そのものは『最低10年』が絶対要件。"}, {"num": 50, "type": "multi", "text": "年末調整の対象となる給与所得者のうち、（ ）は、所得税の確定申告をする必要 がある。", "choices": ["給与の年間収入金額が1,000万円を超える者", "初めて住宅借入金等特別控除の適用を受けようとする者", "生命保険料控除の適用を受けようとする者"], "answer": 1, "kaisetsu": "【正解】2番『初めて住宅借入金等特別控除の適用を受けようとする者』。年末調整と確定申告の関係です。初めて住宅ローン控除を受ける場合は『確定申告必須』です。その後の年分は年末調整でOK。給与が1,000万円超や生命保険料控除は年末調整で対応可能。"}, {"num": 51, "type": "multi", "text": "宅地建物取引業法上の媒介契約のうち、（ ① ）では、依頼者は他の宅地建物取引業 者に重ねて媒介の依頼をすることができるが、（ ② ）では、依頼者は他の宅地建物取 引業者に重ねて媒介の依頼をすることが禁じられている。", "choices": ["① 一般媒介契約 ② 専任媒介契約", "① 専任媒介契約 ② 一般媒介契約", "① 専任媒介契約 ② 専属専任媒介契約"], "answer": 0, "kaisetsu": "【正解】1番『① 一般媒介契約 ② 専任媒介契約』。媒介契約の種類と制限を理解しましょう。『一般媒介＝複数業者へ依頼可、自分でも探可』『専任媒介＝1業者のみ（ただし自分で探すのはOK）』『専属専任＝完全排他的で自分も探せない』。「重ねて媒介依頼が禁止」というのは専任系の特徴。"}, {"num": 52, "type": "multi", "text": "建築基準法によれば、都市計画区域および準都市計画区域内にある建築物の敷地は、原 則として、幅員（ ① ）以上の道路に（ ② ）以上接していなければならない。", "choices": ["① ２ｍ ② ４ｍ", "① ４ｍ ② ２ｍ", "① ６ｍ ② ３ｍ"], "answer": 1, "kaisetsu": "【正解】2番『① 4ｍ ② 2ｍ』。建築基準法の基本ルール。『敷地は幅員4ｍ以上の道路に2ｍ以上接すること』です。これは「4m・2m」ルールとして覚えやすい。接道義務という基本的な要件で、狭い路地では建築不可となる場合があります。都市部の開発制限の核。"}, {"num": 53, "type": "multi", "text": "建物の区分所有等に関する法律（区分所有法）によれば、区分所有者および議決権の 各（ ）以上の多数による集会の決議により、規約の変更をすることができる。", "choices": ["３分の２", "４分の３", "５分の４"], "answer": 1, "kaisetsu": "【正解】2番『4分の３』。区分所有法による規約変更の多数要件です。『区分所有者および議決権の各4分の3以上の多数決』が必要です。強い多数要件が設定されています。単なる過半数では不十分です。共同住宅の重要な意思決定ルール。"}, {"num": 54, "type": "multi", "text": "個人が土地を譲渡した場合の所得税額の計算において、当該譲渡に係る所得が長期譲 渡所得に区分されるためには、土地を譲渡した年の１月１日において所有期間が（ ） を超えていなければならない。", "choices": ["５年", "10年", "15年"], "answer": 0, "kaisetsu": "【正解】1番『５年』。長期譲渡所得の要件です。『所有期間5年超』の場合が長期譲渡所得。短期譲渡所得＝『5年以下』。判定時点は『譲渡した年の1月1日における所有期間』で、引き渡し時点ではなく、『1月1日時点』という独特なルール。"}, {"num": 55, "type": "multi", "text": "自己が居住していた家屋を譲渡する場合、その家屋に自己が居住しなくなった日から （ ① ）を経過する日の属する年の（ ② ）までの間に譲渡しなければ、「居住用財 産を譲渡した場合の3,000万円の特別控除」の適用を受けることができない。", "choices": ["① １年 ② 12月31日", "① ３年 ② ３月15日", "① ３年 ② 12月31日"], "answer": 2, "kaisetsu": "【正解】3番『① ３年 ② 12月31日』。居住用財産3,000万円特別控除の期限ルール。『居住しなくなった日から3年を経過する日の属する年の12月31日までに譲渡』という厳しい期限があります。「3年以内に売る」という期限限定制度。夫婦で利用する場合などに重要。"}, {"num": 56, "type": "multi", "text": "父母のそれぞれから同一年中に暦年課税による贈与を受けた場合、贈与税額の計算上、 贈与税の課税価格から基礎控除額として最高で（ ）を控除することができる。", "choices": ["80万円", "110万円", "220万円"], "answer": 1, "kaisetsu": "【正解】2番『110万円』。父母複数からの贈与ルール。『父からの贈与110万円＋母からの贈与110万円＝合計220万円まで非課税』です。個人ごとに基礎控除が適用される点がポイント。「同一年中」という限定で、複数親からの贈与効果が生まれます。"}, {"num": 57, "type": "multi", "text": "下記のにおいて、Ａさんの相続における子Ｃさんの法定相続分は、（ ） である。なお、ＡさんとＢさんは、Ａさんの相続開始前に離婚している。 父Ｅさん 母Ｆさん × 元夫Ｂさん 被相続人Ａさん 子Ｃさん 子Ｄさん", "choices": ["２分の１", "３分の１", "４分の１"], "answer": 0, "kaisetsu": "【正解】1番『2分の１』。相続人の確認と法定相続分。相続人：被相続人A＋配偶者なし（元夫Bと離婚済）＋子C、D。法定相続分は『子C：1/2、子D：1/2』です。配偶者がいないため、子が全体を相続。元配偶者は相続人ではなく、婚外子との扱いも重要。"}, {"num": 58, "type": "multi", "text": "死亡したＡさんが所有していた上場株式Ｘを相続により取得した場合の１株当たりの 相続税評価額は、下記のによれば、（ ）である。 上場株式Ｘの価格 Ａさんが死亡した月の前々月の毎日の最終価格の月平均額 ： 540円 Ａさんが死亡した月の前月の毎日の最終価格の月平均額 ： 600円 Ａさんが死亡した月の毎日の最終価格の月平均額 ： 620円 Ａさんが死亡した日の最終価格 ： 600円", "choices": ["540円", "600円", "620円"], "answer": 0, "kaisetsu": "【正解】1番『540円』。上場株式の相続税評価額ルール。『以下の４つの価額の最低額』：(1)死亡月の最終価格(600円)、(2)死亡月前月の月平均(600円)、(3)死亡月前々月の月平均(540円)、(4)死亡月当月の月平均。最低額540円が採用される『保守的な評価方法』。"}, {"num": 59, "type": "multi", "text": "貸家建付地の相続税評価額は、その自用地としての価額が１億5,000万円、借地権割合 が60％、借家権割合が30％、賃貸割合が100％である場合、（ ）となる。", "choices": ["6,000万円", "9,000万円", "１億2,300万円"], "answer": 2, "kaisetsu": "【正解】3番『１億2,300万円』。貸家建付地の評価計算です。『評価額＝自用地価額×(1-借地権割合×借家権割合×賃貸割合)＝1.5億×(1-0.6×0.3×1.0)＝1.5億×0.82＝1.23億円』です。借地権と借家権が二重に減額要因として働く点が重要。計算式の理解が必須。"}, {"num": 60, "type": "multi", "text": "相続人が相続により取得した宅地が「小規模宅地等についての相続税の課税価格の計 算の特例」における特定居住用宅地等に該当する場合、その宅地のうち（ ① ）まで を限度面積として、評価額の（ ② ）相当額を減額した金額を、相続税の課税価格に 算入すべき価額とすることができる。", "choices": ["① 200㎡ ② 50％", "① 330㎡ ② 80％", "① 400㎡ ② 80％"], "answer": 1, "kaisetsu": "【正解】2番『① 330㎡ ② 80％』。小規模宅地等の特例における最も優遇された特定居住用宅地等。『330㎡までを限度に80％減額』です。特に『相続人が被相続人と同居していた自宅』に適用される最強の特例。限度面積330㎡と減額率80％の数字はセット暗記が必須。相続税対策の核。"}]}, {"id": "202505", "label": "2025年5月", "questions": [{"num": 1, "type": "ox", "text": "税理士の登録を受けていないファイナンシャル・プランナーが、顧客のために反復継 続して確定申告書を作成しても、その行為が無償であれば税理士法に抵触しない。", "choices": [], "answer": false, "kaisetsu": "【答え：×（間違い）】\n\n税理士の資格がないのに反復継続して確定申告書を作成すると、たとえ無償でも税理士法違反になります。ここがポイント！「無償か有償か」は関係なく、重要なのは「反復継続」という点です。\n\n税理士法は国家資格としての専門性を保護する法律で、税務書類の作成は「税理士独占業務」に該当します。つまり「誰でも自由にできる仕事」ではなく、税理士資格を持つ者だけができる業務なのです。ファイナンシャル・プランナーはお金のプロですが、税務申告書作成については税理士資格が必須です。覚えておこう：「FPの範囲と税理士の範囲」という垣根は明確に分かれているのです。"}, {"num": 2, "type": "ox", "text": "雇用保険の高年齢雇用継続基本給付金は、原則として、60歳以上65歳未満の被保険者 が、60歳到達時点に比べて賃金月額が85％未満に低下した状態で就労している場合に支 給される。", "choices": [], "answer": false, "kaisetsu": "【答え：×（間違い）】\n\n高年齢雇用継続基本給付金の支給要件は「賃金月額が60歳時点の75％未満に低下」です。問題文の「85％未満」という数字が間違っています。混乱しやすい！\n\n正しく理解するために：60歳時点の賃金が月額100,000円だった場合、その後の賃金が74,999円以下に下がると支給対象になります。つまり賃金が25％以上低下している状態ですね。給付額は（60歳時点の賃金 − 現在の賃金）× 15％程度で計算されます。高年齢継続基本給付金は「高齢者の再就職による賃金低下を緩和する制度」という本質を理解することが大切です。"}, {"num": 3, "type": "ox", "text": "国民年金の第１号被保険者の収入により生計を維持している配偶者で、20歳以上60歳 未満の者は、国民年金の第３号被保険者となる。", "choices": [], "answer": false, "kaisetsu": "【答え：×（間違い）】\n\n国民年金第１号被保険者の配偶者では、第３号被保険者になることができません。第３号被保険者の条件は大きく異なります。\n\n正しい条件：第３号被保険者になるには、配偶者が「厚生年金保険や共済組合に加入している（=第２号被保険者）」ことが絶対条件です。さらに①配偶者に生計を維持されていること、②年間収入が約130万円未満であること、も必要です。問題文で「第１号被保険者の収入」と言っているのは逆で、第３号は「被用者（会社員など）の配偶者」という限定的な立場なのです。ここがポイント！「国民年金の自営業者の配偶者では、独立した保険加入が必要」という点を押さえておきましょう。"}, {"num": 4, "type": "ox", "text": "国民年金の第３号被保険者は、確定拠出年金の個人型年金に加入することができる。", "choices": [], "answer": true, "kaisetsu": "【答え：〇（正しい）】\n\n国民年金第３号被保険者であっても、確定拠出年金（iDeCo）の個人型に加入することができます。これは重要なポイント！\n\n第３号被保険者は会社員の配偶者で、すでに厚生年金の保障があります。しかし「それで十分」とは限らず、個人的に老後資金を増やしたいなら、自分で掛金を負担してiDeCoに加入できるのです。月々の掛金上限は23,000円（2024年現在）で、全額所得控除の対象になります。覚えておこう：国民年金制度は「最低限の保障」であって、その以上の蓄積を個人の判断で行うことを国が奨励しているのです。第３号被保険者もその自由が十分にあります。"}, {"num": 5, "type": "ox", "text": "小規模企業共済の掛金月額は、1,000円から７万円までの範囲内で500円単位で選択す ることができる。", "choices": [], "answer": true, "kaisetsu": "【答え：〇（正しい）】\n\n小規模企業共済の掛金月額は1,000円から70,000円までの範囲内で500円単位で選択できます。この制度は個人事業主や小企業経営者向けの強力な退職金制度です。\n\nここがポイント！①掛金が低く設定できるので、経営が厳しい時期にも加入を続けやすい、②500円刻みで細かく調整可能、③掛金全額が所得控除の対象、という三つの大きなメリットがあります。年間最大840,000円（70,000円×12ヶ月）までの積立になります。また加入期間が長いほど、解約手当金の返戻率が高くなる設計になっているので、長期継続が有利です。覚えておこう：「節税しながら退職金を準備できる、個人事業主向けの優秀制度」です。"}, {"num": 6, "type": "ox", "text": "契約転換制度を利用して、現在契約している生命保険を新たな契約に転換する場合、 転換後契約の保険料は、転換前契約の加入時の年齢に応じた保険料率により算出される。", "choices": [], "answer": false, "kaisetsu": "【答え：×（間違い）】\n\n生命保険の契約転換制度を利用する場合、転換後契約の保険料は「転換前契約加入時の年齢や保険料率」ではなく、「転換時の現在の年齢・年齢別保険料率」で計算されます。\n\nここがポイント！契約転換制度は「古い契約を新しい契約に切り替える仕組み」ですが、これは保険会社にとって有利な制度です。なぜなら、年を重ねるごとに保険料は上がるのが原則だからです。転換時に現在の年齢で計算されるので、実質的には保険料が高くなってしまう可能性が高いのです。混乱しやすい！契約転換と「現在価値の充当」という仕組みについて、しっかり理解しておくことが重要です。"}, {"num": 7, "type": "ox", "text": "定期保険特約付終身保険（更新型）は、定期保険特約の更新の都度、告知が必要であ り、被保険者の健康状態によっては定期保険特約を更新することができない。", "choices": [], "answer": false, "kaisetsu": "【答え：〇（正しい）】\n\n定期保険特約付終身保険（更新型）では、定期保険特約の更新の都度、告知が必要です。そして被保険者の健康状態によっては、定期保険特約部分の更新が拒否される可能性があります。\n\nここがポイント！更新型の特約は「その都度新たに契約を結び直す」という性質を持っています。つまり、最初の加入時に健康であっても、更新時に病気になっていたら、その段階で更新が拒否されるリスクがあるということです。これが更新型の大きな欠点です。一方、「自動更新」は保険会社が更新を保障しますが（健康状態を問わず）、保険料は大幅に上がります。覚えておこう：「更新型か全期型か」という選択は、保険料と保障の安定性のトレードオフを考える重要な決断です。"}, {"num": 8, "type": "ox", "text": "個人年金保険（終身年金）の保険料は、他の契約条件が同一であれば、被保険者が女 性のほうが男性よりも高くなる。", "choices": [], "answer": true, "kaisetsu": "【答え：×（間違い）】\n\n個人年金保険（終身年金）の保険料は、他の契約条件が同一であれば、被保険者が女性の方が「男性より低い」です。問題文は逆になっています。\n\nなぜこんなことが起きるのか？統計的に女性は男性より平均寿命が長いからです。つまり「より長い期間、毎月年金を支払う可能性が高い」ということになります。そのため保険会社は女性からの掛金を低く設定する必要があるのです。混乱しやすい！「長寿 = 保険料が安い」という一見逆説的な関係ですが、年金保険の本質を理解すれば納得できます。ここがポイント！生命保険と個人年金保険では「保障の性質が逆」だから、保険料の男女差も逆になるのです。"}, {"num": 9, "type": "ox", "text": "国内旅行傷害保険では、一般に、被保険者が国内旅行中にかかった細菌性食中毒は、 補償の対象となる。 正解 〇", "choices": [], "answer": true, "kaisetsu": "【答え：×（間違い）】\n\n国内旅行傷害保険では、被保険者が国内旅行中にかかった細菌性食中毒は「補償の対象外」です。ウイルス性食中毒のみが対象になることが多いです。\n\n細かい話ですが重要な区別があります。旅行保険は「旅行中に発生した不測の事故」をカバーする保険です。細菌性食中毒は「予防可能なもの」として扱われ、補償対象外になります。一方、ウイルス性食中毒（ノロウイルスなど）は「予防が難しい」として補償される傾向があります。混乱しやすい！保険証券の細かい約款を確認することが本当に重要です。覚えておこう：保険商品の「除外条項」をしっかり読むことで、トラブルを避けられます。"}, {"num": 10, "type": "ox", "text": "自動車保険の人身傷害保険では、記名被保険者が被保険自動車を運転中に自動車同士 の衝突事故により負傷した場合、自己の過失割合にかかわらず、保険金額を限度として 損害額が補償される。", "choices": [], "answer": true, "kaisetsu": "【答え：〇（正しい）】\n\n自動車保険の人身傷害保険では、記名被保険者が被保険自動車を運転中に自動車同士の衝突事故により負傷した場合、自己の過失割合にかかわらず、約定の保険金が支払われます。\n\nここがポイント！人身傷害保険は「過失割合に関係なく保険金を受け取れる」という珍しい保険です。通常の自動車保険は過失割合によって支払額が変わりますが、この保険は違います。自分が100％悪い事故であっても、被保険者が負傷していれば、約定金額の支払いを受けられるのです。これが人身傷害保険の最大の魅力であり、多くの人が加入している理由です。覚えておこう：「自分のケガをカバーする保険」として、無過失でも安心という点が特徴です。"}, {"num": 11, "type": "ox", "text": "米国の市場金利が上昇し、日本と米国の金利差が拡大することは、一般に、米ドル高／ 円安の要因となる。", "choices": [], "answer": true, "kaisetsu": "【答え：〇（正しい）】\n\n米国の市場金利が上昇して、日本と米国の金利差が拡大することは、米ドル高（=円安）の要因となります。これが外国為替市場の基本的なメカニズムです。\n\nなぜそうなるのか？金利差が拡大すると、投資家は「より高い利回りが期待できる米ドル建て資産に投資したい」と考えます。その結果、米ドルへの需要が増加し、米ドルが値上がり（=円が値下がり）することになります。ここがポイント！「金利と為替レート」は相互に関連する金融市場の基本です。覚えておこう：「米国金利上昇 → ドル高・円安」という連鎖を理解することが、国際金融を学ぶ第一歩です。"}, {"num": 12, "type": "ox", "text": "公社債投資信託は、信託財産に株式をいっさい組み入れることができない。 正解 〇", "choices": [], "answer": true, "kaisetsu": "【答え：〇（正しい）】\n\n公社債投資信託は、信託財産に株式をいっさい組み入れることができません。これは法令によって明確に定められています。\n\n公社債投資信託の特徴：①債券のみを投資対象とする、②株式投資信託より値動きが小さい、③分配金が相対的に安定している、という点があります。ここがポイント！「投資信託の種類による制限」を理解することが重要です。株式投資信託は株式と債券を自由に組み合わせられますが、公社債投資信託はそうではありません。覚えておこう：「公社債投資信託 = 債券オンリー = 低リスク・低リターン」という関係式を押さえておきましょう。"}, {"num": 13, "type": "ox", "text": "一般に、市場金利が上昇すると債券価格は上昇し、市場金利が低下すると債券価格は 下落する。", "choices": [], "answer": false, "kaisetsu": "【答え：×（間違い）】\n\n市場金利が上昇すると債券価格は「下落」し、市場金利が低下すると債券価格は「上昇」します。問題文は逆になっています。\n\nなぜこう？債券はあらかじめ決められた金利（クーポン）で利息を払う金融商品です。市場金利が5％に上昇した場合、「利息3%の古い債券は魅力的ではない」と考えられるので価格が下がります。逆に市場金利が1％に低下すれば、その古い債券は「利息3%ももらえるのか」と魅力的になり、価格が上がります。混乱しやすい！債券の「金利と価格の逆相関関係」は金融市場の基本中の基本です。"}, {"num": 14, "type": "ox", "text": "国内の証券取引所に上場している内国株式を普通取引により売買する場合、指値注文 は成行注文に優先して売買が成立する。", "choices": [], "answer": false, "kaisetsu": "【答え：×（間違い）】\n\n国内の証券取引所に上場している内国株式を普通取引により売買する場合、「成行注文の方が指値注文より優先して売買が成立」します。問題文は逆になっています。\n\n株式市場の基本ルール：①成行注文（いくらでもいいから今すぐ売買したい）は、②指値注文（この値段でなら売買したい）より優先されます。これは「市場で最もすぐに約定する注文」を優先する原則です。ここがポイント！注文の優先順位は「値段→時間」の順です。同じ値段なら先着順ですが、成行注文はすべての指値注文より優先されるのです。覚えておこう：「急いている人が優先される」という公正な市場メカニズムです。"}, {"num": 15, "type": "ox", "text": "犯罪による収益の移転防止に関する法律（犯罪収益移転防止法）によれば、金融機関 等の特定事業者が顧客と特定業務に係る取引を行った場合、特定事業者は、原則として、 直ちに当該取引に関する記録を作成し、当該取引の行われた日から７年間保存しなけれ ばならないとされている。", "choices": [], "answer": true, "kaisetsu": "【答え：〇（正しい）】\n\n犯罪による収益の移転防止に関する法律（犯罪収益移転防止法）によれば、金融機関等の特定事業者は、顧客と特定業務に係る取引を行う際、本人確認と取引目的等の確認が義務付けられています。\n\nこれはなぜ大事か？テロ資金やマネーロンダリングを防止するためです。金融機関は「どういう人が、どういう目的で、どんな取引をしようとしているのか」を確認する法的義務があります。ここがポイント！「コンプライアンス」や「AML/CFT」という言葉とも関連する重要な制度です。覚えておこう：個人投資家も、口座開設時に詳細な本人確認を求められるのはこの法律のためです。"}, {"num": 16, "type": "ox", "text": "所得税において、病気で入院したことにより医療保険の被保険者が受け取った入院給 付金は、非課税である。 正解 〇", "choices": [], "answer": true, "kaisetsu": "【答え：〇（正しい）】\n\n所得税において、病気で入院したことにより医療保険の被保険者が受け取った入院給付金は、非課税です。これは保険商品の大きな特徴の一つです。\n\nなぜ非課税なのか？入院給付金は「医療費の補填」という性質を持っており、所得ではなく「損失の補償」と考えられるからです。ここがポイント！所得税法では「治療費や医療給付金は非課税」という明確なルールがあります。これは個人が保険に加入して入院費用をカバーすることを奨励する政策的な配慮です。覚えておこう：給付金の種類（入院給付金、手術給付金など）によって税務扱いが異なることもあるので注意が必要です。"}, {"num": 17, "type": "ox", "text": "所得税において、その年中の給与等の収入金額が103万円以下である場合、給与所得の 金額は０（ゼロ）となる。", "choices": [], "answer": false, "kaisetsu": "【答え：×（間違い）】\n\n所得税において、その年中の給与等の収入金額が103万円以下である場合、給与所得の金額は「0（ゼロ）ではなく、給与所得控除を差し引いた金額になる」のが正しい説明です。\n\n正確に理解：給与収入から「給与所得控除」を差し引いた金額が給与所得です。2024年現在、給与収入が約65万円以下なら給与所得は0（ゼロ）になります。つまり103万円という数字は「配偶者控除の要件」であって、「給与所得が0になる境界線」ではないのです。混乱しやすい！「103万円の壁」と「給与所得控除」は別物だということを理解することが重要です。"}, {"num": 18, "type": "ox", "text": "所得税において、物品販売業を営む個人事業主による事業所得の金額の計算上、商品の 売上原価は、「期末商品棚卸高＋仕入金額－期首商品棚卸高」の算式により計算する。", "choices": [], "answer": false, "kaisetsu": "【答え：×（間違い）】\n\n物品販売業を営む個人事業主による事業所得の金額の計算上、売上原価の正しい計算式は「期首商品棚卸高＋仕入金額－期末商品棚卸高」です。問題文は「期末商品棚卸高＋仕入金額－期首商品棚卸高」となっており、逆になっています。\n\n重要な公式：売上原価 = 期首在庫 + 仕入額 - 期末在庫。これが「FIFO（先入先出法）」や「加重平均法」などの棚卸し方法の基本です。ここがポイント！事業所得を計算する時は「どの在庫が実際に売れたのか」を正確に把握する必要があります。覚えておこう：決算時の棚卸しが重要な理由は、ここにあるのです。"}, {"num": 19, "type": "ox", "text": "所得税において、賃貸アパートの土地および建物を譲渡したことによる譲渡所得の金 額の計算上生じた損失の金額は、他の所得金額と損益通算することができない。", "choices": [], "answer": true, "kaisetsu": "【答え：×（間違い）】\n\n賃貸アパートの土地および建物を譲渡したことによる譲渡所得の金額の計算上生じた損失の金額は、「他の所得金額と相殺（損益通算）することができない」のが原則です。\n\nなぜか？不動産（特に賃貸物件）を譲渡した場合の損失は「事業用資産の損失」としても扱われ、給与所得などとの損益通算が制限されているのです。ここがポイント！譲渡損失が出た場合、それを別の所得と相殺できないという制約があります。ただし、一定の条件下では損失を先送り（繰越）できる特例もあります。覚えておこう：「不動産損失の制限」は税理士試験の重要項目です。"}, {"num": 20, "type": "ox", "text": "所得税において、納税者の合計所得金額が1,000万円を超えている場合、配偶者の合計 所得金額の多寡にかかわらず、納税者は配偶者控除の適用を受けることはできない。 正解 〇", "choices": [], "answer": true, "kaisetsu": "【答え：×（間違い）】\n\n所得税において、納税者の合計所得金額が1,000万円を超えている場合、「配偶者の合計所得金額の多寡にかかわらず、配偶者控除は適用されない」というのが正しい説明です。\n\n配偶者控除の要件：①配偶者の合計所得金額が48万円以下、かつ、②納税者の合計所得金額が1,000万円以下、の両方を満たす必要があります。つまり、納税者の所得が1,000万円を超えたら、配偶者の所得がいくら低くても配偶者控除は受けられないのです。ここがポイント！「配偶者控除の廃止と配偶者特別控除への移行」という仕組みを理解することが大切です。覚えておこう：「1,000万円の壁」は配偶者控除のボーダーラインです。"}, {"num": 21, "type": "ox", "text": "不動産の登記記録において、所有権に関する登記事項は、権利部の甲区に記録される。 正解 〇", "choices": [], "answer": true, "kaisetsu": "【答え：〇（正しい）】\n\n不動産の登記記録において、所有権に関する登記事項は、権利部の甲区に記録されます。これは不動産登記法の基本的な構造です。\n\n登記簿の構成：①表題部（不動産の物理的情報），②権利部の甲区（所有権），③権利部の乙区（所有権以外の権利）。所有権は最も基本的で重要な登記事項なので、甲区に記録されます。ここがポイント！甲区を見れば「この不動産は誰が所有しているのか」が一目瞭然です。覚えておこう：「甲区 = 所有権」という単純な対応関係を押さえておきましょう。"}, {"num": 22, "type": "ox", "text": "借地借家法によれば、定期借地権の設定を目的とする契約は、定期借地権の種類にか かわらず、公正証書によってしなければならない。", "choices": [], "answer": false, "kaisetsu": "【答え：×（間違い）】\n\n借地借家法によれば、定期借地権の設定を目的とする契約は、「定期借地権の種類によって異なる」のが正しい説明です。すべての定期借地権が公正証書を必須としているわけではありません。\n\n詳しく説明：一般定期借地権（20年以上50年未満）は「公正証書による契約が必須」ですが、建物譲渡特約付借地権や事業用借地権の場合は異なるルールが適用されます。ここがポイント！定期借地権の種類によって「契約要件が全く異なる」という点を押さえることが重要です。覚えておこう：借地借家法の細かい区分は複雑ですが、「種類によってルールが異なる」というメタ的な理解が大切です。"}, {"num": 23, "type": "ox", "text": "都市計画法によれば、市街化区域内において行う開発行為は、その規模にかかわらず、 都道府県知事等の許可を受けなければならない。", "choices": [], "answer": false, "kaisetsu": "【答え：×（間違い）】\n\n都市計画法によれば、市街化区域内において行う開発行為は、「規模によって許可要件が異なる」のが正しい説明です。すべての開発行為が無条件に許可不要というわけではありません。\n\n詳しく説明：市街化区域内でも、一定規模以上（通常1,000㎡以上）の開発行為であれば都道府県知事等の許可が必要です。逆に、小規模な開発（例えば住宅を1戸新築する程度）なら許可不要の場合があります。ここがポイント！「市街化区域だから自由に開発できる」という単純な理解は間違いです。覚えておこう：都市計画法は「都市の秩序ある発展」を目的とした細かいルール体系を持っています。"}, {"num": 24, "type": "ox", "text": "土地や建物を取得し、所有権の移転登記を行う際に課される税金は、登録免許税であ る。 正解 〇", "choices": [], "answer": true, "kaisetsu": "【答え：〇（正しい）】\n\n土地や建物を取得し、所有権の移転登記を行う際に課される税金は、登録免許税です。これは不動産取得時の重要な税金です。\n\n登録免許税の基礎知識：①税率は固定資産税評価額の0.4％（所有権移転登記の場合），②所有権以外の権利設定や変更でも税金がかかる，③相続登記は免税（2024年から）。ここがポイント！「登録免許税 = 登記手続時の税金」という対応関係を押さえておきましょう。覚えておこう：購入金額が高いほど登録免許税も高くなるため、不動産取得の真の費用にはこの税金が含まれているのです。"}, {"num": 25, "type": "ox", "text": "土地の有効活用において、一般に、土地所有者が入居予定の事業会社から建設資金を 借り受けて、事業会社の要望に沿った建物を建設し、その建物を事業会社に賃貸する方 式を、事業受託方式という。", "choices": [], "answer": false, "kaisetsu": "【答え：〇（正しい）】\n\n土地の有効活用において、土地所有者が入居予定の事業会社から建設資金を借り受けて、事業会社の要望に沿った建物を建設することは一般的な手法です。これは「定期金建物買取請求権型」などの類型に該当します。\n\nこの仕組みの特徴：①土地は所有者が保有し続ける，②建物は土地所有者が建設・所有する，③事業会社はテナントとして利用，④あらかじめ建物買取価格を設定。ここがポイント！土地所有者にとっては「資金調達と建物完成後の収入が期待できる」という効率的な土地活用方法です。覚えておこう：不動産活用には複数の仕組みがあり、それぞれ異なるメリット・デメリットがあるという理解が重要です。"}, {"num": 26, "type": "ox", "text": "「直系尊属から教育資金の一括贈与を受けた場合の贈与税の非課税」による非課税限度 額は、受贈者ごとに2,000万円（そのうち学校等以外の者に支払われる金銭は1,000万円） である。", "choices": [], "answer": false, "kaisetsu": "【答え：〇（正しい）】\n\n「直系尊属から教育資金の一括贈与を受けた場合の贈与税の非課税」による非課税限度額は、受贈者ごとに2,000万円です。ただし、学校等に直接支払う教育費は1,500万円までという細分化があります。\n\nこの制度の目的：①教育格差の是正，②高齢者資産の若年世代への移転促進。ここがポイント！「教育資金」という限定された用途に限定されることで、高額な非課税枠が認められているのです。覚えておこう：この制度は令和5年までの特例でしたが、2023年から復活しました。「直系尊属」と「受贈者」の関係、「教育費の定義」をしっかり理解することが重要です。"}, {"num": 27, "type": "ox", "text": "公正証書遺言の作成においては、証人２人以上の立会いが必要であるが、遺言者の推 定相続人はその証人となることができない。", "choices": [], "answer": true, "kaisetsu": "【答え：〇（正しい）】\n\n公正証書遺言の作成においては、証人2人以上の立会いが必要です。そして「遺言者の推定相続人」はその証人となることができません。これは遺言の有効性を確保するための重要なルールです。\n\n証人の要件：①推定相続人ではない，②被相続人の債権者や債務者ではない，③未成年者ではない，④公証人と親族関係にない。ここがポイント！証人資格をしっかり満たしていない場合、最悪の場合「遺言が無効」になる可能性があります。覚えておこう：公正証書遺言は「最も確実な遺言方式」とされるのは、このような厳格な手続きがあるからです。"}, {"num": 28, "type": "ox", "text": "相続税額の計算上、死亡保険金の非課税金額の規定による非課税限度額は、「1,000万 円×法定相続人の数」の算式により計算する。", "choices": [], "answer": false, "kaisetsu": "【答え：〇（正しい）】\n\n相続税額の計算上、死亡保険金の非課税金額の規定による非課税限度額は、「1,000万円×法定相続人の数」の算式により計算されます。これは相続税を軽減する重要な仕組みです。\n\nこの仕組みの意義：①生命保険は「相続対策の重要なツール」と位置付けられている，②法定相続人が多いほど非課税額が大きくなる。例えば配偶者と子ども2人の場合：1,000万円×3人=3,000万円まで非課税になります。ここがポイント！保険加入は単なる「医療保障」ではなく「相続対策」としての役割も持つのです。覚えておこう：この非課税限度額を活用した相続税対策は、FPの重要な提案ポイントです。"}, {"num": 29, "type": "ox", "text": "被相続人の配偶者が「配偶者に対する相続税額の軽減」の適用を受けた場合、配偶者 の相続税の課税価格が、相続税の課税価格の合計額に対する配偶者の法定相続分相当額 または２億円のいずれか多い金額までであれば、原則として、配偶者が納付すべき相続 税額は算出されない。", "choices": [], "answer": false, "kaisetsu": "【答え：〇（正しい）】\n\n被相続人の配偶者が「配偶者に対する相続税額の軽減」の適用を受けた場合、配偶者の相続税額は「相続税の課税価格の合計額の1/2、または配偶者の法定相続分のいずれか多い方の金額」以下であれば、配偶者の相続税額は0（ゼロ）になります。\n\nこの特例の条件：①婚姻期間20年以上（現行），②相続または遺贈により取得した財産であること。ここがポイント！配偶者優遇は「配偶者の生活保障」を重視する税制の表れです。覚えておこう：「配偶者の税額軽減」は相続税の「最大の優遇措置」の一つです。"}, {"num": 30, "type": "ox", "text": "贈与税の申告書は、受贈者が贈与者の住所地の所轄税務署長に提出しなければならな い。", "choices": [], "answer": false, "kaisetsu": "【答え：×（間違い）】\n\n贈与税の申告書は、「受贈者が受贈者の住所地の所轄税務署長に提出」するのが正しいです。問題文の「受贈者が贈与者の住所地の所轄税務署長に提出」は誤りです。\n\n贈与税の基本：①受贈者が納税義務を負う，②申告・納税は受贈者が行う，③期限は贈与があった翌年の3月15日。ここがポイント！「誰が税金を負担するのか」という原則をしっかり理解することが、贈与税対策の基本になります。覚えておこう：配偶者間の贈与、親からの教育資金贈与など、さまざまな非課税特例が存在することも重要です。"}, {"num": 31, "type": "multi", "text": "Ａさんの可処分所得（年間）の金額は、下記のによれば、（ ）である。 Ａさんの年間収入等 給与収入 ： 800万円（給与所得 ： 610万円） 所得税・住民税 ： 60万円 社会保険料 ： 100万円 生命保険料 ： 10万円", "choices": ["450万円", "630万円", "640万円"], "answer": 2, "kaisetsu": "【答え：850万円（計算例）】\n\nAさんの可処分所得の計算：給与収入800万円から、所得税・住民税・社会保険料（健康保険・厚生年金・雇用保険）を差し引いた金額が可処分所得です。一般的に給与の手取りは70～75％程度になります。\n\nここがポイント！可処分所得は「実際に自由に使える金額」を示すため、家計管理で最も重要な指標です。年間800万円の給与でも、税金と保険料で約150万円程度が差し引かれるため、手取りは650～700万円程度になります。覚えておこう：給与額面と手取りの大きな差を理解することが、ライフプランニングの第一歩です。"}, {"num": 32, "type": "multi", "text": "全国健康保険協会管掌健康保険に任意継続被保険者として加入することができる期間 は、任意継続被保険者となった日から最長で（ ）である。", "choices": ["１年", "２年", "５年"], "answer": 1, "kaisetsu": "【答え：最長2年】\n\n全国健康保険協会管掌健康保険に任意継続被保険者として加入することができる期間は、任意継続被保険者となった日から最長で2年です。これは退職後の医療保障の重要な仕組みです。\n\nこの制度の特徴：①退職後、被用者保険を続けられる，②保険料は在職時と異なる計算（全額自己負担）となる，③条件：退職前に継続して2ヶ月以上被保険者である。ここがポイント！2年を超えると「国民健康保険」に切り替える必要があります。覚えておこう：「退職後の医療保険選択」は人生の大事な決断ポイントです。"}, {"num": 33, "type": "multi", "text": "65歳到達時に老齢基礎年金の受給資格期間を満たしている者が、70歳０カ月で老齢基 礎年金の繰下げ支給の申出をし、支給開始を60カ月繰り下げた場合、老齢基礎年金の増 額率は（ ）となる。", "choices": ["30％", "36％", "42％"], "answer": 2, "kaisetsu": "【答え：約142%（繰下げによる増加率）】\n\n老齢基礎年金を70歳で繰下げ支給すると、60歳からの5年間（60ヶ月）×0.7% = 42%の増加により、本来額の142%が支給されます。これは大きな増加率です。\n\n繰下げのメリット・デメリット：メリットは「年金額が増加」、デメリットは「受給開始が遅れるため、合計受取額がいつまで生きるかに依存する」という点があります。ここがポイント！「平均寿命より長く生きると、繰下げが有利」という経済学的な判断が重要です。覚えておこう：繰下げ選択は個人の寿命予想と生活設計を踏まえた慎重な決断が必要です。"}, {"num": 34, "type": "multi", "text": "遺族厚生年金を受給することができる遺族の範囲は、厚生年金保険の被保険者等の死 亡の当時、その者によって生計を維持され、かつ、所定の要件を満たす（ ）とさ れ、そのうち最も優先順位の高い者に遺族厚生年金が支給される。", "choices": ["配偶者、子、父母", "配偶者、子、父母、孫、祖父母", "配偶者、子、父母、孫、祖父母、兄弟姉妹"], "answer": 1, "kaisetsu": "【答え：配偶者と子ども】\n\n遺族厚生年金の受給権者になるには、①被保険者等の死亡当時に被保険者によって生計を維持されていること、②年収要件を満たしていること、③年齢要件（配偶者は年齢制限なし、子は18歳到達年度末まで）を満たすことが必要です。遺族の範囲は厳密に定められています。\n\nここがポイント！遺族厚生年金は配偶者であれば年齢制限がありませんが、親や孫になると特定の条件を満たす必要があります。覚えておこう：遺族保障の仕組みを理解することは、生命保険設計の基本です。"}, {"num": 35, "type": "multi", "text": "住宅金融支援機構と民間金融機関が提携した住宅ローンであるフラット35（買取型） の融資金利は（ ① ）であり、借入れをする際には、保証人が（ ② ）である。", "choices": ["① 固定金利 ② 不要", "① 固定金利 ② 必要", "① 変動金利 ② 必要"], "answer": 0, "kaisetsu": "【答え：全期間固定金利】\n\nフラット35（買取型）の融資金利は「全期間固定金利」です。つまり借入れから返済完了まで金利が変わりません。これが最大の特徴で、返済計画が立てやすくなります。\n\nここがポイント！市場金利が変動しても、フラット35の金利は変わらないため「金利上昇リスク」がありません。ただしメガバンク等の変動金利より初期金利が高いことが多いです。覚えておこう：長期ローンの金利リスク管理という観点から、フラット35は重要な選択肢です。"}, {"num": 36, "type": "multi", "text": "国内で事業を行う損害保険会社が破綻した場合、自動車損害賠償責任保険（自賠責保 険）について、損害保険契約者保護機構による補償割合は（ ）である。", "choices": ["80％", "90％", "100％"], "answer": 2, "kaisetsu": "【答え：80%保障される】\n\n自動車損害賠償責任保険（自賠責保険）について、損害保険会社が破綻した場合、損害保険契約者保護機構による補償が適用されます。自賠責保険は「強制保険」のため、完全な保護が図られています。\n\nここがポイント！自賠責保険は保険契約者保護機構により、80%の保険金が保障されます（最低限の補償）。覚えておこう：強制保険だからこそ、保険会社破綻時にも保護される仕組みになっているのです。"}, {"num": 37, "type": "multi", "text": "生命保険会社が（ ）を引き下げた場合、通常、その後の終身保険の新規契約 の保険料は高くなる。", "choices": ["予定利率", "予定死亡率", "予定事業費率"], "answer": 0, "kaisetsu": "【答え：予定利率】\n\n生命保険会社が「予定利率」を引き下げた場合、その後の終身保険の新規契約の保険料は高くなります。予定利率は保険料を計算する重要な要素だからです。\n\nここがポイント！予定利率が低いほど、保険会社が得られる利息が少なくなるため、保険料で穴埋めする必要があるのです。覚えておこう：低金利環境下では予定利率の低下により、保険料がどんどん上昇する傾向があります。"}, {"num": 38, "type": "multi", "text": "自動車損害賠償責任保険（自賠責保険）の保険金の支払限度額は、加害車両が１台の 場合、被害者１人につき、死亡による損害については（ ① ）、傷害による損害につい ては（ ② ）、後遺障害による損害については障害の程度に応じて75万円から4,000万 円である。", "choices": ["① 3,000万円 ② 120万円", "① 4,000万円 ② 150万円", "① 5,000万円 ② 200万円"], "answer": 0, "kaisetsu": "【答え：3,000万円】\n\n自動車損害賠償責任保険（自賠責保険）の保険金の支払限度額は、加害車両が1台の場合、被害者1人につき、死亡による損害について3,000万円です。傷害は120万円、後遺障害は4,000万円（介護を要する場合）です。\n\nここがポイント！自賠責保険は「被害者保護」を最優先とした最低限の保障です。覚えておこう：自賠責では不足する部分を、任意保険（対人賠償責任保険）で補う必要があります。"}, {"num": 39, "type": "multi", "text": "先進医療特約では、（ ）時点において厚生労働大臣により定められている先進医 療が先進医療給付金の対象となる。", "choices": ["申込日", "責任開始日", "療養を受けた日"], "answer": 2, "kaisetsu": "【答え：給付支払い時】\n\n先進医療特約では、「給付支払い時点」において厚生労働大臣により定められている先進医療が先進医療給付金の対象となります。つまり、契約時点ではなく、実際に医療を受ける時点での認定がカウントされます。\n\nここがポイント！先進医療は常に更新されるため、契約時点でどの医療が対象かを確認することが重要です。覚えておこう：先進医療特約は「最新の高度医療に対応できる」という点が魅力です。"}, {"num": 40, "type": "multi", "text": "個人年金保険（保証期間付終身年金）において、契約者（＝保険料負担者）、被保険者 および年金受取人がＡさんの父親である場合、保証期間内にＡさんの父親が死亡し、残 りの保証期間についてＡさんが受け取る年金の年金受給権は、（ ）の課税対象とな る。", "choices": ["贈与税", "相続税", "所得税"], "answer": 1, "kaisetsu": "【答え：一般所得（雑所得）扱い】\n\n個人年金保険（保証期間付終身年金）において、契約者、被保険者、年金受取人がすべて父親である場合の年金は「一般所得（雑所得）」として課税されます。\n\nここがポイント！年金受取人と被保険者の関係により、税務扱いが大きく異なることがあります。覚えておこう：年金保険の税務計算は複雑であり、契約内容を理解することが重要です。"}, {"num": 41, "type": "multi", "text": "追加型株式投資信託を基準価額11,500円（１万口当たり）で１万口購入した後、最初の 決算時に１万口当たり700円の収益分配金が支払われ、分配落ち後の基準価額が11,200円 （１万口当たり）となった場合、その収益分配金のうち、普通分配金は（ ① ）であり、 元本払戻金（特別分配金）は（ ② ）である。", "choices": ["① 300円 ② 400円", "① 400円 ② 300円", "① 500円 ② 200円"], "answer": 1, "kaisetsu": "【答え：11,300円程度（計算例）】\n\n追加型株式投資信託の基準価額の変動を計算する問題です。基準価額11,500円で1万口購入（投資額115万円）後、分配金700円/1万口が支払われると、基準価額から分配金が差し引かれるため、新しい基準価額は11,500円 - 700円 = 10,800円になります。\n\nここがポイント！分配金支払いにより基準価額が下がり、実質的な資産額は変わらないという仕組みを理解することが重要です。覚えておこう：分配金の再投資が複利効果を生み出す理由は、ここにあります。"}, {"num": 42, "type": "multi", "text": "Ｘ社の株価が1,500円、１株当たり純利益が100円、１株当たり純資産（自己資本）が 1,000円である場合、Ｘ社のＲＯＥは、（ ）である。", "choices": ["1.5％", "10％", "15％"], "answer": 1, "kaisetsu": "【答え：15倍】\n\nＸ社の場合、株価1,500円、１株当たり純利益100円なので、PER（株価収益率）= 1,500円 ÷ 100円 = 15倍になります。PERが低いほど「割安」と判断されます。\n\nここがポイント！PERは企業の収益性を評価するための基本的な指標です。業界平均や過去比較により、割安か割高かを判断します。覚えておこう：PER20倍を超えると「割高」と判断されることが多いですが、成長企業では高PERでも正当化される場合があります。"}, {"num": 43, "type": "multi", "text": "異なる２資産からなるポートフォリオにおいて、２資産間の相関係数が（ ）であ る場合、分散投資によるリスクの低減効果は最大となる。", "choices": ["－１", "０", "＋１"], "answer": 0, "kaisetsu": "【答え：-1（完全負の相関）】\n\n異なる２資産からなるポートフォリオにおいて、２資産間の相関係数が-1（完全な負の相関）である場合、分散投資によるリスクの低減効果は最大になります。\n\nここがポイント！相関係数が低い（特にマイナス）ほど、分散投資の効果が大きいということです。覚えておこう：実務では完全な負の相関（-1）は稀であり、-0.5～0程度でも分散効果が期待できます。"}, {"num": 44, "type": "multi", "text": "ＮＩＳＡの「成長投資枠」と「つみたて投資枠」を利用して株式投資信託等を保有するこ とができる上限額（非課税保有限度額）は（ ① ）であり、このうち「成長投資枠」 での保有は（ ② ）が上限となる。", "choices": ["① 1,500万円 ② 1,000万円", "① 1,800万円 ② 1,200万円", "① 2,000万円 ② 1,500万円"], "answer": 1, "kaisetsu": "【答え：1,800万円】\n\nNISAの「成長投資枠」と「つみたて投資枠」を利用して株式投資信託等を保有することができる上限額（非課税保有限度額）は合計1,800万円です（2024年から制度改正）。\n\nここがポイント！年間投資枠（360万円：成長枠240万円+つみたて枠120万円）と生涯非課税保有限度額（1,800万円）の両方の制約がある点に注意が必要です。覚えておこう：生涯1,800万円という上限があるため、長期的な投資計画が重要です。"}, {"num": 45, "type": "multi", "text": "預金保険制度による保護の対象となる預金等のうち、定期預金などの一般預金等につ いては、原則として、１金融機関ごとに預金者１人当たり元本（ ）までとその利 息等が保護される。", "choices": ["500万円", "1,000万円", "1,500万円"], "answer": 1, "kaisetsu": "【答え：1,000万円】\n\n預金保険制度による保護の対象となる定期預金などの一般預金等については、原則として、１金融機関ごとに預金者1人当たり元本1,000万円までとその利息が保護対象です。\n\nここがポイント！同じ銀行に複数の預金口座があっても、合計で1,000万円が限度になります。複数銀行に分散することが資産保護の基本です。覚えておこう：普通預金と定期預金は合わせて1,000万円の上限となるため、分散管理が重要です。"}, {"num": 46, "type": "multi", "text": "所得税における一時所得に係る総収入金額が300万円で、その収入を得るために支出し た金額が100万円である場合、一時所得の金額は（ ① ）となり、そのうち総所得金額 に算入される金額は（ ② ）となる。", "choices": ["① 150万円 ② 50万円", "① 150万円 ② 75万円", "① 200万円 ② 150万円"], "answer": 1, "kaisetsu": "【答え：100万円】\n\n一時所得の計算：一時所得 = （総収入金額 - 支出金額）÷ 2。問題の場合：（300万円 - 100万円）÷ 2 = 100万円が一時所得です。\n\nここがポイント！一時所得は「2分の1課税」という優遇措置が適用されます。さらに一時所得控除50万円があるため、課税対象は（100万円 - 50万円）= 50万円になります。覚えておこう：懸賞金や競馬の払戻金なども一時所得の対象になり、この優遇措置が適用されます。"}, {"num": 47, "type": "multi", "text": "所得税において、国民年金基金に加入して支払った掛金は、（ ）の対象となる。", "choices": ["生命保険料控除", "社会保険料控除", "小規模企業共済等掛金控除"], "answer": 1, "kaisetsu": "【答え：社会保険料控除】\n\n所得税において、国民年金基金に加入して支払った掛金は、「社会保険料控除」の対象となります。全額所得控除が可能です。\n\nここがポイント！国民年金基金は個人事業主の重要な年金準備手段で、税制上も優遇されています。覚えておこう：掛金が全額控除されるため、高い節税効果が期待できる制度です。"}, {"num": 48, "type": "multi", "text": "所得税において、個人が支払う地震保険の保険料に係る地震保険料控除は、原則とし て、（ ① ）を限度として年間支払保険料の（ ② ）が控除額となる。", "choices": ["① ５万円 ② 全額", "① ５万円 ② ２分の１相当額", "① 10万円 ② ２分の１相当額"], "answer": 0, "kaisetsu": "【答え：50,000円（年間上限）】\n\n所得税において、個人が支払う地震保険の保険料に係る地震保険料控除は、原則として、「50,000円」を限度として年間支払保険料の全額が対象となります。\n\nここがポイント！他の生命保険料控除と異なり、地震保険料控除には「上限額」があります。覚えておこう：地震保険は火災保険とセットで加入することがほとんどであり、保険料控除による節税メリットは大きいです。"}, {"num": 49, "type": "multi", "text": "住宅ローンを利用して認定長期優良住宅を新築し、新たに所得税における住宅借入金 等特別控除の適用を受ける場合、控除期間は最長で（ ）である。", "choices": ["10年", "13年", "15年"], "answer": 1, "kaisetsu": "【答え：13年】\n\n住宅ローンを利用して認定長期優良住宅を新築し、住宅借入金等特別控除の適用を受ける場合、控除期間は最長「13年」です。通常の新築住宅は10年ですが、長期優良住宅は3年間延長されます。\n\nここがポイント！長期優良住宅は国が推奨する環境配慮住宅であり、税制上も優遇されています。覚えておこう：13年間の控除により、住宅購入時の税負担が大幅に軽減されます。"}, {"num": 50, "type": "multi", "text": "その年の１月16日以後に新たに事業所得を生ずべき業務を開始した者が、その年分か ら所得税の青色申告の承認を受けようとする場合、原則として、その業務を開始した日 から（ ）以内に、青色申告承認申請書を納税地の所轄税務署長に提出しなければ ならない。", "choices": ["２カ月", "３カ月", "６カ月"], "answer": 0, "kaisetsu": "【答え：期限内申請が必須】\n\nその年の1月16日以後に新たに事業所得を生ずべき業務を開始した者が、その年分から青色申告の承認を受けようとする場合、原則として「その業務開始日から2ヶ月以内」に承認申請する必要があります。期限を超えると承認されません。\n\nここがポイント！青色申告の特典（最大65万円の青色申告特別控除など）を受けるには、手続きの期限遵守が重要です。覚えておこう：青色申告のメリットは大きいため、事業開始時には速やかに申請手続きを進める必要があります。"}, {"num": 51, "type": "multi", "text": "宅地建物取引業法によれば、宅地建物取引業者は、自ら売主となる宅地または建物の 売買契約の締結に際して、取引の相手方が宅地建物取引業者でない場合、代金の額の （ ）を超える額の手付金を受領することができない。", "choices": ["５％", "10％", "20％"], "answer": 2, "kaisetsu": "【答え：重要事項説明書の交付】\n\n宅地建物取引業法によれば、宅地建物取引業者は、自ら売主となる宅地または建物の売買契約の締結に際して、取引の相手方に対して「重要事項説明書」を交付する義務があります。\n\nここがポイント！重要事項説明は、購入者保護の重要な制度です。宅建士が説明することが必須であり、説明なしの契約は無効になる可能性があります。覚えておこう：不動産取引は高額であるため、消費者保護が最優先されるのです。"}, {"num": 52, "type": "multi", "text": "下記の200㎡の土地に建築面積100㎡、延べ面積150㎡の２階建ての住宅を建築した場合、 当該建物の建蔽率は、（ ）である。 ６ｍ公道 200㎡", "choices": ["50％", "75％", "100％"], "answer": 0, "kaisetsu": "【答え：50%】\n\n200㎡の土地に建築面積100㎡の建物を建築した場合の建蔽率は、（100㎡ ÷ 200㎡）×100 = 50%です。\n\nここがポイント！建蔽率は「敷地面積に対する建築面積の割合」を示す重要な指標です。地域によって建蔽率の上限（60％、70％、80％など）が異なるため、新築時に確認が必要です。覚えておこう：建蔽率と容積率の両方の制限を受けるため、建物設計時には両者を考慮する必要があります。"}, {"num": 53, "type": "multi", "text": "建物の区分所有等に関する法律（区分所有法）によれば、共用部分に対する各区分所 有者の共有持分は、各共有者が有する（ ① ）によるものとされており、当該規定は 規約で別段の定めをすることが（ ② ）。", "choices": ["① 戸数の総戸数に占める割合 ② できる", "① 専有部分の床面積の割合 ② できない", "① 専有部分の床面積の割合 ② できる"], "answer": 2, "kaisetsu": "【答え：各共有者の建物床面積】\n\n建物の区分所有等に関する法律（区分所有法）によれば、共用部分に対する各区分所有者の共有持分は、「各区分所有者が有する専有部分の床面積」の比率に応じて決定されます。\n\nここがポイント！マンション管理の基本である共有持分比率は、床面積によって決まるのです。覚えておこう：共有持分比率は修繕費の負担額やマンション総会での議決権に影響するため、重要な指標です。"}, {"num": 54, "type": "multi", "text": "個人が土地を譲渡したことによる譲渡所得の金額の計算において、譲渡した土地の取 得費が不明である場合には、譲渡収入金額の（ ）相当額を取得費とすることがで きる。", "choices": ["５％", "10％", "15％"], "answer": 0, "kaisetsu": "【答え：5%】\n\n個人が土地を譲渡したことによる譲渡所得の金額の計算において、譲渡した土地の取得費が不明である場合には、譲渡収入金額の「5%」を取得費とすることができます。\n\nここがポイント！取得費不明の場合でも、税法上の合理的な推定が可能になっています。覚えておこう：古い土地の場合、取得費が不明なことが多いため、この規定は実務上重要です。"}, {"num": 55, "type": "multi", "text": "被相続人の居住用家屋およびその敷地を単独で相続した被相続人の子が、当該家屋お よびその敷地を譲渡し、「被相続人の居住用財産（空き家）に係る譲渡所得の特別控除の 特例」の適用を受けた場合、譲渡所得の金額の計算上、最高で（ ）を控除するこ とができる。", "choices": ["1,000万円", "2,000万円", "3,000万円"], "answer": 2, "kaisetsu": "【答え：3,000万円が非課税】\n\n被相続人の居住用家屋およびその敷地を相続した被相続人の子が、「被相続人の居住用財産を譲渡した場合の譲渡所得の特例」を適用する場合、譲渡益のうち3,000万円までが非課税になります。\n\nここがポイント！高齢親の実家を相続して売却する際の重要な特例です。覚えておこう：この特例により、実家を売却しても多くの場合は譲渡所得税がかからなくなります。"}, {"num": 56, "type": "multi", "text": "贈与税の配偶者控除は、婚姻期間が（ ① ）以上である配偶者から居住用不動産の 贈与または居住用不動産を取得するための金銭の贈与を受け、所定の要件を満たす場合、 贈与税の課税価格から基礎控除額のほかに最高で（ ② ）を控除することができる特 例である。", "choices": ["① 10年 ② 2,500万円", "① 10年 ② 2,000万円", "① 20年 ② 2,000万円"], "answer": 2, "kaisetsu": "【答え：20年以上】\n\n贈与税の配偶者控除は、「婚姻期間が20年以上である配偶者」から居住用不動産の贈与を受けた場合に適用されます。最高2,000万円の控除が可能です。\n\nここがポイント！夫婦間の資産移転を促進する制度であり、長期婚姻を要件としています。覚えておこう：20年という長い婚姻期間が要件となるため、離婚の可能性が低い婚姻を想定した制度設計になっています。"}, {"num": 57, "type": "multi", "text": "下記のにおいて、Ａさんの相続における父Ｃさんの法定相続分は、（ ） である。なお、母Ｄさんは、Ａさんの相続開始前に死亡している。 父Ｃさん 母Ｄさん （既に死亡） 被相続人Ａさん 妻Ｂさん 妹Ｅさん", "choices": ["２分の１", "３分の１", "４分の１"], "answer": 1, "kaisetsu": "【答え：法定相続分に応じて計算】\n\nAさんの相続における父Cさんの法定相続分は、母が既に死亡している場合、Aさんの兄弟姉妹の人数によって異なります。一般的には「1/4」になることが多いです（Aさん本人が1/2、兄弟姉妹で1/2を分ける場合）。\n\nここがポイント！法定相続分は「誰が相続人か」で決定される固定的なルールです。覚えておこう：実務では遺産分割協議により、異なる分割ができますが、法定相続分は遺産分割の参考値となります。"}, {"num": 58, "type": "multi", "text": "同族株主のいる会社において、同族株主以外の株主等が取得した取引相場のない株式 の相続税評価額は、原則として、特例的評価方式である（ ）により評価する。", "choices": ["配当還元方式", "類似業種比準方式", "純資産価額方式"], "answer": 0, "kaisetsu": "【答え：純資産価額方式】\n\n同族株主のいる会社において、同族株主以外の株主等が取得した取引相場のない株式の相続税評価額は、原則として「純資産価額方式」で評価されます。\n\nここがポイント！株価評価は企業の財務状況を反映した複雑な仕組みになっています。覚えておこう：類似企業比準方式、純資産価額方式、折衷方式など複数の評価方法があり、状況に応じて使い分けられます。"}, {"num": 59, "type": "multi", "text": "貸家の相続税評価額は、その家屋の固定資産税評価額が8,000万円、借地権割合が60％、 借家権割合が30％、賃貸割合が100％である場合、原則として、（ ）となる。", "choices": ["2,400万円", "5,600万円", "6,560万円"], "answer": 1, "kaisetsu": "【答え：計算結果に基づき】\n\n貸家の相続税評価額の計算では、「固定資産税評価額×（1 - 借地権割合×借家権割合×賃貸割合）」という複雑な公式が使われます。\n\n例えば：固定資産税評価額8,000万円、借地権割合60％、借家権割合30％、賃貸割合100％の場合\n= 8,000万円×（1 - 0.6×0.3×1）= 8,000万円×（1 - 0.18）= 8,000万円×0.82 = 6,560万円\n\nここがポイント！複数の割合を組み合わせた評価方法が特徴です。"}, {"num": 60, "type": "multi", "text": "相続人が相続により取得した宅地が「小規模宅地等についての相続税の課税価格の計 算の特例」における特定事業用宅地等に該当する場合、その宅地のうち（ ① ）まで を限度面積として、評価額の（ ② ）相当額を減額した金額を、相続税の課税価格に 算入すべき価額とすることができる。", "choices": ["① 200㎡ ② 50％", "① 330㎡ ② 80％", "① 400㎡ ② 80％"], "answer": 2, "kaisetsu": "【答え：80%減額】\n\n相続人が相続により取得した宅地が「小規模宅地等についての相続税の課税価格の計算の特例」における特定事業用宅地等に該当する場合、その宅地の課税価格は「80%減額」されます。最大2,000㎡まで適用可能です。\n\nここがポイント！この特例は「事業継続」と「相続人の生活保護」を目的とした重要な制度です。覚えておこう：自宅の場合は「小規模住宅用地特例」により、課税価格が80%減額されるため、相続税負担が大幅に軽減されます。"}]}], "jitsugi": [{"id": "202305", "label": "2023年5月", "questions": [{"num": 1, "type": "multi", "text": "ファイナンシャル・プランニング業務を行うに当たっては、関連業法を順守することが重要である。 ファイナンシャル・プランナー（以下「ＦＰ」という）の行為に関する次の記述のうち、最も不適切な ものはどれか。", "tables_html": "", "choices": ["税理士資格を有していないＦＰが、無料の相続相談会において、相談者の持参した資料に基づき、 相談者が納付すべき相続税額を計算した。", "社会保険労務士資格を有していないＦＰが、顧客の「ねんきん定期便」等の資料を参考に、公的年 金の受給見込み額を試算した。", "投資助言・代理業の登録を受けていないＦＰが、顧客が保有する投資信託の運用報告書に基づき、 その記載内容について説明した。"], "answer": 0, "kaisetsu": "【ここがポイント！】ＦＰが遵守しなければならない関連業法を理解することが重要です。\n\n正解は①「税理士資格を有していないＦＰが、無料の相続相談会において、相談者が納付すべき相続税額を計算した」です。相続税額の「計算」は税理士法に違反します。無料相談であっても有料相談であっても、税理士資格がなければ具体的な相続税額を計算することはできません。\n\n②の公的年金受給見込み額の試算は、参考資料に基づく一般的な計算なので、社会保険労務士資格がなくても問題ありません。③の投資信託の説明は、既存の運用報告書の内容を説明するだけなので、投資助言業の登録がなくても大丈夫です。"}, {"num": 2, "type": "multi", "text": "下記は、山岸家のキャッシュフロー表（一部抜粋）である。このキャッシュフロー表の空欄（ア）～ （ウ）にあてはまる数値として、誤っているものはどれか。なお、計算に当たっては、キャッシュフロ ー表中に記載の整数を使用し、計算過程においては端数処理をせず計算し、計算結果については万円未 満を四捨五入すること。 ＜山岸家のキャッシュフロー表＞ （単位：万円) 経過年数 基準年 １年 ２年 ３年 ４年 西暦（年） ２０２２ ２０２３ ２０２４ ２０２５ ２０２６ 山岸 雄太 本人 ３６歳 ３７歳 ３８歳 ３９歳 ４０歳 家族・ 美咲 妻 ４１歳 ４２歳 ４３歳 ４４歳 ４５歳 年齢 尚人 長男 ６歳 ７歳 ８歳 ９歳 １０歳 由香 長女 ２歳 ３歳 ４歳 ５歳 ６歳 尚人 ライフイベント 変動率 小学校入学 給与収入(本人) １％ ３９０ （ ア ） 収入 給与収入（妻） － ８０ ８０ ８０ ８０ ８０ 収入合計 － ４７０ ４８６ 基本生活費 ２％ １８２ １８６ 住宅関連費 － １０６ １０６ １０６ １０６ 教育費 － ５０ ４０ ４０ ８０ 支出 保険料 － ２２ ２２ ２２ ２２ 一時的支出 － その他支出 － ２０ ２０ ２０ ２０ 支出合計 － ３８０ ３７７ ４２５ 年間収支 － ９０ ６０ １０１ （ イ ） 金融資産残高 １％ １,１６０ （ ウ ） １,４５９ ※年齢および金融資産残高は各年１２月３１日現在のものとし、２０２２年を基準年とする。 ※給与収入は可処分所得で記載している。 ※記載されている数値は正しいものとする。 ※問題作成の都合上、一部を空欄にしてある。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>経過年数</td><td></td><td></td><td>基準年</td><td>１年</td><td>２年</td><td>３年</td><td>４年</td></tr><tr><td>西暦（年）</td><td></td><td></td><td>２０２２</td><td>２０２３</td><td>２０２４</td><td>２０２５</td><td>２０２６</td></tr><tr><td>家族・<br>年齢</td><td>山岸 雄太</td><td>本人</td><td>３６歳</td><td>３７歳</td><td>３８歳</td><td>３９歳</td><td>４０歳</td></tr><tr><td></td><td>美咲</td><td>妻</td><td>４１歳</td><td>４２歳</td><td>４３歳</td><td>４４歳</td><td>４５歳</td></tr><tr><td></td><td>尚人</td><td>長男</td><td>６歳</td><td>７歳</td><td>８歳</td><td>９歳</td><td>１０歳</td></tr><tr><td></td><td>由香</td><td>長女</td><td>２歳</td><td>３歳</td><td>４歳</td><td>５歳</td><td>６歳</td></tr><tr><td>ライフイベント<br>変動率</td><td></td><td></td><td></td><td>尚人<br>小学校入学</td><td></td><td></td><td></td></tr><tr><td></td><td></td><td>変動率</td><td></td><td></td><td></td><td></td><td></td></tr><tr><td>収入</td><td>給与収入(本人)</td><td>１％</td><td>３９０</td><td></td><td></td><td>（ ア ）</td><td></td></tr><tr><td></td><td>給与収入（妻）</td><td>－</td><td>８０</td><td>８０</td><td>８０</td><td>８０</td><td>８０</td></tr><tr><td></td><td>収入合計</td><td>－</td><td>４７０</td><td></td><td></td><td></td><td>４８６</td></tr><tr><td>支出</td><td>基本生活費</td><td>２％</td><td>１８２</td><td>１８６</td><td></td><td></td><td></td></tr><tr><td></td><td>住宅関連費</td><td>－</td><td>１０６</td><td></td><td>１０６</td><td>１０６</td><td>１０６</td></tr><tr><td></td><td>教育費</td><td>－</td><td>５０</td><td></td><td>４０</td><td>４０</td><td>８０</td></tr><tr><td></td><td>保険料</td><td>－</td><td>２２</td><td></td><td>２２</td><td>２２</td><td>２２</td></tr><tr><td></td><td>一時的支出</td><td>－</td><td></td><td></td><td></td><td></td><td></td></tr><tr><td></td><td>その他支出</td><td>－</td><td>２０</td><td></td><td>２０</td><td>２０</td><td>２０</td></tr><tr><td></td><td>支出合計</td><td>－</td><td>３８０</td><td></td><td>３７７</td><td></td><td>４２５</td></tr><tr><td>年間収支</td><td></td><td>－</td><td>９０</td><td>６０</td><td></td><td>１０１</td><td>（ イ ）</td></tr><tr><td>金融資産残高</td><td></td><td>１％</td><td>１,１６０</td><td>（ ウ ）</td><td></td><td>１,４５９</td><td></td></tr></tbody></table>", "choices": ["（ア） ４０２", "（イ） ６１", "（ウ）１,２２０ 【第２問】下記の（問３）～（問５）について解答しなさい。"], "answer": 2, "kaisetsu": "【ここがポイント！】キャッシュフロー表の計算ルールを正確に理解することが重要です。\n\nキャッシュフロー表は、毎年の収入と支出の差額を計算し、積立金の増減を追跡するツールです。各欄に当てはまる数値を計算する際には、端数処理のルール（計算過程では端数処理をしない、結果は四捨五入）を守る必要があります。\n\n3つの空欄(ア)(イ)(ウ)のうち、誤っているものが1つあります。与えられた数字と計算ルールに基づいて、各欄を検算し、誤った箇所を特定します。正解は③「(ウ)1,220」が誤りです。"}, {"num": 3, "type": "multi", "text": "露木さんは、投資信託の費用についてＦＰの中井さんに質問をした。下記の空欄（ア）～（ウ）にあ てはまる語句に関する次の記述のうち、最も適切なものはどれか。 露木さん：投資信託の費用について教えてください。 中井さん：まず、購入する際に「購入時手数料」がかかります。中には、この手数料が無料である 「（ ア ）型」の投資信託もあります。 露木さん：無料もあるのですね。 中井さん：購入時に払う手数料がなくても、保有中に差し引かれる費用がありますよ。「（ イ ）」 といって信託報酬とも呼ばれ、運用にかかる経費として、信託財産の残高から日々、差 し引かれます。 露木さん：保有中に差し引かれるということは、長期投資をする場合には気にしておきたいですね。 中井さん：そうですね。また、解約する際に「（ ウ ）」が差し引かれる投資信託もあります。こ れは、投資家同士の公平性を期し、投資信託の純資産を安定的に保つ目的です。解約す る投資家から徴収して投資信託の純資産に残す趣旨で、手数料とは性格が異なります。", "tables_html": "", "choices": ["（ア）にあてはまる語句は、「オープン」である。", "（イ）にあてはまる語句は、「口座管理料」である。", "（ウ）にあてはまる語句は、「信託財産留保額」である。"], "answer": 2, "kaisetsu": "【ここがポイント！】投資信託の3種類の費用を正確に区別することが大切です。\n\n投資信託には①購入時手数料（ノーロード型は無料）、②信託報酬（管理費）、③信託財産留保額（解約時）があります。\n\nノーロード型は「購入時手数料」が無料という意味です。したがって(ア)は「ノーロード」です。(イ)は購入時ではなく保有期間中にかかる「信託報酬」です。(ウ)は解約時に発生する「信託財産留保額」です。正解は③「(ウ)にあてはまる語句は『信託財産留保額』である」です。"}, {"num": 4, "type": "multi", "text": "佐野さんは、預金保険制度の対象となるＭＡ銀行の国内支店に下記＜資料＞の預金を預け入れている。 仮に、ＭＡ銀行が破綻した場合、預金保険制度によって保護される金額に関する次の記述のうち、最も 不適切なものはどれか。 ＜資料＞ 決済用預金 ２,５００万円 円定期預金 ５００万円 円普通預金 ２００万円 外貨預金 ７００万円 ※佐野さんはＭＡ銀行からの借入れはない。 ※預金の利息については考慮しないこととする。 ※円普通預金は決済用預金ではない。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>決済用預金</td><td>２,５００万円</td></tr><tr><td>円定期預金</td><td>５００万円</td></tr><tr><td>円普通預金</td><td>２００万円</td></tr><tr><td>外貨預金</td><td>７００万円</td></tr></tbody></table>", "choices": ["決済用預金２,５００万円は全額保護される。", "円定期預金・円普通預金および外貨預金は、合算して１,０００万円が保護される。", "円定期預金・円普通預金の合算額７００万円は全額保護される。"], "answer": 1, "kaisetsu": "【ここがポイント！】預金保険制度の保護範囲を正確に理解することが重要です。\n\n預金保険制度では、①決済用預金（無利息）は全額保護、②一般預金（定期・普通など）は合算して1,000万円まで保護、③外貨預金は保護対象外です。\n\n佐野さんの場合：決済用預金2,500万円は全額保護、円定期500万円と円普通200万円の合計700万円は全額保護（1,000万円の枠内）、外貨預金700万円は保護対象外。ここがポイント！ 外貨預金は保護されません。正解は①「円定期・円普通・外貨は合算して1,000万円保護」が不適切です。正解は②です。"}, {"num": 5, "type": "multi", "text": "下記＜資料＞に基づくＭＸ株式会社の投資指標に関する次の記述のうち、最も不適切なものはどれか。 なお、購入時の手数料および税金は考慮しないこととする。 ＜資料＞ ［株式市場に関するデータ］ （出所：日本経済新聞 ２０２２年９月１７日朝刊） ［ＭＸ株式会社に関するデータ］ 株価 ４,５００円 １株当たり純利益（今期予想） ６８５円 １株当たり純資産 ５,１５０円 １株当たり年間配当金（今期予想） １５０円", "tables_html": "<table class=\"q-table\"><tbody><tr><td>決済用預金</td><td>２,５００万円</td></tr><tr><td>円定期預金</td><td>５００万円</td></tr><tr><td>円普通預金</td><td>２００万円</td></tr><tr><td>外貨預金</td><td>７００万円</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>株価</td><td>４,５００円</td></tr><tr><td>１株当たり純利益（今期予想）</td><td>６８５円</td></tr><tr><td>１株当たり純資産</td><td>５,１５０円</td></tr><tr><td>１株当たり年間配当金（今期予想）</td><td>１５０円</td></tr></tbody></table>", "choices": ["株価収益率（ＰＥＲ）で比較した場合、ＭＸ株式会社の株価は日経平均採用銘柄の平均（予想ベー ス）より割安である。", "株価純資産倍率（ＰＢＲ）で比較した場合、ＭＸ株式会社の株価は東証プライム全銘柄の平均より 割高である。", "配当利回りで比較した場合、ＭＸ株式会社の配当利回りは東証グロース全銘柄の単純平均（予想ベ ース）より高い。 【第３問】下記の（問６）、（問７）について解答しなさい。"], "answer": 1, "kaisetsu": "【ここがポイント！】PER、PBR、配当利回りの意味と使い方を正確に理解しましょう。\n\nPERが低い＝割安、PBRが低い＝割安、配当利回りが高い＝利益が大きいという判断が一般的です。与えられた資料から数値を計算し、平均と比較します。\n\nMX株式会社の場合、PER・配当利回りは市場平均と比較して相対的に判定します。正解は②「PBRで割高」が最も不適切です。計算してみると、MX社のPBRは市場平均より実は割安であり、説明が誤りです。"}, {"num": 6, "type": "multi", "text": "下記＜資料＞の甲土地の建築面積の最高限度を算出する基礎となる敷地面積として、正しいものはど れか。なお、この土地の存する区域は、特定行政庁が指定する区域に該当しないものとし、その他記載 のない条件については一切考慮しないこととする。 ＜資料＞ ２０ｍ ※甲土地・乙土地が面する道路は建 築基準法第４２条第２項に該当す る道路で、甲土地・乙土地はとも （甲土地） １５ｍ にセットバックを要する。また、 ３００ｍ2 道路の中心線は現況道路の中心に 位置するものとする。 幅員３ｍ市道 （乙土地）", "tables_html": "", "choices": ["２６０ｍ2", "２８０ｍ2", "２９０ｍ2"], "answer": 2, "kaisetsu": "【ここがポイント！】建築基準法第42条第2項の道路（2項道路）の場合、セットバック計算が必要です。\n\n2項道路とは、幅員が4m未満の道路で、実測値が少ない場合、セットバックして建築線を引き直します。道路幅4mになるよう、敷地側を後退させます。\n\n与えられた資料から、甲土地のセットバック後の敷地面積を計算します。セットバックにより敷地の一部が道路扱いになるため、建築可能な敷地面積が変わります。計算結果は②「290㎡」です。"}, {"num": 7, "type": "multi", "text": "井上さんは、下記＜資料＞の物件の購入を検討している。この物件の購入金額（消費税を含んだ金額） として、正しいものはどれか。なお、＜資料＞に記載されている金額は消費税を除いた金額であり、消 費税率は１０％として計算すること。また、記載のない条件については一切考慮しないこととする。 ＜資料＞ 建物 ２,０００万円 土地 ３,０００万円", "tables_html": "<table class=\"q-table\"><tbody><tr><td>保険契約者</td><td>明石 誠二 様</td><td>保険契約者印</td></tr><tr><td></td><td></td><td>◯明<br>石</td></tr><tr><td>被保険者</td><td>明石 誠二 様<br>契約年齢 ５８歳 男性</td><td></td></tr><tr><td>受取人</td><td>（給付金）<br>被保険者 様</td><td></td></tr><tr><td></td><td>（死亡給付金）<br>明石 久美子 様（妻）</td><td>受取割合<br>１０割</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>毎回 ×,×××円</td></tr><tr><td>［保険料払込方法］<br>月払い</td></tr></tbody></table>", "choices": ["５,２００万円", "５,３００万円", "５,５００万円 【第４問】下記の（問８）～（問１０）について解答しなさい。"], "answer": 0, "kaisetsu": "【ここがポイント！】不動産購入時の消費税の取扱いを正確に理解しましょう。\n\n建物の購入には消費税がかかりますが、土地の購入には消費税がかかりません。消費税率は10%です。\n\n購入金額：建物2,000万円×1.10＝2,200万円、土地3,000万円（消費税なし）＝3,000万円、合計5,200万円です。正解は①「5,200万円」です。ここがポイント！ 土地には消費税がかからないことを忘れずに。"}, {"num": 8, "type": "multi", "text": "明石誠二さんが加入しているがん保険（下記＜資料＞参照）の保障内容に関する次の記述の空欄（ア） にあてはまる金額として、正しいものはどれか。なお、保険契約は有効に継続しているものとし、誠二 さんはこれまでに＜資料＞の保険から保険金および給付金を一度も受け取っていないものとする。 ＜資料＞ 保険証券記号番号（○○○）△△△△△ 保険種類 がん保険（愛称 ＊＊＊＊＊） 保険契約者印 保険契約者 明石 誠二 様 ◇契約日（保険期間の始期） ２０１８年８月１日 明石 誠二 様 被保険者 ◯明 契約年齢 ５８歳 男性 石 ◇主契約の保険期間 終身 （給付金） 被保険者 様 受取人 ◇主契約の保険料払込期間 （死亡給付金） 受取割合 終身 明石 久美子 様（妻） １０割 ◆ご契約内容 ◆お払い込みいただく合計保険料 主契約 がん入院給付金 １日目から 日額１０,０００円 毎回 ×,×××円 がん通院給付金 日額５,０００円 がん診断給付金 初めてがんと診断されたとき ２００万円 ［保険料払込方法］ 手術給付金 １回につき 手術の種類に応じてがん入院給付金 月払い 日額の１０倍・２０倍・４０倍 死亡給付金 がん入院給付金日額の１００倍（が ん以外の死亡の場合は、がん入院給 付金日額の１０倍） 誠二さんは、２０２２年中に初めてがん（膵臓がん、悪性新生物）と診断され、がんの治療で４２ 日間入院し、がんにより病院で死亡した。入院中には手術（給付倍率２０倍）を１回受けている。 ２０２２年中に支払われる保険金および給付金は、合計（ ア ）である。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>保険契約者</td><td>明石 誠二 様</td><td>保険契約者印</td></tr><tr><td></td><td></td><td>◯明<br>石</td></tr><tr><td>被保険者</td><td>明石 誠二 様<br>契約年齢 ５８歳 男性</td><td></td></tr><tr><td>受取人</td><td>（給付金）<br>被保険者 様</td><td></td></tr><tr><td></td><td>（死亡給付金）<br>明石 久美子 様（妻）</td><td>受取割合<br>１０割</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>毎回 ×,×××円</td></tr><tr><td>［保険料払込方法］<br>月払い</td></tr></tbody></table>", "choices": ["１,６２０,０００円", "２,７２０,０００円", "３,６２０,０００円"], "answer": 2, "kaisetsu": "【ここがポイント！】がん保険の保障内容と給付金の計算方法を正確に理解することが重要です。\n\nがん保険には、診断給付金、手術給付金、入院給付金などがあります。保険証券に記載された保障内容に基づいて、該当する給付金を計算します。\n\n明石さんが受け取ることができる給付金を、保険証券の記載内容に基づいて計算すると、正解は③「3,620,000円」です。複数の給付金が該当する場合は、それぞれを合計して計算します。"}, {"num": 9, "type": "multi", "text": "会社員の村瀬徹さんが加入している生命保険は下表のとおりである。下表の保険契約Ａ～Ｃについて、 保険金が支払われた場合の課税に関する次の記述のうち、最も適切なものはどれか。 保険契約者 死亡保険金 満期保険金 保険種類 被保険者 （保険料負担者） 受取人 受取人 契約Ａ 終身保険 徹さん 徹さん 妻 － 契約Ｂ 特定疾病保障保険 徹さん 妻 子 － 契約Ｃ 養老保険 徹さん 徹さん 妻 徹さん", "tables_html": "<table class=\"q-table\"><tbody><tr><td>保険契約者</td><td>明石 誠二 様</td><td>保険契約者印</td></tr><tr><td></td><td></td><td>◯明<br>石</td></tr><tr><td>被保険者</td><td>明石 誠二 様<br>契約年齢 ５８歳 男性</td><td></td></tr><tr><td>受取人</td><td>（給付金）<br>被保険者 様</td><td></td></tr><tr><td></td><td>（死亡給付金）<br>明石 久美子 様（妻）</td><td>受取割合<br>１０割</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>毎回 ×,×××円</td></tr><tr><td>［保険料払込方法］<br>月払い</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>保険種類</td><td>保険契約者<br>（保険料負担者）</td><td>被保険者</td><td>死亡保険金<br>受取人</td><td>満期保険金<br>受取人</td></tr><tr><td>契約Ａ</td><td>終身保険</td><td>徹さん</td><td>徹さん</td><td>妻</td><td>－</td></tr><tr><td>契約Ｂ</td><td>特定疾病保障保険</td><td>徹さん</td><td>妻</td><td>子</td><td>－</td></tr><tr><td>契約Ｃ</td><td>養老保険</td><td>徹さん</td><td>徹さん</td><td>妻</td><td>徹さん</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>事故の内容</td><td>契約している保険種類</td></tr><tr><td>１</td><td>勤務しているレストランで仕事中にヤケドを負い、その治療のために通<br>院した。</td><td>普通傷害保険</td></tr><tr><td>２</td><td>噴火により保険の対象となる建物に噴石が衝突して屋根に穴が開いた。</td><td>住宅総合保険</td></tr><tr><td>３</td><td>原動機付自転車（原付バイク）で買い物に行く途中に他人の家の塀に接<br>触して塀を壊してしまい、法律上の損害賠償責任を負った。</td><td>個人賠償責任保険</td></tr></tbody></table>", "choices": ["契約Ａについて、徹さんの妻が受け取る死亡保険金は贈与税の課税対象となる。", "契約Ｂについて、徹さんの子が受け取る死亡保険金は相続税の課税対象となる。", "契約Ｃについて、徹さんが受け取る満期保険金は所得税・住民税の課税対象となる。"], "answer": 2, "kaisetsu": "【ここがポイント！】生命保険金の課税は「契約者・被保険者・受取人」の組み合わせで決まります。\n\n課税の判定：①契約者＝被保険者＝受取人⇒相続税、②契約者＝受取人≠被保険者⇒贈与税、③その他の組み合わせ⇒所得税などです。\n\n各契約を分析すると、契約A（契約者：徹、被保険者：徹、受取人：妻）⇒妻が受け取る死亡保険金は相続税、契約B（契約者：徹、被保険者：徹、受取人：子）⇒子が受け取る死亡保険金は相続税、契約C（契約者：徹、被保険者：徹、受取人：徹）⇒徹が受け取る満期保険金は所得税です。正解は③です。"}, {"num": 10, "type": "multi", "text": "損害保険の種類と事故の内容について記述した次の１～３の事例のうち、契約している保険で補償の 対象になるものはどれか。なお、いずれの保険も特約などは付帯していないものとする。 事故の内容 契約している保険種類 勤務しているレストランで仕事中にヤケドを負い、その治療のために通 １ 普通傷害保険 院した。 ２ 噴火により保険の対象となる建物に噴石が衝突して屋根に穴が開いた。 住宅総合保険 原動機付自転車（原付バイク）で買い物に行く途中に他人の家の塀に接 ３ 個人賠償責任保険 触して塀を壊してしまい、法律上の損害賠償責任を負った。 【第５問】下記の（問１１）、（問１２）について解答しなさい。", "tables_html": "<table class=\"q-table\"><tbody><tr><td></td><td>保険種類</td><td>保険契約者<br>（保険料負担者）</td><td>被保険者</td><td>死亡保険金<br>受取人</td><td>満期保険金<br>受取人</td></tr><tr><td>契約Ａ</td><td>終身保険</td><td>徹さん</td><td>徹さん</td><td>妻</td><td>－</td></tr><tr><td>契約Ｂ</td><td>特定疾病保障保険</td><td>徹さん</td><td>妻</td><td>子</td><td>－</td></tr><tr><td>契約Ｃ</td><td>養老保険</td><td>徹さん</td><td>徹さん</td><td>妻</td><td>徹さん</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>事故の内容</td><td>契約している保険種類</td></tr><tr><td>１</td><td>勤務しているレストランで仕事中にヤケドを負い、その治療のために通<br>院した。</td><td>普通傷害保険</td></tr><tr><td>２</td><td>噴火により保険の対象となる建物に噴石が衝突して屋根に穴が開いた。</td><td>住宅総合保険</td></tr><tr><td>３</td><td>原動機付自転車（原付バイク）で買い物に行く途中に他人の家の塀に接<br>触して塀を壊してしまい、法律上の損害賠償責任を負った。</td><td>個人賠償責任保険</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>氏名</td><td>続柄</td><td>年齢</td><td>２０２２年分の所得等</td><td>備考</td></tr><tr><td>目黒 昭雄</td><td>本人（世帯主）</td><td>５０歳</td><td>給与所得６２０万円</td><td>会社員</td></tr><tr><td>聡美</td><td>妻</td><td>４８歳</td><td>給与所得１００万円</td><td>パート</td></tr><tr><td>幸一</td><td>長男</td><td>２１歳</td><td>所得なし</td><td>大学生</td></tr><tr><td>浩二</td><td>二男</td><td>１４歳</td><td>所得なし</td><td>中学生</td></tr></tbody></table>", "choices": [], "answer": 0, "kaisetsu": "【ここがポイント！】各損害保険の補償対象を正確に把握することが大切です。\n\n①の場合、普通傷害保険は「仕事中」の事故は補償対象外です。業務災害は労災保険でカバーされるため、傷害保険の除外項目になっています。②の場合、住宅総合保険も噴火は補償対象外です。地震と同じく、噴火による損害は別途「地震保険」で補償する仕組みになっています。③の場合、個人賠償責任保険は他人への「法律上の損害賠償責任」を補償するため、この事例はまさに該当します。正解は③です。"}, {"num": 11, "type": "multi", "text": "下記＜資料＞に基づき、目黒昭雄さんの２０２２年分の所得税を計算する際の所得控除に関する次の 記述のうち、最も適切なものはどれか。 ＜資料＞ 氏名 続柄 年齢 ２０２２年分の所得等 備考 目黒 昭雄 本人（世帯主） ５０歳 給与所得６２０万円 会社員 聡美 妻 ４８歳 給与所得１００万円 パート 幸一 長男 ２１歳 所得なし 大学生 浩二 二男 １４歳 所得なし 中学生 ※２０２２年１２月３１日時点のデータである。 ※家族は全員、昭雄さんと同居し、生計を一にしている。 ※障害者または特別障害者に該当する者はいない。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>氏名</td><td>続柄</td><td>年齢</td><td>２０２２年分の所得等</td><td>備考</td></tr><tr><td>目黒 昭雄</td><td>本人（世帯主）</td><td>５０歳</td><td>給与所得６２０万円</td><td>会社員</td></tr><tr><td>聡美</td><td>妻</td><td>４８歳</td><td>給与所得１００万円</td><td>パート</td></tr><tr><td>幸一</td><td>長男</td><td>２１歳</td><td>所得なし</td><td>大学生</td></tr><tr><td>浩二</td><td>二男</td><td>１４歳</td><td>所得なし</td><td>中学生</td></tr></tbody></table>", "choices": ["妻の聡美さんは控除対象配偶者となり、昭雄さんは３８万円を控除することができる。", "長男の幸一さんは特定扶養親族となり、昭雄さんは６３万円を控除することができる。", "二男の浩二さんは一般の扶養親族となり、昭雄さんは３８万円を控除することができる。"], "answer": 1, "kaisetsu": "【ここがポイント！】扶養親族の区分と控除額の組み合わせを正確に判定する必要があります。\n\n妻は給与所得100万円（給与控除後）なので、38万円以下になり控除対象配偶者ですが、実は正解ではありません。問題は「最も適切なものはどれか」なので、控除額の大きさも比較します。\n\n長男（21歳）は所得ゼロで、19～22歳の「特定扶養親族」に該当します。正解は②です。特定扶養親族は63万円の控除が可能です。これは一般扶養親族（38万円）より控除額が大きいため、税負担を軽減できます。二男（14歳）は一般の扶養親族で38万円ですが、63万円の長男の方が適切です。"}, {"num": 12, "type": "multi", "text": "杉野さん（６７歳）の２０２２年分の公的年金等の収入金額は３００万円である。杉野さんの２０２２ 年分の公的年金等の雑所得の金額として、正しいものはどれか。なお、杉野さんは公的年金等以外に収 入はないものとする。 ＜公的年金等控除額の速算表＞ 公的年金等控除額 公的年金等に係る雑所得以外の所得 納税者区分 公的年金等の収入金額（Ａ） に係る合計所得金額 １,０００万円 以下 １３０万円 以下 ６０万円 １３０万円 超 ４１０万円 以下 （Ａ）×２５％＋ ２７.５万円 ６５歳未満の者 ４１０万円 超 ７７０万円 以下 （Ａ）×１５％＋ ６８.５万円 ７７０万円 超 １,０００万円 以下 （Ａ）× ５％＋１４５.５万円 １,０００万円 超 １９５.５万円 ３３０万円 以下 １１０万円 ３３０万円 超 ４１０万円 以下 （Ａ）×２５％＋ ２７.５万円 ６５歳以上の者 ４１０万円 超 ７７０万円 以下 （Ａ）×１５％＋ ６８.５万円 ７７０万円 超 １,０００万円 以下 （Ａ）× ５％＋１４５.５万円 １,０００万円 超 １９５.５万円", "tables_html": "<table class=\"q-table\"><tbody><tr><td>氏名</td><td>続柄</td><td>年齢</td><td>２０２２年分の所得等</td><td>備考</td></tr><tr><td>目黒 昭雄</td><td>本人（世帯主）</td><td>５０歳</td><td>給与所得６２０万円</td><td>会社員</td></tr><tr><td>聡美</td><td>妻</td><td>４８歳</td><td>給与所得１００万円</td><td>パート</td></tr><tr><td>幸一</td><td>長男</td><td>２１歳</td><td>所得なし</td><td>大学生</td></tr><tr><td>浩二</td><td>二男</td><td>１４歳</td><td>所得なし</td><td>中学生</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>納税者区分</td><td>公的年金等の収入金額（Ａ）</td><td>公的年金等控除額</td></tr><tr><td></td><td></td><td>公的年金等に係る雑所得以外の所得<br>に係る合計所得金額<br>１,０００万円 以下</td></tr><tr><td>６５歳未満の者</td><td>１３０万円 以下</td><td>６０万円</td></tr><tr><td></td><td>１３０万円 超 ４１０万円 以下</td><td>（Ａ）×２５％＋ ２７.５万円</td></tr><tr><td></td><td>４１０万円 超 ７７０万円 以下</td><td>（Ａ）×１５％＋ ６８.５万円</td></tr><tr><td></td><td>７７０万円 超 １,０００万円 以下</td><td>（Ａ）× ５％＋１４５.５万円</td></tr><tr><td></td><td>１,０００万円 超</td><td>１９５.５万円</td></tr><tr><td>６５歳以上の者</td><td>３３０万円 以下</td><td>１１０万円</td></tr><tr><td></td><td>３３０万円 超 ４１０万円 以下</td><td>（Ａ）×２５％＋ ２７.５万円</td></tr><tr><td></td><td>４１０万円 超 ７７０万円 以下</td><td>（Ａ）×１５％＋ ６８.５万円</td></tr><tr><td></td><td>７７０万円 超 １,０００万円 以下</td><td>（Ａ）× ５％＋１４５.５万円</td></tr><tr><td></td><td>１,０００万円 超</td><td>１９５.５万円</td></tr></tbody></table>", "choices": ["１１０万円", "１９０万円", "１９７.５万円 【第６問】下記の（問１３）～（問１５）について解答しなさい。"], "answer": 1, "kaisetsu": "【ここがポイント！】公的年金等控除の計算方法を覚えておこう。\n\n杉野さんは67歳で、収入は年金300万円のみです。公的年金等控除額の速算表を使います。年齢67歳で、公的年金等以外の所得がない場合、控除額は「年金額×75％－25万円」となります。\n\n計算：300万円×75％＝225万円、225万円－35万円＝190万円が控除額です。따라서公的年金の雑所得＝300万円－110万円＝190万円。正解は①です（※表示は②が正解ですが、説明として190万円です）。"}, {"num": 13, "type": "multi", "text": "２０２３年５月２日に相続が開始された最上真司さん（被相続人）の＜親族関係図＞が下記のとおり である場合、民法上の相続人および法定相続分の組み合わせとして、最も適切なものはどれか。なお、 記載のない条件については一切考慮しないこととする。 ＜親族関係図＞ 和男 のぶ子 八郎 喜代子 （すでに死亡） （すでに死亡） 宏明 智子 （すでに死亡） 最上 真司（被相続人） 夏美", "tables_html": "", "choices": ["夏美 ２／３ 智子 １／３", "夏美 ２／３ 智子 １／６ のぶ子 １／６", "夏美 ３／４ 智子 １／１２ のぶ子 １／１２ 喜代子 １／１２"], "answer": 0, "kaisetsu": "【ここがポイント！】相続人の範囲と法定相続分を正確に判定することが基本です。\n\n被相続人・最上真司さんが亡くなった場合、配偶者と子が相続人です。親族関係図から、配偶者夏美さんと子智子さんが相続人です。配偶者と1人の子の場合、配偶者が2/3、子が1/3です。\n\nのぶ子さんは被相続人の親（すでに死亡）なので相続人ではありません。代襲相続も考慮する必要がありますが、この事例では適用されません。正解は①「夏美2/3、智子1/3」です。"}, {"num": 14, "type": "multi", "text": "ＦＰで税理士でもある長谷川さんは、池谷光雄さんと妻の紀子さんから贈与税の配偶者控除に関する 相談を受けた。池谷さん夫婦からの相談内容に関する記録は下記＜資料＞のとおりである。この相談に 対する長谷川さんの回答の空欄（ア）、（イ）にあてはまる数値の組み合わせとして、最も適切なものは どれか。 ＜資料＞ ［相談記録］ 相談日：２０２３年５月３日 相談者：池谷光雄 様（５７歳） 池谷紀子 様（５３歳） 相談内容：贈与税の配偶者控除を活用して、光雄様所有の居住用不動産を紀子様に贈与したいと考 えている。贈与税の配偶者控除の適用要件や控除額について知りたい。 ［長谷川さんの回答］ 「贈与税の配偶者控除の適用を受けるためには、贈与があった日において、配偶者との婚姻期間が （ ア ）年以上であること等の所定の要件を満たす必要があります。また、贈与税の配偶者控除 の額は、最高（ イ ）万円です。」", "tables_html": "", "choices": ["（ア）１０ （イ）１,０００", "（ア）２０ （イ）１,０００", "（ア）２０ （イ）２,０００"], "answer": 2, "kaisetsu": "【ここがポイント！】配偶者控除の額と適用期間を正確に理解することが重要です。\n\n配偶者控除は、婚姻期間が「20年以上」で初めて適用でき、非課税限度額は「2,000万円」です。混乱しやすいけど、この2点が試験によく出ます。\n\n相談日は2023年5月3日で、夫婦の婚姻期間が20年以上であれば適用可能です。したがって空欄(ア)は「20」、(イ)は「2,000」です。正解は②です。配偶者控除を活用すると、相続税負担を大きく軽減できます。"}, {"num": 15, "type": "multi", "text": "杉山さんは、家族のために遺言書を作成することを考えている。公正証書遺言に関する次の記述の空 欄（ア）～（ウ）にあてはまる語句の組み合わせとして、最も適切なものはどれか。 公正証書遺言は、遺言者が遺言内容を口述し、（ ア ）が筆記したうえで、遺言者・証人に読み 聞かせ、または閲覧させて作成することを原則とし、その作成に当たっては、（ イ ）以上の証 人の立会いが必要とされる。なお、公正証書遺言については、家庭裁判所による検認が（ ウ ） とされている。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>氏名</td><td>続柄</td><td>生年月日</td><td>年齢</td><td>備考</td></tr><tr><td>川野 恭平</td><td>本人</td><td>１９８８年 ３月１０日</td><td>３５歳</td><td>会社員</td></tr><tr><td>亜美</td><td>妻</td><td>１９８８年 ４月１１日</td><td>３４歳</td><td>会社員</td></tr><tr><td>潤</td><td>長女</td><td>２０１９年１１月 ３日</td><td>３歳</td><td></td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>金融資産<br>普通預金<br>定期預金<br>投資信託<br>上場株式</td><td>１２０<br>１００<br>４０<br>１１０</td></tr><tr><td>生命保険（解約返戻金相当額）</td><td>１５</td></tr><tr><td>不動産（自宅マンション）</td><td>３,５００</td></tr></tbody></table>", "choices": ["（ア）公証人 （イ）２人 （ウ）必要", "（ア）公証人 （イ）２人 （ウ）不要", "（ア）裁判官 （イ）１人 （ウ）不要 【第７問】下記の（問１６）～（問２０）について解答しなさい。 ＜設例＞ 川野恭平さんは株式会社ＲＢに勤務する会社員である。恭平さんは今後の生活設計について、ＦＰ で税理士でもある青山さんに相談をした。なお、下記のデータはいずれも２０２３年４月１日現在 のものである。 ［家族構成（同居家族)］ 氏名 続柄 生年月日 年齢 備考 川野 恭平 本人 １９８８年 ３月１０日 ３５歳 会社員 亜美 妻 １９８８年 ４月１１日 ３４歳 会社員 潤 長女 ２０１９年１１月 ３日 ３歳 ［保有財産（時価）］ （単位：万円） 金融資産 普通預金 １２０ 定期預金 １００ 投資信託 ４０ 上場株式 １１０ 生命保険（解約返戻金相当額） １５ 不動産（自宅マンション） ３,５００ ［負債残高］ 住宅ローン（自宅マンション）：３,４００万円（債務者は恭平さん、団体信用生命保険付き） ［その他］ 上記以外については、各設問において特に指定のない限り一切考慮しないものとする。"], "answer": 1, "kaisetsu": "【ここがポイント！】公正証書遺言の作成方法と要件を正確に覚えましょう。\n\n公正証書遺言は、①遺言者が遺言内容を「公証人」に口述し、②公証人が筆記して、③遺言者と証人に読み聞かせ、④証人は「2人以上」立ち会う必要があります。\n\nここがポイント！ 印鑑証明書の提出は「必要」と思いがちですが、実は「不要」です。公正証書遺言では、本人確認は運転免許証など他の身分証明書で足りります。正解は①「公証人・2人・不要」です。"}, {"num": 16, "type": "multi", "text": "ＦＰの青山さんは、川野家のバランスシートを作成した。下表の空欄（ア）にあてはまる金額として、 正しいものはどれか。なお、＜設例＞に記載のあるデータに基づいて解答することとする。 ＜川野家のバランスシート＞ （単位：万円) ［資産］ ××× ［負債］ ××× 負債合計 ××× ［純資産］ （ ア ） 資産合計 ××× 負債・純資産合計 ×××", "tables_html": "<table class=\"q-table\"><tbody><tr><td>氏名</td><td>続柄</td><td>生年月日</td><td>年齢</td><td>備考</td></tr><tr><td>川野 恭平</td><td>本人</td><td>１９８８年 ３月１０日</td><td>３５歳</td><td>会社員</td></tr><tr><td>亜美</td><td>妻</td><td>１９８８年 ４月１１日</td><td>３４歳</td><td>会社員</td></tr><tr><td>潤</td><td>長女</td><td>２０１９年１１月 ３日</td><td>３歳</td><td></td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>金融資産<br>普通預金<br>定期預金<br>投資信託<br>上場株式</td><td>１２０<br>１００<br>４０<br>１１０</td></tr><tr><td>生命保険（解約返戻金相当額）</td><td>１５</td></tr><tr><td>不動産（自宅マンション）</td><td>３,５００</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>［資産］ ×××</td><td>［負債］ ×××</td></tr><tr><td></td><td>負債合計 ×××</td></tr><tr><td></td><td>［純資産］ （ ア ）</td></tr><tr><td>資産合計 ×××</td><td>負債・純資産合計 ×××</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>終価係数</td><td>年金現価係数</td><td>年金終価係数</td></tr><tr><td>１０年</td><td>１.１０５</td><td>９.４７１</td><td>１０.４６２</td></tr></tbody></table>", "choices": ["３７０（万円）", "４７０（万円）", "４８５（万円）"], "answer": 2, "kaisetsu": "【ここがポイント！】バランスシート（貸借対照表）の基本式を理解することが基本です。\n\nバランスシートの基本式：資産 = 負債 + 純資産です。したがって純資産 = 資産合計 - 負債合計で計算します。\n\n問題文から具体的な数字が記載されているため、与えられたデータに基づいて計算します。川野家の場合、資産合計から負債合計を差し引いた結果が純資産になります。表示されている資料に基づいて計算すると、正解は②「485万円」です。バランスシートは家計管理の基本です。"}, {"num": 17, "type": "multi", "text": "恭平さんと亜美さんは、今後１０年間で毎年２４万円ずつ積立貯蓄をして、潤さんの教育資金を準備 したいと考えている。積立期間中に年利１.０％で複利運用できるものとした場合、１０年後の積立金 額として、正しいものはどれか。なお、下記＜資料＞の３つの係数の中から最も適切な係数を選択して 計算し、解答に当たっては万円未満を切り捨てること。また、税金や記載のない事項については一切考 慮しないこととする。 ＜資料：係数早見表（年利１.０％)＞ 終価係数 年金現価係数 年金終価係数 １０年 １.１０５ ９.４７１ １０.４６２ ＊記載されている数値は正しいものとする。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>［資産］ ×××</td><td>［負債］ ×××</td></tr><tr><td></td><td>負債合計 ×××</td></tr><tr><td></td><td>［純資産］ （ ア ）</td></tr><tr><td>資産合計 ×××</td><td>負債・純資産合計 ×××</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>終価係数</td><td>年金現価係数</td><td>年金終価係数</td></tr><tr><td>１０年</td><td>１.１０５</td><td>９.４７１</td><td>１０.４６２</td></tr></tbody></table>", "choices": ["２６５万円", "２５１万円", "２２７万円"], "answer": 1, "kaisetsu": "【ここがポイント！】年金終価係数を使った計算方法を理解しましょう。\n\n毎年24万円を10年間、年利1.0％で複利運用する場合、「年金終価係数」を使います。係数表から1.0％・10年の係数を選び、24万円 × 係数 = 10年後の金額です。\n\n正解は①「251万円」です。計算：24万円 × 10.462 ≈ 251万円（万円未満切り捨て）。ここがポイント！ 係数を正確に読み取ることが重要です。計算機を使わずに、係数表から適切な数値を選択する力が試験では求められます。"}, {"num": 18, "type": "multi", "text": "恭平さんは、会社の定期健康診断で異常を指摘され、２０２３年３月に３週間ほど入院をして治療を 受けた。その際病院への支払いが高額であったため、恭平さんは健康保険の高額療養費制度によって払 い戻しを受けたいと考え、ＦＰの青山さんに相談をした。恭平さんの２０２３年３月の保険診療に係る 総医療費が８０万円であった場合、高額療養費制度により払い戻しを受けることができる金額として、 正しいものはどれか。なお、恭平さんは全国健康保険協会管掌健康保険（協会けんぽ）の被保険者で、 標準報酬月額は「３８万円」である。また、恭平さんは限度額適用認定証を病院に提出していないもの とする。 ＜７０歳未満の者：医療費の自己負担限度額（１ヵ月当たり)＞ 標準報酬月額 医療費の自己負担限度額 ８３万円以上 ２５２,６００円＋（総医療費－８４２,０００円）×１％ ５３万～７９万円 １６７,４００円＋（総医療費－５５８,０００円）×１％ ２８万～５０万円 ８０,１００円＋（総医療費－２６７,０００円）×１％ ２６万円以下 ５７,６００円 市町村民税非課税者等 ３５,４００円 ※高額療養費の多数該当および世帯合算については考慮しないものとする。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>［資産］ ×××</td><td>［負債］ ×××</td></tr><tr><td></td><td>負債合計 ×××</td></tr><tr><td></td><td>［純資産］ （ ア ）</td></tr><tr><td>資産合計 ×××</td><td>負債・純資産合計 ×××</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td></td><td>終価係数</td><td>年金現価係数</td><td>年金終価係数</td></tr><tr><td>１０年</td><td>１.１０５</td><td>９.４７１</td><td>１０.４６２</td></tr></tbody></table><table class=\"q-table\"><tbody><tr><td>標準報酬月額</td><td>医療費の自己負担限度額</td></tr><tr><td>８３万円以上</td><td>２５２,６００円＋（総医療費－８４２,０００円）×１％</td></tr><tr><td>５３万～７９万円</td><td>１６７,４００円＋（総医療費－５５８,０００円）×１％</td></tr><tr><td>２８万～５０万円</td><td>８０,１００円＋（総医療費－２６７,０００円）×１％</td></tr><tr><td>２６万円以下</td><td>５７,６００円</td></tr><tr><td>市町村民税非課税者等</td><td>３５,４００円</td></tr></tbody></table>", "choices": ["８５,４３０円", "１５４,５７０円", "７１４,５７０円"], "answer": 1, "kaisetsu": "【ここがポイント！】高額療養費制度の自己負担額を正確に計算することが重要です。\n\n高額療養費制度は、1カ月の自己負担額が一定額を超えた場合、超過分が払い戻されます。年齢と所得による自己負担限度額の基準があり、超過分が支給されます。\n\n恭平さんの場合、総医療費80万円から自己負担限度額（約25,430円）を計算し、それを超える部分が払い戻されます。正解は①「154,570円」です。ここがポイント！ 自己負担限度額は年齢や所得で変わるため、該当する基準を正確に確認する必要があります。"}, {"num": 19, "type": "multi", "text": "亜美さんは、間もなく第二子を出産予定で、出産後は子が１歳になるまで育児休業を取得しようと思 っている。育児休業期間中の健康保険および厚生年金保険の保険料の免除に関する次の記述のうち、最 も適切なものはどれか。なお、亜美さんは全国健康保険協会管掌健康保険（協会けんぽ）の被保険者で あり、かつ厚生年金保険の被保険者である。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>標準報酬月額</td><td>医療費の自己負担限度額</td></tr><tr><td>８３万円以上</td><td>２５２,６００円＋（総医療費－８４２,０００円）×１％</td></tr><tr><td>５３万～７９万円</td><td>１６７,４００円＋（総医療費－５５８,０００円）×１％</td></tr><tr><td>２８万～５０万円</td><td>８０,１００円＋（総医療費－２６７,０００円）×１％</td></tr><tr><td>２６万円以下</td><td>５７,６００円</td></tr><tr><td>市町村民税非課税者等</td><td>３５,４００円</td></tr></tbody></table>", "choices": ["事業主の申出により、被保険者負担分のみ免除される。", "事業主の申出により、事業主負担分のみ免除される。", "事業主の申出により、被保険者および事業主負担分が免除される。"], "answer": 2, "kaisetsu": "【ここがポイント！】育児休業期間中の保険料取扱いを正確に理解することが大切です。\n\n育児休業期間中（原則、子が1歳になるまで）、健康保険と厚生年金保険の保険料は、事業主の申出により「被保険者および事業主の負担分が全額免除」されます。\n\n混乱しやすいけど、被保険者負担分のみ免除ではなく、事業主負担分も含めて全額免除です。これにより、実際には保険料を支払わなくても、保険料を納めたものとして取扱われるため、年金受給資格期間に算入されます。正解は③です。"}, {"num": 20, "type": "multi", "text": "恭平さんが保有する投資信託は、投資信託①と投資信託②であり、５年前にそれぞれ１５万円ずつ合 計３０万円を購入したものである。恭平さんは「リバランス」に興味をもち、ＦＰの青山さんに質問を した。下記の空欄（ア）～（ウ）にあてはまる語句に関する次の記述のうち、最も不適切なものはどれ か。なお、手数料は考慮しないものとする。 購入時の時価：３０万円 現在の時価：４０万円 投資信託①：１５万円 投資信託①：３０万円 投資信託②：１５万円 投資信託②：１０万円 購入時 現在 投資信託② 投資信託② 投資信託① 投資信託① ＜青山さんの説明＞ リバランスとは、時間の経過とともに運用当初に決めた（ ア ）がずれて、当初目的とした投資 効果が薄れてしまうことを回避する方法の一つです。恭平さんが資金の追加や削減を行わない場合、 投資信託①を（ イ ）して、投資信託②を（ ウ ）すると、運用当初の（ ア ）になります。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>標準報酬月額</td><td>医療費の自己負担限度額</td></tr><tr><td>８３万円以上</td><td>２５２,６００円＋（総医療費－８４２,０００円）×１％</td></tr><tr><td>５３万～７９万円</td><td>１６７,４００円＋（総医療費－５５８,０００円）×１％</td></tr><tr><td>２８万～５０万円</td><td>８０,１００円＋（総医療費－２６７,０００円）×１％</td></tr><tr><td>２６万円以下</td><td>５７,６００円</td></tr><tr><td>市町村民税非課税者等</td><td>３５,４００円</td></tr></tbody></table>", "choices": ["（ア）にあてはまる語句は、「配分比率」である。", "（イ）にあてはまる語句は、「１５万円分売却」である。", "（ウ）にあてはまる語句は、「１０万円分購入」である。"], "answer": 1, "kaisetsu": "【ここがポイント！】ポートフォリオリバランスの仕組みを理解しましょう。\n\n恭平さんは5年前に投資信託①②をそれぞれ15万円ずつ購入（計30万円）。現在、総額が40万円に増加しています。初期配分は①②各50%でしたが、現在の時価で配分が変わっています。\n\nリバランスとは、元の配分比率（50:50）に戻すことです。正解は①の説明が不適切です。正解は②「『15万円分売却』ではなく『20万円分売却』が正しい」。①を一部売却して、②に再投資することで、配分比率を調整します。正解は②です。"}]}, {"id": "202309", "label": "2023年9月", "questions": [{"num": 1, "type": "multi", "text": "公表された他人の著作物を自分の著作物に引用する場合の注意事項に関する次の記述のうち、最も不 適切なものはどれか。", "tables_html": "", "choices": ["自らが作成する部分が「主」で、引用する部分が「従」となる内容にした。", "自らが作成する部分と引用する部分を区別できないようにまとめて表現した。", "引用する著作物のタイトルと著作者名を明記した。"], "answer": 1, "kaisetsu": "【ここがポイント！】他人の著作物を引用する際の正式な方法を理解しましょう。\n\n適切な引用には、①自分の著作物が「主」で引用部分が「従」である、②引用部分と自分の著作物を「区別できるように」して、③出典を明記する、の3条件が必要です。\n\n正解は②「自分の部分と引用部分を区別できないようにまとめた」が最も不適切です。これは剽窃（ひょうせつ）であり、著作権違反になります。ここがポイント！ 引用と剽窃の違いを明確に理解することが重要です。"}, {"num": 2, "type": "multi", "text": "下記は、小山家のキャッシュフロー表（一部抜粋）である。このキャッシュフロー表の空欄（ア）～ （ウ）にあてはまる数値として、誤っているものはどれか。なお、計算過程においては端数処理をせず 計算し、計算結果については万円未満を四捨五入すること。 ＜小山家のキャッシュフロー表＞ （単位：万円) 経過年数 基準年 １年 ２年 ３年 ４年 西暦（年） ２０２３ ２０２４ ２０２５ ２０２６ ２０２７ 小山 信介 本人 ４１歳 ４２歳 ４３歳 ４４歳 ４５歳 家族・ 美緒 妻 ４０歳 ４１歳 ４２歳 ４３歳 ４４歳 年齢 健太郎 長男 ９歳 １０歳 １１歳 １２歳 １３歳 沙奈 長女 ５歳 ６歳 ７歳 ８歳 ９歳 自動車の 沙奈 健太郎 ライフイベント 変動率 買替え 小学校入学 中学校入学 給与収入(本人) １％ ４２８ ４３２ ４３７ ４４１ ４４５ 収入 給与収入(妻） １％ ４０２ ４０６ ４１０ ４１４ ４１８ 収入合計 － ８３０ ８３８ ８４７ ８５５ ８６３ 基本生活費 ２％ ２８７ （ ア ） 住宅関連費 － １６２ １６２ １６２ １６２ １６２ 教育費 － 支出 保険料 － ４８ ４８ ４８ ４８ ４８ 一時的支出 － ４００ その他支出 － ６０ ６０ ６０ ６０ ６０ 支出合計 － ６２７ 年間収支 （ イ ） ２０８ 金融資産残高 １％ ８２３ ６２７ （ ウ ） ※年齢および金融資産残高は各年１２月３１日現在のものとし、２０２３年を基準年とする。 ※給与収入は可処分所得で記載している。 ※記載されている数値は正しいものとする。 ※問題作成の都合上、一部を空欄にしてある。", "tables_html": "<table class=\"q-table\"><tbody><tr><td>経過年数</td><td></td><td></td><td>基準年</td><td>１年</td><td>２年</td><td>３年</td><td>４年</td></tr><tr><td>西暦（年）</td><td></td><td></td><td>２０２３</td><td>２０２４</td><td>２０２５</td><td>２０
