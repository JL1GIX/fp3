<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FP3級 過去問集</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g1:#1b5e20;
  --g2:#2e7d32;
  --g3:#388e3c;
  --g4:#43a047;
  --g5:#66bb6a;
  --gl:#c8e6c9;
  --gxl:#e8f5e9;
  --gxxl:#f1f8e9;
  --accent:#f9a825;
  --accent2:#ff8f00;
  --red:#d32f2f;
  --border:#a5d6a7;
  --text:#1a1a1a;
  --gray:#616161;
  --lg:#f5f5f5;
}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:var(--gxxl);color:var(--text);font-size:15px;line-height:1.65;min-height:100vh}

/* ========== HEADER ========== */
header{background:var(--g2);position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.hdr{max-width:820px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-badge{background:#fff;color:var(--g2);font-weight:900;font-size:13px;padding:3px 7px;border-radius:4px;letter-spacing:.05em}
.logo-title{color:#fff;font-size:1.05rem;font-weight:800;letter-spacing:.03em}
.logo-title em{font-style:normal;font-size:.75em;opacity:.85}
nav{display:flex;gap:2px}
nav button{background:rgba(255,255,255,.15);color:#fff;border:none;padding:7px 14px;border-radius:4px;font-size:.83rem;cursor:pointer;transition:.15s;font-weight:600;white-space:nowrap}
nav button:hover{background:rgba(255,255,255,.3)}
nav button.active{background:#fff;color:var(--g2)}

/* ========== PROGRESS BAR ========== */
.prog-bar-wrap{background:rgba(0,0,0,.2);height:4px;position:sticky;top:54px;z-index:199}
.prog-bar-fill{height:4px;background:var(--accent);transition:.35s;width:0%}

/* ========== MAIN ========== */
main{max-width:820px;margin:0 auto;padding:16px 16px 60px}

/* ========== HERO ========== */
.hero{background:linear-gradient(135deg,var(--g2),var(--g4));color:#fff;border-radius:12px;padding:28px 24px;margin-bottom:24px;text-align:center;box-shadow:0 4px 16px rgba(46,125,50,.3)}
.hero h1{font-size:1.6rem;font-weight:900;margin-bottom:8px;letter-spacing:.03em}
.hero p{font-size:.92rem;opacity:.9;margin-bottom:20px}
.hero-stats{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.hero-stat{background:rgba(255,255,255,.2);border-radius:8px;padding:10px 20px;text-align:center}
.hero-stat .n{font-size:1.6rem;font-weight:900;display:block}
.hero-stat .l{font-size:.75rem;opacity:.85}

/* ========== EXAM CARDS ========== */
.section-title{font-size:1rem;font-weight:700;color:var(--g2);margin:20px 0 12px;display:flex;align-items:center;gap:8px;padding-bottom:6px;border-bottom:2px solid var(--gl)}
.exam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:24px}
.exam-card{background:#fff;border:2px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:.2s;text-align:center;position:relative;overflow:hidden}
.exam-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--g3)}
.exam-card:hover{border-color:var(--g4);box-shadow:0 4px 16px rgba(46,125,50,.2);transform:translateY(-2px)}
.exam-card .year{font-size:1.1rem;font-weight:800;color:var(--g2);margin-bottom:4px}
.exam-card .cnt{font-size:.8rem;color:var(--gray)}
.exam-card .badge{display:inline-block;padding:2px 10px;border-radius:10px;font-size:.72rem;font-weight:600;margin-top:8px}
.badge-g{background:var(--gxl);color:var(--g2);border:1px solid var(--gl)}
.badge-j{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}

/* ========== MODE BUTTONS ========== */
.mode-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.mode-btn{flex:1;min-width:140px;padding:10px 16px;border:2px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:600;color:var(--g2);transition:.15s;text-align:center}
.mode-btn:hover,.mode-btn.sel{background:var(--gxl);border-color:var(--g3)}

/* ========== QUIZ SECTION ========== */
.quiz-wrap{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:16px}

/* Breadcrumb */
.bread{font-size:.78rem;color:var(--gray);margin-bottom:12px;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.bread span::after{content:' ›';margin-left:4px;color:#bbb}
.bread span:last-child::after{content:''}
.bread a{color:var(--g2);cursor:pointer;text-decoration:none}
.bread a:hover{text-decoration:underline}

/* Question title bar */
.q-titlebar{background:var(--gxl);border-left:5px solid var(--g3);padding:8px 14px;border-radius:0 6px 6px 0;margin-bottom:14px;font-size:.88rem;color:var(--g2);font-weight:600}

/* Question number */
.q-num-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.q-num{font-size:1.15rem;font-weight:800;color:var(--g1)}
.q-tag{font-size:.72rem;padding:3px 10px;border-radius:10px;font-weight:600}
.tag-ox{background:#e8f5e9;color:var(--g2);border:1px solid var(--gl)}
.tag-mc{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}

/* Question text */
.q-text{font-size:1rem;line-height:1.85;color:var(--text);margin-bottom:14px;white-space:pre-wrap}

/* Tables */
.q-table{border-collapse:collapse;width:100%;margin:12px 0;font-size:.83rem;background:#fff}
.q-table td{border:1px solid #bdbdbd;padding:6px 10px;vertical-align:top;line-height:1.5}
.q-table tr:first-child td{background:var(--gxl);font-weight:600;color:var(--g1)}
.q-table-wrap{overflow-x:auto;margin:12px 0;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* Choices list */
.choices-list{list-style:none;margin:10px 0 14px}
.choices-list li{padding:6px 0;display:flex;gap:8px;line-height:1.7;font-size:.93rem}
.choices-list li .cn{color:var(--g2);font-weight:700;flex-shrink:0;min-width:22px}

/* Answer buttons */
.ans-btns{display:flex;gap:12px;margin:20px 0;justify-content:center}
.ans-btn{display:inline-flex;align-items:center;justify-content:center;width:130px;height:56px;background:var(--g3);color:#fff;border:none;border-radius:8px;font-size:1.8rem;font-weight:900;cursor:pointer;transition:.15s;box-shadow:0 3px 8px rgba(0,0,0,.2);user-select:none}
.ans-btn:hover:not(:disabled){background:var(--g1);transform:translateY(-2px);box-shadow:0 5px 12px rgba(0,0,0,.25)}
.ans-btn:active{transform:translateY(0)}
.ans-btn:disabled{opacity:.7;cursor:default;transform:none}
.ans-btn.correct-btn{background:#1b5e20;box-shadow:0 0 0 3px #1b5e20,0 3px 8px rgba(0,0,0,.2)}
.ans-btn.wrong-btn{background:#757575}
.ans-btn.dim-btn{background:#9e9e9e;opacity:.6}

.mc-btns{display:flex;gap:10px;margin:20px 0;justify-content:center;flex-wrap:wrap}
.mc-btn{display:inline-flex;align-items:center;justify-content:center;min-width:70px;height:52px;padding:0 20px;background:var(--g3);color:#fff;border:none;border-radius:8px;font-size:1.2rem;font-weight:700;cursor:pointer;transition:.15s;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.mc-btn:hover:not(:disabled){background:var(--g1);transform:translateY(-2px)}
.mc-btn:disabled{cursor:default;transform:none}
.mc-btn.correct-btn{background:#1b5e20}
.mc-btn.wrong-btn{background:#757575}
.mc-btn.dim-btn{background:#bdbdbd;opacity:.7}

/* Overlay */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:300;display:flex;align-items:center;justify-content:center}
.overlay-circle{width:140px;height:140px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:pop .38s cubic-bezier(.175,.885,.32,1.275) forwards;opacity:0}
.overlay-circle.ok{background:rgba(27,94,32,.92)}
.overlay-circle.ng{background:rgba(198,40,40,.92)}
.overlay-icon{font-size:3.4rem;line-height:1;color:#fff}
.overlay-txt{font-size:.9rem;color:#fff;font-weight:700;margin-top:4px}
@keyframes pop{0%{transform:scale(.2);opacity:0}65%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

/* Result box */
.result-box{background:var(--gxxl);border:1.5px solid var(--border);border-radius:8px;padding:14px 16px;margin:16px 0}
.result-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.result-label{font-weight:700;color:var(--g1);font-size:.88rem}
.result-ans{font-size:1.15rem;font-weight:900;color:var(--g2)}
.result-yours{font-size:.82rem;color:var(--gray);margin-left:4px}
.bunya-badge{background:var(--gxl);border:1px solid var(--gl);color:var(--g2);font-size:.78rem;font-weight:600;padding:3px 10px;border-radius:10px;display:inline-block;margin-top:4px}

/* Explanation */
.ex-box{margin:16px 0}
.ex-head{background:var(--gxl);border-left:4px solid var(--g4);padding:8px 14px;font-weight:700;font-size:.9rem;color:var(--g2);margin-bottom:10px}
.ex-text{font-size:.9rem;line-height:1.85;color:var(--text)}
.ex-correct-choice{margin-bottom:10px;padding:8px 12px;background:#f1f8e9;border-radius:6px;border-left:3px solid var(--g4)}
.ex-detail{padding:10px 12px;background:#fff;border:1px solid var(--gl);border-radius:6px;line-height:1.85}
.hl{background:#f0fce4;border-bottom:2px solid var(--g5);padding:0 2px;font-weight:600}

/* Nav row */
.nav-row{display:flex;justify-content:flex-end;margin:16px 0}
.next-btn{background:var(--g3);color:#fff;border:none;padding:11px 24px;border-radius:8px;font-size:.92rem;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
.next-btn:hover{background:var(--g1)}

/* ========== SCORE PAGE ========== */
.score-card{background:#fff;border-radius:12px;padding:36px 24px;text-align:center;box-shadow:0 4px 20px rgba(46,125,50,.15);margin:20px 0}
.score-pct{font-size:4rem;font-weight:900;color:var(--g2);line-height:1}
.score-label{font-size:.9rem;color:var(--gray);margin:6px 0}
.score-frac{font-size:1.3rem;font-weight:700;margin-bottom:16px}
.pass-badge{display:inline-block;padding:7px 24px;border-radius:20px;font-weight:700;font-size:1rem;margin-bottom:24px}
.pass{background:#e8f5e9;color:var(--g1);border:1.5px solid var(--g5)}
.fail{background:#ffebee;color:#b71c1c;border:1.5px solid #ef9a9a}
.score-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.sc-btn{padding:12px 28px;border-radius:8px;border:none;cursor:pointer;font-size:.95rem;font-weight:700;transition:.15s}
.sc-primary{background:var(--g3);color:#fff}
.sc-primary:hover{background:var(--g1)}
.sc-secondary{background:#eee;color:var(--text)}
.sc-secondary:hover{background:#ddd}

/* Breakdown table */
.break-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:.88rem}
.break-table th{background:var(--gxl);padding:9px 12px;text-align:left;border:1px solid var(--border);color:var(--g1);font-weight:700}
.break-table td{padding:8px 12px;border:1px solid var(--border);text-align:center}
.break-table tr:hover td{background:var(--gxxl)}
.sec-head{font-size:1rem;font-weight:700;color:var(--g2);margin:24px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--gl)}

/* ========== UTILITY ========== */
.hidden{display:none!important}
.mt12{margin-top:12px}
footer{text-align:center;padding:20px;font-size:.75rem;color:var(--gray);background:var(--gxl);border-top:1px solid var(--gl);margin-top:40px}

/* ========== RESPONSIVE ========== */
@media(max-width:580px){
  .hero h1{font-size:1.3rem}
  .hero-stats{gap:12px}
  .hero-stat{padding:8px 14px}
  .ans-btn{width:110px;height:50px;font-size:1.5rem}
  .mc-btn{min-width:60px;height:46px;font-size:1.1rem}
  .exam-grid{grid-template-columns:1fr 1fr}
  .hdr{height:48px}
  nav button{padding:5px 10px;font-size:.78rem}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <a class="logo" href="#" onclick="goHome();return false;">
      <span class="logo-badge">FP3</span>
      <span class="logo-title">過去問集</span>
    </a>
  </div>
</header>

<div class="prog-bar-wrap hidden" id="progWrap">
  <div class="prog-bar-fill" id="progFill"></div>
</div>

<main>

<!-- ========== HOME ========== -->
<div id="view-home">
  <div class="hero">
    <h1>FP3級 過去問集</h1>
    <div class="hero-stats">
      <div class="hero-stat"><span class="n">300問</span><span class="l">学科問題</span></div>
      <div class="hero-stat"><span class="n">100問</span><span class="l">実技問題</span></div>
    </div>
  </div>

  <!-- 学科 exams -->
  <div class="section-title">📚 学科試験（正誤式＋三択式）</div>
  <div class="exam-grid" id="gakka-cards"></div>

  <!-- 実技 exams -->
  <div class="section-title">✍️ 実技試験（資産設計提案業務）</div>
  <div class="exam-grid" id="jitsugi-cards"></div>
</div>

<!-- ========== EXAM SELECT / MODE ========== -->
<div id="view-select" class="hidden">
  <div class="bread">
    <span><a onclick="goHome()">Home</a></span>
    <span id="sel-bread"></span>
  </div>
  <div class="quiz-wrap">
    <div id="sel-title" class="q-titlebar"></div>
    <div class="mode-row">
      <button class="mode-btn sel" id="mode-all" onclick="setMode('all',this)">🔀 全問ランダム</button>
      <button class="mode-btn" id="mode-ox" onclick="setMode('ox',this)">⭕ 正誤問題のみ</button>
      <button class="mode-btn" id="mode-mc" onclick="setMode('mc',this)">🔢 三択問題のみ</button>
    </div>
    <div style="text-align:center;margin-top:20px">
      <button onclick="startQuiz()" style="background:var(--g3);color:#fff;border:none;padding:15px 60px;border-radius:8px;font-size:1.1rem;font-weight:800;cursor:pointer;box-shadow:0 4px 12px rgba(46,125,50,.3);letter-spacing:.05em">
        出題開始 START ▶
      </button>
    </div>
  </div>
</div>

<!-- ========== QUIZ ========== -->
<div id="view-quiz" class="hidden">
  <div class="bread">
    <span><a onclick="goHome()">Home</a></span>
    <span id="qbread-exam"></span>
    <span id="qbread-q"></span>
  </div>
  <div class="quiz-wrap">
    <div class="q-titlebar" id="q-titlebar"></div>

    <div class="q-num-row">
      <div class="q-num" id="q-num-label"></div>
      <div class="q-tag" id="q-type-tag"></div>
    </div>

    <div class="q-text" id="q-text"></div>
    <div id="q-table-area"></div>
    <div id="q-choices-area"></div>

    <div class="ans-btns hidden" id="ox-btns">
      <button class="ans-btn" id="btn-maru" onclick="ansOX(true)">○</button>
      <button class="ans-btn" id="btn-batsu" onclick="ansOX(false)">×</button>
    </div>
    <div class="mc-btns hidden" id="mc-btns"></div>
  </div>

  <div id="overlay" class="overlay hidden">
    <div class="overlay-circle" id="ov-circle">
      <div class="overlay-icon" id="ov-icon"></div>
      <div class="overlay-txt" id="ov-txt"></div>
    </div>
  </div>

  <div class="quiz-wrap hidden" id="result-area">
    <div class="result-box">
      <div class="result-row">
        <span class="result-label">正解</span>
        <span class="result-ans" id="res-ans"></span>
        <span class="result-yours" id="res-yours"></span>
      </div>
      <div id="res-bunya"></div>
    </div>
    <div class="ex-box hidden" id="ex-box">
      <div class="ex-head">💡 解説</div>
      <div class="ex-text" id="ex-text"></div>
    </div>
    <div class="nav-row">
      <button class="next-btn" id="next-btn" onclick="nextQ()">次の問題 »</button>
    </div>
  </div>
</div>

<!-- ========== SCORE ========== -->
<div id="view-score" class="hidden">
  <div class="bread">
    <span><a onclick="goHome()">Home</a></span>
    <span>成績</span>
  </div>
  <div class="score-card">
    <div class="score-label">正答率</div>
    <div class="score-pct" id="sc-pct"></div>
    <div class="score-frac" id="sc-frac"></div>
    <div class="pass-badge" id="sc-pass"></div>
    <div class="score-actions">
      <button class="sc-btn sc-primary" onclick="retryQuiz()">もう一度 🔄</button>
      <button class="sc-btn sc-secondary" onclick="goHome()">トップへ 🏠</button>
    </div>
  </div>
  <div class="sec-head">科目別成績</div>
  <table class="break-table">
    <thead><tr><th>問題番号</th><th>結果</th><th>正解</th></tr></thead>
    <tbody id="sc-list"></tbody>
  </table>
</div>

</main>

<footer>
  <p>FP3級 過去問集 | データ出典：FP3級過去問PDF（日本FP協会）</p>
</footer>

<script>
// ===== DATA =====
const DATA = {"gakka": [{"id": "202305", "label": "2023年5月", "questions": [{"num": 1, "type": "ox", "text": "弁護士の資格を有しないファイナンシャル・プランナーが、顧客に対して、法定後 見制度と任意後見制度の違いについて一般的な説明を行う行為は、弁護士法に抵触す る。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\nここがポイント！一般的な法定後見制度と任意後見制度の違いについて説明することは、弁護士法には抵触しません。FP として基本的な情報提供は問題ないのです。\n\nただし注意すべき点があります。実際に「どの制度を選ぶべきか」という具体的なアドバイスや、契約書の作成・代理人になるといった行為は弁護士資格が必要です。法律知識に基づく一般的な説明と、法律専門家による法的アドバイスは別物ということを覚えておきましょう。\n\nFPは金融や保険のプロとして、顧客の資産管理や生涯設計をサポートする際に、相続対策の文脈で後見制度について説明することはできます。これは法律業務ではなく、適切な情報提供だからです。"}, {"num": 2, "type": "ox", "text": "雇用保険の基本手当を受給するためには、倒産、解雇、雇止めなどの場合を除き、 原則として、離職の日以前２年間に被保険者期間が通算して12カ月以上あることなど の要件を満たす必要がある。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n雇用保険の基本手当を受給するための重要な要件を押さえましょう。原則として、離職日の前2年間に「通算して12ヶ月以上」の被保険者期間が必要です。毎月働いている必要はなく、パートやアルバイトでも通算期間に含まれます。\n\nここがポイント！「倒産・解雇・雇止め」などの特定の理由で離職した場合は、この2年間が「1年間」に短縮されます。つまり、より早期に基本手当を受給できるので、突然の失業時には会社に「どの理由で離職するか」を確認することが大切です。\n\nまた、被保険者期間は「失業状態で求職している」ことも要件になります。すぐに再就職した場合は基本手当は受給できません。"}, {"num": 3, "type": "ox", "text": "障害基礎年金の受給権者が、生計維持関係にある65歳未満の配偶者を有する場合、 その受給権者に支給される障害基礎年金には、配偶者に係る加算額が加算される。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n障害基礎年金に配偶者加算が認められるのは、配偶者が「65歳以上」の場合だけです。問題文では「65歳未満」と書かれているので、この場合は配偶者加算がつきません。\n\nここがポイント！FP試験では年齢要件をよく問われます。混乱しやすいけど、覚えておこう：\n・障害基礎年金：配偶者は「65歳以上」で加算あり\n・遺族厚生年金：配偶者は「年齢制限なし」で加算あり\n\nまた、子や孫への加算は若い年齢（18歳未満など）で認められますが、配偶者は別枠と覚えておくと良いでしょう。実際のライフプランニングでも、障害状態になった時に家族構成と加算額を確認することは重要です。"}, {"num": 4, "type": "ox", "text": "遺族厚生年金を受給することができる遺族の範囲は、厚生年金保険の被保険者等の 死亡の当時、その者によって生計を維持し、かつ、所定の要件を満たす配偶者、子、 父母、孫、祖父母である。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n遺族厚生年金の受給者範囲を正確に理解することは、相続・遺族保障の提案に欠かせません。被保険者等が死亡した時点で「生計を維持されていた」という条件下で、以下の順序で受給権が生じます：配偶者 → 子 → 父母 → 孫 → 祖父母。\n\nここがポイント！「生計を維持」とは経済的に依存していたという意味。同居していなくても、定期的に仕送りを受けていれば該当します。順位が高い遺族がいれば、その者だけが受給権を持ちます。例えば、配偶者と子がいる場合、原則として両者で遺族厚生年金を分ける形になります（配偶者が優先ではなく、受給権者全員で分配）。\n\n実務では、複数の受給遺族がいる場合の年金額計算が複雑になるため、しっかり確認しておきましょう。"}, {"num": 5, "type": "ox", "text": "日本政策金融公庫の教育一般貸付（国の教育ローン）の使途は、入学金や授業料な どの学校納付金に限られ、受験費用や在学のために必要となる住居費用などに利用す ることはできない。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n日本政策金融公庫の教育一般貸付（国の教育ローン）は、単に「学校納付金だけ」ではなく、幅広い教育関連費用に利用できます。\n\n実際の使途：入学金、授業料、教科書代、通学定期代、留学資金、学生寮の費用、在学中の住居費、受験費用など多岐にわたります。\n\nここがポイント！金利が比較的低いので、教育資金が必要な家庭にとって有力な選択肢です。銀行の教育ローンと比較して、限度額や金利を確認することが大切。融資実行額は学生1人につき上限約350万円（時期により異なる）です。返済は卒業後から開始でき、在学中は利息のみの返済も可能な場合があります。ライフプランニングで進学資金を検討する際は、まずこの国の制度を提案しましょう。"}, {"num": 6, "type": "ox", "text": "延長保険とは、一般に、保険料の払込みを中止して、その時点での解約返戻金を基 に、元契約よりも長い保険期間の定期保険に変更する制度である。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n「延長保険」は、解約返戻金を活用して「元契約と同じ保険期間かそれより短い定期保険」に変更する仕組みです。問題文で「より長い保険期間」と述べられているので誤りです。\n\n正しい仕組み：保険料の払込を中止して、その時点での解約返戻金を「一時払い保険料」として、新しい定期保険に変更します。同じ死亡保険金額であれば、保険期間は短くなります。これは「保険料払込免除」と組み合わせられることもあります。\n\nここがポイント！「延長保険」と混同しやすいのが「保険料払込免除」です。どちらも保険料の払込を止めますが、延長保険は「別の定期保険に変更」し、払込免除は「元契約を継続」します。試験では用語の定義が重要なので、区別をしっかり覚えましょう。"}, {"num": 7, "type": "ox", "text": "収入保障保険の死亡保険金を一時金で受け取る場合の受取額は、一般に、年金形式 で受け取る場合の受取総額よりも少なくなる。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n収入保障保険の死亡保険金受取方法は、受け取る時期によって総額が変わります。この仕組みを理解することは、顧客に正確な説明をするうえで重要です。\n\n年金受取（分割受取）：毎月（または毎年）一定額を受け取ります。例えば、被保険者が死亡して保険満期まで10年あれば、月額10万円なら合計1,200万円受け取ります。\n\n一時金受取：死亡時に全額を一括受け取りします。ただし、この場合は「割引」が適用され、本来受け取るはずの総額より少なくなります。これは、保険会社の資金運用効率を考慮した仕組みです。\n\nここがポイント！割引率は保険会社や契約時の金利状況によって異なります。一般に5～10％程度の割引が生じます。顧客の資金ニーズに合わせて、年金受取か一時金受取かを提案することが大切です。相続税対策の観点からも、複数の受け取り方を検討する価値があります。"}, {"num": 8, "type": "ox", "text": "自動車保険の人身傷害保険では、被保険者が被保険自動車を運転中、自動車事故に より負傷した場合、損害額から自己の過失割合に相当する部分を差し引いた金額が補 償の対象となる。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n自動車保険の「人身傷害保険」の特徴をしっかり覚えましょう。この保険は「過失割合に関係なく、損害額全額（契約限度額まで）」が補償されます。これが示談交渉を不要にする大きなメリットです。\n\n対比：搭乗者傷害保険は医学的な損害認定に基づいた定額補償で、人身傷害保険は実損害補償です。また、相手方の賠償責任保険では過失割合で減額されますが、人身傷害保険には関係ありません。\n\nここがポイント！「搭乗者傷害保険と人身傷害保険の違い」はFP試験の定番問題です。顧客が加害者側であっても、人身傷害保険があれば自分の治療費が出ます。これは「もらい事故」だけでなく、自損事故や無保険車との衝突でも活躍します。保険金の請求は保険会社と直接行うため、示談成立を待つ必要がない点も利点です。"}, {"num": 9, "type": "ox", "text": "普通傷害保険では、特約を付帯していない場合、細菌性食中毒は補償の対象となら ない。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n普通傷害保険の除外事項（補償されない場合）をきちんと押さえることは、顧客対応で非常に大切です。細菌性食中毒は原則として補償されません。\n\n補償されないもの例：細菌性食中毒、ウイルス性食中毒（特約で付保される場合もあります）、熱中症、日射病、放射能汚染、地震・津波・噴火による傷害など。\n\nここがポイント！特に食中毒は「微生物による病気」として「傷害」ではなく「疾病」に分類されるため除外される場合がほとんどです。ただし、特約を付けることで細菌性食中毒も補償対象にできます。顧客から「食中毒も傷害保険で大丈夫ですか？」と聞かれたら、原則除外だが特約で対応可能と説明しましょう。アウトドア活動が多い方には、この特約の提案価値があります。"}, {"num": 10, "type": "ox", "text": "自宅が火災で焼失したことにより契約者（＝保険料負担者）が受け取る火災保険の 保険金は、一時所得として所得税の課税対象となる。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n火災保険の保険金受け取りに関する税務をしっかり理解しましょう。契約者自身の家が火災で焼失した場合、受け取った火災保険金は「所得税の課税対象外」です。これは保険金の性質が「損害補償」だからです。\n\n重要ポイント：火災保険金は「資産の復旧資金」として位置づけられており、被った損失を補てんするものなので、利益ではなく税法上「所得」にはならないのです。\n\n対比情報：もし保険金が実際の損害額を超える場合（保険金が過剰な場合）、その超過分は一時所得となります。ただし通常は「再調査」により適切な保険金額に調整されます。\n\nここがポイント！保険金受け取りと税務は顧客から頻繁に聞かれる項目です。「保険金は非課税」という基本原則を押さえておくと、信頼感がアップします。一方、保険金を銀行に預けて得た利息は当然課税対象になることも説明が必要ですね。"}, {"num": 11, "type": "ox", "text": "全国企業短期経済観測調査（日銀短観）は、企業間で取引される財に関する価格の 変動を測定した統計である。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n日本銀行短観（全国企業短期経済観測調査）は、「企業の景気判断」を測定した統計です。問題文の「企業間で取引される財に関する価格の変動」は誤りです。\n\n正確な内容：日銀短観は企業の経営者や財務担当者に「現在の業況」「今後の見通し」を聞く調査です。業種別、企業規模別に企業マインドを把握でき、金融政策の判断材料として活用されます。\n\n対比：物価の変動を測定するのは「消費者物価指数（CPI）」「企業物価指数（PPI）」です。日銀短観は「景気・業況」を測り、物価指数は「価格の変動」を測ります。\n\nここがポイント！「日銀短観」は経済ニュースでよく報道されます。「業況判断DI（Diffusion Index）」という指標が重要で、プラスなら景気良好、マイナスなら悪化という見方があります。FPがマクロ経済の動向を顧客に説明する際に活躍する知識です。"}, {"num": 12, "type": "ox", "text": "投資信託のパッシブ運用は、日経平均株価や東証株価指数（ＴＯＰＩＸ）などのベンチ マークに連動した運用成果を目指す運用手法である。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n投資信託の運用手法の大分類をしっかり理解しましょう。パッシブ運用は「ベンチマーク（指数）に連動した成果」を目指します。\n\nパッシブ運用（インデックス運用）の特徴：\n・日経平均やTOPIX（東証株価指数）などの指標に連動\n・運用コストが低い（インデックスファンドは信託報酬が安い）\n・運用成績が市場平均並み（ビートする必要がない）\n\nアクティブ運用との対比：ベンチマークを上回る成果を目指し、ファンドマネージャーの銘柄選択が重要です。運用コストは高めです。\n\nここがポイント！個人投資家にとって、パッシブ運用は「低コスト」「透明性が高い」というメリットが大きいため、ここ数年は人気が高まっています。顧客のリスク許容度や運用期間に応じて、パッシブとアクティブのバランスを提案することが大切です。つみたてNISAでもインデックスファンドが推奨されている理由も同じですね。"}, {"num": 13, "type": "ox", "text": "一般に、残存期間や表面利率（クーポンレート）が同一であれば、格付の高い債券ほど 利回りが低く、格付の低い債券ほど利回りが高くなる。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n債券の利回りと信用リスク（格付）の関係を正確に理解することは、固定収益資産の提案に必須です。\n\n基本ロジック：格付が高い（≒デフォルトリスク低い）→利回りは低くても投資家が買う → 利回り低下\n         格付が低い（≒デフォルトリスク高い）→高い利回りで誘わないと買い手がつかない → 利回り高い\n\n実例：国債（格付高い）の利回りは低く、ジャンク債（格付低い）の利回りは高い構造になっています。\n\nここがポイント！「残存期間と表面利率が同じ条件」という前置きが大切です。他の条件が同じなら、信用リスク（≒格付）だけが利回りの差を作るということですね。債券ポートフォリオ構築時に、リスク・リターン・流動性のバランスを考慮しながら格付の異なる債券をミックスすることは、分散投資の基本です。"}, {"num": 14, "type": "ox", "text": "配当性向とは、株価に対する１株当たり年間配当金の割合を示す指標である。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n「配当性向」の正確な定義を覚えましょう。問題文は誤った定義を提示しています。\n\n正確な定義：配当性向 = （1株当たり配当金 ÷ 1株当たり利益）× 100%\nつまり、企業が得た利益のうち「何％を配当として株主に還元しているか」を示す指標です。\n\n対比される指標：配当利回り = （年間配当金 ÷ 株価）× 100%\nこれは「株価に対する配当の割合」で、問題文で誤りとされた定義に近いものです。\n\nここがポイント！「性向」と「利回り」の違いは試験頻出です。配当性向は企業の利益分配方針を示し、配当利回りは投資家のリターンを示します。成熟企業は配当性向が高く、成長企業は配当性向が低い傾向があります。顧客のポートフォリオに組み込む際は、これらの指標から企業の特性を読み取ることが大切です。"}, {"num": 15, "type": "ox", "text": "オプション取引において、特定の商品を将来の一定期日に、あらかじめ決められた 価格（権利行使価格）で売る権利のことを、コール・オプションという。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n「ポートフォリオのベータ値」の基本をしっかり押さえましょう。複数の銘柄で構成されたポートフォリオのベータ値は「各銘柄のベータ値の加重平均」で計算されます。問題文で「各銘柄のベータ値の合計」と述べられているので誤りです。\n\n正確な計算：ポートフォリオβ = Σ（各銘柄の投資比率 × その銘柄のβ）\n\n例：30%が株式A（β=1.2）、70%が株式B（β=0.8）の場合\n ポートフォリオβ = 0.3×1.2 + 0.7×0.8 = 0.36 + 0.56 = 0.92\n\nここがポイント！加重平均だという点が重要です。ベータ値の合計は投資比率の合計が100%なら常に平均化されます。この知識は、ポートフォリオのリスク調整を実際に行う際に活躍します。高ベータ銘柄と低ベータ銘柄をバランスよく組み合わせることで、全体的なリスクレベルをコントロールできるのです。"}, {"num": 16, "type": "ox", "text": "所得税において、国債や地方債などの特定公社債の利子は、総合課税の対象となる。", "choices": [], "answer": false, "kaisetsu": "答え：○（正しい）\n\n「年金現価係数」の概念をしっかり理解しましょう。これは資金計画の実務で頻繁に使う重要な係数です。\n\n概念：毎年一定額を受け取る場合、現在いくら必要かを計算する係数です。\n\n例：毎年100万円を10年間受け取りたい場合、年利率3%なら必要現在額 = 100万円 × 8.530203 ≒ 853万円\n\n特徴：受取期間が長いほど係数は大きく、利率が高いほど係数は小さくなります（同じ総額を受け取るなら、利息でカバーできる部分が増えるから）\n\nここがポイント！年金現価係数は「現在価値を求める」ときに使います。対比として「年金終価係数」は「将来いくら貯まるか」を計算します。試験では「どの係数を使うのか」という判断問題がよく出ます。ライフプラン相談で「退職後の生活資金は今いくら必要？」という質問には、この係数が活躍します。"}, {"num": 17, "type": "ox", "text": "退職手当等の支払を受ける個人がその支払を受ける時までに「退職所得の受給に関 する申告書」を提出した場合、その支払われる退職手当等の金額に20.42％の税率を乗 じた金額に相当する所得税および復興特別所得税が源泉徴収される。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n「減債基金係数」の用途をしっかり理解しましょう。問題文の用途は誤りです。\n\n正確な用途：減債基金係数は「将来の借金やローンを返済するために、毎年いくら積み立てる必要があるか」を計算する係数です。\n\n例：5年後に500万円返済する必要がある場合、毎年いくら積み立てるか\n 毎年積立額 = 500万円 × 0.1804 ≒ 90.2万円（年利率3%の場合）\n\nこの係数がよく使われる場面：住宅ローンの繰上返済計画、事業資金の返済計画、満期償還する債券の買い入れ資金計画など。\n\nここがポイント！「減債基金」という名称通り、計画的に借金を減らしていく際に使う係数です。対比として「借入金現価係数」は「借金していくら借りられるか」を計算します。試験では「どの係数？」という判断が重要なので、それぞれの用途を明確に区別しておきましょう。"}, {"num": 18, "type": "ox", "text": "所得税において、国民年金基金の掛金は、社会保険料控除の対象となる。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n住宅ローンの返済方式に関する重要な知識です。元利均等返済は毎月の返済額が一定という大きな特徴があります。\n\n仕組み：毎月の返済額（元金 + 利息）を合計すると常に同じ金額\n初期段階：利息が多く、元金が少ない\n後期段階：元金が多く、利息が少ない\n\nメリット：返済計画が立てやすく、家計管理が簡単\nデメリット：総利息が元金均等返済より多くなる\n\n対比：元金均等返済は毎月の元金が一定で、利息が減るにつれて返済額が減っていきます。\n\nここがポイント！日本の住宅ローンの大多数は元利均等返済です。「毎月いくら?」と聞かれたら返済額は一定だと答えられるはず。ただし、金利が変わる変動金利型では、5年ごと、10年ごとに返済額が見直されます。固定金利型でも全期間固定と期間限定固定の違いを説明できると、顧客の信頼が深まります。"}, {"num": 19, "type": "ox", "text": "所得税において、生計を一にする配偶者の合計所得金額が48万円を超える場合、配 偶者控除の適用を受けることはできない。", "choices": [], "answer": true, "kaisetsu": "答え：×（誤り）\n\n公的年金の受給開始年齢に関する現在の制度をしっかり把握しましょう。問題文の「65歳」は標準的な受給開始年齢ですが、繰下げ受給や繰上げ受給の制度があります。\n\n現在の制度（2023年5月時点）：\n・標準的受給開始年齢：65歳\n・繰上げ受給：60～64歳（減額される）\n・繰下げ受給：66～75歳（増額される）\n\n2022年改正で変わったポイント：繰上げ・繰下げの上限年齢が引き上げられました。以前は70歳までの繰下げでしたが、現在は75歳まで可能です。\n\nここがポイント！高齢雇用の促進と人生100年時代を背景に、受給開始年齢の選択肢が広がっています。顧客の就業状況や健康状態、ライフプランに応じて、最適な受給開始時期を提案することが重要です。繰上げ・繰下げの減額・増額率は正確に把握しておく必要があります。"}, {"num": 20, "type": "ox", "text": "住宅ローンを利用してマンションを取得し、所得税の住宅借入金等特別控除の適用 を受ける場合、借入金の償還期間は、20年以上でなければならない。", "choices": [], "answer": false, "kaisetsu": "答え：○（正しい）\n\n国民年金保険料の免除制度の重要な要件を理解しましょう。「前年度の所得が一定以下」というのが免除申請の基本的な判定条件です。\n\n免除の種類と要件：\n・全額免除：前年度所得が「100万円以下」など\n・3/4免除：前年度所得が「100万円超～150万円以下」など\n・1/2免除：前年度所得が「150万円超～200万円以下」など\n・1/4免除：前年度所得が「200万円超～250万円以下」など\n\n重要：免除期間でも年金加入期間として数えられます（年金額は減額）\n\nここがポイント！「免除」と「猶予」の違いも重要です。猶予は保険料の支払い義務を一時的に延期するもので、免除とは異なります。低所得の学生は「学生納付特例」という別の制度があります。顧客が経済困難になった時、正しい制度を案内できるFPは信頼される存在になります。保険料の追納制度についても説明できるようにしましょう。"}, {"num": 21, "type": "ox", "text": "不動産登記には公信力が認められていないため、登記記録上の権利者が真実の権利 者と異なっている場合に、登記記録を信じて不動産を購入した者は、原則として、そ の不動産に対する権利の取得について法的に保護されない。", "choices": [], "answer": true, "kaisetsu": "答え：×（誤り）\n\n厚生年金保険の被保険者期間に関する重要な知識です。厚生年金の被保険者は「会社員」と思われがちですが、実は多くのカテゴリーが含まれます。\n\n厚生年金被保険者：正社員だけでなく、アルバイト・パート（一定条件下）、派遣社員、公務員（共済制度）なども含まれます。\n\nここがポイント！被保険者期間は「保険料を納めた月数」で計算されます。例えば、途中で退職して国民年金に切り替わった場合、その期間の厚生年金掛け月数は変わりません。転職が多い人でも、通算された被保険者期間が年金受給の判定に使われます。\n\n実務的には、転職や失業時に「厚生年金から国民年金への切り替え忘れ」が起こりやすいので、顧客に注意喚起することは大切です。未納期間が長いと、将来の年金受給に大きな影響を与えます。"}, {"num": 22, "type": "ox", "text": "アパートやマンションの所有者が、当該建物を賃貸して家賃収入を得るためには、 宅地建物取引業の免許を取得しなければならない。", "choices": [], "answer": false, "kaisetsu": "答え：○（正しい）\n\n個人年金保険の税務扱いをしっかり理解しましょう。保険料を個人が支払い、本人が受け取る個人年金保険は雑所得（年金所得）で課税されます。\n\n税務のポイント：\n・受け取った年金から「払った保険料」を引いた部分が課税対象\n・所得税と住民税の両方がかかる\n・生命保険料控除の対象外（個人年金保険料控除がある場合は別）\n\n対比：勤務先の企業年金や確定拠出年金は別の扱い\n\nここがポイント！「確定給付企業年金」の掛金は給与所得控除の対象外ですが、「確定拠出年金（iDeCo）」の掛金は全額控除できるという違いがあります。個人年金保険加入時に、税務効率を説明できるFPはより価値を提供できます。\n\nまた、受取期間が「10年確定年金」か「終身年金」かで税務扱いが少し異なるので、顧客の選択肢を説明する際には注意が必要です。"}, {"num": 23, "type": "ox", "text": "都市計画区域内にある建築物の敷地は、原則として、建築基準法に規定する道路に ２ｍ以上接していなければならない。", "choices": [], "answer": true, "kaisetsu": "答え：×（誤り）\n\n外貨建て保険の為替リスク特性をしっかり理解しましょう。問題文では「為替リスクはない」と述べられているので誤りです。\n\n外貨建て保険の為替リスク：\n・保険料支払時と年金受取時の為替レートが異なると、受け取り金額（日本円換算）は変動\n・円安なら有利（少ない円で多くの外貨を購入 → 円高時に日本円に換算すると多くなる）\n・円高なら不利\n\nリスク管理策：定期的に円建てで一部を保有するなど、通貨を分散させる\n\nここがポイント！「利回りは国内保険より高い傾向」というメリットがある反面、為替リスクを背負うデメリットがあります。顧客の資産構成や投資目的、為替観に基づいて提案する必要があります。\n\n外貨建て保険はインフレヘッジになる可能性もあり、国際分散投資の視点では有効です。ただし高齢者や元本確保志向が強い顧客には説明をしっかり行う必要があります。"}, {"num": 24, "type": "ox", "text": "個人が相続により取得した被相続人の居住用家屋およびその敷地を譲渡し、「被相続 人の居住用財産（空き家）に係る譲渡所得の特別控除の特例」の適用を受けるために は、譲渡資産の譲渡対価の額が6,000万円以下であることなどの要件を満たす必要があ る。", "choices": [], "answer": false, "kaisetsu": "答え：○（正しい）\n\n変動金利型住宅ローンのリスク特性を正確に理解しましょう。金利が上昇すると、当然ながら毎月の返済額も増加する可能性があります。\n\n変動金利型の仕組み：\n・短期プライムレート（銀行の短期貸出金利）に連動\n・一般に半年ごとに金利が見直される\n・多くの商品では「5年ルール」「125%ルール」があります\n\n5年ルール：金利見直しから5年間は返済額が変わらない\n125%ルール：返済額が一度に125%を超えて増加しない\n\nリスク管理方法：固定金利型への変更、繰上げ返済による元金圧縮など\n\nここがポイント！「金利が上がっても返済額は変わらない」わけではなく、5年後に大幅増加する可能性があります。低金利時代に変動金利で借り入れた人も、将来の金利上昇に備えた家計管理の提案は重要です。\n\n貯蓄とのバランス、固定金利への切り替え時期、繰上げ返済計画など、ライフプランニングの出番がここにあります。"}, {"num": 25, "type": "ox", "text": "土地の有効活用において、一般に、土地所有者が入居予定の事業会社から建設資金 を借り受けて、事業会社の要望に沿った店舗等を建設し、その店舗等を事業会社に賃 貸する手法を、建設協力金方式という。", "choices": [], "answer": true, "kaisetsu": "答え：×（誤り）\n\n「固定資産税の計算」に関する基本的な知識をしっかり押さえましょう。固定資産税は「固定資産税評価額」を基に計算されます。\n\n正確な計算式：固定資産税 = 固定資産税評価額 × 税率（標準税率1.4%）\n\nここがポイント！「時価（実際の売却価格）」と「固定資産税評価額」は異なります。評価額は一般に時価の60～70%程度です。だから、実際の購入価格や売却予想価格をもとに固定資産税を計算するのは誤りです。\n\n評価替え：3年ごとに評価額が見直されます。地価が変動すれば、その反映により固定資産税も変わります。\n\n不動産投資の利回り計算では、このポイントが重要です。表面利回りだけでなく、固定資産税や都市計画税などの税負担を含めた「実質利回り」を提案できるFPは信頼される存在になります。"}, {"num": 26, "type": "ox", "text": "書面によらない贈与契約は、その履行前であれば、各当事者は契約の解除をするこ とができる。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n登録免許税の計算に関する重要な知識です。抵当権の設定登記は「借り入れ金額」に対して登録免許税が課される場合があります。\n\n登録免許税の税率例：\n・所有権移転登記：不動産の固定資産税評価額 × 2%（標準）\n・抵当権設定登記：債務額 × 0.4%（標準）\n\nここがポイント！住宅ローン利用時には「抵当権設定登記」が必須です。借入額が大きいほど登録免許税も大きくなります。ただし、住宅ローン減税や各種軽減措置がある場合があります。\n\n実務的には、不動産取得にかかる諸費用（登録免許税、司法書士費用、不動産取得税など）を正確に見積もることが、ライフプランの精度を高めます。新築と中古、住宅と投資物件で税務扱いが異なることも説明できると、顧客に好印象を与えられます。"}, {"num": 27, "type": "ox", "text": "特別養子縁組が成立した場合、養子となった者と実方の父母との親族関係は終了す る。", "choices": [], "answer": true, "kaisetsu": "答え：×（誤り）\n\n相続税の計算における「配偶者の税額軽減制度」の重要な要件をしっかり理解しましょう。問題文では「相続割合が多いほど軽減額が大きい」と述べられているので、より正確に説明する必要があります。\n\n配偶者の税額軽減：配偶者が相続した金額から、以下の金額まで相続税がかかりません\n・「相続税の課税価格 × 配偶者の法定相続分」\n・あるいは「1億6,000万円」のいずれか大きい方\n\nここがポイント！軽減額は「相続割合」ではなく「法定相続分か1億6,000万円か、どちらか大きいか」で決まります。つまり、配偶者が全財産の90%を相続しても、1億6,000万円までの部分は軽減される仕組みです。\n\n相続税対策では、配偶者への遺産分割方法を工夫することが重要です。二次相続（配偶者亡き後の相続）まで視点を広げた「トータル相続税」の観点から提案できるFPが理想的です。"}, {"num": 28, "type": "ox", "text": "自筆証書遺言書保管制度を利用して、法務局（遺言書保管所）に保管されている自 筆証書遺言については、家庭裁判所による検認の手続を要しない。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n遺産分割協議に関する基本的な法的知識です。遺産分割協議は「相続人全員の合意」によって初めて成立します。\n\n重要ポイント：\n・一人でも合意しない相続人がいれば、協議は成立しない\n・全員で遺産分割協議書に署名押印して初めて有効\n・協議がまとまらない場合は家庭裁判所に調停を申し立てることができます\n\nここがポイント！「遺産分割協議書」は相続登記（不動産名義変更）や相続税申告の際に重要な書類になります。トラブル防止のためにも、早期に協議を開始することが大切です。\n\n実務では、被相続人の生前に「遺言書」を作成することで、相続人間のトラブルを未然に防ぐ提案が価値を持ちます。遺言書があれば遺産分割協議が不要な場合も多いので、ライフプランニングの重要なテーマになります。"}, {"num": 29, "type": "ox", "text": "相続人が負担した被相続人に係る香典返戻費用は、相続税の課税価格の計算上、葬 式費用として控除することができる。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n贈与税の計算における「配偶者控除」に関する知識をしっかり押さえましょう。問題文では誤った説明がされています。\n\n正確な配偶者控除：\n・婚姻期間20年以上の夫婦間の贈与\n・居住用不動産（土地・建物）またはその取得資金が対象\n・最高2,000万円まで控除可能\n・その年の他の贈与と合わせて基礎控除110万円が使える（二重控除）\n\nここがポイント！この制度を活用すると、配偶者への贈与がかなり有利になります。相続税対策としても、生前贈与により配偶者の生活基盤を確保しながら相続税を減らす手法として使われます。\n\nただし、不動産の取得資金の場合は「その年中に取得すること」など時間的要件があります。また、不動産の価格証明（買売契約書など）が必要なので、実務では注意が必要です。夫婦で協力してライフプラン設計できるFPは信頼度が高まります。"}, {"num": 30, "type": "ox", "text": "「配偶者に対する相続税額の軽減」の適用を受けることができる配偶者は、被相続 人と法律上の婚姻の届出をした者に限られ、いわゆる内縁関係にある者は該当しない。 【第２問】 次の各文章（(31)～(60)）の（ ）内にあてはまる最も適切な文章、語句、数 字またはそれらの組合せを1)～3)のなかから選び、その番号を解答用紙にマー クしなさい。 〔30問〕", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n所得税における「給与所得控除」の性質を理解しましょう。これは給与収入に対する概算経費のようなもので、実費ではなく「定額控除」です。\n\n給与所得控除の金額（2023年以降）：\n・給与年収550万円以下：収入×40%～65%（上限）\n・給与年収550万円超～1,000万円以下：220万円\n・給与年収1,000万円超：220万円（上限）\n\nここがポイント！給与所得者は経費を実際に計算せず、この控除により「給与所得」を算出します。例えば、年収600万円なら給与所得控除は220万円で、給与所得は380万円になります。\n\n自営業者の「必要経費控除」とは異なる制度です。給与所得者はこの控除により、実際の支出がなくても一定額が控除されるメリットがあります。税務効率の観点から、給与以外の副収入がある場合の税務計画が重要になります。"}, {"num": 31, "type": "multi", "text": "一定の利率で複利運用しながら一定期間、毎年一定金額を受け取るために必要な元 本を試算する際、毎年受け取る一定金額に乗じる係数は、（ ）である。", "choices": ["減債基金係数", "年金現価係数", "資本回収係数"], "answer": 1, "kaisetsu": "答え：×（誤り）\n\n医療費控除の対象範囲をしっかり理解しましょう。問題文では誤った説明がされています。\n\n医療費控除の要件：\n・本人と生計を一にする親族のための医療費\n・その年（1月1日～12月31日）に実際に支払った金額\n・総所得金額の5%超の部分が対象\n・最高200万円まで控除可能\n\n重要な対象範囲：診察料、治療費、医薬品代、通院費（交通費）、入院費など\n\nここがポイント！「生計を一にする親族」という概念が重要です。別居している親でも、仕送りをしていれば対象になる可能性があります。\n\n対象外の例：健康診断、ビタミン剤などの一般用医薬品（処方箋なし）、美容整形など。医療費控除の申告により、かなり多くの納税者が節税できます。医療費が多い年（手術の年など）に顧客に提案できると、FPの価値が高まります。セルフメディケーション税制という別の制度もあるので、顧客の状況に応じて提案しましょう。"}, {"num": 32, "type": "multi", "text": "後期高齢者医療制度の被保険者は、後期高齢者医療広域連合の区域内に住所を有す る（ ① ）以上の者、または（ ② ）の者であって一定の障害の状態にある旨の 認定を受けたものである。", "choices": ["① 65歳 ② 40歳以上65歳未満", "① 70歳 ② 60歳以上70歳未満", "① 75歳 ② 65歳以上75歳未満"], "answer": 2, "kaisetsu": "答え：○（正しい）\n\n会社員の「源泉徴収」の仕組みをしっかり理解しましょう。これは所得税の前払い制度で、給与から毎月天引きされます。\n\n源泉徴収の流れ：\n1. 給与支払者が毎月給与から所得税を天引き\n2. 天引きした所得税を税務署に納付\n3. 年末調整で過不足を清算\n\nここがポイント！会社員は給与から自動的に税金が引かれるため、所得税の手続きを意識しにくいのが特徴です。ただし、医療費控除や寄付金控除などを受けたい場合は、確定申告により還付を受けられます。\n\n副業をしている場合、副業所得が20万円を超えると確定申告が必要になります。また、給与の他に不動産賃貸所得や事業所得がある場合も注意が必要です。税務効率を重視するFPなら、これらの落とし穴を顧客に早期に指摘できます。"}, {"num": 33, "type": "multi", "text": "国民年金の第１号被保険者が、国民年金の定額保険料に加えて月額（ ① ）の付 加保険料を納付し、65歳から老齢基礎年金を受け取る場合、（ ② ）に付加保険料納 付済期間の月数を乗じて得た額が付加年金として支給される。", "choices": ["① 400円 ② 200円", "① 400円 ② 300円", "① 200円 ② 400円"], "answer": 0, "kaisetsu": "答え：×（誤り）\n\n「有価証券の譲渡所得」の計算方法をしっかり理解しましょう。問題文では誤った説明がされています。\n\n正確な譲渡所得の計算：\n上場株式の譲渡所得 = 売却価額 - 取得価額 - 売却手数料（など諸経費）\n\n税務上の扱い：\n・上場株式：申告分離課税（税率20.315%）\n・一般の株式：総合課税（累進税率5%～45%）\n\nここがポイント！「取得価額」は購入時点の価格であり、「帳簿価額」ではありません。株価が変動しても、取得時の価格が固定されます。\n\n損失が出た場合の損益通算も重要です。譲渡損が発生すれば、配当所得や他の譲渡所得との相殺ができます。投資損失が大きい年は、確定申告により税負担を軽くできる可能性があります。資産運用のアドバイスをする際に、このような税務効率も説明できるFPはより信頼されます。"}, {"num": 34, "type": "multi", "text": "住宅金融支援機構と民間金融機関が提携した住宅ローンであるフラット3（5 買取型） の融資金利は（ ① ）であり、（ ② ）時点の金利が適用される。", "choices": ["① 変動金利 ② 借入申込", "① 固定金利 ② 借入申込", "① 固定金利 ② 融資実行"], "answer": 2, "kaisetsu": "答え：○（正しい）\n\n不動産所得の計算における「土地の取得費用」の扱いをしっかり理解しましょう。土地は償却対象ではなく、費用化されません。\n\n不動産所得の計算：\n所得 = 総賃料収入 - 必要経費\n必要経費：建物部分の減価償却費、固定資産税、都市計画税、保険料、修繕費、管理費など\n\nここがポイント！土地は耐用年数がないため、減価償却できません。一方、建物は耐用年数（木造22年、RCは47年など）に基づき減価償却します。\n\n建物と土地の分別：購入時の価格を、建物と土地に按分する必要があります。按分比率は「固定資産税評価額の比率」で行うのが一般的です。\n\n不動産投資の利回り計算では、減価償却による所得控除が利益を圧縮する効果に注目します。特に初年度は建物価格の減価償却が大きく、所得税の節税に繋がります。この仕組みを説明できるFPなら、不動産投資家の信頼を勝ち取れます。"}, {"num": 35, "type": "multi", "text": "貸金業法の総量規制により、個人が貸金業者による個人向け貸付を利用する場合の 借入合計額は、原則として、年収の（ ）以内でなければならない。", "choices": ["２分の１", "３分の１", "４分の１"], "answer": 1, "kaisetsu": "答え：×（誤り）\n\n「青色申告特別控除」の金額をしっかり理解しましょう。問題文では誤った金額が述べられています。\n\n正確な青色申告特別控除（2023年以降）：\n・正規の簿記により帳簿を付けた場合：65万円控除\n・簡易簿記の場合：10万円控除\n\nここがポイント！以前は「10万円」「65万円」の2種類がありましたが、2020年改正で「55万円」が新設され、現在は「10万円」「55万円」「65万円」の3段階になりました（電子帳簿保存等要件による）。\n\n青色申告のメリット：特別控除だけでなく、損失の3年繰越も可能です。つまり、赤字が出た年があれば、その後3年間で相殺できます。\n\n自営業者のライフプランニングでは、青色申告による節税効果を説明することが重要です。記帳負担があるものの、税務効率の面では大きなメリットがあります。"}, {"num": 36, "type": "multi", "text": "生命保険会社が（ ）を引き上げた場合、通常、その後の終身保険の新規契約 の保険料は安くなる。", "choices": ["予定利率", "予定死亡率", "予定事業費率"], "answer": 0, "kaisetsu": "答え：○（正しい）\n\n国庫債務負担行為に関する基本的な経済知識です。これは政府の「将来の支払い約束」を示す指標で、経済規模の把握に重要です。\n\nGDP（国内総生産）との関連：\n一般政府支出（政府消費 + 政府投資）の把握には、実際の支出だけでなく、将来の支出約束も考慮する必要があります。\n\nここがポイント！国庫債務負担行為は「発生主義会計」の概念を示しています。実現主義で計上された支出だけでは、政府の財政状況を正確に把握できません。\n\n経済分析：マクロ経済学で「政府部門の規模」を評価する際に、将来の支払い義務を含めることで、より正確な分析ができます。\n\nFPとして、顧客のライフプランニングで「将来の支払い予定」を把握することは、同じロジックが適用されます。住宅ローンや教育資金のように、将来の支払い約束を含めた総合的な資金計画が重要です。"}, {"num": 37, "type": "multi", "text": "生命保険契約において、契約者（＝保険料負担者）および被保険者が夫、死亡保険 金受取人が妻である場合、夫の死亡により妻が受け取る死亡保険金は、（ ）の課 税対象となる。", "choices": ["贈与税", "相続税", "所得税"], "answer": 1, "kaisetsu": "答え：×（誤り）\n\n「消費者物価指数（CPI）」の定義をしっかり理解しましょう。問題文では誤った説明がされています。\n\n正確な定義：\nCPI = 一般消費者が購入する商品・サービスの価格の変動を測定した統計\n（生産段階での価格変動ではなく、消費者が実際に買う価格）\n\n対比される指標：\n・企業物価指数（PPI）：企業間取引での物価変動を測定\n\nCPIの構成：食料品、衣類、家具、医療、教育、交通、通信など幅広い費目を含む\n\nここがポイント！インフレ率の把握に欠かせない統計です。日本銀行の金融政策の判断基準にもなります。「生鮮食品を除くコア CPI」が注目されることが多く、変動しやすい食品を除いた基調的な物価水準を見ます。\n\n顧客のライフプランニングでは、インフレーション率を考慮した資金計画が必要です。将来の生活費を現在価値で計画する際に、CPIの推移を参考にすることが重要です。"}, {"num": 38, "type": "multi", "text": "地震保険の保険金額は、火災保険の保険金額の一定範囲内で設定するが、居住用建 物については（ ① ）、生活用動産については（ ② ）が上限となる。", "choices": ["① 1,000万円 ② 500万円", "① 3,000万円 ② 1,000万円", "① 5,000万円 ② 1,000万円"], "answer": 2, "kaisetsu": "答え：○（正しい）\n\n「失業率」の計算式を正確に理解しましょう。これは労働市場の健全性を示す重要な指標です。\n\n正確な計算：\n失業率 = 失業者数 ÷ 労働力人口（就業者数 + 失業者数）× 100%\n\n重要ポイント：失業者とは「働く能力と意思があり、求職活動中だが仕事に就いていない人」を指します。ニート（Not in Education, Employment or Training）は失業者に含まれません。\n\n労働力人口：15歳以上で働く能力のある人（学生でも兼業していれば含まれる）\n\nここがポイント！失業率が低い＝経済が好調とは限りません。働き手不足（労働力人口の減少）で失業率が低い場合もあります。\n\nFP実務では、顧客の就業状況や将来のキャリアプランを考察する際に、マクロの雇用動向も視点に入れることが大切です。産業構造の変化により、求められるスキルが変わることを顧客に伝えることで、キャリア形成と資産形成のバランスについてアドバイスできます。"}, {"num": 39, "type": "multi", "text": "民法および失火の責任に関する法律（失火責任法）において、借家人が軽過失によっ て火事を起こし、借家と隣家を焼失させた場合、借家の家主に対して損害賠償責任を （ ① ）。また、隣家の所有者に対して損害賠償責任を（ ② ）。", "choices": ["① 負わない ② 負う", "① 負う ② 負う", "① 負う ② 負わない"], "answer": 2, "kaisetsu": "答え：×（誤り）\n\n生命保険の契約者と被保険者の関係に関する税務知識です。問題文では誤った説明がされています。\n\n保険金の税務（死亡保険金）：\n・契約者と保険金受取人が同一 → 所得税（一時所得）\n・契約者と被保険者が同一、受取人が異なる → 相続税\n・全て異なる → 贈与税\n\nここがポイント！「誰が保険料を払ったか」「誰が保険金を受け取るか」「誰に万が一のことがあるか」により税務が変わります。\n\n相続税対策として、被保険者を親、契約者を子、受取人を配偶者にするなど、複雑な構造も使われます。ただし「保険契約者を被保険者にしない」という一般原則があり、例外的な構造には保険会社の審査が必要です。\n\n生命保険提案時に、顧客の税負担を考慮した設計ができるFPは、信頼と満足度が高まります。"}, {"num": 40, "type": "multi", "text": "がん保険では、一般に、（ ）程度の免責期間が設けられており、この期間中に がんと診断されたとしても診断給付金は支払われない。", "choices": ["90日", "120日", "180日"], "answer": 0, "kaisetsu": "答え：○（正しい）\n\n貸家建付地の相続税評価に関する重要な知識です。自用地と比べて、貸家建付地は評価が下がる仕組みを理解しましょう。\n\n評価式：貸家建付地の評価 = 自用地評価額 × （1 - 土地に対する固定資産税評価額比率 × 借地権割合）\n\n割合：借地権割合は地域によって異なり、20%～90%の範囲（国税庁発表）\n\nメリット：賃貸住宅を建てることで、相続税評価を下げて相続税を節税できます\n\nここがポイント！相続税対策として「アパート建築」がしばしば提案されるのは、この評価減が目的です。ただし、建物の減価償却費による所得控除（節税）、建築資金の借入（レバレッジ効果）と組み合わせて効果が最大化します。\n\n実務では、土地の有効活用、キャッシュフロー、相続税評価の3つの観点から総合的に提案することが重要です。建築費、利回り、税務効果を含めたシミュレーションができるFPは、富裕層から信頼されます。"}, {"num": 41, "type": "multi", "text": "一般法人、個人、地方公共団体などの通貨保有主体が保有する通貨量の残高を集計 したものを（ ① ）といい、（ ② ）が作成・公表している。", "choices": ["① マネーストック ② 財務省", "① マネーストック ② 日本銀行", "① ＧＤＰ ② 日本銀行"], "answer": 1, "kaisetsu": "答え：×（誤り）\n\n「生前贈与」と「相続」の税務効率を比較する際の重要なポイントです。問題文では誤った説明がされています。\n\n生前贈与と相続の税率比較：\n・贈与税：累進税率15%～55%（一般贈与）\n・相続税：累進税率10%～55%（同じ最高税率）\n\nここがポイント！低い金額での贈与は「贈与税基礎控除110万円」があるため、相続税より有利な場合があります。例えば、毎年110万円以下を複数人に贈与すれば、非課税で資産を移転できます。\n\n相続税対策戦略：\n・配偶者への贈与：配偶者控除2,000万円で有利\n・教育資金・結婚・出産資金：非課税枠があり、有利\n・相続税評価額より時価が低い資産の生前贈与：贈与税が安い可能性\n\n実務では、顧客の相続予定額、相続人数、資産構成を総合判断して、生前贈与と相続のシミュレーションを行うことが求められます。「タイミング」「相手方」「資産種類」を工夫することで、大きな税効率改善ができます。"}, {"num": 42, "type": "multi", "text": "追加型株式投資信託を基準価額１万3,000円（１万口当たり）で１万口購入した後、 最初の決算時に１万口当たり400円の収益分配金が支払われ、分配落ち後の基準価額 が１万2,700円（１万口当たり）となった場合、その収益分配金のうち、普通分配金は （ ① ）であり、元本払戻金（特別分配金）は（ ② ）である。", "choices": ["① ０円 ② 400円", "① 100円 ② 300円", "① 300円 ② 100円"], "answer": 1, "kaisetsu": "答え：○（正しい）\n\n死亡保険金の相続税評価に関する重要な知識です。保険金は相続財産に該当し、一定額まで非課税扱いになります。\n\n死亡保険金の非課税枠：\n500万円 × 相続人の数 = 非課税額\n\n例：相続人3人なら非課税額は1,500万円。保険金が2,000万円なら、500万円が課税される\n\n重要ポイント：この非課税枠は「相続人ごと」ではなく「全相続人合計」で判定されます。つまり、一人の受取人が全額受け取った場合は、非課税枠をその人が独占します。\n\n相続対策活用例：子ども複数人が受け取人の場合、各自の分割受取で非課税枠を活用できます。\n\n実務では、相続財産に占める保険金の割合、相続人の人数構成、遺産総額などを見て、保険加入額を提案することが重要です。また、保険金は遺産分割の対象にならない（受取人固有の財産）という法的特性も説明できると、顧客の信頼が深まります。"}, {"num": 43, "type": "multi", "text": "表面利率（クーポンレート）２％、残存期間５年の固定利付債券を、額面100円当た り104円で購入し、２年後に額面100円当たり102円で売却した場合の所有期間利回り （年率・単利）は、（ ）である。なお、税金や手数料等は考慮しないものとし、 答は表示単位の小数点以下第３位を四捨五入している。", "choices": ["0.96％", "1.54％", "2.88％"], "answer": 0, "kaisetsu": "答え：×（誤り）\n\n「都市計画税」の対象地域と税率をしっかり理解しましょう。問題文では誤った説明がされています。\n\n正確な都市計画税：\n・対象：都市計画法に基づく「市街化区域」内の土地・建物\n・税率：標準0.3%（上限0.3%、固定資産税の上限1.4%）\n・計算：都市計画税評価額 × 0.3%\n\n市街化区域と市街化調整区域：市街化区域は「今後も市街化を進める地域」、市街化調整区域は「原則として市街化を抑制する地域」です。\n\nここがポイント！固定資産税とは別に課税されるため、合計で「固定資産税1.4% + 都市計画税0.3% = 1.7%」程度が年間負担になります。\n\n都市部の不動産投資では、都市計画税の負担が利回り計算を大きく左右します。地方の市街化調整区域内の物件なら都市計画税がかからないため、実質利回りが高くなる可能性があります。実務では必ず確認すべき項目です。"}, {"num": 44, "type": "multi", "text": "Ａ資産の期待収益率が3.0％、Ｂ資産の期待収益率が5.0％の場合に、Ａ資産を40％、 Ｂ資産を60％の割合で組み入れたポートフォリオの期待収益率は、（ ）となる。", "choices": ["1.8％", "4.0％", "4.2％"], "answer": 2, "kaisetsu": "答え：○（正しい）\n\n「定期借家権」と「普通借家権」の重要な違いをしっかり理解しましょう。定期借家権は契約期間終了で確定的に終了する特徴があります。\n\n普通借家権（従来型）：\n・更新権あり：貸し手の正当な事由がない限り、借主は更新を要求できる\n・借主保護が厚い\n\n定期借家権：\n・更新権なし：契約期間満了で終了（原則として再契約なし）\n・1年以上の契約期間が必須\n・貸し手にとってより確実な期間を設定できる\n\n重要ポイント：定期借家権契約には「定期借家契約書」と「契約条件説明書」の作成・交付が必須です。不動産経営の効率化の観点から、定期借家権を選択する大家さんも増えています。\n\n実務では、相続不動産の管理方法を顧客に提案する際に、どちらの借家権を選ぶか（選べるか）を確認することが重要です。借家権の設定により、売却時の評価額も変わります。"}, {"num": 45, "type": "multi", "text": "預金保険制度の対象金融機関に預け入れた（ ）は、預入金額の多寡にかかわ らず、その全額が預金保険制度による保護の対象となる。", "choices": ["定期積金", "決済用預金", "譲渡性預金"], "answer": 1, "kaisetsu": "答え：×（誤り）\n\n「居住用財産の譲渡所得の特別控除」に関する重要な要件をしっかり理解しましょう。問題文では誤った説明がされています。\n\n正確な要件：\n・居住していた期間：3年以上\n・売却時期：住まなくなってから「3年以内」に売却\n・居住用一軒家または分譲マンション対象\n・控除額：最高3,000万円\n\nここがポイント！「3年以上住んでいた」AND「3年以内に売却」の両要件を満たす必要があります。3年以上住んだ後、売却を1年先延ばしにすると対象外になります。\n\n相続対策への応用：親が長く住んでいた自宅を相続した場合、3年以内に売却すれば3,000万円の控除が使える可能性があります。相続税がかかった場合でも、譲渡所得税の控除で総税負担を軽くできます。\n\n実務では、相続不動産の売却時期の提案が重要です。複数の兄弟姉妹が相続した場合、誰が売却するか、いつまでに売却するかで税務が大きく変わります。"}, {"num": 46, "type": "multi", "text": "所得税において、2022年中に取得した建物（鉱業用減価償却資産等を除く）に係る 減価償却の方法は、（ ）である。", "choices": ["定額法", "定率法", "低価法"], "answer": 0, "kaisetsu": "答え：○（正しい）\n\n「建物の除去費用」の相続税評価に関する知識です。古い建物を壊すのに必要な費用は、相続税評価額から控除できる場合があります。\n\n考え方：建物の相続税評価額は「固定資産税評価額」がベースですが、建物が著しく破損している場合や除去予定の場合、実務上の評価減が検討されます。\n\n除去費用の取扱い：\n・建物を壊す予定がある場合：除去予定額を控除することもあります\n・土地活用計画で建物除去が必要な場合：同様に検討対象\n\nここがポイント！税務署との合意により判断されるため、事前相談が必要です。特に「老朽化した建物」と判定されれば、評価減の対象になる可能性が高まります。\n\n相続不動産の評価：相続税申告時には、単に建物の固定資産税評価額をそのまま使うのではなく、実際の価値（老朽度、除去予定など）を考慮した評価提案ができるFPは、顧客の税負担軽減に貢献できます。"}, {"num": 47, "type": "multi", "text": "所得税において、（ ）、事業所得、山林所得、譲渡所得の金額の計算上生じた 損失の金額は、一定の場合を除き、他の所得の金額と損益通算することができる。", "choices": ["一時所得", "不動産所得", "雑所得"], "answer": 1, "kaisetsu": "答え：×（誤り）\n\n「小規模宅地等の特例」に関する重要な適用要件をしっかり理解しましょう。問題文では誤った説明がされています。\n\n正確な適用要件：\n・対象：被相続人の居住用宅地、事業用宅地、駐車場など\n・評価減：最大80%（居住用）、50%（事業用）\n・面積制限：居住用は330㎡、事業用は400㎡まで\n・要件：相続人が一定期間以上（原則2年）保有する義務\n\nここがポイント！この特例により、相続税の節税効果は非常に大きいです。例えば、相続税評価1億円の自宅が0.2億円に評価されるため、相続税が劇的に減ります。\n\n相続人要件：「配偶者」または「相続開始直前3年以上その家に住んでいない親族」など、適用対象者に制限があります。\n\n実務では、相続財産に「居住用宅地」が含まれる場合は、必ずこの特例の適用を検討します。二次相続（配偶者亡き後）まで視点を広げて、家族全体での税負担軽減策を提案できるFPが理想的です。"}, {"num": 48, "type": "multi", "text": "所得税において、控除対象扶養親族のうち、その年の12月31日時点の年齢が16歳以 上19歳未満である扶養親族に係る扶養控除の額は、扶養親族１人につき（ ）であ る。", "choices": ["38万円", "48万円", "63万円"], "answer": 0, "kaisetsu": "答え：○（正しい）\n\n「遺言の方式」に関する基本的な法律知識です。自筆証書遺言は、全文を自分の手で書く必要があります。\n\n自筆証書遺言の要件：\n・全文を遺言者自身の手で書く（筆記）\n・日付と署名を記入\n・印鑑（認め印可）を押す\n・ワープロやタイプライター不可\n\n他の遺言方式：\n・公正証書遺言：公証人立会いで作成（最も確実）\n・秘密証書遺言：内容を秘密にして作成\n\nここがポイント！自筆証書遺言は費用がかからないメリットがある反面、形式不備で無効になるリスクがあります。また、紛失や改ざんの可能性もあります。\n\n2020年改正では「法務局での保管制度」が開始され、自筆証書遺言の信頼性が向上しました。\n\nライフプランニングで遺言書作成を提案する際に、各方式の特徴を説明できるFPは信頼されます。特に、資産が多い顧客や相続トラブルが予想される場合は「公正証書遺言」の提案が重要です。"}, {"num": 49, "type": "multi", "text": "所得税の確定申告をしなければならない者は、原則として、所得が生じた年の翌年 の（ ① ）から（ ② ）までの間に、納税地の所轄税務署長に対して確定申告書 を提出しなければならない。", "choices": ["① ２月１日 ② ３月15日", "① ２月16日 ② ３月15日", "① ２月16日 ② ３月31日"], "answer": 1, "kaisetsu": "答え：×（誤り）\n\n「遺留分」に関する重要な知識です。遺留分は法定相続分とは異なる概念で、遺言でも侵害できない「最低限の相続分」です。\n\n遺留分権利者：配偶者、子ども、親（兄弟姉妹には遺留分なし）\n\n遺留分の割合（全体相続財産に対する）：\n・配偶者のみ：1/2\n・配偶者と子ども：配偶者1/4、子ども1/4（子ども複数なら分割）\n・子ども（配偶者なし）：1/2\n\nここがポイント！「遺言で全て長男に譲る」という遺言も、他の子どもの遺留分を侵害すれば、遺留分侵害額請求権が発生します。つまり、後から「遺留分をください」と請求されるリスクがあります。\n\n遺留分対策：遺言作成時に「遺留分を侵害しない配分」を心がけるか、あるいは「遺言で遺留分の減殺を承知」という特別な条件を検討します。\n\n相続トラブル防止の観点から、FPが遺言作成を促す際に、遺留分を説明することは非常に大切です。"}, {"num": 50, "type": "multi", "text": "所得税において、青色申告者に損益通算してもなお控除しきれない損失の金額（純 損失の金額）が生じた場合、その損失の金額を翌年以後最長で（ ）繰り越して、 翌年以後の所得金額から控除することができる。", "choices": ["３年間", "５年間", "７年間"], "answer": 0, "kaisetsu": "答え：○（正しい）\n\n「マイナンバー制度」に関する基本的な知識です。マイナンバーは国民全員に割り当てられた12桁の番号で、税務、社会保障、災害対策で利用されます。\n\nマイナンバーの利用場面：\n・所得税申告：収入や控除を記載\n・社会保険手続き：雇用保険、厚生年金など\n・福祉給付：生活保護、児童手当など\n・銀行口座：マイナンバー登録が進行中\n\nここがポイント！マイナンバーにより、個人の収入、社会保険加入状況、資産情報が連携されます。これにより「脱税や過度な給付」の防止効果が期待されています。\n\nプライバシー保護：マイナンバーは重要な個人情報であり、厳格な管理が必須です。不正利用は罰則対象になります。\n\nFPとして、顧客の税務手続きやライフイベント手続き時に、マイナンバー提供の要件を正確に説明できることは信頼につながります。"}, {"num": 51, "type": "multi", "text": "相続税路線価は、地価公示の公示価格の（ ① ）を価格水準の目安として設定さ れており、（ ② ）のホームページで閲覧可能な路線価図で確認することができる。", "choices": ["① 70％ ② 国土交通省", "① 80％ ② 国税庁", "① 90％ ② 国税庁"], "answer": 1, "kaisetsu": "答え：×（誤り）\n\n「定年退職後の企業年金」に関する知識です。問題文では誤った説明がされています。\n\n企業年金の種類：\n・確定給付企業年金：企業が年金額を確定（運用リスクは企業が負担）\n・確定拠出年金（企業型）：従業員が運用方法を選択（運用リスクは従業員が負担）\n\n確定給付企業年金の特徴：企業倒産時には「企業年金債務者負担金」により保障される仕組みがあります。ただし、全額保障ではなく、一定額までの保障です。\n\nセーフティネット：確定給付企業年金保険機構が、企業年金の最低保障を行う制度があります。\n\nここがポイント！「企業が責任を持つ」という原則がありますが、企業の経営難により削減の可能性もゼロではありません。特に、会社の経営状況に不安がある場合は、年金額の確認が重要です。\n\nライフプランニングでは、企業年金の見込み額を盛り込む際に、信頼度（企業の財務状況）を加味することが大切です。"}, {"num": 52, "type": "multi", "text": "借地借家法によれば、定期建物賃貸借契約（定期借家契約）の賃貸借期間が１年以 上である場合、賃貸人は、原則として、期間満了の１年前から（ ）前までの間 に、賃借人に対して期間満了により契約が終了する旨の通知をしなければ、その終了 を賃借人に対抗することができない。", "choices": ["１カ月", "３カ月", "６カ月"], "answer": 2, "kaisetsu": "答え：○（正しい）\n\n「雇用契約と業務委託契約」の違いをしっかり理解しましょう。業務委託契約は、給与所得ではなく事業所得（または雑所得）として扱われます。\n\n雇用契約：\n・雇用者が給与を支払う\n・給与所得控除が適用\n・社会保険加入（雇用主が半分負担）\n・源泉徴収あり\n\n業務委託契約：\n・報酬を受け取る\n・事業所得として申告（実費経費控除）\n・国民年金、国民健康保険に加入（全額自己負担）\n・源泉徴収なし（自分で申告税納付）\n\nここがポイント！業務委託は「自営業」に近い扱いで、経費計算や税務申告の手続きが複雑になります。また、社会保険の負担が重くなる傾向があります。\n\n個人事業主としてのFPやコンサルタントも、この扱いになります。適切な税務申告と経費計算により、節税機会を活用することが重要です。"}, {"num": 53, "type": "multi", "text": "建築基準法によれば、第一種低層住居専用地域内の建築物の高さは、原則として （ ）のうち当該地域に関する都市計画において定められた建築物の高さの限度を 超えてはならないとされている。", "choices": ["10ｍまたは12ｍ", "10ｍまたは20ｍ", "12ｍまたは15ｍ"], "answer": 0, "kaisetsu": "答え：×（誤り）\n\n「分散投資」の効果についての知識です。問題文では誤った説明がされています。\n\n分散投資の効果（正確な理解）：\n・異なる値動きの資産を組み合わせれば、ポートフォリオ全体のリスクを低減できる\n・これを「相関係数が低い資産の組み合わせ」と言います\n・完全に「リスク0」にはならない（非分散可能リスクは残る）\n\n相関係数：\n・+1に近い：同じ方向に動く（分散効果なし）\n・0に近い：関係ない動き（分散効果大きい）\n・-1に近い：逆方向に動く（分散効果最大）\n\nここがポイント！「全ての資産が暴落する相場」では、分散投資も効果が限定的になります。例えば、2008年金融危機では、株式、債券、不動産が同時に下落しました。\n\n多様な資産クラス（国内株、海外株、国債、社債、不動産、商品など）を組み合わせることで、分散効果を最大化できます。定期的なリバランスも重要です。"}, {"num": 54, "type": "multi", "text": "市街化区域内において、所有する農地を自宅の建築を目的として宅地に転用する場 合、あらかじめ（ ）に届出をすれば都道府県知事等の許可は不要である。", "choices": ["農業委員会", "市町村長", "国土交通大臣"], "answer": 0, "kaisetsu": "答え：○（正しい）\n\n「投資信託の信託報酬」の特徴をしっかり理解しましょう。信託報酬は年率で表示されることが多く、毎日の基準価額から差し引かれます。\n\n信託報酬の内訳（年率、例）：\n・運用会社への報酬：0.5%程度\n・販売会社への報酬：0.3%程度\n・受託会社への報酬：0.05%程度\n合計：0.85%～1.0%程度\n\n支払い方法：保有期間中、毎日基準価額から自動的に差し引かれます\n\n影響度：長期投資では信託報酬の差が大きく影響します\n・信託報酬0.5%と1.0%の投信を30年保有すれば、運用成果が15%以上変わる可能性があります\n\nここがポイント！「低コスト化」がここ数年のトレンドです。インデックスファンドは0.1%～0.3%程度、アクティブファンドは0.5%～2.0%程度が相場です。\n\n顧客への提案時に、信託報酬を含めた実質的なリターン（手数料控除後）を説明できるFPは信頼度が高まります。"}, {"num": 55, "type": "multi", "text": "個人が自宅の土地および建物を譲渡し、「特定の居住用財産の買換えの場合の長期 譲渡所得の課税の特例」の適用を受けるためには、譲渡した年の１月１日において譲 渡資産の所有期間が（ ① ）を超えていることや、譲渡資産の譲渡対価の額が（ ② ） 以下であることなどの要件を満たす必要がある。", "choices": ["① ５年 ② １億円", "① ５年 ② １億6,000万円", "① 10年 ② １億円"], "answer": 2, "kaisetsu": "答え：×（誤り）\n\n「つみたてNISA」の投資対象に関する知識です。問題文では誤った説明がされています。\n\nつみたてNISAの要件：\n・対象商品：一定基準を満たす投資信託とETF\n・信託報酬：0.75%以下が目安\n・基本的にインデックスファンド、または厳選されたアクティブファンド\n・高すぎる手数料商品は対象外\n\n対象外の例：\n・ファンド・オブ・ファンズ（複数ファンドを組み合わせた商品）\n・頻繁な分配金を行うファンド\n・極度に複雑な商品\n\nここがポイント！つみたてNISAは「初心者向けの安全な長期投資」を想定しているため、商品選定が厳格です。その代わり、信頼度の高い商品だけが集められています。\n\nつみたてNISAと一般NISAの使い分けも重要です。毎月コツコツ貯める若年層にはつみたてNISA、ある程度資金がある中高年層には一般NISAが向いています。"}, {"num": 56, "type": "multi", "text": "個人が法人からの贈与により取得する財産は、（ ）の課税対象となる。", "choices": ["法人税", "贈与税", "所得税"], "answer": 2, "kaisetsu": "答え：○（正しい）\n\n「iDeCo（確定拠出年金個人型）」の拠出限度額に関する知識です。職業や加入している年金制度により限度額が異なります。\n\n拠出限度額（年額、2023年時点）：\n・会社員（企業年金なし）：27.6万円（月額2.3万円）\n・会社員（企業型DC加入）：24万円（月額2万円）\n・公務員など：14.4万円（月額1.2万円）\n・自営業・フリーランス：81.6万円（月額6.8万円）\n\nここがポイント！企業型DCに加入している場合は拠出限度額が下がります。これは「企業と個人の合計拠出額」の上限を考慮した設定です。\n\n税制メリット：\n・拠出時：全額所得控除（節税）\n・運用時：運用益非課税\n・受取時：退職所得控除（退職金扱い）または公的年金控除\n\nライフプランニングで、自営業者や高所得会社員に対しては、iDeCoの活用を強く提案する価値があります。特に「節税効果」と「老後資金形成」の二つのメリットが大きいからです。"}, {"num": 57, "type": "multi", "text": "下記の＜親族関係図＞において、Ａさんの相続における母Ｄさんの法定相続分は、 （ ）である。 ＜親族関係図＞ 父Ｃさん 母Ｄさん Ａさん 妻Ｂさん 兄Ｅさん （被相続人）", "choices": ["３分の１", "４分の１", "６分の１"], "answer": 2, "kaisetsu": "答え：×（誤り）\n\n「終身医療保険」と「定期医療保険」の比較に関する知識です。問題文では誤った説明がされています。\n\n終身医療保険：\n・保障期間：一生涯（解約しない限り保障継続）\n・保険料：一定（変わらない）\n・特徴：長期安心、ただし保険料は割高\n\n定期医療保険：\n・保障期間：一定期間（10年、20年など）\n・保険料：定期ごとに更新で上昇する傾向\n・特徴：割安、短期間の保障に最適\n\nここがポイント！「年齢が上がると定期医療保険の更新保険料が高くなる」という仕組みがあります。つまり、長く加入する予定なら「終身医療保険」が結果的に割安になる可能性があります。\n\n選択のポイント：\n・若い頃：定期医療保険で低コスト\n・40代以降：終身医療保険への切り替えを検討\n・既存契約：必要に応じて保障を調整\n\nライフステージに応じた医療保障の提案ができるFPは、顧客の信頼を勝ち取ります。"}, {"num": 58, "type": "multi", "text": "下記の＜親族関係図＞において、遺留分を算定するための財産の価額が２億4,000 万円である場合、長女Ｅさんの遺留分の金額は、（ ）となる。 ＜親族関係図＞ Ａさん 妻Ｂさん （被相続人） 長男Ｃさん 二男Ｄさん 長女Ｅさん", "choices": ["1,000万円", "2,000万円", "4,000万円"], "answer": 1, "kaisetsu": "答え：○（正しい）\n\n「がん保険」の保障内容に関する基本知識です。一般的に、がん保険は診断時に「診断給付金」が支払われます。\n\nがん保険の主な保障：\n・診断給付金：がんと診断された時に一括給付（例：100万円）\n・入院給付金：入院日数に応じて給付\n・手術給付金：がん治療手術で給付\n・抗がん剤治療給付金：分子標的薬など先進治療をカバー\n\n重要ポイント：診断給付金は「治療費」以外にも使える自由度が高い\n・生活費補填、先進治療の自己負担、仕事復帰までのサポートなど\n\nここがポイント！医療保険とがん保険の併用が一般的です。医療保険は幅広い病気をカバーし、がん保険はがんに特化した厚手の保障を提供します。\n\nライフステージ別提案：\n・若年層：保険料が安いうちにがん保険加入\n・中高年層：既存保障の見直し、新しい治療法への対応\n・高齢層：保障継続、加給年金の検討\n\nがんは「3人に1人がかかる時代」であり、顧客との相談で頻出テーマになります。"}, {"num": 59, "type": "multi", "text": "被相続人の（ ）が相続により財産を取得した場合、その者は相続税額の２割 加算の対象となる。", "choices": ["兄弟姉妹", "父母", "孫（子の代襲相続人）"], "answer": 0, "kaisetsu": "答え：×（誤り）\n\n「介護保険」の保障対象に関する知識です。問題文では誤った説明がされています。\n\n介護保険（民間商品）の保障：\n・公的介護保険の自己負担分をカバー\n・介護が必要になった時に給付金\n・認知症、寝たきり、要介護2以上が対象（商品による）\n\n公的介護保険との関係：\n・公的介護保険：65歳以上の全国民が加入（医療保険と連動）\n・民間介護保険：公的保険の不足分を補完\n\n長期介護リスク：\n・介護期間：5～10年以上になる可能性\n・介護費用：月15～30万円程度（施設による）\n・精神的負担：家族介護の限界\n\nここがポイント！「介護が長期化する時代」に対応するため、民間介護保険の提案価値が高まっています。\n\n選択基準：\n・親の介護状況、経済状況\n・相続資産の規模\n・子ども世代の介護負担能力\n\n介護と相続は別問題ですが、一緒に相談される場合が多いです。親の介護費用が相続財産を減らす可能性も説明できると、FPの価値が高まります。"}, {"num": 60, "type": "multi", "text": "相続人が相続により取得した宅地が「小規模宅地等についての相続税の課税価格の 計算の特例」における特定事業用宅地等に該当する場合、その宅地のうち（ ① ） までを限度面積として、評価額の（ ② ）相当額を減額した金額を、相続税の課税 価格に算入すべき価額とすることができる。", "choices": ["① 200㎡ ② 50％", "① 330㎡ ② 80％", "① 400㎡ ② 80％ （終）"], "answer": 2, "kaisetsu": "答え：○（正しい）\n\n「個人賠償責任保険」の特性をしっかり理解しましょう。この保険は日常生活の事故により、他人に損害を与えた時の法的責任をカバーします。\n\n保障の例：\n・子どもが他人の物を壊した\n・ペットが他人に危害を加えた\n・自転車で人にぶつかった\n・家の浴槽から水漏れして隣家に被害\n\n保険金の使途：\n・治療費、修理費、慰謝料などの損害賠償金\n\n特徴：保険料が非常に安い（年1,000円～3,000円程度）\n\n加入場所：\n・火災保険や自動車保険の特約\n・傷害保険の特約\n・単独の個人賠償責任保険\n\nここがポイント！「低額保険料で高額保障」という点が魅力です。一般的に1億円まで保障される商品が多いため、子どもがいる家庭には必須です。\n\n家計診断の際に「個人賠償責任保険に入ってますか？」という質問をするFPは、細かい気配りができる信頼できるアドバイザーとして評価されます。"}]}, {"id": "202309", "label": "2023年9月", "questions": [{"num": 1, "type": "ox", "text": "ファイナンシャル・プランナーが顧客と投資顧問契約を締結し、当該契約に基づき 金融商品取引法で定める投資助言・代理業を行うためには、内閣総理大臣の登録を受 けなければならない。", "choices": [], "answer": true, "kaisetsu": "【正解】○ ファイナンシャル・プランナーが顧客と投資顧問契約を結んで投資助言・代理業を行う際は、必ず内閣総理大臣の登録が必要です。これは金融商品取引法（金商法）で定められた重要なルールです。無登録で行うと違法になるため、顧客との信頼関係構築の第一歩として、登録状況の確認は大切です。金商法は投資の安全性を守るための法律なので、しっかり覚えておきましょう。"}, {"num": 2, "type": "ox", "text": "アルバイトやパートタイマーが、労働者災害補償保険の適用を受けるためには、１ 週間の所定労働時間が20時間を超えていなければならない。", "choices": [], "answer": false, "kaisetsu": "【正解】×（誤解しやすい）アルバイトやパートタイマーでも、労働者災害補償保険（労災保険）の適用を受けるには、週の所定労働時間が20時間「以上」であることが条件です。20時間「超えていなければ」という条件は実はありません。労災は全労働者を守る仕組みなので、勤務形態に関わらず一定の条件で適用される重要な保障です。"}, {"num": 3, "type": "ox", "text": "国民年金の第１号被保険者は、日本国内に住所を有する20歳以上60歳未満の自営業 者や学生などのうち、日本国籍を有する者のみが該当する。", "choices": [], "answer": false, "kaisetsu": "【正解】×（条件をチェック）国民年金第1号被保険者の対象は「日本国内に住所を有する20歳以上60歳未満」の自営業者や学生など。重要なのは「日本国籍を有する者のみ」という限定が実はなく、永住者など日本に住所がある人なら対象になります。この「国籍要件なし」を覚えておくことがポイントです。"}, {"num": 4, "type": "ox", "text": "国民年金基金の加入員は、所定の事由により加入員資格を喪失する場合を除き、加 入している国民年金基金から自己都合で任意に脱退することはできない。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 国民年金基金は自分の意思で自由に脱退できない仕組みになっています。所定の事由（死亡、60歳到達など）のみで資格喪失します。これは年金という長期的な保障を確保するための設計なので、加入時には慎重に判断することが大切です。"}, {"num": 5, "type": "ox", "text": "住宅ローンの一部繰上げ返済では、返済期間を変更せずに毎月の返済額を減額する 返済額軽減型よりも、毎月の返済額を変更せずに返済期間を短くする期間短縮型のほ うが、他の条件が同一である場合、通常、総返済額は少なくなる。", "choices": [], "answer": true, "kaisetsu": "【正解】○（計算の工夫）住宅ローン繰上げ返済で「期間短縮型」と「返済額軽減型」を比べると、期間短縮型の方が利息をより多く削減できるため、総返済額が少なくなります。毎月の支払いが楽な「返済額軽減型」は便利ですが、利息削減効果は期間短縮型に劣ります。"}, {"num": 6, "type": "ox", "text": "国内で事業を行う生命保険会社が破綻した場合、生命保険契約者保護機構による補 償の対象となる保険契約については、高予定利率契約を除き、既払込保険料相当額の 90％まで補償される。", "choices": [], "answer": false, "kaisetsu": "【正解】×（補償率に注意）生命保険契約者保護機構による破綻時補償は「90%」ではなく、高予定利率契約を除き「責任準備金等の90%相当」です。100%補償ではないということを押さえておきましょう。"}, {"num": 7, "type": "ox", "text": "定期保険特約付終身保険（更新型）は、定期保険特約を同額の保険金額で更新する 場合、更新にあたって被保険者の健康状態についての告知や医師の診査は必要ない。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 定期保険特約付終身保険（更新型）は、特約を更新する際に「告知や医師の診査が不要」という大きなメリットがあります。これにより、更新時点での健康状態に関わらず、保障を継続できる利点が生まれます。ただし保険料は上がる可能性があるので注意が必要です。"}, {"num": 8, "type": "ox", "text": "変額個人年金保険は、特別勘定の運用実績によって、将来受け取る年金額や死亡給 付金額は変動するが、解約返戻金額は変動しない。", "choices": [], "answer": false, "kaisetsu": "【正解】×（仕組みをしっかり理解）変額個人年金保険は、将来受け取る年金額や死亡給付金額が運用実績により変動するだけでなく、解約返戻金も変動します。「実績連動」という特性全体が価格変動するということを覚えておきましょう。"}, {"num": 9, "type": "ox", "text": "自動車保険の車両保険では、一般に、被保険自動車が洪水により水没したことに よって被る損害は、補償の対象となる。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 自動車保険の車両保険では、洪水や台風などの自然災害による水没損害も補償の対象です。ただし地震による損害は除外されることが多いので、地震と自然災害の区別が大切です。"}, {"num": 10, "type": "ox", "text": "地震保険では、保険の対象である居住用建物または生活用動産（家財）の損害の程 度が「全損」「大半損」「小半損」「一部損」のいずれかに該当した場合に、保険金が支 払われる。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 地震保険は「全損」「大半損」「小半損」「一部損」という4段階の損害程度で保険金が支払われます。損害があっても「一部損」に満たなければ支払われないという制限がある点が特徴です。"}, {"num": 11, "type": "ox", "text": "景気動向指数において、コンポジット・インデックス（ＣＩ）は、景気拡張の動きの 各経済部門への波及度合いを測定することを主な目的とした指標である。", "choices": [], "answer": false, "kaisetsu": "【正解】×（指標の役割を区別）景気動向指数のコンポジット・インデックス（CI）は「各部門への波及度合い」ではなく「景気変動の大きさや方向」を測定します。これを「DI」と混同しないことがポイントです。"}, {"num": 12, "type": "ox", "text": "追加型の国内公募株式投資信託において、収益分配金支払後の基準価額が受益者の 個別元本を下回る場合、当該受益者に対する収益分配金は、その全額が普通分配金と なる。", "choices": [], "answer": false, "kaisetsu": "【正解】×（分配金の種類を理解）基準価額が受益者の個別元本を下回る場合、全額が普通分配金になるわけではなく、その差額は「特別分配金（元本払戻金）」になります。分配金が必ずしも利益ではないという仕組みを理解することが大切です。"}, {"num": 13, "type": "ox", "text": "債券の信用格付とは、債券やその発行体の信用評価を記号等で示したものであり、 一般に、ＢＢＢ（トリプルビー）格相当以上の格付が付された債券は、投資適格債とさ れる。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 債券格付でBBB格（トリプルビー）以上を「投資適格債」と呼び、これは比較的安全性が高い債券を示す重要な分類です。BB格以下は「投機的格付」となり、リスクが高まります。"}, {"num": 14, "type": "ox", "text": "日経平均株価は、東京証券取引所スタンダード市場に上場している代表的な225銘柄 を対象として算出される。", "choices": [], "answer": false, "kaisetsu": "【正解】×（市場を間違えるな）日経平均株価は「東京証券取引所プライム市場」に上場している代表的な225銘柄で計算されます。スタンダード市場ではなくプライム市場という違いが大切なポイントです。"}, {"num": 15, "type": "ox", "text": "オプション取引において、他の条件が同一であれば、満期までの残存期間が長いほ ど、プレミアム（オプション料）は高くなる。", "choices": [], "answer": true, "kaisetsu": "【正解】○ オプション取引のプレミアム（オプション料）は、残存期間が長いほど「本質価値変動の可能性」が大きくなるため、より高くなります。時間価値という概念を理解することが重要です。"}, {"num": 16, "type": "ox", "text": "電車・バス等の交通機関を利用して通勤している給与所得者が、勤務先から受ける 通勤手当は、所得税法上、月額10万円を限度に非課税とされる。", "choices": [], "answer": false, "kaisetsu": "【正解】×（限度額を確認）電車・バス等で通勤する場合の通勤手当は、所得税法上「月額15万円」を限度に非課税です。10万円ではなく15万円がポイントです。"}, {"num": 17, "type": "ox", "text": "確定拠出年金の個人型年金の老齢給付金を全額一時金で受け取った場合、当該老齢 給付金は、一時所得として所得税の課税対象となる。", "choices": [], "answer": false, "kaisetsu": "【正解】×（課税形式に注意）確定拠出年金（iDeCo）の老齢給付金を一時金で受け取る場合、「退職所得」として扱われます。一時所得ではなく退職所得という特別な扱いになることが大切です。"}, {"num": 18, "type": "ox", "text": "セルフメディケーション税制（特定一般用医薬品等購入費を支払った場合の医療費 控除の特例）の対象となるスイッチＯＴＣ医薬品等の購入費を支払った場合、その購入 費用の全額を所得税の医療費控除として総所得金額等から控除することができる。", "choices": [], "answer": false, "kaisetsu": "【正解】×（控除の限度額を理解）セルフメディケーション税制では、スイッチOTC医薬品等の購入費全額が控除対象ではなく、1年間で「12,000円を超える部分」のみが対象となります。最大で200,000円までという限度もあります。"}, {"num": 19, "type": "ox", "text": "上場不動産投資信託（Ｊ-ＲＥＩＴ）の分配金は、確定申告をすることにより所得税の 配当控除の適用を受けることができる。", "choices": [], "answer": false, "kaisetsu": "【正解】×（J-REITの特性を理解）上場不動産投資信託（J-REIT）の分配金は、配当控除の適用を受けることができません。これは配当金ではなく「収益分配」として扱われるためです。"}, {"num": 20, "type": "ox", "text": "給与所得者のうち、その年中に支払を受けるべき給与の収入金額が1,000万円を超え る者は、所得税の確定申告をしなければならない。", "choices": [], "answer": false, "kaisetsu": "【正解】×（申告義務を正確に理解）給与所得者が給与1,000万円超でも「申告義務あり」は絶対ではなく、実際には条件によって変わります。むしろ年末調整で処理されることが一般的です。"}, {"num": 21, "type": "ox", "text": "不動産の登記事項証明書は、対象不動産について利害関係を有する者以外であって も、交付を請求することができる。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 不動産登記事項証明書は「利害関係者」に限らず、誰でも交付請求できます。この透明性が不動産取引の信頼性を保証する重要な仕組みです。"}, {"num": 22, "type": "ox", "text": "借地借家法によれば、定期建物賃貸借契約（定期借家契約）では、貸主に正当の事 由があると認められる場合でなければ、貸主は、借主からの契約の更新の請求を拒む ことができないとされている。", "choices": [], "answer": false, "kaisetsu": "【正解】×（定期借家契約の特徴を理解）定期借家契約では「正当事由がなくても更新を拒める」ことができます。つまり貸主優位な仕組みとなっており、これが普通借家契約との大きな違いです。"}, {"num": 23, "type": "ox", "text": "都市計画法によれば、市街化区域については、用途地域を定めるものとし、市街化 調整区域については、原則として用途地域を定めないものとされている。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 都市計画法の原則：市街化区域には必ず用途地域を定め、市街化調整区域には原則として用途地域を定めません。この区分けが都市計画の骨組みとなっています。"}, {"num": 24, "type": "ox", "text": "建築基準法によれば、建築物の敷地が２つの異なる用途地域にわたる場合、その全 部について、建築物の用途制限がより厳しい用途地域の建築物の用途に関する規定が 適用される。", "choices": [], "answer": false, "kaisetsu": "【正解】×（複数用途地域の場合）敷地が異なる用途地域にまたがる場合、「より厳しい用途制限が全体に適用される」のではなく「敷地のある部分ごとに適用される」ことになります。部分的適用が正解です。"}, {"num": 25, "type": "ox", "text": "「居住用財産を譲渡した場合の長期譲渡所得の課税の特例」（軽減税率の特例）の適 用を受けるためには、譲渡した居住用財産の所有期間が譲渡した日の属する年の１月 １日において10年を超えていなければならない。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 居住用財産の軽減税率特例を受けるには、所有期間が「譲渡した年の1月1日において10年超」である必要があります。この10年という長さが低い税率適用の条件となっています。"}, {"num": 26, "type": "ox", "text": "個人が死因贈与により取得した財産は、課税の対象とならないものを除き、贈与税の 課税対象となる。", "choices": [], "answer": false, "kaisetsu": "【正解】×（死因贈与の課税形式を理解）死因贈与によって取得した財産は「相続税の対象」として扱われ、贈与税ではなく相続税がかかります。死亡時に効力が生じる特殊な贈与として理解することが大切です。"}, {"num": 27, "type": "ox", "text": "親族間において著しく低い価額の対価で土地の譲渡が行われた場合、原則として、 その譲渡があった時の土地の時価と支払った対価との差額に相当する金額が、贈与税 の課税対象となる。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 親族間で著しく低い価額での譲渡があった場合、その差額（時価と実際支払額の差）が贈与税の対象となります。これは「暗黙の贈与」を防ぐための規定です。"}, {"num": 28, "type": "ox", "text": "共同相続人は、被相続人が遺言により相続分や遺産分割方法の指定をしていない場 合、法定相続分どおりに相続財産を分割しなければならない。", "choices": [], "answer": false, "kaisetsu": "【正解】×（遺産分割の自由度を理解）遺言による指定がない場合、相続人は「法定相続分通り」に分割する義務はなく、遺産分割協議で自由に配分を決めることができます。合意がない場合の目安が法定相続分という理解です。"}, {"num": 29, "type": "ox", "text": "相続税の申告書の提出は、原則として、その相続の開始があったことを知った日の 翌日から10カ月以内にしなければならない。", "choices": [], "answer": true, "kaisetsu": "【正解】○ 相続税申告書の提出期限は「相続開始を知った日の翌日から10ヶ月以内」が原則です。この期限内に申告・納税しないと加算税が課される可能性があります。"}, {"num": 30, "type": "ox", "text": "相続人が相続により取得した宅地が「小規模宅地等についての相続税の課税価格の 計算の特例」における特定居住用宅地等に該当する場合、その宅地のうち330㎡までを 限度面積として、評価額の80％相当額を減額した金額を、相続税の課税価格に算入す べき価額とすることができる。 【第２問】 次の各文章（(31)～(60)）の（ ）内にあてはまる最も適切な文章、語句、数 字またはそれらの組合せを1)～3)のなかから選び、その番号を解答用紙にマー クしなさい。 〔30問〕", "choices": [], "answer": true, "kaisetsu": "【正解】○ 小規模宅地等の特例で、特定居住用宅地等（330㎡限度）は「評価額の80%を減額」できます。この大幅な減額は相続税負担を大きく軽減する重要な制度です。"}, {"num": 31, "type": "multi", "text": "Ａさんの2023年分の可処分所得の金額は、下記の＜資料＞によれば、（ ）であ る。 ＜資料＞2023年分のＡさんの収入等 給与収入 ： 750万円（給与所得：565万円） 所得税・住民税 ： 80万円 社会保険料 ： 100万円 生命保険料 ： 20万円", "choices": ["385万円", "550万円", "570万円"], "answer": 2, "kaisetsu": "【正解】3）570万円。可処分所得の計算：給与所得565万円から所得税・住民税80万円と社会保険料100万円を控除します。ここで重要なのは「生命保険料は控除対象外」という点です。計算式：565万円－80万円－100万円＝385万円では?いいえ。給与「収入」750万円から社会保険料100万円を控除した650万円が税前手取りで、そこから税80万円を引くと570万円になります。生命保険料20万円は個人的な支出として除外されるため可処分所得は570万円です。覚えておこう：可処分所得＝税引後手取り。"}, {"num": 32, "type": "multi", "text": "全国健康保険協会管掌健康保険の被保険者に支給される傷病手当金の額は、原則と して、１日につき、傷病手当金の支給を始める日の属する月以前の直近の継続した （ ① ）の各月の標準報酬月額の平均額を30で除した額に、（ ② ）を乗じた額で ある。", "choices": ["① ６カ月間 ② ３分の２", "① 12カ月間 ② ３分の２", "① 12カ月間 ② ４分の３"], "answer": 1, "kaisetsu": "【正解】2）① 12カ月間 ② 3分の2。健康保険の傷病手当金計算：支給開始日以前の「直近の継続した12ヶ月」間の標準報酬月額の平均を基準とし、その平均額を30で割った額に「3分の2」を乗じます。この「12ヶ月」と「3分の2」という組み合わせは確定申告や実務で何度も出てくるので、セットで覚えることが大切です。"}, {"num": 33, "type": "multi", "text": "雇用保険の基本手当を受給するためには、倒産、解雇、雇止めなどの場合を除き、 原則として、離職の日以前（ ① ）に被保険者期間が通算して（ ② ）以上ある ことなどの要件を満たす必要がある。", "choices": ["① １年間 ② ６カ月", "① ２年間 ② ６カ月", "① ２年間 ② 12カ月"], "answer": 2, "kaisetsu": "【正解】3）① 2年間 ② 12カ月。雇用保険基本手当の受給要件：倒産・解雇などを除き、「離職の前日以前2年間」に「通算12ヶ月以上」の被保険者期間が必要です。この「2年」「12ヶ月」という数字のセットをしっかり記憶することが重要です。"}, {"num": 34, "type": "multi", "text": "子のいない障害等級１級に該当する者に支給される障害基礎年金の額は、子のいな い障害等級２級に該当する者に支給される障害基礎年金の額の（ ）に相当する 額である。", "choices": ["1.25倍", "1.50倍", "1.75倍"], "answer": 0, "kaisetsu": "【正解】1）1.25倍。障害基礎年金の等級による支給額：1級は2級の「1.25倍」となります。この比率は社会保障制度の基本なので、確実に頭に入れておきましょう。"}, {"num": 35, "type": "multi", "text": "住宅金融支援機構と民間金融機関が提携した住宅ローンであるフラット3（5 買取型） の融資額は、土地取得費を含めた住宅建設費用または住宅購入価額以内で、最高 （ ① ）であり、融資金利は（ ② ）である。", "choices": ["① 8,000万円 ② 固定金利", "① １億円 ② 固定金利", "① １億円 ② 変動金利"], "answer": 0, "kaisetsu": "【正解】1）① 8,000万円 ② 固定金利。フラット35（買取型）の特徴：融資限度額「8,000万円」、金利は「固定金利」。この組み合わせにより、返済期間全体で金利が変わらないため、長期的な資金計画が立てやすくなります。"}, {"num": 36, "type": "multi", "text": "生命保険の保険料は、大数の法則および（ ① ）に基づき、予定死亡率、予定 利率、（ ② ）の３つの予定基礎率を用いて計算される。", "choices": ["① 適合性の原則 ② 予定事業費率", "① 適合性の原則 ② 予定損害率", "① 収支相等の原則 ② 予定事業費率"], "answer": 2, "kaisetsu": "【正解】3）① 収支相等の原則 ② 予定事業費率。生命保険料計算の基礎：「大数の法則」と「収支相等の原則」に基づいて、3つの予定基礎率（予定死亡率・予定利率・予定事業費率）を用いて計算されます。この原則を理解することが保険商品設計の基本です。"}, {"num": 37, "type": "multi", "text": "自動車損害賠償責任保険（自賠責保険）において、被害者１人当たりの保険金の支 払限度額は、加害車両が１台の場合、死亡による損害については（ ① ）、傷害によ る損害については（ ② ）である。", "choices": ["① 3,000万円 ② 120万円", "① 3,000万円 ② 150万円", "① 4,000万円 ② 150万円"], "answer": 0, "kaisetsu": "【正解】1）① 3,000万円 ② 120万円。自動車損害賠償責任保険（自賠責）の保険金支払限度額：被害者1人当たり、死亡による損害は「3,000万円」、傷害による損害は「120万円」（対物損害は3,000万円）。この金額は試験頻出なので必須暗記です。"}, {"num": 38, "type": "multi", "text": "個人賠償責任保険（特約）では、被保険者が（ ）、法律上の損害賠償責任を負 うことによって被る損害は、補償の対象となる。", "choices": ["業務中に自転車で歩行者に衝突してケガをさせてしまい", "自動車を駐車する際に誤って隣の自動車に傷を付けてしまい", "買い物中に誤って商品を落として破損させてしまい"], "answer": 2, "kaisetsu": "【正解】3）買い物中に誤って商品を落として破損させてしまい。個人賠償責任保険の対象：日常生活での過失により他人に損害を与えた場合です。業務中の自転車は「職務」のため除外、自動車損傷は「自動車保険」の対象のため除外されます。"}, {"num": 39, "type": "multi", "text": "スーパーマーケットを経営する企業が、火災により店舗が全焼し、休業した場合の 利益損失を補償する保険として、（ ）がある。", "choices": ["請負業者賠償責任保険", "企業費用・利益総合保険", "施設所有（管理）者賠償責任保険"], "answer": 1, "kaisetsu": "【正解】2）企業費用・利益総合保険。火災による営業停止で発生する利益損失（営業利益減少）をカバーする保険が「企業費用・利益総合保険」です。事業継続に直結する重要な保障です。"}, {"num": 40, "type": "multi", "text": "医療保険等に付加される先進医療特約では、（ ）時点において厚生労働大臣に より定められている先進医療が給付の対象となる。", "choices": ["申込日", "責任開始日", "療養を受けた日"], "answer": 2, "kaisetsu": "【正解】3）療養を受けた日。先進医療特約の給付対象判定：「療養を受けた日」時点で厚生労働大臣により認定されている先進医療が対象となります。申込日や責任開始日ではなく、治療を受ける当時の認定状況が基準です。"}, {"num": 41, "type": "multi", "text": "一定期間内に国内で生産された財やサービスの付加価値の合計額から物価変動の影 響を取り除いた指標を、（ ）という。", "choices": ["実質ＧＤＰ", "名目ＧＤＰ", "ＧＤＰデフレーター"], "answer": 0, "kaisetsu": "【正解】1）実質GDP。GDP（国内総生産）の種類：物価変動の影響を除いた国内生産の付加価値合計が「実質GDP」です。経済の「本当の成長」を測定するため、インフレ・デフレの影響を調整した重要な指標です。"}, {"num": 42, "type": "multi", "text": "投資信託の運用において、株価が企業の財務状況や利益水準などからみて、割安と評 価される銘柄に投資する運用手法を、（ ）という。", "choices": ["グロース運用", "バリュー運用", "パッシブ運用"], "answer": 1, "kaisetsu": "【正解】2）バリュー運用。投資手法の区別：企業の財務状況や利益水準からみて割安と評価される銘柄に投資する手法が「バリュー運用」です。成長性重視の「グロース運用」や、指数連動の「パッシブ運用」との違いを理解することが大切です。"}, {"num": 43, "type": "multi", "text": "表面利率（クーポンレート）３％、残存期間２年の固定利付債券を額面100円当たり 105円で購入した場合の最終利回り（年率・単利）は、（ ）である。なお、税金 等は考慮しないものとし、計算結果は表示単位の小数点以下第３位を四捨五入してい る。", "choices": ["0.48％", "0.50％", "0.53％"], "answer": 0, "kaisetsu": "【正解】1）0.48%。債券の最終利回り計算：表面利率3%で残存期間2年の債券を105円で購入。年間利息=3円、期間2年で利息合計6円。購入価格105円と額面100円の差5円を調整して計算すると（6-5）/105÷2≒0.476%→0.48%。"}, {"num": 44, "type": "multi", "text": "株式の投資指標として利用されるＲＯＥは、（ ① ）を（ ② ）で除して算出さ れる。", "choices": ["① 当期純利益 ② 自己資本", "① 当期純利益 ② 総資産", "① 営業利益 ② 総資産"], "answer": 0, "kaisetsu": "【正解】1）① 当期純利益 ② 自己資本。株式投資指標ROE：Return on Equity（自己資本利益率）＝当期純利益÷自己資本で算出されます。企業の資本効率性を測る重要な指標です。"}, {"num": 45, "type": "multi", "text": "外貨預金の預入時において、預入金融機関が提示する（ ）は、預金者が円貨 を外貨に換える際に適用される為替レートである。", "choices": ["ＴＴＢ", "ＴＴＭ", "ＴＴＳ"], "answer": 2, "kaisetsu": "【正解】3）TTS。外貨預金の為替レート種類：「TTS（Telegraphic Transfer Selling）」は、預金者が円を外貨に換える際に適用される金融機関側の売値です。TTBは外貨売却時、TTMは仲値という区別を覚えましょう。"}, {"num": 46, "type": "multi", "text": "固定資産のうち、（ ）は減価償却の対象とされない資産である。", "choices": ["特許権", "ソフトウエア", "土地"], "answer": 2, "kaisetsu": "【正解】3）土地。固定資産と減価償却：「土地」は減価償却の対象とされません。時間経過で価値が減少しないという会計的判断です。特許権やソフトウェアは無形資産として減価償却対象になります。"}, {"num": 47, "type": "multi", "text": "所得税において、ふるさと納税の謝礼として地方公共団体から受ける返礼品に係る 経済的利益は、（ ）として総合課税の対象となる。", "choices": ["一時所得", "配当所得", "雑所得"], "answer": 0, "kaisetsu": "【正解】1）一時所得。ふるさと納税の返礼品：地方公共団体から受け取る返礼品に係る経済的利益は「一時所得」として総合課税の対象となります。配当所得や雑所得ではないという分類が大切です。"}, {"num": 48, "type": "multi", "text": "所得税において、所定の要件を満たす子を有し、現に婚姻をしていない者がひとり 親控除の適用を受けるためには、納税者本人の合計所得金額が（ ）以下でなけ ればならない。", "choices": ["200万円", "350万円", "500万円"], "answer": 2, "kaisetsu": "【正解】3）500万円。ひとり親控除の所得制限：所定の要件を満たす子がいる現に婚姻していない者のひとり親控除は「合計所得金額が500万円以下」が条件です。高所得者は適用対象外になります。"}, {"num": 49, "type": "multi", "text": "所得税において、控除対象扶養親族のうち、その年の12月31日時点の年齢が（ ① ） 以上（ ② ）未満である者は、特定扶養親族に該当する。", "choices": ["① 16歳 ② 19歳", "① 18歳 ② 22歳", "① 19歳 ② 23歳"], "answer": 2, "kaisetsu": "【正解】3）① 19歳 ② 23歳。特定扶養親族の年齢：12月31日時点で「19歳以上23歳未満」の控除対象扶養親族です。この年齢層は扶養控除額が大学進学等で支出が多いという政策的配慮から特別扱いされています。"}, {"num": 50, "type": "multi", "text": "その年の１月16日以後新たに事業所得を生ずべき業務を開始した納税者が、その年 分から所得税の青色申告の承認を受けようとする場合、原則として、その業務を開始 した日から（ ）以内に、青色申告承認申請書を納税地の所轄税務署長に提出し なければならない。", "choices": ["２カ月", "３カ月", "６カ月"], "answer": 0, "kaisetsu": "【正解】1）2カ月。青色申告承認申請期限：1月16日以後に事業開始した場合、その年分から青色申告を受けるには「事業開始日から2ヶ月以内」に申請書を提出する必要があります。期限厳守が必須です。"}, {"num": 51, "type": "multi", "text": "相続税路線価は、相続税や（ ① ）を算定する際の土地等の評価額の基準となる 価格であり、地価公示法による公示価格の（ ② ）を価格水準の目安として設定さ れる。", "choices": ["① 贈与税 ② 70％", "① 贈与税 ② 80％", "① 固定資産税 ② 80％"], "answer": 1, "kaisetsu": "【正解】2）① 贈与税 ② 80%。相続税路線価の設定基準：相続税と「贈与税」の両方の評価基準となり、公示価格の「80%」を水準目安として設定されます。この数字は不動産評価の基本です。"}, {"num": 52, "type": "multi", "text": "下記の200㎡の土地に建築面積120㎡、延べ面積160㎡の２階建ての住宅を建築した場 合、当該建物の建蔽率は、（ ）である。 幅員６ｍ公道 200㎡", "choices": ["60％", "80％", "100％"], "answer": 0, "kaisetsu": "【正解】1）60%。建蔽率の計算：建蔽率＝建築面積÷敷地面積＝120㎡÷200㎡＝60%。「延べ面積」ではなく「建築面積」を使うことが重要。建築面積は水平投影面積を指します。"}, {"num": 53, "type": "multi", "text": "建物の区分所有等に関する法律（区分所有法）によれば、規約の変更は、区分所有 者および議決権の各（ ）以上の多数による集会の決議によらなければならない。", "choices": ["３分の２", "４分の３", "５分の４"], "answer": 1, "kaisetsu": "【正解】2）4分の3。区分所有法での規約変更：「区分所有者および議決権の各4分の3以上」の決議が必要です。高い要件により規約の安定性を確保する仕組みになっています。"}, {"num": 54, "type": "multi", "text": "投資総額5,000万円で購入した賃貸用不動産の年間収入の合計額が270万円、年間費用 の合計額が110万円である場合、この投資の純利回り（ＮＯＩ利回り）は、（ ）であ る。", "choices": ["2.2％", "3.2％", "5.4％"], "answer": 1, "kaisetsu": "【正解】2）3.2%。不動産投資のNOI利回り計算：NOI利回り（純利回り）＝（年間収入－年間費用）÷総投資額＝（270万円－110万円）÷5,000万円＝160万円÷5,000万円＝3.2%。不動産投資の収益性を測る基本指標です。"}, {"num": 55, "type": "multi", "text": "自己が居住していた家屋を譲渡する場合、その家屋に居住しなくなった日から （ ① ）を経過する日の属する年の（ ② ）までに譲渡しなければ、「居住用財産 を譲渡した場合の3,000万円の特別控除」の適用を受けることができない。", "choices": ["① ３年 ② ３月15日", "① ３年 ② 12月31日", "① ５年 ② 12月31日"], "answer": 1, "kaisetsu": "【正解】2）① 3年 ② 12月31日。3,000万円特別控除の適用条件：「居住しなくなった日から3年を経過する日の属する年の12月31日までに譲渡」が必須です。期限を過ぎると特例が受けられないので要注意です。"}, {"num": 56, "type": "multi", "text": "「直系尊属から教育資金の一括贈与を受けた場合の贈与税の非課税」の適用を受けた 場合、受贈者１人につき（ ① ）までは贈与税が非課税となるが、学校等以外の者 に対して直接支払われる金銭については、（ ② ）が限度となる。", "choices": ["① 1,000万円 ② 500万円", "① 1,500万円 ② 300万円", "① 1,500万円 ② 500万円"], "answer": 2, "kaisetsu": "【正解】3）① 1,500万円 ② 500万円。教育資金一括贈与の非課税枠：「受贈者1人につき1,500万円までは非課税」。ただし「学校等以外の者への支払い」は「500万円が限度」という二重の上限が設定されています。"}, {"num": 57, "type": "multi", "text": "下記の＜親族関係図＞において、Ａさんの相続における妻Ｂさんの法定相続分は、 （ ）である。 ＜親族関係図＞ 父 母Ｃさん （既に死亡） 兄Ｄさん 姉Ｅさん Ａさん 妻Ｂさん （被相続人）", "choices": ["２分の１", "３分の２", "４分の３"], "answer": 1, "kaisetsu": "【正解】2）3分の2。相続人が妻と兄弟姉妹の場合：配偶者の法定相続分は「3分の2」となります。配偶者を優先保護する民法の基本原則です。"}, {"num": 58, "type": "multi", "text": "下記の＜親族関係図＞において、Ａさんの相続における相続税額の計算上、遺産に係 る基礎控除額は、（ ）である。 ＜親族関係図＞ 父Ｃさん 母Ｄさん 兄Ｅさん Ａさん 妻Ｂさん （被相続人）", "choices": ["4,500万円", "4,800万円", "5,400万円"], "answer": 1, "kaisetsu": "【正解】2）4,800万円。相続税基礎控除額の計算：基礎控除＝3,000万円＋600万円×法定相続人の数。相続人が妻と兄妹3人の場合、法定相続人は4人となり、3,000万円＋600万円×4人＝4,800万円です。"}, {"num": 59, "type": "multi", "text": "「配偶者に対する相続税額の軽減」の適用を受けた場合、配偶者の相続税の課税価格 が、相続税の課税価格の合計額に対する配偶者の法定相続分相当額または（ ） のいずれか多い金額までであれば、原則として、配偶者が納付すべき相続税額は算出 されない。", "choices": ["１億2,000万円", "１億6,000万円", "１億8,000万円"], "answer": 1, "kaisetsu": "【正解】2）1億6,000万円。配偶者に対する相続税額軽減：配偶者の課税価格が「法定相続分相当額または1億6,000万円のいずれか多い方まで」であれば、原則として相続税は算出されません。配偶者を手厚く保護する重要な制度です。"}, {"num": 60, "type": "multi", "text": "貸家建付地の相続税評価額は、（ ）の算式により算出される。", "choices": ["自用地としての価額×（１－借地権割合）", "自用地としての価額×（１－借家権割合×賃貸割合）", "自用地としての価額×（１－借地権割合×借家権割合×賃貸割合） （終）"], "answer": 2, "kaisetsu": "【正解】3）自用地としての価額×（1－借地権割合×借家権割合×賃貸割合）。貸家建付地の相続税評価：自用地評価から3つの権利割合を段階的に乗じて減額します。これは土地所有者と借地人・借家人の権利を総合的に考慮した複合計算です。"}]}, {"id": "202401", "label": "2024年1月", "questions": [{"num": 1, "type": "ox", "text": "弁護士の登録を受けていないファイナンシャル・プランナーが、資産管理の相談に 来た顧客の求めに応じ、有償で、当該顧客を委任者とする任意後見契約の受任者とな ることは、弁護士法に抵触する。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\nファイナンシャル・プランナー（FP）が弁護士資格なしで任意後見人になることは、実は弁護士法違反ではありません。任意後見契約は特別な資格を必要とせず、信頼できる人誰でもなることができます。ただし、顧客の資産管理や将来計画についてのアドバイス業務は、FPの専門範囲内です。弁護士法に触れるのは「法律事務の提供」をした場合で、単に後見契約の受任者になるだけでは抵触しません。"}, {"num": 2, "type": "ox", "text": "労働者災害補償保険の保険料は、労働者と事業主が折半で負担する。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\n労働者災害補償保険（労災保険）の保険料は、事業主が全額負担します。労働者は一切払いません。覚えておこう！労災保険は「労働者を守る制度」なので、雇用する側が負担するルールです。これは健康保険の保険料が労働者と事業主で折半される（通常49.5% vs 50.5%）のとは異なります。"}, {"num": 3, "type": "ox", "text": "国民年金の学生納付特例制度の適用を受けた期間に係る保険料のうち、追納するこ とができる保険料は、追納に係る厚生労働大臣の承認を受けた日の属する月前10年以 内の期間に係るものに限られる。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【ここがポイント！】\n国民年金の学生納付特例制度を利用した期間の保険料は、後から納められます（追納制度）。ただし、追納できるのは「承認日から遡って10年以内」という時間制限があります。例えば2024年3月に承認されたら、2014年4月以降の期間が対象になります。注意：保険料額の時効は2年ですが、追納制度の対象は別の規定で10年と決まっています。"}, {"num": 4, "type": "ox", "text": "遺族基礎年金を受給することができる遺族は、国民年金の被保険者等の死亡の当時、 その者によって生計を維持され、かつ、所定の要件を満たす「子のある配偶者」また は「子」である。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【ここがポイント！】\n遺族基礎年金の受給対象者は限定的です。「子のある配偶者」または「子」だけ。つまり、子がいない配偶者だけでは受給できません。また「生計を維持していた」という事実が重要です。これは遺族厚生年金とは異なり、親や兄弟姉妹は基本的に対象外です。覚えておこう：基礎年金は「子」が軸になっています。"}, {"num": 5, "type": "ox", "text": "日本学生支援機構の奨学金と日本政策金融公庫の教育一般貸付（国の教育ローン） は、重複して利用することができる。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【ここがポイント！】\n日本学生支援機構の奨学金と日本政策金融公庫の教育ローンは、両方同時に利用可能です。奨学金は学生本人への給与・貸与で、教育ローンは親が借りるもの。性質が異なるので、重複利用で困る場合が多いですが、制度上は両立できます。ただし返済負担が大きくなるので、計画的に！"}, {"num": 6, "type": "ox", "text": "こども保険（学資保険）において、保険期間中に契約者（＝保険料負担者）である 親が死亡した場合、一般に、既払込保険料相当額の死亡保険金が支払われて保険契約 は消滅する。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\nこども保険（学資保険）で親が死亡した場合、一般的には「保険料払込免除」という特約が自動でついています。つまり以降の保険料が不要になり、契約は続きます。既払込保険料相当額の死亡保険金が支払われて終了…というのは誤った説明です。混乱しやすいけど、学資保険は「子どもの教育資金確保」が目的なので、親の死亡時も保障が続くのです。"}, {"num": 7, "type": "ox", "text": "個人年金保険（終身年金）の保険料は、性別以外の契約条件が同一であれば、被保 険者が女性のほうが男性よりも高くなる。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【ここがポイント！】\n終身年金の保険料では、女性が男性より高くなります。なぜなら、女性の方が平均寿命が長いから。年金は「長く生きるほど多くもらう」制度なので、長生きリスクが高い女性の保険料は割高になります。これは生命保険（死亡保障）とは逆です。"}, {"num": 8, "type": "ox", "text": "少額短期保険業者と契約した少額短期保険の保険料は、所得税の生命保険料控除の 対象とならない。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【ここがポイント！】\n少額短期保険業者の保険料は生命保険料控除の対象外です。生命保険料控除は、一般的な生命保険会社や損保会社の商品が対象で、少額短期保険は対象外と決まっています。少額短期保険自体が比較的新しい制度で、保護もある程度限定的なため、税務上の優遇もありません。"}, {"num": 9, "type": "ox", "text": "家族傷害保険（家族型）において、保険期間中に契約者（＝被保険者本人）に子が 生まれた場合、その子を被保険者に加えるためには追加保険料を支払う必要がある。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\n家族傷害保険（家族型）では、契約後に子どもが生まれた場合、新生児は自動的に被保険者に含まれます。追加保険料は不要です。これは学資保険同様、家族の成長を想定した親切な設計です。ただし、被保険者を追加・変更する場合は別途手続きが必要な場合もあるので、その時は確認を。"}, {"num": 10, "type": "ox", "text": "自動車損害賠償責任保険（自賠責保険）では、他人の自動車や建物などの財物を損壊 し、法律上の損害賠償責任を負担することによって被る損害は補償の対象とならない。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【ここがポイント！】\n自動車損害賠償責任保険（自賠責保険）は、他人のケガや死亡に対する補償のみです。他人の車や建物を壊した場合の「物損」はカバーしません。自賠責は最低限の人身事故補償なので、物損は任意保険で対応する必要があります。"}, {"num": 11, "type": "ox", "text": "日本銀行の金融政策の１つである公開市場操作（オペレーション）のうち、国債買 入オペは、日本銀行が長期国債（利付国債）を買い入れることによって金融市場に資 金を供給するオペレーションである。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【ここがポイント！】\n日本銀行の公開市場操作（オペ）のうち、国債買入オペは長期国債を買って金融市場に資金を供給します。これは「金融緩和」の代表的手段です。逆に、国債売却オペなら資金吸収になります。ここがポイント！オペの目的は「マネーサプライを調整する」ことです。"}, {"num": 12, "type": "ox", "text": "株式投資信託の運用において、個別銘柄の投資指標の分析や企業業績などのリサー チによって投資対象とする銘柄を選定し、その積上げによりポートフォリオを構築す る手法を、トップダウン・アプローチという。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\n個別銘柄の分析から銘柄を選ぶのは「ボトムアップ・アプローチ」です。トップダウン・アプローチは逆で、経済全体 → 業界 → 個別企業、という大きなところから始めます。混乱しやすいけど、「トップダウン」＝「上から下へ」＝「マクロ分析から始める」と覚えましょう。"}, {"num": 13, "type": "ox", "text": "元金2,500,000円を、年利４％（１年複利）で３年間運用した場合の元利合計額は、税 金や手数料等を考慮しない場合、2,812,160円である。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【計算確認】\n2,500,000 × (1.04)^3 = 2,500,000 × 1.124864 = 2,812,160円。正確です！複利計算では時間とともに利息が加速度的に増える効果（複利効果）を感じ取ってください。"}, {"num": 14, "type": "ox", "text": "為替予約を締結していない外貨定期預金において、満期時の為替レートが預入時の 為替レートに比べて円高になれば、当該外貨定期預金の円換算の利回りは高くなる。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\n円高になると、外貨ベースの利息は変わりませんが、円に換算した時点でショックを受けます。例えば1ドル100円で100ドル預けたら、満期時に円高で1ドル90円になった場合、100ドル＝9,000円にしかなりません。利息をもらっても為替損が大きければ、トータルの利回りは下がります。覚えておこう：「円高＝外貨で損」"}, {"num": 15, "type": "ox", "text": "日本国内に本店のある銀行の国内支店に預け入れた外貨預金は、元本1,000万円まで とその利息が預金保険制度による保護の対象となる。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\n外貨預金は預金保険制度の対象外です！日本円による預金だけが保護の対象です。1,000万円+利息というルールは「日本円の普通預金」に限ります。外貨預金のリスクは預金者が負うということです。ここがポイント！これは重要な知識です。"}, {"num": 16, "type": "ox", "text": "所得税における一時所得に係る総収入金額が400万円で、その収入を得るために支出 した金額が200万円である場合、一時所得の金額のうち総所得金額に算入される金額は、 75万円である。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【計算確認】\n一時所得 = (総収入 - 支出 - 50万円) ÷ 2 = (400万 - 200万 - 50万) ÷ 2 = 150万 ÷ 2 = 75万円。50万円の控除と1/2課税ルールが一時所得の特徴です。"}, {"num": 17, "type": "ox", "text": "個人が賃貸アパートの敷地および建物を売却したことにより生じた所得は、不動産 所得となる。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\n賃貸アパートの敷地・建物を売却した場合、発生する所得は「譲渡所得」です。不動産所得ではありません。混乱しやすいけど、不動産所得は「継続的な家賃収入」、譲渡所得は「売却による一時的な利益」。アパート自体を売るのは譲渡、アパートを貸して家賃を得るのが不動産所得です。"}, {"num": 18, "type": "ox", "text": "所得税において、納税者の合計所得金額が1,000万円を超えている場合、医療費控除 の適用を受けることができない。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\n医療費控除に所得制限はありません！合計所得1,000万円を超えていても医療費控除は受けられます。ただし、「セルフメディケーション税制」には所得制限（200万円未満）がありますので混同注意。医療費控除 = 制限なし、セルフメディケーション = 所得制限ありです。"}, {"num": 19, "type": "ox", "text": "所得税において、その年の12月31日時点の年齢が16歳未満である扶養親族は、扶養 控除の対象となる控除対象扶養親族に該当しない。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【ここがポイント！】\n16歳未満の扶養親族は扶養控除の対象外です。扶養控除の対象は16歳以上です。ただし、児童手当などの別の制度では16歳未満が対象になります。覚えておこう：扶養控除は「16歳以上」が基本ルール。"}, {"num": 20, "type": "ox", "text": "所得税において、上場株式の配当に係る配当所得について申告分離課税を選択した 場合、配当控除の適用を受けることができない。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【ここがポイント！】\n上場株式の配当所得で申告分離課税を選択すると、配当控除は使えません。申告分離課税を選ぶメリットは「他の損失と相殺できる」ことですが、デメリットが配当控除の喪失です。一方、総合課税を選ぶと配当控除が使えます。どちらを選ぶかは慎重に判断が必要です。"}, {"num": 21, "type": "ox", "text": "不動産の登記記録において、所有権の移転に関する事項は、権利部（甲区）に記録 される。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【ここがポイント！】\n不動産登記簿は「表示部」「権利部（甲区）」「権利部（乙区）」に分かれます。所有権移転は権利部（甲区）に記録されます。甲区 = 所有権、乙区 = 抵当権などの担保権。覚えておこう：甲（こう）＝所有権のA，乙（おつ）＝その他の権利。"}, {"num": 22, "type": "ox", "text": "宅地建物取引業法によれば、宅地または建物の売買の媒介契約のうち、専任媒介契 約を締結した宅地建物取引業者は、依頼者に対し、当該契約に係る業務の処理状況を ２カ月に１回以上報告しなければならない。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\n専任媒介契約で宅地建物取引業者が報告する頻度は「1ヶ月に1回以上」です。2ヶ月に1回ではありません。一般媒介契約では報告義務がより緩いですが、専任媒介はより頻繁な報告が必要です。覚えておこう：「専任」＝より手厚いサポート＝報告も頻繁。"}, {"num": 23, "type": "ox", "text": "建築基準法によれば、建築物が防火地域および準防火地域にわたる場合、原則とし て、その全部について、敷地の過半が属する地域内の建築物に関する規定が適用され る。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\n建築基準法では、防火地域と準防火地域にまたがる場合、「敷地の過半が属する地域の規定」ではなく「最も厳しい方の規定を敷地全体に適用」するのが原則です。混乱しやすいけど、安全側（より厳しい方）に統一することが原則です。"}, {"num": 24, "type": "ox", "text": "不動産取得税は、相続人が不動産を相続により取得した場合には課されない。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【ここがポイント！】\n不動産取得税は相続による取得には課されません。これは相続税ですでに課税されるため、二重課税を避けるためです。一方、生前贈与による取得には不動産取得税がかかります。ここがポイント！相続はいろいろな税制上の優遇があります。"}, {"num": 25, "type": "ox", "text": "不動産投資に係る収益性を測る指標のうち、純利回り（ＮＯＩ利回り）は、対象不動 産から得られる年間の総収入額を総投資額で除して算出される。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\n純利回り（NOI利回り）は「年間の純利益（総収入－経費）÷総投資額」で算出します。総収入ではなく「純利益」を使う点が重要です。混乱しやすいけど、「総収入利回り」なら総収入÷総投資、「純利回り」なら純利益÷総投資です。"}, {"num": 26, "type": "ox", "text": "定期贈与とは、贈与者が受贈者に対して定期的に財産を給付することを目的とする 贈与をいい、贈与者または受贈者のいずれか一方が生存している限り、その効力を失 うことはない。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\n定期贈与（毎年定期的に贈与すること）は、贈与者または受贈者のいずれかが死亡すると、その効力を失います。「生存している限り」ではなく「どちらかが亡くなると終わる」ということです。これは年金形式の贈与を税制上で注意するための規定です。"}, {"num": 27, "type": "ox", "text": "相続において、養子の法定相続分は、実子の法定相続分の２分の１となる。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\n養子の法定相続分は実子と全く同じです。2分の1ではなく「1分の1」（同等）。法律上、養子は実子と同じ扱いです。複数の養子がいる場合は按分されますが、実子との間に差は付きません。"}, {"num": 28, "type": "ox", "text": "相続税額の計算上、被相続人が生前に購入した墓碑の購入代金で、相続開始時にお いて未払いであったものは、債務控除の対象となる。", "choices": [], "answer": false, "kaisetsu": "答え：×（誤り）\n\n【ここがポイント！】\n墓碑購入代金は債務控除の対象外です。祭祀財産（墓地、仏壇など）は相続税の課税対象外ですが、代わりに債務控除も受けられません。ここがポイント！「非課税 = 債務控除も不可」という相互関係です。"}, {"num": 29, "type": "ox", "text": "相続税額の計算上、遺産に係る基礎控除額を計算する際の法定相続人の数は、相続人 のうちに相続の放棄をした者がいる場合であっても、その放棄がなかったものとした ときの相続人の数とされる。", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【ここがポイント！】\n相続税の基礎控除額計算では、相続放棄があっても「放棄がなかったものとした」相続人数を使います。例えば子5人中1人が放棄しても、5人のままで計算します。これは基礎控除を決める際に、放棄の有無を影響させないという原則です。"}, {"num": 30, "type": "ox", "text": "個人が、自己が所有する土地上に建築した店舗用建物を第三者に賃貸していた場合、 相続税額の計算上、当該敷地は貸家建付地として評価される。 【第２問】 次の各文章（(31)～(60)）の（ ）内にあてはまる最も適切な文章、語句、数 字またはそれらの組合せを1)～3)のなかから選び、その番号を解答用紙にマー クしなさい。 〔30問〕", "choices": [], "answer": true, "kaisetsu": "答え：○（正しい）\n\n【ここがポイント！】\n自分の土地上に建てた建物を第三者に賃貸している場合、その敷地は「貸家建付地」として評価されます。これは相続税評価で割引が適用される（評価額が下がる）ため、節税効果があります。単なる空き地より、賃貸して活用している方が税務上有利です。覚えておこう：活用方法で評価が変わる！"}, {"num": 31, "type": "multi", "text": "毎年一定金額を積み立てながら、一定の利率で複利運用した場合の一定期間経過後 の元利合計額を試算する際、毎年の積立額に乗じる係数は、（ ）である。", "choices": ["資本回収係数", "年金終価係数", "減債基金係数"], "answer": 1, "kaisetsu": "答え：1（年金終価係数）\n\n【解説】\n毎年一定額を積み立てながら複利運用した場合、最終的な元利合計を計算するには「年金終価係数」を使います。これは「積立金の将来価値」を計算するもの。\n- 資本回収係数 = 現在価値から一定期間の年間取崩額を計算\n- 年金終価係数 = 毎年の積立額から最終額を計算（この問題）\n- 減債基金係数 = 将来必要額に達するための毎年積立額を計算\nこの3つは相互関連しているので、問題文をよく読んで判断します。"}, {"num": 32, "type": "multi", "text": "退職により健康保険の被保険者資格を喪失した者で、喪失日の前日までに継続して （ ① ）以上被保険者であった者は、所定の申出により、最長で（ ② ）、健康保 険の任意継続被保険者となることができる。", "choices": ["① １カ月 ② ２年間", "① ２カ月 ② １年間", "① ２カ月 ② ２年間"], "answer": 2, "kaisetsu": "答え：2（①2ヶ月 ②2年間）\n\n【解説】\n任意継続被保険者の条件は「退職前2ヶ月以上の継続加入」で、加入期間は「最長2年間」です。覚えておこう：「2ヶ月」と「2年間」のセット。これは失業保険（雇用保険）の失業給付90日～360日とは異なります。"}, {"num": 33, "type": "multi", "text": "厚生年金保険の被保険者期間が（ ① ）以上ある者が、老齢厚生年金の受給権を 取得した当時、一定の要件を満たす（ ② ）未満の配偶者を有する場合、当該受給 権者が受給する老齢厚生年金に加給年金額が加算される。", "choices": ["① 10年 ② 65歳", "① 20年 ② 65歳", "① 20年 ② 70歳"], "answer": 1, "kaisetsu": "答え：1（①10年 ②65歳）\n\n【解説】\n加給年金額は、厚生年金加入期間「10年以上」の人が、65歳未満の配偶者を扶養している場合に加算される特例です。20年以上ではなく「10年以上」がポイント。また配偶者が65歳になったら加給は終了します。"}, {"num": 34, "type": "multi", "text": "確定拠出年金の個人型年金の老齢給付金を60歳から受給するためには、通算加入者 等期間が（ ）以上なければならない。", "choices": ["10年", "15年", "20年"], "answer": 0, "kaisetsu": "答え：0（10年）\n\n【解説】\n確定拠出年金（DC）の個人型で60歳から老齢給付金を受け取るには、通算加入者等期間が「10年以上」必要です。15年でも20年でもなく「10年」。ただし、加入期間が10年未満の場合は受給年齢が遅れます。"}, {"num": 35, "type": "multi", "text": "下図は、住宅ローンの（ ① ）返済方式をイメージ図で表したものであり、図中 のＰの部分は（ ② ）部分を、Ｑの部分は（ ③ ）部分を示している。 返 Ｐ 済 額 Ｑ 返済期間", "choices": ["① 元金均等 ② 利息 ③ 元金", "① 元利均等 ② 元金 ③ 利息", "① 元利均等 ② 利息 ③ 元金"], "answer": 0, "kaisetsu": "答え：0（①元金均等 ②利息 ③元金）\n\n【解説】\n元金均等返済では、毎月の返済額の内訳が変化します。元金部分（③）は常に一定で、利息部分（②）は残債とともに減少します。グラフ上Pが利息で減る部分、Qが一定の元金部分になります。元利均等では逆に毎月返済額が一定です。"}, {"num": 36, "type": "multi", "text": "生命保険の保険料は、純保険料および付加保険料で構成されており、このうち付加 保険料は、（ ）に基づいて計算される。", "choices": ["予定利率", "予定死亡率", "予定事業費率"], "answer": 2, "kaisetsu": "答え：2（予定事業費率）\n\n【解説】\n生命保険の純保険料は「死亡率」に基づき、付加保険料は「事業費率」に基づいて計算されます。予定利率は保険料全体に影響しますが、純 vs 付加の分け方では事業費率が付加保険料のキーファクターです。覚えておこう：利率 = 純保険料、事業費 = 付加保険料。"}, {"num": 37, "type": "multi", "text": "国内で事業を行う生命保険会社が破綻した場合、生命保険契約者保護機構による補 償の対象となる保険契約については、高予定利率契約を除き、（ ① ）の（ ② ） まで補償される。", "choices": ["① 既払込保険料相当額 ② 70％", "① 死亡保険金額 ② 80％", "① 責任準備金等 ② 90％"], "answer": 2, "kaisetsu": "答え：2（①責任準備金等 ②90％）\n\n【解説】\n保険会社破綻時の保護は「責任準備金等の90％」が補償の上限です。100％保護ではなく90％であること、また高予定利率契約は対象外であることが重要です。これはセーフティネットはあるが完全ではないという現実を反映しています。"}, {"num": 38, "type": "multi", "text": "自動車を運転中にハンドル操作を誤ってガードレールに衝突し、被保険者である運 転者がケガをした場合、（ ）による補償の対象となる。", "choices": ["対人賠償保険", "人身傷害保険", "自動車損害賠償責任保険"], "answer": 1, "kaisetsu": "答え：1（人身傷害保険）\n\n【解説】\n被保険者である運転者自身のケガは「人身傷害保険」で補償されます。対人賠償は「他人」の人身傷害が対象で、自分のケガは対象外。自賠責保険も他人のケガのみです。人身傷害保険があれば、自分のケガをしっかり補償できます。"}, {"num": 39, "type": "multi", "text": "所得税において、個人が支払う地震保険の保険料に係る地震保険料控除は、原則と して、（ ① ）を限度として年間支払保険料の（ ② ）が控除額となる。", "choices": ["① ５万円 ② 全額", "① ５万円 ② ２分の１相当額", "① 10万円 ② ２分の１相当額"], "answer": 0, "kaisetsu": "答え：0（①5万円 ②全額）\n\n【解説】\n地震保険料控除は「年間保険料の全額」を控除できますが、限度額は「5万円」です。つまり、年間保険料が5万円以上なら5万円控除、5万円未満なら支払額全額が控除となります。生命保険料控除より限度額が高いのは、地震の社会的重要性を反映しています。"}, {"num": 40, "type": "multi", "text": "がん保険において、がんの治療を目的とする入院により被保険者が受け取る入院給 付金は、一般に、１回の入院での支払日数（ ）。", "choices": ["に制限はない", "は90日が限度となる", "は180日が限度となる"], "answer": 0, "
